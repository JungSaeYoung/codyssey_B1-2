분리하는 최적화. 구현은 공유 페이지를 읽기 전용으로 표시해 두고, 쓰기 시도가 일어나면 <a href=\"#page-fault\">페이지 폴트</a>(보호 위반)를 유발해 커널이 그 페이지만 복사하는 식이다. 읽기만 하면 영원히 공유.</li>\n<li><strong>비유</strong>: 같은 책을 둘이 같이 보다가, 한 명이 한 페이지에 메모를 적으려는 순간 그 페이지만 복사해 가져가는 방식.</li>\n<li><strong>왜 중요한가</strong>: 1 GB 짜리 프로세스를 fork 해도 실제 메모리는 거의 안 늘어난다. 그래서 멀티프로세싱이 <em>생각보다</em> 메모리 효율적이다. 단, 시간이 흐르며 페이지가 분리되면 결국 메모리는 늘어난다.</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Copy-on-write\">Copy-on-write — Wikipedia</a></li>\n</ul>\n<h3 id=\"clone-syscall\">clone() 시스템 콜<a class=\"headerlink\" href=\"#clone-syscall\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 리눅스에서 <a href=\"#fork-exec\"><code>fork</code></a> 도 <a href=\"#pthread\"><code>pthread_create</code></a> 도 결국 모두 같은 <code>clone()</code> 시스템 콜의 다른 옵션이다. <code>CLONE_VM</code>·<code>CLONE_FS</code>·<code>CLONE_FILES</code>·<code>CLONE_SIGHAND</code>·<code>CLONE_THREAD</code> 등 플래그로 \"메모리도 공유? 파일도 공유? 시그널 핸들러도 공유?\" 를 결정한다. <code>CLONE_VM</code> 이 켜지면 두 실행 흐름이 <em>같은 메모리 공간</em> 을 본다 — 이게 곧 스레드다.</li>\n<li><strong>비유</strong>: 한 종류의 \"분신술\" 시스템에서 분신과 본체가 무엇을 공유할지 옵션으로 고를 수 있는 것. fork = 아무것도 공유 안 함. thread = 거의 다 공유.</li>\n<li><strong>왜 중요한가</strong>: 리눅스에서 프로세스와 스레드의 경계가 <em>유연</em> 하다는 의미. 그래서 <code>ps -L</code> 이 스레드 별 정보를 보여줄 수 있다. 커널 입장에서는 같은 <a href=\"#pcb\"><code>task_struct</code></a>.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §4.3 멀티스레딩</a></p>\n</blockquote>\n</li>\n</ul>\n<hr />\n<ul>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man2/clone.2.html\">clone(2) — Linux manual page</a></li>\n</ul>\n<h2 id=\"4\">4. 종료 · 보호 정책 · 환경변수<a class=\"headerlink\" href=\"#4\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"oom-killer\">OOM Killer · <code>oom_score</code><a class=\"headerlink\" href=\"#oom-killer\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>OOM Killer</strong>: 물리 메모리(DRAM)와 스왑까지 모두 차서 커널이 더는 페이지를 할당해 줄 수 없을 때 발동하는 비상 장치. 한 프로세스를 골라 <a href=\"#signal\">SIGKILL</a>(9) 로 강제 종료해 메모리를 회수한다. 메모리가 <em>조금 부족한</em> 정도가 아니라 <strong>할당 자체가 막힌</strong> 막다른 상황에서만 작동한다는 점이 흔한 오해 포인트다.</li>\n<li><strong><code>oom_score</code> / badness</strong>: 커널이 각 프로세스에 매기는 \"이 놈을 죽이면 메모리가 많이 회수될까\" 점수. 대체로 <a href=\"#vsz-vs-rss\">RSS</a>(실제 점유 물리 메모리)에 비례해 커진다. <code>/proc/&lt;pid&gt;/oom_score</code> 에서 현재 점수를, <code>/proc/&lt;pid&gt;/oom_score_adj</code> 에서 사람이 직접 매기는 가중치(보정값)를 볼 수 있다. <code>oom_score_adj</code> 는 <strong>-1000 ~ +1000</strong> 범위이며, <strong>-1000 으로 두면 그 프로세스는 사실상 OOM 대상에서 제외</strong>(절대 안 죽임)된다.</li>\n<li><strong>비유</strong>: 응급 상황에서 함선 무게를 줄여야 할 때, 가장 무거운 짐 한 개를 골라 바다에 던지는 함장. <code>oom_score_adj = -1000</code> 은 \"이 짐만큼은 절대 못 버린다\" 라고 못 박아 두는 것.</li>\n<li><strong>왜 중요한가</strong>: OOM Killer 가 발동하면 <em>우리가 죽이고 싶지 않은 중요한 프로세스</em> 까지 끌려갈 수 있다. 그래서 앱 내부에 MemoryGuard 같은 자체 보호 정책을 둬서 커널 OOM Killer 가 발동하기 <em>전에</em> 스스로 죽는다. 이번 미션의 핵심은 \"같은 OOM 이라도 <strong>커널이 죽였나(SIGKILL, <code>dmesg</code> 에 흔적) 앱이 스스로 죽었나(SELF-TERMINATED 로그)</strong> 를 구분\" 하는 것이다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §2.4 OOM — 두 가지 트리거</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man5/proc_pid_oom_score.5.html\">proc_pid_oom_score(5)</a> · <a href=\"https://man7.org/linux/man-pages/man5/proc_pid_oom_score_adj.5.html\">proc_pid_oom_score_adj(5)</a></li>\n</ul>\n<h3 id=\"signal\">시그널 · SIGKILL · SIGTERM<a class=\"headerlink\" href=\"#signal\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#process\">프로세스</a>에게 커널이 전달하는 짧은 비동기 알림. 종류마다 번호와 기본 동작이 정해져 있다.</li>\n<li><strong>SIGTERM (15)</strong>: \"끝낼 준비해\" — 프로세스가 <strong>핸들러로 가로채(catch)</strong> 정상 종료 절차(파일 닫기, 락 풀기 등)를 수행할 수 있다. 핸들러가 없으면 기본 동작은 종료. <code>kill &lt;pid&gt;</code> 의 기본 시그널.</li>\n<li><strong>SIGKILL (9)</strong>: \"지금 즉시 죽여\" — <strong>가로채거나 무시·차단할 수 없는</strong> 단 둘뿐인 시그널 중 하나(다른 하나는 SIGSTOP). 프로세스는 정리 코드를 돌릴 틈도 없이 커널에 의해 즉사한다.</li>\n<li><strong>SIGINT (2)</strong>: 터미널에서 Ctrl+C 가 보내는 시그널. 기본 동작은 종료이며 SIGTERM 처럼 가로챌 수 있다.</li>\n<li><strong>비유</strong>: SIGTERM = \"퇴근 준비하세요\" / SIGKILL = \"당장 끌어내, 변명 금지\" / SIGINT = \"Ctrl+C 누른 사용자의 인내심 끝\".</li>\n<li><strong>왜 중요한가</strong>: MemoryGuard 는 보통 SIGKILL 을 쓰고(<a href=\"#watchdog\">Watchdog</a> 은 SIGTERM 을 쓴다), 이 차이가 곧 정책의 정체를 알려준다. 메모리가 한계에 도달한 상황에선 cleanup 조차 추가 메모리를 요구할 수 있어 SIGKILL(즉사)이 안전하고, CPU 만 문제인 경우엔 SIGTERM(정상 정리)이 적합하다. 로그에서 종료 시그널이 무엇이었는지를 보면 어느 정책이 발동했는지 역추적할 수 있다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §3.4 Watchdog — SIGTERM vs SIGKILL</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man7/signal.7.html\">signal(7)</a></li>\n</ul>\n<h3 id=\"env-var\">환경변수 (Environment Variable)<a class=\"headerlink\" href=\"#env-var\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 프로세스가 자식에게 물려주는 <code>KEY=VALUE</code> 형태의 문자열 묶음. 셸에서 <code>export NAME=value</code> 로 설정하면, 이후 실행되는 자식은 <a href=\"#fork-exec\"><code>exec</code></a> 계열 호출의 <code>envp</code> 인자를 통해 <strong>현재 환경의 복사본</strong> 을 물려받는다. 프로그램은 C 의 <code>getenv(\"NAME\")</code>(파이썬은 <code>os.environ</code>) 으로 읽는다. 핵심 오해 정정: 환경변수는 <strong>상속(복사)</strong> 이라 <em>자식이 바꿔도 부모에게는 반영되지 않고</em>, 부모가 나중에 바꿔도 이미 떠난 자식에게는 영향이 없다. 현재 실행 중 프로세스의 환경은 <code>/proc/&lt;pid&gt;/environ</code> 에서 들여다볼 수 있다.</li>\n<li><strong>비유</strong>: 신입사원이 출근 첫날 받아 가는 가이드 사본. \"사무실 전화번호는 X, 이메일은 Y\" 를 미리 알려주지만, 사원이 자기 사본에 낙서해도 회사 원본은 그대로다.</li>\n<li><strong>왜 중요한가</strong>: <code>agent-leak-app</code> 은 <code>MEMORY_LIMIT</code>, <code>CPU_MAX_OCCUPY</code>, <code>MULTI_THREAD_ENABLE</code> 같은 환경변수를 부팅 시 읽어 이후 행동의 임계치·동작 모드로 쓴다. 환경변수만 바꾸면 코드 재컴파일 없이 정책이 바뀌므로, 어떤 값으로 떠 있었는지가 곧 장애 재현 조건이다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §2.5 환경변수 MEMORY_LIMIT 의 의미</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man7/environ.7.html\">environ(7)</a></li>\n</ul>\n<h3 id=\"watchdog\">Watchdog (감시견)<a class=\"headerlink\" href=\"#watchdog\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 어떤 자원의 사용량을 주기적으로 감시하다가, 임계치를 넘으면 미리 정의된 보호 조치(주로 종료)를 발동하는 패턴. 하드웨어 워치독(타이머를 안 건드리면 보드를 리셋), OS 워치독(리눅스 softlockup/hardlockup 감지기 — 한 태스크가 커널 모드에서 기본 ~20초간 빠져나오지 못하면 경고), 앱 워치독 등 여러 층위에 존재한다. 이번 미션의 <code>Watchdog</code> 은 <strong>앱 내부 정책</strong> 으로, 자기 CPU% 가 <code>CPU_MAX_OCCUPY</code> 를 넘으면 자신에게 <a href=\"#signal\">SIGTERM</a> 을 보내 종료한다.</li>\n<li><strong>비유</strong>: 집의 누전 차단기. 전기를 너무 많이 쓰면 자동으로 차단해 화재를 막는다. 단 이번 미션의 워치독은 \"옆집 분전반(커널)\" 이 아니라 \"내 방에 직접 단 차단기(앱)\" 다.</li>\n<li><strong>왜 중요한가</strong>: \"내가 폭주하면 알아서 자살\" 패턴은 시스템 전체를 지키는 방어선이자 이번 미션의 핵심 정책 중 하나다. 로그에 <code>[Watchdog] CPU threshold exceeded … SIGTERM</code> 이 보이면, 그것은 커널 softlockup 감지기가 아니라 <strong>앱이 스스로 발동한 정책</strong> 임을 구분할 수 있어야 한다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §3.4 Watchdog — CPU 과점유 보호 정책</a></p>\n</blockquote>\n</li>\n</ul>\n<hr />\n<ul>\n<li><strong>출처</strong>: <a href=\"https://docs.kernel.org/admin-guide/lockup-watchdogs.html\">Softlockup/Hardlockup detector — Linux Kernel docs</a></li>\n</ul>\n<h2 id=\"5\">5. 스레드 · 스케줄링<a class=\"headerlink\" href=\"#5\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"thread\">스레드 (Thread)<a class=\"headerlink\" href=\"#thread\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#process\">프로세스</a> 안에서 따로 실행되는 작업 단위. 같은 프로세스의 메모리·파일·코드(텍스트/힙/전역 변수)를 공유하지만 자기만의 실행 흐름과 <a href=\"#memory-segments\">Stack</a>, 레지스터 집합(특히 프로그램 카운터)을 가짐. 리눅스에서 스레드는 별도의 특별한 객체가 아니라 <em>주소 공간 등을 공유하는 또 하나의 실행 단위</em>(<a href=\"#pcb\"><code>task_struct</code></a>)로 구현되며, 같은 프로세스의 스레드들은 하나의 스레드 그룹(TGID = 대표 <a href=\"#pid\">PID</a>)에 묶이고 커널 내부적으로는 각자 고유한 TID 를 가진다. 흔한 오해: \"스레드는 항상 프로세스보다 가볍고 안전하다\" — 생성·전환 비용은 더 싸지만, 메모리를 공유하므로 한 스레드의 버그(잘못된 포인터, 세그폴트)가 프로세스 전체를 죽인다.</li>\n<li><strong>비유</strong>: 한 식당(프로세스) 안의 여러 요리사(스레드). 같은 주방과 재료(메모리)를 공유하면서 각자 다른 요리를 동시에 만든다.</li>\n<li><strong>왜 중요한가</strong>: 멀티스레드는 빠르지만, 같은 자원을 동시에 만지면 충돌(<a href=\"#race-condition\">race condition</a>, <a href=\"#coffman\">데드락</a>)이 생긴다. 이번 미션 3번째 장애의 원인. 공유 메모리 때문에 한 스레드의 폭주가 전체 프로세스의 <a href=\"#oom-killer\">OOM</a>·CPU 폭주로 번지는 점도 분석 포인트.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man2/clone.2.html\">clone(2) — Linux manual page</a></li>\n</ul>\n<h3 id=\"pcb\">PCB · <code>task_struct</code><a class=\"headerlink\" href=\"#pcb\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 프로세스/스레드의 상태(레지스터 값, <a href=\"#pid\">PID</a>/TID, 메모리 정보, 열린 파일 목록, 스케줄링 상태·우선순위 등)를 담아두는 OS 내부 자료구조. 리눅스에서는 <code>task_struct</code> 라는 C 구조체로 표현되며, 모든 실행 단위(프로세스든 스레드든)마다 하나씩 존재한다. 프로세스마다 따로, 스레드마다 따로 만들어진다는 점이 핵심 — 리눅스 커널은 \"프로세스\"와 \"스레드\"를 동일한 <code>task_struct</code> 로 다루고 자원 공유 범위만 다르게 둔다.</li>\n<li><strong>비유</strong>: 식당 손님 카드. 손님 번호, 주문 내역, 결제 정보 등을 한 장에 모아둔 것.</li>\n<li><strong>왜 중요한가</strong>: OS 가 <a href=\"#context-switch\">컨텍스트 스위치</a>(다음 스레드로 바꾸기)를 할 때 PCB 의 정보를 저장·복원한다. <code>/proc/&lt;pid&gt;/</code> 가 노출하는 대부분의 정보(상태·메모리·스레드 목록)가 이 구조체에서 나오므로, 미션의 모니터링·진단도 결국 PCB 를 들여다보는 일이다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://docs.kernel.org/kernel-hacking/locking.html\">docs.kernel.org: Data Structures (task_struct)</a></li>\n</ul>\n<h3 id=\"context-switch\">컨텍스트 스위치 (Context Switch)<a class=\"headerlink\" href=\"#context-switch\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: CPU 가 지금 돌리던 <a href=\"#thread\">스레드</a>를 멈추고 다른 스레드로 바꾸는 행위. 현재 스레드의 모든 레지스터 값을 <a href=\"#pcb\">PCB</a> 에 저장하고, 새 스레드의 값을 PCB 에서 꺼내 레지스터에 채운다. 발생 계기는 (1) <a href=\"#time-slice\">타임 슬라이스</a> 소진, (2) 더 높은 우선순위 스레드의 깨어남(선점), (3) 스레드가 자발적으로 I/O·락 대기로 잠드는 경우.</li>\n<li><strong>비유</strong>: 요리사가 음식 만들기를 잠시 멈추고, 도마/칼/재료 위치를 메모지에 적어둔 뒤, 다른 요리를 시작. 나중에 돌아오면 그 메모지를 보고 정확히 멈춘 자리부터 재개.</li>\n<li><strong>왜 중요한가</strong>: 컨텍스트 스위치는 공짜가 아니다(직접 비용은 보통 수 µs, 캐시·<a href=\"#page-table-tlb\">TLB</a> 가 식는 간접 비용까지 더하면 더 커진다). 너무 자주 일어나면 정작 일하는 시간보다 바꾸는 시간이 길어진다. 또 <em>프로세스 간</em> 스위치는 주소 공간이 바뀌어 <a href=\"#page-table-tlb\">TLB</a> 를 비워야(flush) 하므로 <em>스레드 간</em> 스위치보다 훨씬 비싸다. CPU 사용률이 높은데 처리량이 안 나오면 <code>vmstat</code> 의 <code>cs</code>(context switch) 수치를 의심하라.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Context_switch\">Context switch — Wikipedia</a></li>\n</ul>\n<h3 id=\"ipc\">IPC (Inter-Process Communication)<a class=\"headerlink\" href=\"#ipc\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 서로 격리된 <a href=\"#process\">프로세스</a>끼리 데이터를 주고받는 방법들. 파이프·FIFO(명명된 파이프)·소켓·공유 메모리·메시지 큐·세마포어·<a href=\"#signal\">시그널</a> 등. POSIX 와 System V 두 계열의 표준 메커니즘이 함께 존재한다. 이 중 공유 메모리만이 \"복사 없이\" 데이터를 주고받고, 나머지는 대체로 커널을 거치며 복사 비용이 든다.</li>\n<li><strong>비유</strong>: 다른 사무실에 있는 동료에게 메모를 보내거나(파이프), 전화하거나(소켓), 공용 게시판에 적거나(공유 메모리), 사내 방송으로 알리는 것(<a href=\"#signal\">시그널</a>).</li>\n<li><strong>왜 중요한가</strong>: 멀티프로세스 설계에서 필수. 메모리가 격리돼 있어 변수 공유가 안 되므로 명시적 통신이 필요. <a href=\"#pthread\">멀티스레딩</a> 에 비해 통신이 <em>명시적이고 비싼</em> 게 멀티프로세싱의 트레이드오프. Python <a href=\"#py-multiprocessing\">multiprocessing</a> 의 <code>Queue</code>·<code>Pipe</code> 도 결국 OS IPC 위에 얹혀 있다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man7/pipe.7.html\">pipe(7) — Linux manual page</a></li>\n</ul>\n<h3 id=\"core-smt\">CPU 코어 · 하이퍼스레딩<a class=\"headerlink\" href=\"#core-smt\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>코어</strong>: CPU 칩 안에 들어 있는 독립적 처리 유닛. 코어 하나당 동시에 한 <a href=\"#thread\">스레드</a> 실행 가능.</li>\n<li><strong>하이퍼스레딩 (Hyper-Threading, SMT)</strong>: 한 물리 코어를 OS 가 보기에 2개의 \"논리 프로세서\"처럼 보이게 하는 인텔의 SMT(Simultaneous Multithreading) 구현. 두 논리 프로세서는 각자의 아키텍처 상태(레지스터)를 가지지만 실행 유닛·캐시 같은 물리 자원은 <em>공유</em>한다. 4코어 + HT = OS 가 보기엔 8 \"논리 코어\". 흔한 오해: HT 가 성능을 2배로 만들지는 않는다 — 실행 자원을 공유하므로 워크로드에 따라 통상 15~30% 향상에 그친다.</li>\n<li><strong>비유</strong>: 코어 = 식당 요리사 인원. HT 는 한 명이 두 일을 번갈아/겹쳐 하는 \"1.5인분\" 효과.</li>\n<li><strong>왜 중요한가</strong>: <code>top</code> 에서 %CPU 가 400% 찍혔다면 \"4개 논리 코어를 다 쓰고 있다\" 라는 뜻. 시스템 전체 사용률은 (총합 / 코어 수) 로 나눠서 봐야 함. <a href=\"#concurrency-vs-parallelism\">병렬성</a> 의 상한은 결국 (논리)코어 수이며, CPU-bound 분석에서 \"몇 % 까지가 정상인가\"의 기준선이 된다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Hyper-threading\">Hyper-threading — Wikipedia</a></li>\n</ul>\n<h3 id=\"idle\">idle (유휴 시간)<a class=\"headerlink\" href=\"#idle\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#cpu\">CPU</a> 가 할 일이 없어서 쉬고 있는 시간의 비율. <code>top</code> 의 <code>id</code> 컬럼. 리눅스는 이 외에도 I/O 완료를 기다리느라 노는 시간을 <code>wa</code>(iowait)로 따로 구분하는데, iowait 도 엄밀히는 CPU 가 노는 상태의 한 종류다. 흔한 오해: <code>id</code> 가 0 이라고 곧장 \"위험\"은 아니다 — 의도적으로 코어를 꽉 채워 쓰는 배치 작업이면 정상일 수 있다.</li>\n<li><strong>비유</strong>: 식당 요리사가 주문이 없어 그냥 서 있는 시간의 비율.</li>\n<li><strong>왜 중요한가</strong>: CPU 사용률 = 100% − idle%. <code>monitor.sh</code> 가 사용률을 구하는 공식이 그것. 미션의 CPU 폭주 판정 임계치도 결국 idle% 가 바닥을 치는 순간으로 정의된다.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man1/top.1.html\">top(1) — Linux manual page</a></li>\n</ul>\n<h3 id=\"scheduler\">스케줄러 (Scheduler)<a class=\"headerlink\" href=\"#scheduler\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 여러 <a href=\"#thread\">스레드</a>가 동시에 실행 가능(runnable)할 때, \"다음으로 어느 스레드에게 CPU 를 줄까\" 를 결정하는 커널의 핵심 모듈. 리눅스는 실시간 정책(<code>SCHED_FIFO</code>/<code>SCHED_RR</code>)과 일반 정책(<code>SCHED_OTHER</code>)을 함께 가지며, 실시간 클래스가 항상 일반 클래스보다 먼저 CPU 를 가져간다.</li>\n<li><strong>비유</strong>: 식당 매니저. 손님이 줄을 서면 누구를 어느 테이블에 보낼지 결정한다.</li>\n<li><strong>왜 중요한가</strong>: 스케줄러 정책이 바뀌면 같은 코드도 다른 속도로 돌 수 있다. \"왜 내 작업이 안 끝나지?\" 의 답이 스케줄러에 있을 때가 많다. CPU 경쟁이 심한 미션 상황에서 어떤 프로세스가 굶주리는지(starvation) 이해하는 출발점.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man7/sched.7.html\">sched(7) — Linux manual page</a></li>\n</ul>\n<h3 id=\"time-slice\">타임 슬라이스 (Time Slice / Quantum)<a class=\"headerlink\" href=\"#time-slice\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 한 <a href=\"#thread\">스레드</a>가 <a href=\"#cpu\">CPU</a> 를 잡고 있을 수 있는 (목표) 시간. 보통 수 ms 단위. 이 시간이 지나면 <a href=\"#scheduler\">스케줄러</a>가 강제로 다음 스레드로 바꾼다(선점). 리눅스의 공정 스케줄러는 고정된 슬라이스를 쓰지 않고, 실행 가능한 스레드 수가 많아질수록 각자의 슬라이스를 줄이는 방식이라 슬라이스 길이는 동적이다(예: 기본 슬라이스 파라미터는 수 ms 수준).</li>\n<li><strong>비유</strong>: 회의실 예약 시간. 30분 슬롯이 다 차면 다음 팀에게 양보해야 한다.</li>\n<li><strong>왜 중요한가</strong>: 타임 슬라이스가 짧으면 응답성↑ <a href=\"#context-switch\">컨텍스트 스위치</a>↑(오버헤드↑). 길면 처리량↑ 응답성↓. 트레이드오프의 대표 사례.</li>\n<li><strong>출처</strong>: <a href=\"https://docs.kernel.org/scheduler/sched-design-CFS.html\">CFS Scheduler — The Linux Kernel documentation</a></li>\n</ul>\n<h3 id=\"cfs\">CFS · <code>vruntime</code><a class=\"headerlink\" href=\"#cfs\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>CFS (Completely Fair Scheduler)</strong>: 리눅스 2.6.23(2007)부터 오랫동안 기본 <a href=\"#scheduler\">스케줄러</a>였던 일반 작업용 스케줄러. \"모든 <a href=\"#thread\">스레드</a>를 가능한 한 <em>공정하게</em> 다루겠다\". (참고: 커널 6.6(2023)부터 기본 스케줄러는 CFS 를 계승·개선한 EEVDF 로 교체되었으나, vruntime 기반 공정성·rbtree 구조 등 핵심 개념은 그대로 이어진다.)</li>\n<li><strong><code>vruntime</code></strong>: 각 스레드가 지금까지 받은 CPU 시간을 <a href=\"#nice\">nice 값</a> 가중치로 보정한 \"가상 실행 시간\". 작을수록(= 덜 받았을수록) 우선 실행 대상.</li>\n<li><strong>비유</strong>: CFS = 식당 매니저가 \"오늘 가장 적게 음식 받은 손님에게 다음 음식을 준다\" 정책. vruntime = 손님이 (가중치로 환산해) 받은 음식 양.</li>\n<li><strong>왜 중요한가</strong>: 공정성을 추구하므로 Round-Robin 과 외형이 비슷하지만, 일부 스레드가 자발적으로 sleep 하거나 <a href=\"#nice\">nice 값</a>이 다르면 비율이 달라진다. CPU 를 두고 여러 프로세스가 다툴 때 \"왜 이 비율로 나뉘는가\"를 설명해 준다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Completely_Fair_Scheduler\">Completely Fair Scheduler — Wikipedia</a></li>\n</ul>\n<h3 id=\"nice\">nice 값 · 우선순위<a class=\"headerlink\" href=\"#nice\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 리눅스에서 일반 <a href=\"#thread\">스레드</a>에 매기는 \"양보 정도\". −20 ~ +19 정수(기본 0). 음수일수록 더 많은 CPU 시간을 받음, 양수일수록 양보. nice 차이는 산술이 아니라 가중치(대략 한 단계당 약 1.25배)로 <a href=\"#cfs\">vruntime</a> 누적 속도에 반영된다. 흔한 오해: nice 는 <em>일반(SCHED_OTHER)</em> 작업끼리의 상대적 양보일 뿐, 실시간 우선순위와는 다른 축이다.</li>\n<li><strong>비유</strong>: 회의실 예약 우선권. 임원(낮은 nice)은 먼저 잡고, 일반 직원(높은 nice)은 양보.</li>\n<li><strong>왜 중요한가</strong>: <code>nice</code> / <code>renice</code> 명령으로 조정 가능. 단, nice 를 음수(더 높은 우선순위)로 내리려면 보통 root 권한이 필요하다. 백그라운드 작업은 nice 값을 높여서 시스템 응답성을 지키는 게 정석 — CPU 폭주 프로세스를 죽이지 않고 <code>renice</code> 로 길들이는 완화책의 근거.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man7/sched.7.html\">sched(7): nice values and weights — Linux manual page</a></li>\n</ul>\n<h3 id=\"rb-tree\">빨간-검정 트리 (Red-Black Tree)<a class=\"headerlink\" href=\"#rb-tree\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 자가 균형 이진 탐색 트리의 한 종류. 색(빨강/검정) 규칙으로 트리 높이를 O(log n) 으로 묶어, 삽입·삭제·탐색이 모두 O(log n) 보장.</li>\n<li><strong>비유</strong>: 자동으로 균형을 유지하는 분류 책장. 어느 책을 찾든 비슷한 시간에 찾을 수 있다.</li>\n<li><strong>왜 중요한가</strong>: 리눅스 공정 스케줄러(<a href=\"#cfs\">CFS</a>)가 실행 가능한 <a href=\"#thread\">스레드</a>들을 vruntime 으로 정렬한 시간순 rbtree 로 관리한다. 가장 왼쪽(= vruntime 최소) 노드는 캐시되어 <em>다음 실행 대상 선택은 사실상 O(1)</em>, 삽입·재배치는 O(log n) 으로 끝난다. 그래서 스레드 수가 폭증해도 스케줄링 결정 비용이 안정적이다.</li>\n<li><strong>출처</strong>: <a href=\"https://docs.kernel.org/scheduler/sched-design-CFS.html\">CFS Scheduler — The Linux Kernel documentation</a></li>\n</ul>\n<h3 id=\"pthread\">POSIX Threads (pthread)<a class=\"headerlink\" href=\"#pthread\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 유닉스 계열의 표준 <a href=\"#thread\">스레드</a> API. <code>pthread_create(&amp;tid, attr, func, arg)</code> 로 생성, <code>pthread_join(tid, &amp;ret)</code> 로 종료 대기, <code>pthread_mutex_*</code> 로 락 관리. 리눅스의 현행 구현은 NPTL(Native POSIX Thread Library)로, 각 사용자 스레드가 커널 스케줄링 단위 하나에 1:1 로 대응한다.</li>\n<li><strong>비유</strong>: 모든 유닉스 식당이 따르는 \"요리사 추가 채용 표준 매뉴얼\". 식당마다 똑같은 양식으로 요리사를 부르고 보낼 수 있다.</li>\n<li><strong>왜 중요한가</strong>: C/C++/Rust 등 시스템 언어의 멀티스레드는 거의 다 pthread 위에 얹혀 있다. Python <code>threading</code> 모듈도 내부적으로 pthread 를 부른다. 리눅스에서 <code>pthread_create</code> 는 메모리·파일·시그널 핸들러를 공유하도록 플래그를 켠 <a href=\"#clone-syscall\"><code>clone()</code></a> 시스템 콜로 구현되고, 동기화(mutex·join)는 <a href=\"#futex\"><code>futex</code></a> 위에서 동작한다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man7/nptl.7.html\">nptl(7) — Linux manual page</a> · <a href=\"https://man7.org/linux/man-pages/man7/pthreads.7.html\">pthreads(7) — Linux manual page</a></li>\n</ul>\n<h3 id=\"tls\">TLS (Thread-Local Storage)<a class=\"headerlink\" href=\"#tls\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 같은 <a href=\"#process\">프로세스</a> 안의 <a href=\"#thread\">스레드</a>들이 메모리를 공유하지만, <em>스레드별로 따로 존재하는</em> 변수를 두는 메커니즘. C 에서는 <code>__thread int x</code>(또는 C11 <code>_Thread_local</code>), Python 에서는 <code>threading.local()</code>. 각 스레드는 같은 이름의 변수에 접근해도 자기 전용 사본을 보므로 <a href=\"#lock-mutex\">락</a> 없이 안전하다.</li>\n<li><strong>비유</strong>: 식당의 공용 주방에서 각 요리사가 자기만의 도마와 칼을 따로 갖는 것. 재료는 공유하지만 작업 도구는 개인용.</li>\n<li><strong>왜 중요한가</strong>: 멀티스레드에서 \"스레드마다 다른 컨텍스트(예: DB 커넥션, 로깅 prefix)\" 가 필요할 때 <a href=\"#lock-mutex\">락</a> 없이도 안전하게 가질 수 있다. C 표준 라이브러리의 오류 코드 <code>errno</code> 도 멀티스레드에서 스레드별 변수로 정의되어, 한 스레드의 오류가 다른 스레드의 <code>errno</code> 를 덮어쓰지 않는다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n</li>\n</ul>\n<hr />\n<ul>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Thread-local_storage\">Thread-local storage — Wikipedia</a> · <a href=\"https://man7.org/linux/man-pages/man3/errno.3.html\">errno(3) — Linux manual page</a></li>\n</ul>\n<h2 id=\"6\">6. 병렬 실행 모델<a class=\"headerlink\" href=\"#6\" title=\"Permanent link\">#</a></h2>\n<h2 id=\"6_1\">6. 병렬 실행 모델<a class=\"headerlink\" href=\"#6_1\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"gil\">GIL (Global Interpreter Lock)<a class=\"headerlink\" href=\"#gil\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: CPython(가장 흔한 Python 구현체) 인터프리터 전체를 하나의 거대한 <a href=\"#lock-mutex\">락</a>으로 묶는 메커니즘. 결과: <strong>같은 프로세스 안에서는 한 번에 <em>오직 한 <a href=\"#thread\">스레드</a>만</em> Python 바이트코드를 실행할 수 있다</strong>. GIL 은 영원히 한 스레드가 쥐고 있는 게 아니라, 인터프리터가 주기적으로(기본 <em>약 5ms</em> 의 \"switch interval\", <code>sys.setswitchinterval()</code> 로 조정 가능) 다른 스레드에 넘겨 <em>동시성의 환상</em> 을 만든다. 흔한 오해 둘: ① GIL 은 Python <em>언어</em> 의 속성이 아니라 <em>CPython 구현</em> 의 속성이다(Jython·IronPython 엔 GIL 이 없다). ② \"GIL 때문에 스레드가 쓸모없다\" 는 과장 — I/O 대기·<code>time.sleep</code>·많은 C 확장(NumPy 등)은 GIL 을 <em>놓아주므로</em> 그 구간은 진짜로 병렬이다.</li>\n<li><strong>비유</strong>: 5인용 회의실에 마이크가 하나뿐인 회의. 5명이 들어와 있어도 마이크 가진 한 명만 발언 가능. 단, 발언자가 잠깐 물 마시러 가면(I/O 대기) 마이크를 내려놓아 다른 사람이 집을 수 있다.</li>\n<li><strong>왜 중요한가</strong>: GIL 때문에 Python 멀티스레드는 <strong><a href=\"#cpu-vs-io-bound\">CPU-bound</a> 작업에는 효과가 없다</strong> (코어가 8개여도 1개만 쓰는 셈). <a href=\"#cpu-vs-io-bound\">I/O-bound</a> 작업은 I/O 대기 중 GIL 이 풀려서 의미가 있음. CPU 병렬화가 필요하면 <a href=\"#py-multiprocessing\">멀티프로세싱</a> 으로 가야 한다. CPython 의 메모리 관리(참조 카운팅)가 스레드-안전하지 않아서 도입된 역사적 결정. 최신 흐름: Python 3.12 는 인터프리터별 독립 GIL(PEP 684)을, 3.13 은 GIL 을 끄는 <em>free-threaded</em> 실험 빌드(PEP 703)를 도입했고 3.14 에서 단일스레드 오버헤드가 5~10%대로 개선됐다 — 다만 표준 빌드는 여전히 GIL 이 켜져 있다. 미션에서 <code>MULTI_THREAD_ENABLE</code> 로 스레드를 켰는데도 <a href=\"#cpu\">CPU</a> 가 한 코어만 100% 라면 이 GIL 이 원인이다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §4.5 — Python 의 GIL</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://docs.python.org/3/library/sys.html#sys.setswitchinterval\">sys — System-specific parameters and functions</a> · <a href=\"https://docs.python.org/3/howto/free-threading-python.html\">Python support for free threading</a></li>\n</ul>\n<h3 id=\"py-multiprocessing\">multiprocessing (Python)<a class=\"headerlink\" href=\"#py-multiprocessing\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: Python 의 표준 멀티프로세스 라이브러리. <code>multiprocessing.Process</code>, <code>Pool</code>, <code>Queue</code> 등을 제공해 <a href=\"#gil\">GIL</a> 을 우회하는 진짜 병렬 실행을 가능하게 한다(자식 프로세스마다 자기 인터프리터·자기 GIL 을 가진다). <em>프로세스를 만드는 방식(start method)</em> 이 셋 있다 — <code>fork</code>(부모를 통째로 복제, Linux 전통 기본·빠르지만 멀티스레드 부모에선 위험), <code>spawn</code>(빈 인터프리터를 새로 띄움, 안전·느림), <code>forkserver</code>(중립 서버에서 fork). 흔한 오해: \"항상 <code>fork</code> 를 쓴다\" 는 옛말 — Windows·macOS 는 예전부터 <code>spawn</code> 이 기본이고, <strong>Python 3.14 부터 macOS 를 제외한 Unix 의 기본값이 <code>fork</code> → <code>forkserver</code> 로 바뀌었다</strong>.</li>\n<li><strong>비유</strong>: 마이크 하나로 회의가 안 굴러가니, 회의실을 5개로 쪼개서 5개 회의를 동시에 열기. 회의실마다 마이크(GIL)가 따로 있으니 5명이 동시에 발언한다.</li>\n<li><strong>왜 중요한가</strong>: CPU-bound Python 작업을 멀티코어로 가속하는 <em>표준</em> 방법. 단점은 <a href=\"#ipc\">IPC</a> 가 명시적이고 비싸다는 것 — 객체를 <a href=\"https://docs.python.org/3/library/pickle.html\">pickle</a> 로 직렬화해서 보내야 하고, <code>spawn</code>/<code>forkserver</code> 는 자식이 부모 모듈을 다시 import 한다(전역 코드가 또 실행됨에 유의). 미션에서 <a href=\"#dram\">메모리</a> 사용량이 <em>프로세스 수에 비례</em> 해 늘어나 <a href=\"#oom-killer\">OOM</a> 으로 이어질 수 있는 지점이 바로 여기다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §4.2 — 멀티프로세싱</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://docs.python.org/3/whatsnew/3.14.html\">What's New In Python 3.14 — multiprocessing</a></li>\n</ul>\n<h3 id=\"asyncio\">asyncio · 이벤트 루프<a class=\"headerlink\" href=\"#asyncio\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 단일 <a href=\"#thread\">스레드</a> 안에서 <em>수많은 동시 작업</em> 을 효율적으로 굴리기 위한 비동기 프로그래밍 모델. Python <code>asyncio</code>, JavaScript Node.js, C 의 libuv 등이 같은 원리.</li>\n<li><strong>이벤트 루프</strong>: \"지금 깨어 있어야 할 작업\" 들의 큐를 돌며 하나씩 실행하다가, I/O 대기에 들어가면 다음 작업으로 넘어가는 단일 스레드 스케줄러. 내부적으로 OS 의 다중화 호출(Linux <code>epoll</code>, BSD <code>kqueue</code>, 범용 <code>select</code>)로 \"어떤 <a href=\"#file-descriptor\">파일 디스크립터</a>가 준비됐는지\" 를 한 번에 묻는다.</li>\n<li><strong>협력적(cooperative) 스케줄링</strong>: <a href=\"#thread\">스레드</a>는 OS 가 강제로 뺏는(선점) 반면, 코루틴은 <code>await</code> 지점에서 <em>스스로</em> 제어권을 양보한다. <code>await</code> 가 없으면 양보도 없다 — 이게 아래 \"블로킹\" 문제의 뿌리다.</li>\n<li><strong>비유</strong>: 1명의 손님 응대 직원이 손님 A 에게 \"메뉴 보고 계세요\" 하고 손님 B 응대를 시작, 그 사이 손님 A 가 결정하면 다시 가는 식. 한 명이 100명을 효율적으로 응대.</li>\n<li><strong>왜 중요한가</strong>: I/O-bound 작업에 <a href=\"#thread\">스레드</a> 100개를 만드는 대신 <em>하나의 이벤트 루프</em> 로 처리하면 메모리·컨텍스트 스위치 비용이 훨씬 적다. 단, CPU-bound 작업이 끼거나 동기 블로킹 호출(예: <code>requests.get</code>, <code>time.sleep</code>)을 그대로 부르면 <em>모든 다른 작업이 같이 멈춘다</em> (이벤트 루프 블로킹). 미션에서 단일 프로세스의 <a href=\"#cpu\">CPU</a> 가 100% 인데 응답이 다 굳어버리면 이벤트 루프 블로킹을 의심하라.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://docs.python.org/3/library/asyncio.html\">asyncio — Asynchronous I/O</a> · <a href=\"https://docs.python.org/3/library/asyncio-dev.html\">Developing with asyncio</a></li>\n</ul>\n<h3 id=\"amdahl\">암달의 법칙 (Amdahl's Law)<a class=\"headerlink\" href=\"#amdahl\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 1967년 Gene Amdahl 이 AFIPS 학회에서 발표한 병렬화의 수학적 한계.</li>\n<li><strong>Speedup ≤ 1 / ((1 − p) + p / N)</strong> &nbsp;&nbsp; (p = 병렬화 가능한 코드 비율, N = 코어 수)</li>\n<li>N → ∞ 로 보내면 분모의 <code>p/N → 0</code>, 즉 <strong>최대 speedup 은 <code>1 / (1 − p)</code></strong> 에 수렴한다 — 직렬 부분이 천장을 정한다. 흔한 오해: \"코어를 2배로 늘리면 2배 빨라진다\" 는 p=1(완전 병렬)일 때만 참이다.</li>\n<li><strong>비유</strong>: 부엌 일에서 <em>씻기·자르기</em> 는 사람을 늘려 빨라지지만 <em>국 한 솥을 끓이는 시간</em> 은 사람 수 늘려도 안 줄어든다. 끓이는 시간이 직렬 부분.</li>\n<li><strong>왜 중요한가</strong>: 직렬 부분 5% 만 있어도(p=0.95) 코어를 <em>무한</em> 으로 늘려도 최대 20배. 50% 직렬이면 최대 2배. 그래서 병렬 시스템 설계의 핵심은 \"직렬 구간을 어떻게 줄이느냐\" 다. <a href=\"#lock-mutex\">락</a>으로 묶인 <a href=\"#critical-section\">임계구역</a>은 본질적으로 직렬 구간이므로, 락 경합이 심하면 코어를 늘려도 <a href=\"#cpu\">CPU</a> 활용률이 오르지 않는다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §4.7 — 암달의 법칙</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Amdahl%27s_law\">Amdahl's law — Wikipedia</a></li>\n</ul>\n<h3 id=\"thread-pool\">스레드 풀 (Thread Pool)<a class=\"headerlink\" href=\"#thread-pool\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#thread\">스레드</a>를 그때그때 만들지 않고, <em>미리 N개</em> 를 만들어 두고 작업을 분배하는 패턴. 작업이 끝난 스레드는 죽지 않고 다음 작업을 받아 재사용한다. 풀 크기 N 은 워크로드 성격에 맞춘다 — CPU-bound 면 대략 코어 수, I/O-bound 면 그보다 크게 잡는 게 보통이다.</li>\n<li><strong>비유</strong>: 콜센터 — 전화 올 때마다 사람 뽑지 않고, 상담사 50명을 미리 대기시켜 두고 들어오는 전화를 분배.</li>\n<li><strong>왜 중요한가</strong>: 스레드 생성·종료 비용이 작업당 비용보다 클 때 큰 차이가 난다. Python <code>concurrent.futures.ThreadPoolExecutor</code>, Java <code>ExecutorService</code> 등이 표준 구현. <a href=\"#py-multiprocessing\">멀티프로세싱</a> 에서도 <code>ProcessPoolExecutor</code>, <code>multiprocessing.Pool</code> 로 같은 패턴. 다만 풀 크기를 무한정 키우면 스레드/프로세스마다 <a href=\"#memory-segments\">스택</a>·<a href=\"#dram\">메모리</a>를 먹어 오히려 <a href=\"#oom-killer\">OOM</a> 이나 컨텍스트 스위치 폭증을 부른다 — 풀의 핵심은 <em>상한을 두는 것</em> 이다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §4.6 — 동시 실행 패턴</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://docs.python.org/3/library/concurrent.futures.html#threadpoolexecutor\">concurrent.futures — Launching parallel tasks</a></li>\n</ul>\n<h3 id=\"producer-consumer\">Producer-Consumer (생산자-소비자)<a class=\"headerlink\" href=\"#producer-consumer\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 한 쪽은 작업을 <a href=\"#critical-section\">큐</a>에 <em>생산</em> 하고, 다른 쪽은 큐에서 꺼내 <em>소비</em> 한다. 큐가 비면 소비자가 대기, 가득 차면 생산자가 대기(이 \"가득 차면 대기\" 가 백프레셔/backpressure — 빠른 생산자가 느린 소비자를 압도해 메모리를 무한히 먹는 걸 막는다).</li>\n<li><strong>비유</strong>: 카페에서 바리스타(생산자)가 음료를 카운터(큐)에 올리면 손님(소비자)이 가져간다. 카운터 자리가 다 차면 바리스타가 멈추고, 비어 있으면 손님이 기다린다.</li>\n<li><strong>왜 중요한가</strong>: 멀티스레드·멀티프로세스 동시 실행의 가장 흔한 패턴. 큐 자체는 <a href=\"#lock-mutex\">락</a> + <a href=\"#condition-variable\">컨디션 변수</a> 로 구현된다(Python <code>queue.Queue</code>, <code>multiprocessing.Queue</code>). 데이터 파이프라인의 기본 형태. 큐에 <em>상한이 없으면</em>(<code>maxsize=0</code>) 느린 소비자 때문에 큐가 무한정 자라 <a href=\"#oom-killer\">OOM</a> 으로 직결되므로, 미션 메모리 분석에서 눈여겨볼 구조다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §4.6 — 동시 실행 패턴</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://docs.python.org/3/library/queue.html\">queue — A synchronized queue class</a></li>\n</ul>\n<h3 id=\"fork-join\">Fork-Join (분할-합치기)<a class=\"headerlink\" href=\"#fork-join\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 큰 작업을 N 개로 쪼개서(fork) 병렬 실행 → 모두 끝날 때까지 기다렸다가(join) 결과를 모으는 패턴. 전체 소요 시간은 <em>가장 느린 한 조각</em> 에 묶인다(낙오자/straggler 문제) — 그래서 작업을 균등하게 쪼개는 게 중요하다.</li>\n<li><strong>비유</strong>: 큰 시험지 채점을 5명에게 나눠 주고, 다 끝나면 점수를 합산. 한 명이 유독 두꺼운 묶음을 받으면 나머지 4명이 그를 기다린다.</li>\n<li><strong>왜 중요한가</strong>: MapReduce, 병렬 정렬, 행렬 곱셈 등 대량 데이터 처리의 기본 구조. Java <code>ForkJoinPool</code>, Go 의 <code>sync.WaitGroup</code>, Python <code>concurrent.futures</code> 의 결과 수집 등이 표준 구현 제공. join 지점은 <a href=\"#amdahl\">암달의 법칙</a>의 직렬 구간이자, 한 워커가 락을 쥔 채 끝나지 않으면 <a href=\"#coffman\">데드락</a>으로 전체가 멈출 수 있는 합류점이다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §4.6 — 동시 실행 패턴</a></p>\n</blockquote>\n</li>\n</ul>\n<hr />\n<ul>\n<li><strong>출처</strong>: <a href=\"https://docs.oracle.com/en/java/javase/21/docs/api/java.base/java/util/concurrent/ForkJoinPool.html\">ForkJoinPool — Java Platform SE API</a></li>\n</ul>\n<h2 id=\"7\">7. 동시성 · 데드락<a class=\"headerlink\" href=\"#7\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"race-condition\">Race Condition (경쟁 조건)<a class=\"headerlink\" href=\"#race-condition\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 두 개 이상의 <a href=\"#thread\">스레드</a>(또는 <a href=\"#process\">프로세스</a>)가 같은 자원을 동시에 만질 때, 연산의 <em>인터리빙(interleaving) 순서</em>에 따라 최종 결과가 달라지는 상태. 결과의 정확성이 스케줄러의 타이밍이라는 <em>통제 불가능한 변수</em>에 의존하게 된다. 흔한 오해는 \"<code>x += 1</code> 한 줄이니 원자적(atomic)이겠지\" 인데, 이 한 줄도 실제로는 <em>읽기 → 더하기 → 쓰기</em> 세 단계로 쪼개지므로 두 스레드가 끼어들면 증가분 하나가 통째로 사라진다(lost update). \"버그가 가끔만 나타난다\" 는 가장 무서운 종류의 버그.</li>\n<li><strong>비유</strong>: 식당에서 두 종업원이 동시에 같은 주문서를 읽어 같은 음식을 두 번 만드는 사고.</li>\n<li><strong>왜 중요한가</strong>: 한 번 만들고 끝나는 게 아니라, <em>발생 가능 조건</em> 만 잠재돼 있다. 테스트에서 99 번 통과해도 100 번째에 사고가 난다. <a href=\"#lock-mutex\">락</a>으로 <a href=\"#critical-section\">임계구역</a>을 보호하는 게 정석. 미션의 Deadlock·CPU 이상 분석에서 \"왜 산발적으로만 재현되는가\" 를 설명하는 출발점이다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Race_condition\">Race condition — Wikipedia</a></li>\n</ul>\n<h3 id=\"critical-section\">임계구역 (Critical Section)<a class=\"headerlink\" href=\"#critical-section\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 한 번에 <em>한 <a href=\"#thread\">스레드</a>만</em> 들어가야 하는 코드 구간. 공유 자원을 읽거나 쓰는 부분 전체를 가리킨다. 임계구역은 가능한 한 <em>짧게</em> 잡는 것이 원칙인데, 길수록 다른 스레드의 대기 시간이 늘어 동시성 이점이 사라지고(직렬화), 그 안에서 다른 락을 또 잡으면 <a href=\"#coffman\">데드락</a> 위험이 커지기 때문이다.</li>\n<li><strong>비유</strong>: 일인용 탈의실. 한 명이 들어가면 다른 사람은 밖에서 기다려야 한다.</li>\n<li><strong>왜 중요한가</strong>: 임계구역을 정확히 식별해서 <a href=\"#lock-mutex\">락</a>으로 둘러싸야 <a href=\"#race-condition\">race condition</a> 을 막을 수 있다. 식별이 너무 좁으면 보호가 새고, 너무 넓으면 성능이 죽는다.</li>\n</ul>\n<h3 id=\"lock-mutex\">락 · 뮤텍스 (Lock · Mutex)<a class=\"headerlink\" href=\"#lock-mutex\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>락</strong>: 자원을 보호하는 잠금 장치. 잡으면(acquire) 다른 <a href=\"#thread\">스레드</a>는 못 잡고 대기.</li>\n<li><strong>뮤텍스 (Mutex = Mutual Exclusion)</strong>: 락의 가장 흔한 구현. 한 번에 한 명만 잡을 수 있는 가장 단순한 락. 핵심 규약은 <em>잠근 스레드가 직접 풀어야 한다</em>(소유권 개념)는 것 — 이 점이 아무나 풀 수 있는 <a href=\"#semaphore\">세마포어</a>와 다르다. 파이썬 <code>threading.Lock</code> 은 \"locked / unlocked\" 두 상태만 갖는 가장 원시적인 락으로, <code>acquire()</code> / <code>release()</code> 로 조작한다.</li>\n<li><strong>비유</strong>: 탈의실 문 잠금. 한 명만 잠그면 다른 사람은 밖에서 기다린다. 안에 있는 사람이 풀어야 다음 사람 입장.</li>\n<li><strong>왜 중요한가</strong>: 락을 잘못 쓰면 <a href=\"#coffman\">데드락</a>이 난다(획득 순서 불일치, release 누락 등). 미션에서 멀티스레드 프로세스가 멈춰 있을 때, 그 락의 내부 구현인 <a href=\"#futex\">futex</a> 대기로 잡히는지가 진단 단서다.</li>\n<li><strong>출처</strong>: <a href=\"https://docs.python.org/3/library/threading.html#lock-objects\">threading — Lock Objects, Python docs</a></li>\n</ul>\n<h3 id=\"semaphore\">세마포어 (Semaphore)<a class=\"headerlink\" href=\"#semaphore\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 내부에 <em>정수 카운터</em>를 두는 동기화 장치. <code>acquire()</code> 마다 1 감소, <code>release()</code> 마다 1 증가하며, 카운터가 0이면 <code>acquire()</code> 가 블록된다. 초기값 N 이면 동시에 N 명까지 통과한다(<a href=\"#lock-mutex\">뮤텍스</a>는 N=1 인 특수 경우로 볼 수 있다). 단, 엄밀히는 뮤텍스의 \"소유권\" 개념이 세마포어엔 없어서, 잡은 스레드가 아닌 다른 스레드가 <code>release</code> 할 수도 있다.</li>\n<li><strong>비유</strong>: 좌석 5개짜리 회의실. 5명까지는 들어가고, 6번째는 한 명 나갈 때까지 대기.</li>\n<li><strong>왜 중요한가</strong>: \"DB 커넥션 풀 5개\" 같은 동시 접속 수 제한 시나리오에 적합. 데드락 가능성은 뮤텍스와 동일하게 존재하며, <code>release</code> 누락 시 카운터가 새서 영구 블록(일종의 <a href=\"#starvation\">기아</a>)이 생길 수 있다.</li>\n<li><strong>출처</strong>: <a href=\"https://docs.python.org/3/library/threading.html#semaphore-objects\">threading — Semaphore Objects, Python docs</a></li>\n</ul>\n<h3 id=\"condition-variable\">컨디션 변수 (Condition Variable)<a class=\"headerlink\" href=\"#condition-variable\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: \"특정 조건이 만족될 때까지 잠들었다가, 다른 <a href=\"#thread\">스레드</a>가 깨워줄 때 일어나는\" 동기화 메커니즘. 항상 <a href=\"#lock-mutex\">뮤텍스</a>와 한 쌍으로 쓰며, <code>wait()</code> 는 <em>락을 원자적으로 풀고 잠든 뒤 깨어나면 다시 락을 잡는다</em>. 깨우는 쪽은 <code>notify()</code>(한 명)·<code>notify_all()</code>(전부)을 호출한다. C 에서 <code>pthread_cond_wait</code> / <code>pthread_cond_signal</code>, Python 에서 <code>threading.Condition</code>. 깨어난 뒤에도 조건을 <em>다시 검사</em>(<code>while</code> 루프)해야 한다 — 가짜 깨어남(spurious wakeup)과 다른 소비자가 먼저 채간 경우 때문.</li>\n<li><strong>비유</strong>: 손님이 \"음식 나오면 깨워 주세요\" 하고 자리에서 잠든 뒤, 종업원이 와서 어깨를 두드려 깨우는 방식. <a href=\"#busy-wait\">busy-wait</a> 처럼 계속 확인하지 않아도 됨.</li>\n<li><strong>왜 중요한가</strong>: <a href=\"#producer-consumer\">Producer-Consumer 패턴</a> 의 핵심 도구. 큐가 비었을 때 소비자가 <em>효율적으로 잠들었다가</em> 생산자가 깨우는 식이라 <a href=\"#cpu\">CPU</a>를 태우지 않는다(미션의 CPU 100% 진단에서 \"busy-wait 대신 condition variable 을 썼는가\" 가 갈림길). 락만으로는 못 만든다.</li>\n<li><strong>출처</strong>: <a href=\"https://docs.python.org/3/library/threading.html#condition-objects\">threading — Condition Objects, Python docs</a></li>\n</ul>\n<h3 id=\"coffman\">데드락 · Coffman 조건<a class=\"headerlink\" href=\"#coffman\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 데드락 = 둘 이상의 스레드가 서로가 쥔 자원을 무한히 기다려 <em>전원이</em> 멈춘 상태(누구도 진행하지 못함). Coffman·Elphick·Shoshani 가 1971년 논문 <em>System Deadlocks</em> 에서 정리한 4가지 조건 — (1) 상호 배제(mutual exclusion), (2) 점유 대기(hold-and-wait), (3) 비선점(no preemption), (4) 순환 대기(circular wait) — 이 <em>동시에</em> 성립할 때만 발생한다. 즉 이 중 <em>하나만 깨도</em> 데드락은 원천 차단된다.</li>\n<li><strong>비유</strong>: 좁은 골목에서 두 차가 마주쳐 서로 양보하지 않고 영원히 멈춰 있는 상황.</li>\n<li><strong>왜 중요한가</strong>: \"데드락 막으려면 어떤 조건을 깨야 하나\" 의 체크리스트. 4개 다 외워야 데드락 분석을 자기 말로 할 수 있고, 미션 리포트의 <em>Root Cause Analysis</em> 에서 관찰된 멈춤이 어느 조건의 성립 때문인지 짚어 설명할 수 있다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://uobdv.github.io/Design-Verification/Supplementary/System_Deadlocks-Four_necessary_and_sufficient_conditions_for_deadlock.pdf\">System Deadlocks (Coffman, Elphick, Shoshani, 1971)</a></li>\n</ul>\n<h3 id=\"lock-free\">lock-free 자료구조<a class=\"headerlink\" href=\"#lock-free\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#lock-mutex\">락</a> 없이도 멀티스레드가 안전하게 쓸 수 있도록 설계한 자료구조. CPU 의 원자적 명령인 <code>compare-and-swap</code>(CAS — \"기대값과 같으면 새 값으로 바꾸기\" 를 한 번에 수행)으로 동기화한다. 정확히는 <em>lock-free</em> 는 \"최소 한 스레드는 항상 진행한다\" 는 보장이고, 더 강한 <em>wait-free</em> 는 \"모든 스레드가 유한 단계 안에 끝난다\" 는 보장이다. CAS 기반 설계의 대표적 함정은 ABA 문제(값이 A→B→A 로 돌아오면 CAS 가 \"안 변했다\" 고 착각).</li>\n<li><strong>비유</strong>: 일인용 탈의실 대신, 누가 들어가도 충돌 안 나는 자동 회전문.</li>\n<li><strong>왜 중요한가</strong>: 락이 없으니 <a href=\"#coffman\">데드락</a> 자체가 사라진다(Coffman 의 상호 배제 조건을 깸). 단, 설계가 매우 어렵고 ABA·메모리 회수 문제 때문에 모든 자료구조에 만들 수 있는 건 아니다.</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Compare-and-swap\">Compare-and-swap — Wikipedia</a></li>\n</ul>\n<h3 id=\"try-lock\">try_lock · 타임아웃<a class=\"headerlink\" href=\"#try-lock\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: \"<a href=\"#lock-mutex\">락</a>을 잡으려고 시도하되, 즉시(try) 또는 X 초 안에 못 잡으면 <em>블록하지 않고</em> 실패를 반환하고 포기\" 하는 패턴. Python <code>Lock.acquire(blocking=False)</code> 또는 <code>acquire(timeout=…)</code>, C++ <code>try_lock</code> 이 그 예. 실패 시 호출 측이 이미 쥔 락을 풀고 재시도(backoff)할 길이 열린다.</li>\n<li><strong>비유</strong>: 회의실 문이 잠겨 있으면 5분만 기다리고 다른 회의실 찾아가는 행동.</li>\n<li><strong>왜 중요한가</strong>: <a href=\"#coffman\">Coffman 조건</a>의 \"점유 대기/비선점\" 을 깰 수 있는 실용적 방법. 무한 대기 대신 포기·재시도로 전환하므로, 미션에서 데드락 회피 설계의 근거로 인용하기 좋다.</li>\n</ul>\n<h3 id=\"dining-philosophers\">식사하는 철학자 문제 (Dining Philosophers)<a class=\"headerlink\" href=\"#dining-philosophers\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 동시성 학습용 고전 시나리오. 5명의 철학자가 원탁에 앉아 양옆 포크 <em>두 개를 동시에</em> 들어야 식사 가능 — 모두가 왼쪽 포크를 먼저 들면 오른쪽 포크를 영원히 기다려 데드락(순환 대기)에 빠진다. 원형은 1965년 다익스트라(Edsger Dijkstra)가 출제한 문제이며(원래 컴퓨터의 테이프 드라이브 경쟁 비유), 1971년 토니 호어(Tony Hoare)가 지금의 \"철학자와 포크\" 형태로 재구성했다. 자원 순서화(번호가 낮은 포크부터 들기) 등으로 순환 대기를 깨면 해결된다.</li>\n<li><strong>비유</strong>: 5명이 원탁에 앉아 포크 5개를 사이에 두고 식사. 모두가 동시에 왼쪽 포크를 들고 오른쪽을 기다리면 영원히 멈춤.</li>\n<li><strong>왜 중요한가</strong>: 운영체제 교과서마다 등장. 면접 단골 질문. 이번 미션 리포트의 <em>Root Cause Analysis</em> 에 인용하면 <a href=\"#coffman\">Coffman 조건</a>과 묶여 설득력이 확 올라간다.</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Dining_philosophers_problem\">Dining philosophers problem — Wikipedia</a></li>\n</ul>\n<h3 id=\"starvation\">기아 (Starvation)<a class=\"headerlink\" href=\"#starvation\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#coffman\">데드락</a>은 아니지만(시스템 전체는 진행함) <em>특정 <a href=\"#thread\">스레드</a>만</em> 영영 자원을 못 받아 진행하지 못하는 상태. 다른 스레드들이 계속 우선 처리돼서 차례가 안 온다. 데드락과의 결정적 차이: 데드락은 <em>아무도</em> 진행 못 하고 영구적이지만, 기아는 <em>일부만</em> 막히고 운(타이밍)에 따라 풀릴 수도 있다.</li>\n<li><strong>비유</strong>: 식당에서 한 손님이 매번 우선순위 낮아서 새치기 당하다가 영원히 음식 못 받는 상황.</li>\n<li><strong>왜 중요한가</strong>: 우선순위 기반 스케줄링이나 불공정한 락에서 자주 발생. 데드락과 다른 개념이라 진단 시 구분해야 한다(멈춘 스레드가 <em>전부</em>인지 <em>일부</em>인지가 1차 분기점).</li>\n</ul>\n<h3 id=\"stat-codes\">프로세스 상태 코드 (STAT)<a class=\"headerlink\" href=\"#stat-codes\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <code>ps</code> 의 <code>STAT</code> 컬럼에 찍히는 상태 코드. 첫 글자가 주 상태, 뒤따르는 글자는 부가 플래그다.</li>\n<li><code>R</code>: running or runnable (실행 중 또는 실행 큐에서 대기 가능)</li>\n<li><code>S</code>: interruptible sleep (이벤트 대기 중, 시그널로 깨울 수 있음)</li>\n<li><code>D</code>: uninterruptible sleep (보통 디스크 I/O 대기, 시그널로 강제 깨우기 불가 — 이래서 <code>D</code> 가 많으면 I/O 병목 신호)</li>\n<li><code>Z</code>: defunct/zombie (종료됐는데 부모가 회수(reap) 안 함)</li>\n<li><code>T</code>: stopped (job control 시그널, 예: Ctrl+Z 로 정지)</li>\n<li>뒤에 <code>l</code>: 멀티스레드(NPTL pthreads 등 <code>CLONE_THREAD</code>), <code>+</code>: 포그라운드 프로세스 그룹, <code>s</code>: 세션 리더, <code>&lt;</code>: 높은 우선순위, <code>N</code>: 낮은 우선순위</li>\n<li><strong>비유</strong>: 손님 상태 — 식사 중(R), 음식 기다림(S), 화장실(D), 가버림(Z).</li>\n<li><strong>왜 중요한가</strong>: 데드락 의심 시 <code>Sl</code> 이 뜨면 <em>멀티스레드 프로세스가 인터럽트 가능 sleep</em> 에 잠겨 있다는 강한 단서. <code>R</code> 인데 안 끝나면 <a href=\"#infinite-loop\">무한 루프</a>/<a href=\"#busy-wait\">busy-wait</a>를, <code>D</code> 가 박혀 있으면 I/O 대기를 의심하는 식으로 1차 분류에 쓴다.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man1/ps.1.html\">ps(1) — Linux manual page</a></li>\n</ul>\n<h3 id=\"futex\">futex (Fast Userspace muTEX)<a class=\"headerlink\" href=\"#futex\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 리눅스에서 유저 공간 <a href=\"#lock-mutex\">락</a>을 효율적으로 구현하기 위한 커널 기반 메커니즘과 그 <a href=\"#syscall\">시스템 콜</a>(<code>futex(2)</code>). 핵심은 <em>경합 없는(uncontended) 경우를 빠르게</em> 만드는 것 — 락이 비어 있으면 유저 공간의 원자적 연산만으로 끝나 커널 진입이 아예 없고(나노초 수준), 경합이 생겼을 때만 <code>FUTEX_WAIT</code>/<code>FUTEX_WAKE</code> 시스템 콜로 커널에 잠들고 깨운다.</li>\n<li><strong>비유</strong>: 회의실 문이 안 잠겨 있으면 그냥 들어가고(빠름), 잠겨 있을 때만 \"노크하고 기다리는\" 시스템.</li>\n<li><strong>왜 중요한가</strong>: Python <code>threading.Lock</code>, C++ <code>std::mutex</code> 의 락 대기가 내부적으로 futex 로 내려간다. 그래서 데드락이 나면 <a href=\"#wchan\"><code>wchan</code></a>에 <code>futex_wait_queue</code> 같은 이름이 찍혀 \"이 스레드는 락을 기다리는 중\" 이라는 결정적 단서가 된다.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man7/futex.7.html\">futex(7) — Linux manual page</a></li>\n</ul>\n<h3 id=\"wchan\"><code>wchan</code> (Wait Channel)<a class=\"headerlink\" href=\"#wchan\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#thread\">스레드</a>가 sleep 상태일 때 <em>어느 커널 함수 안에서 잠들어 있는지</em>를 가리키는 심볼릭 이름. <code>/proc/&lt;pid&gt;/wchan</code> 파일이 \"the symbolic name corresponding to the location in the kernel where the process is sleeping\" 를 담으며, <code>ps -L -o wchan</code> 으로도 본다(읽기엔 ptrace 권한 필요). 깨어 있거나 잠들어 있지 않으면 <code>0</code>(또는 빈 값)으로 표시된다.</li>\n<li><strong>비유</strong>: 잠든 사람이 \"어떤 일 때문에 잠들었는지\" 라벨을 붙여둔 것.</li>\n<li><strong>왜 중요한가</strong>: <code>wchan</code> 만 보면 \"이 스레드가 락 대기(<a href=\"#futex\">futex</a>)인가, I/O 대기인가, 단순 sleep 인가\" 가 한눈에 구분된다. 외부(비침습)에서 코드를 안 봐도 데드락 vs CPU spike 를 가르는 핵심 컬럼이다.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man5/proc_pid_wchan.5.html\">proc_pid_wchan(5) — Linux manual page</a></li>\n</ul>\n<h3 id=\"busy-wait\">busy-wait (바쁜 대기)<a class=\"headerlink\" href=\"#busy-wait\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 조건이 만족될 때까지 <code>while (!condition) {}</code> 식으로 <em><a href=\"#cpu\">CPU</a> 를 계속 돌리면서</em> 폴링하며 기다리는 패턴(스핀 대기/spin-wait). 잠들지 않으므로 코어 하나를 100% 점유한다 — CPU 100% 점유의 가장 흔한 원인. 임계구역이 <em>극히 짧을 때만</em> 스핀락이 정당화되고, 그 외에는 거의 항상 <a href=\"#condition-variable\">컨디션 변수</a> 같은 블로킹 대기가 옳다.</li>\n<li><strong>비유</strong>: 친구가 올 때까지 문 앞에서 계속 깡총깡총 뛰는 행동. 가만히 의자에 앉아 기다리면 될 일을.</li>\n<li><strong>왜 중요한가</strong>: 올바른 동시성 코드는 <a href=\"#condition-variable\">컨디션 변수</a> 같은 메커니즘으로 잠들었다가 <em>깨어나는</em> 방식을 쓴다. busy-wait 는 거의 항상 버그 또는 미숙한 설계이며, 미션의 CPU spike 진단에서 <code>STAT=R</code> + 높은 <code>%CPU</code> + 비-<code>futex</code> <code>wchan</code> 조합으로 식별된다.</li>\n</ul>\n<h3 id=\"infinite-loop\">무한 루프 (Infinite Loop)<a class=\"headerlink\" href=\"#infinite-loop\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 종료 조건이 영영 거짓이 되지 않아 끝나지 않는 반복문. <code>while True: pass</code>, <code>for(;;) {}</code> 같은 코드. 안에서 sleep·I/O·블로킹 호출이 없으면 한 코어를 100% 태운다.</li>\n<li><strong>비유</strong>: \"끝낼 때까지 계속\" 만 정해두고 <em>끝낼 조건</em> 을 안 적은 일. 영원히 안 멈춘다.</li>\n<li><strong>왜 중요한가</strong>: <a href=\"#cpu\">CPU</a> 100% 점유의 대표 원인. <a href=\"#busy-wait\">busy-wait</a> 도 무한 루프의 한 종류(차이: busy-wait 는 <em>조건을 돌면서</em> 계속 체크). 무한 루프는 <a href=\"#watchdog\">Watchdog</a> 같은 외부 감시가 깨주지 않으면 자체적으로 못 멈추므로 시스템에 <em>반드시</em> 안전망이 필요하다.</li>\n</ul>\n<h3 id=\"refcount\">참조 카운팅 (Reference Counting)<a class=\"headerlink\" href=\"#refcount\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 모든 객체에 \"지금 나를 가리키는 참조가 몇 개냐\" 라는 정수 카운터를 붙이고, 카운터가 0 이 되면 <em>즉시</em> 메모리를 해제하는 메모리 관리 방식. CPython 의 기본 <a href=\"#malloc-free-gc\">GC</a> 가 이 방식이며, 보충적으로 순환 참조(서로를 가리켜 카운터가 0이 안 되는 경우)를 잡는 <em>순환 가비지 컬렉터</em>를 함께 둔다. 일부 객체는 불멸(immortal)로 지정돼 카운터가 갱신되지 않는다.</li>\n<li><strong>비유</strong>: 도서관 책에 \"지금 누가 빌렸나\" 카드를 붙여 두고, 카드가 비면 책장에 자동 반납.</li>\n<li><strong>왜 중요한가</strong>: <a href=\"#gil\">GIL</a> 이 존재하는 <em>근본 이유</em>. 멀티스레드가 동시에 카운터를 ++/-- 하면 <a href=\"#race-condition\">race condition</a> 으로 카운터가 망가져 메모리 누수 또는 이중 해제(=크래시)가 일어난다. GIL 은 그걸 \"한 번에 한 스레드만 바이트코드를 실행하게\" 막는 가장 단순한 해결책으로, 객체 모델을 암묵적으로 스레드 안전하게 만든다(대신 멀티코어 병렬성을 희생).</li>\n</ul>\n<hr />\n<ul>\n<li><strong>출처</strong>: <a href=\"https://docs.python.org/3/glossary.html#term-reference-count\">Python Glossary: reference count</a> · <a href=\"https://docs.python.org/3/glossary.html#term-global-interpreter-lock\">Python Glossary: global interpreter lock</a></li>\n</ul>\n<h2 id=\"8\">8. 운영 도구<a class=\"headerlink\" href=\"#8\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"proc\"><code>/proc</code> 가상 파일시스템<a class=\"headerlink\" href=\"#proc\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 실제 디스크에 데이터가 없는 <strong>의사(pseudo) 파일시스템</strong>. 커널 내부 자료구조를 텍스트 파일처럼 노출하는 인터페이스로, 보통 <code>/proc</code> 에 마운트된다. 실행 중인 프로세스마다 PID 이름의 디렉터리(<code>/proc/&lt;pid&gt;/</code>)가 생기고, 시스템 전체 정보는 <code>/proc/cpuinfo</code>·<code>/proc/meminfo</code>·<code>/proc/stat</code> 등에 있다. 파일 대부분은 읽기 전용이지만 일부(<code>/proc/sys/...</code>, sysctl)는 쓰기로 커널 파라미터를 런타임에 바꿀 수 있다. 흔한 오해: \"파일이니 디스크 용량을 차지한다\" — 아니다. 읽는 순간 커널이 값을 생성하는 가상 파일이라 <code>ls -l</code> 의 크기는 대부분 0 으로 보인다.</li>\n<li><strong>비유</strong>: 빌딩 1층에 걸린 실시간 전광판. 지금 누가 어디 있는지 텍스트로 보여준다.</li>\n<li><strong>왜 중요한가</strong>: <code>top</code>, <code>ps</code>, <code>free</code> 모두 결국 <code>/proc</code> 을 읽는다. 명령어가 막히거나 의심스러울 때 <code>cat /proc/&lt;pid&gt;/status</code> 로 RSS·스레드 수·State 같은 원본 진실에 직접 닿을 수 있다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §6 시스템 관제 도구 정리</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man5/proc.5.html\">proc(5) — Linux manual page</a> · <a href=\"https://docs.kernel.org/filesystems/proc.html\">The /proc Filesystem — The Linux Kernel documentation</a></li>\n</ul>\n<h3 id=\"top-ps\"><code>top</code> · <code>htop</code> · <code>ps</code><a class=\"headerlink\" href=\"#top-ps\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><code>top</code>: <a href=\"#process\">프로세스</a> 사용량(CPU·메모리)을 <em>실시간</em> 으로 갱신(기본 3초 간격)해 보여주는 도구. <code>q</code> 로 종료, <code>top -H</code> 는 스레드 단위 표시.</li>\n<li><code>htop</code>: top 의 향상 버전. 색깔·트리뷰·마우스 지원. (별도 설치 필요)</li>\n<li><code>ps</code>: 그 순간의 <em>스냅샷</em> 만 한 번 찍어 표시. 출력이 고정 텍스트라 스크립트에서 파싱하기 좋음.</li>\n<li><strong>비유</strong>: top = CCTV 라이브 화면, ps = 폴라로이드 사진 한 장.</li>\n<li><strong>왜 중요한가</strong>: 데드락은 시간이 흐르지 않으므로 ps 한 장으로 충분(특히 <code>ps -L ... -o ...,wchan</code> 으로 멈춘 스레드의 대기 함수 확인). CPU 폭주는 실시간 변화를 봐야 하니 top(또는 <code>top -H</code>) 필요. 둘 다 내부적으로는 <a href=\"#proc\"><code>/proc</code></a> 을 읽는 래퍼다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §6 시스템 관제 도구 정리</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man1/top.1.html\">top(1) — Linux manual page</a> · <a href=\"https://man7.org/linux/man-pages/man1/ps.1.html\">ps(1) — Linux manual page</a></li>\n</ul>\n<h3 id=\"dmesg\"><code>dmesg</code><a class=\"headerlink\" href=\"#dmesg\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 커널이 출력한 메시지를 <strong>커널 링 버퍼(kernel ring buffer)</strong> 에서 읽어 보여주는 명령어. 커널 코드는 <code>printk()</code> 로 메시지를 이 고정 크기 순환(circular) 버퍼에 쌓고, 가득 차면 가장 오래된 메시지부터 덮어쓴다. 따라서 부팅 이후의 하드웨어 변화·드라이버 로드·<a href=\"#oom-killer\">OOM Killer</a> 발동 같은 사건이 보이지만, 오래된 사건은 버퍼가 회전하며 사라질 수 있다. <code>dmesg -T</code> 로 사람이 읽는 타임스탬프, <code>dmesg -w</code> 로 실시간 추적.</li>\n<li><strong>비유</strong>: 빌딩 관리실의 로그북(다만 페이지 수가 고정이라 꽉 차면 앞장부터 지워진다). 정전·화재경보·승강기 고장 같은 큰 사건이 기록됨.</li>\n<li><strong>왜 중요한가</strong>: 앱 로그에 안 나오는 시스템 레벨 사건(특히 커널 OOM Killer 의 <code>Out of memory: Killed process ...</code> 줄)이 dmesg 에만 있을 수 있다. 영구 보존이 필요하면 <a href=\"#systemd-tools\"><code>journalctl -k</code></a> 가 더 낫다.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man1/dmesg.1.html\">dmesg(1) — Linux manual page</a></li>\n</ul>\n<h3 id=\"vmstat\"><code>vmstat</code><a class=\"headerlink\" href=\"#vmstat\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 프로세스·가상 메모리·페이징·블록 I/O·CPU 활동 통계를 보고하는 도구. <code>vmstat 1</code> 은 매초 한 줄씩 갱신한다. 단, 인자 없이 한 번만 호출하면 첫 줄은 <em>부팅 이후 누적 평균</em> 이라 순간값으로 착각하면 안 된다 — 둘째 줄부터가 실제 구간값이다. 핵심 컬럼: <code>si</code>(swap-in, 디스크→메모리로 초당 읽어들인 양), <code>so</code>(swap-out, 메모리→스왑으로 초당 쓴 양).</li>\n<li><strong>비유</strong>: 자동차 계기판. 속도·연료·rpm 을 동시에 한 화면에서 모니터링.</li>\n<li><strong>왜 중요한가</strong>: OOM 직전에 <code>si</code>/<code>so</code> 가 0 에서 폭증하면 <a href=\"#swap-thrashing\">쓰래싱</a>의 결정적 증거 — 시스템이 디스크 스왑에 매달려 실질 처리량이 무너지는 신호다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §6 시스템 관제 도구 정리</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man8/vmstat.8.html\">vmstat(8) — Linux manual page</a></li>\n</ul>\n<h3 id=\"port-localhost\">포트 · localhost · 0.0.0.0<a class=\"headerlink\" href=\"#port-localhost\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>포트 (Port)</strong>: 한 컴퓨터 안의 <em>프로그램별 통신 창구</em> 번호. TCP/UDP 가 쓰는 <strong>16비트</strong> 값이라 범위는 0~65535. IANA 는 0~1023 을 well-known(시스템) 포트, 1024~49151 을 registered, 49152~65535 를 dynamic/ephemeral 로 구분한다.</li>\n<li><strong>localhost (127.0.0.1)</strong>: \"내 컴퓨터\" 를 가리키는 루프백 주소. 패킷이 NIC 밖으로 <em>나가지 않고</em> 커널 안에서 되돌아온다. 정확히는 <code>127.0.0.0/8</code> 블록 전체가 루프백으로 예약돼 있고 127.0.0.1 이 그 대표 주소다.</li>\n<li><strong>0.0.0.0</strong>: 서버가 바인딩할 때 \"이 호스트의 <em>모든</em> IPv4 인터페이스에서 들어오는 요청을 받겠다\" 는 와일드카드 주소. 외부 접속도 허용된다(반대로 127.0.0.1 에만 바인딩하면 외부에서 접속 불가).</li>\n<li><strong>비유</strong>: 아파트 호수. IP 주소 = 동, 포트 = 호수. 한 동(컴퓨터)에 여러 프로그램이 살고 각자 다른 호수(포트)에서 손님을 받는다.</li>\n<li><strong>왜 중요한가</strong>: <code>agent-leak-app</code> 이 <code>0.0.0.0:15034</code> 에 바인딩되어 있다면 그 포트로 <code>curl</code> 을 쏘면 응답해야 정상 — <a href=\"#coffman\">데드락</a> 이면 timeout. <code>ss -tlnp</code> 또는 <code>netstat -tlnp</code> 로 어떤 프로세스가 어떤 포트를 LISTEN 중인지 확인.</li>\n<li><strong>출처</strong>: <a href=\"https://www.rfc-editor.org/rfc/rfc6335.html\">RFC 6335 — IANA Procedures for the Port Number Registry</a> · <a href=\"https://en.wikipedia.org/wiki/Reserved_IP_addresses\">Reserved IP addresses — Wikipedia</a></li>\n</ul>\n<h3 id=\"http-curl\">HTTP · <code>curl</code> · <code>wget</code><a class=\"headerlink\" href=\"#http-curl\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>HTTP (HyperText Transfer Protocol)</strong>: 웹 서버와 클라이언트가 텍스트로 주고받는 표준 양식. <code>GET /path</code> 같은 요청 메서드와 3자리 상태 코드 응답(<code>2xx</code> 성공, <code>4xx</code> 클라이언트 오류, <code>5xx</code> 서버 오류 — 예 <code>200 OK</code>, <code>404 Not Found</code>, <code>500 Internal Server Error</code>)으로 이뤄진다.</li>\n<li><strong>curl</strong>: 명령행에서 URL 로 데이터를 전송하는 도구(libcurl 기반). <code>curl --max-time 3 http://...</code> 로 타임아웃을 걸 수 있고, 기본 출력은 표준출력이다.</li>\n<li><strong>wget</strong>: GNU 프로젝트의 비대화형 다운로더. HTTP/HTTPS/FTP 를 지원하고 기본으로 파일을 저장하며, 재귀 다운로드·끊긴 전송 재개·백그라운드 다운로드에 강하다.</li>\n<li><strong>비유</strong>: HTTP = 손님이 웨이터에게 주문하는 공통 양식. curl = 그 양식대로 주문서를 쓰는 도구.</li>\n<li><strong>왜 중요한가</strong>: 외부 health check 의 표준 방법. <code>curl --max-time 3 http://0.0.0.0:15034</code> 가 timeout 된다면 <em>서버 프로세스가 살아있어도 응답을 못 한다</em> 는 외부 증거 — <a href=\"#coffman\">데드락</a> 분석의 6대 증거 중 하나(프로세스는 떠 있는데 소켓 응답만 멈춤).</li>\n<li><strong>출처</strong>: <a href=\"https://developer.mozilla.org/en-US/docs/Web/HTTP/Status\">HTTP response status codes — MDN</a> · <a href=\"https://curl.se/docs/manpage.html\">curl(1) manual page</a> · <a href=\"https://www.gnu.org/software/wget/manual/wget.html\">GNU Wget Manual — Overview</a></li>\n</ul>\n<h3 id=\"text-tools\">grep · awk · sed<a class=\"headerlink\" href=\"#text-tools\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 셸의 텍스트 처리 3대장. 셋 다 <em>줄 단위 스트림</em> 을 처리하며 정규표현식을 쓴다.</li>\n<li><strong>grep</strong>: 패턴에 맞는 <em>줄</em> 만 골라냄. 이름 자체가 ed 편집기 명령 <code>g/re/p</code>(global / regular expression / print)에서 왔다. <code>grep -i \"error\" app.log</code></li>\n<li><strong>awk</strong>: 입력을 <em>레코드(줄)와 필드(컬럼)</em> 로 쪼개 패턴-액션 규칙으로 추출/계산하는 데이터 처리 언어. <code>awk '{print $2, $5}'</code> 는 2·5번째 컬럼.</li>\n<li><strong>sed</strong>: 스트림 편집기. 줄 단위로 <em>치환·삭제</em> 등을 수행. <code>sed 's/foo/bar/g'</code> 는 각 줄의 모든 foo→bar.</li>\n<li><strong>비유</strong>: 책에서 grep = \"특정 단어가 있는 페이지만 표시\", awk = \"각 페이지의 2번째 줄만 모음\", sed = \"이 단어를 저 단어로 일괄 교체\".</li>\n<li><strong>왜 중요한가</strong>: <code>monitor.log</code> 같은 텍스트 로그에서 원하는 정보만 뽑는 표준 도구. <code>tail -f app.log | grep CRITICAL</code> 처럼 <a href=\"#pipe-redirect\">파이프</a>와 결합해서 라이브 모니터링도 한다.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man1/grep.1.html\">grep(1) — Linux manual page</a> · <a href=\"https://www.gnu.org/software/gawk/manual/gawk.html\">The GNU Awk User's Guide</a> · <a href=\"https://www.gnu.org/software/sed/manual/sed.html\">sed, a stream editor — GNU sed Manual</a></li>\n</ul>\n<h3 id=\"systemd-tools\"><code>systemctl</code> · <code>journalctl</code><a class=\"headerlink\" href=\"#systemd-tools\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: systemd(리눅스의 표준 init 시스템, PID 1) 관리 도구.</li>\n<li><strong>systemctl</strong>: 서비스(<a href=\"#daemon\">데몬</a>) 유닛의 시작/정지/상태 조회 및 부팅 활성화 제어. <code>systemctl status sshd</code>, <code>systemctl restart nginx</code>, <code>systemctl enable agent-leak</code>.</li>\n<li><strong>journalctl</strong>: systemd 의 로깅 데몬(<code>systemd-journald</code>)이 한곳에 모은 구조화 로그 조회. <code>journalctl -k</code>(커널만), <code>journalctl -u sshd</code>(특정 서비스), <code>journalctl --since \"5 min ago\"</code>. 기본은 재부팅 시 휘발(<code>/run</code>)이지만 <code>/var/log/journal/</code> 이 있으면 영구 저장된다.</li>\n<li><strong>비유</strong>: systemctl = 빌딩 자동제어 패널(시설별 on/off). journalctl = 그 빌딩의 전자 로그북.</li>\n<li><strong>왜 중요한가</strong>: 데몬 미션에서 <code>systemctl status</code> 로 살아 있는지 보고, <code>journalctl -k | grep -i oom</code> 로 <a href=\"#oom-killer\">커널 OOM Killer</a> 흔적을 확인. <a href=\"#dmesg\"><code>dmesg</code></a>와 비슷하지만 영구 저장·서비스/시간 단위 필터링이 강하다.</li>\n</ul>\n<hr />\n<ul>\n<li><strong>출처</strong>: <a href=\"https://www.freedesktop.org/software/systemd/man/latest/systemctl.html\">systemctl(1) — freedesktop.org</a> · <a href=\"https://www.freedesktop.org/software/systemd/man/latest/journalctl.html\">journalctl(1) — freedesktop.org</a></li>\n</ul>\n<h2 id=\"_1\">부록 — 자주 헷갈리는 개념 비교표<a class=\"headerlink\" href=\"#_1\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"_2\">메모리 단위<a class=\"headerlink\" href=\"#_2\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>단위</th>\n<th>크기</th>\n<th>비고</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1 Byte (B)</td>\n<td>8 bit</td>\n<td>영어 한 글자(아스키)</td>\n</tr>\n<tr>\n<td>1 KB</td>\n<td>1,024 B</td>\n<td>보통 1,000 B 로 어림(SI 와 IEC 의 차이)</td>\n</tr>\n<tr>\n<td>1 MB</td>\n<td>1,024 KB ≈ 100만 B</td>\n<td>작은 이미지</td>\n</tr>\n<tr>\n<td>1 GB</td>\n<td>1,024 MB ≈ 10억 B</td>\n<td>영화 한 편(저화질)</td>\n</tr>\n<tr>\n<td>4 KB</td>\n<td>—</td>\n<td>리눅스 페이지 기본 크기</td>\n</tr>\n<tr>\n<td>1 MiB</td>\n<td>1,024 KiB (정확히 2^20 B)</td>\n<td>IEC 표준, 1 MB 와 미세하게 다름</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"_3\">시그널 자주 쓰는 것<a class=\"headerlink\" href=\"#_3\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>번호</th>\n<th>이름</th>\n<th>의미</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1</td>\n<td>SIGHUP</td>\n<td>터미널 끊김 — 데몬 재로드 신호로 자주 재활용</td>\n</tr>\n<tr>\n<td>2</td>\n<td>SIGINT</td>\n<td>Ctrl+C</td>\n</tr>\n<tr>\n<td>9</td>\n<td>SIGKILL</td>\n<td>즉시 죽임 (catch/ignore 불가)</td>\n</tr>\n<tr>\n<td>11</td>\n<td>SIGSEGV</td>\n<td>메모리 위반 (NULL 포인터 등)</td>\n</tr>\n<tr>\n<td>15</td>\n<td>SIGTERM</td>\n<td>정상 종료 요청</td>\n</tr>\n<tr>\n<td>17</td>\n<td>SIGCHLD</td>\n<td>자식 프로세스 종료 알림</td>\n</tr>\n<tr>\n<td>19</td>\n<td>SIGSTOP</td>\n<td>정지 (Ctrl+Z 와 비슷, 무시 불가)</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"vs\">멀티프로세싱 vs 멀티스레딩 한 줄 요약<a class=\"headerlink\" href=\"#vs\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>항목</th>\n<th>멀티프로세싱</th>\n<th>멀티스레딩</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>생성 비용</td>\n<td>크다 (~1ms)</td>\n<td>작다 (~10µs)</td>\n</tr>\n<tr>\n<td>메모리 격리</td>\n<td>완전</td>\n<td>없음</td>\n</tr>\n<tr>\n<td>통신</td>\n<td><a href=\"#ipc\">IPC</a> 필요</td>\n<td>변수 직접 공유</td>\n</tr>\n<tr>\n<td>데드락 가능성</td>\n<td>거의 없음</td>\n<td>있음</td>\n</tr>\n<tr>\n<td>한 명 죽으면</td>\n<td>다른 명 무사</td>\n<td>전체 종료</td>\n</tr>\n<tr>\n<td>Python GIL 우회</td>\n<td>가능</td>\n<td>불가</td>\n</tr>\n<tr>\n<td>적합한 작업</td>\n<td><a href=\"#cpu-vs-io-bound\">CPU-bound</a> (Python), 격리 필요</td>\n<td><a href=\"#cpu-vs-io-bound\">I/O-bound</a>, 데이터 공유 잦음</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"_4\">메모리 관련 측정 도구 한 줄 요약<a class=\"headerlink\" href=\"#_4\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>도구</th>\n<th>무엇을 본다</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>free -h</code></td>\n<td>시스템 전체 RAM/Swap 합계</td>\n</tr>\n<tr>\n<td><code>top</code> (<code>Shift+M</code>)</td>\n<td>프로세스를 MEM 순으로 정렬</td>\n</tr>\n<tr>\n<td><code>ps -o pid,vsz,rss,comm</code></td>\n<td>프로세스 별 <a href=\"#vsz-vs-rss\">VSZ/RSS</a></td>\n</tr>\n<tr>\n<td><code>cat /proc/meminfo</code></td>\n<td>시스템 메모리의 원본 데이터</td>\n</tr>\n<tr>\n<td><code>cat /proc/$PID/status</code></td>\n<td>프로세스 별 메모리·스레드 원본</td>\n</tr>\n<tr>\n<td><code>pmap -x $PID</code></td>\n<td>프로세스의 메모리 영역별 분포</td>\n</tr>\n<tr>\n<td><code>smem</code></td>\n<td>RSS·PSS·USS 를 한눈에 (별도 설치)</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"vs-vs\">데드락 vs 라이브락 vs 기아<a class=\"headerlink\" href=\"#vs-vs\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>현상</th>\n<th>정의</th>\n<th>진단</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><a href=\"#coffman\">데드락</a></td>\n<td>서로의 자원을 기다리며 영원히 정지</td>\n<td>CPU 0%, <a href=\"#wchan\">wchan</a> = futex_*, 로그 멈춤</td>\n</tr>\n<tr>\n<td>라이브락</td>\n<td>서로 양보만 하느라 진척이 없음 (실제로는 CPU 를 쓰며 도는데 결과 없음)</td>\n<td>CPU 높음, 로그는 계속 찍히는데 같은 패턴 반복</td>\n</tr>\n<tr>\n<td><a href=\"#starvation\">기아 (Starvation)</a></td>\n<td>특정 스레드만 영영 자원을 못 받음</td>\n<td>한 스레드의 진행률만 멈춰 있음, 다른 건 정상</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h2 id=\"_5\">참고 — 더 깊이 가고 싶을 때<a class=\"headerlink\" href=\"#_5\" title=\"Permanent link\">#</a></h2>\n<table>\n<thead>\n<tr>\n<th>자료</th>\n<th>한 줄 평</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>OSTEP</strong> (<em>Operating Systems: Three Easy Pieces</em>)</td>\n<td>무료 PDF, 가상 메모리·스케줄링·동시성의 정석. <strong>무료 + 통독 강추</strong>.</td>\n</tr>\n<tr>\n<td><strong>CSAPP</strong> (Computer Systems: A Programmer's Perspective)</td>\n<td>메모리 계층·시스템 콜·동시성을 C 코드로 따라가며 배운다.</td>\n</tr>\n<tr>\n<td><strong>Modern Operating Systems</strong> (Tanenbaum)</td>\n<td>OS 의 전통적 교과서. 친절한 비유 多. 스케줄링·데드락 챕터 추천.</td>\n</tr>\n<tr>\n<td><strong>Linux Kernel Development</strong> (Robert Love)</td>\n<td>리눅스 커널 내부를 깔끔하게 정리. 스케줄러·메모리 관리 챕터 추천.</td>\n</tr>\n<tr>\n<td><strong>The Linux Programming Interface</strong> (Michael Kerrisk)</td>\n<td>1500쪽짜리 시스템 콜 백과사전. <code>man</code> 페이지의 큰형. fork/exec/pthread 챕터가 특히 좋음.</td>\n</tr>\n<tr>\n<td><strong>Systems Performance</strong> (Brendan Gregg)</td>\n<td>시스템 성능 분석의 바이블. <code>top</code>/<code>vmstat</code>/<code>perf</code> 사용법과 함정.</td>\n</tr>\n<tr>\n<td><strong>The Art of Multiprocessor Programming</strong> (Herlihy &amp; Shavit)</td>\n<td>락·세마포어·lock-free 자료구조의 정석.</td>\n</tr>\n<tr>\n<td><strong>Dijkstra 의 1965 논문</strong> <em>Cooperating sequential processes</em></td>\n<td>세마포어와 <a href=\"#dining-philosophers\">식사하는 철학자 문제</a>의 원전. 짧고 읽기 쉽다.</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"man\"><code>man</code> 페이지 통독 권장 목록<a class=\"headerlink\" href=\"#man\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>man<span class=\"w\"> </span><span class=\"m\">7</span><span class=\"w\"> </span>signal<span class=\"w\">       </span><span class=\"c1\"># 시그널 개요 — SIGTERM/SIGKILL/SIGSEGV 다 여기</span>\nman<span class=\"w\"> </span><span class=\"m\">7</span><span class=\"w\"> </span>pthreads<span class=\"w\">     </span><span class=\"c1\"># POSIX 스레드 개요</span>\nman<span class=\"w\"> </span><span class=\"m\">5</span><span class=\"w\"> </span>proc<span class=\"w\">         </span><span class=\"c1\"># /proc 안의 모든 파일 의미</span>\nman<span class=\"w\"> </span><span class=\"m\">2</span><span class=\"w\"> </span>fork<span class=\"w\">         </span><span class=\"c1\"># fork — 멀티프로세싱의 출발점</span>\nman<span class=\"w\"> </span><span class=\"m\">2</span><span class=\"w\"> </span>clone<span class=\"w\">        </span><span class=\"c1\"># clone — 리눅스의 통합 프로세스/스레드 생성</span>\nman<span class=\"w\"> </span><span class=\"m\">2</span><span class=\"w\"> </span>mmap<span class=\"w\">         </span><span class=\"c1\"># mmap — 가상 메모리 매핑의 진실</span>\nman<span class=\"w\"> </span><span class=\"m\">2</span><span class=\"w\"> </span>futex<span class=\"w\">        </span><span class=\"c1\"># futex — 락의 진짜 구현</span>\nman<span class=\"w\"> </span><span class=\"m\">1</span><span class=\"w\"> </span>top<span class=\"w\">          </span><span class=\"c1\"># top 의 모든 컬럼 의미</span>\nman<span class=\"w\"> </span><span class=\"m\">1</span><span class=\"w\"> </span>ps<span class=\"w\">           </span><span class=\"c1\"># ps 의 모든 옵션</span>\n</code></pre></div>\n\n<h3 id=\"_6\">시스템 호출 추적 도구<a class=\"headerlink\" href=\"#_6\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>도구</th>\n<th>무엇을 보여주나</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>strace -f -p $PID</code></td>\n<td>그 프로세스(+자식들)가 <em>지금</em> 호출하는 <a href=\"#syscall\">시스템 콜</a>을 실시간으로 출력. 데드락 시 모든 스레드가 <code>futex(...)</code> 에서 멈춰 있는 모습이 직접 보인다.</td>\n</tr>\n<tr>\n<td><code>ltrace -p $PID</code></td>\n<td>라이브러리 함수 호출을 추적. <code>pthread_mutex_lock</code> 같은 함수가 어디서 멈췄는지 보임.</td>\n</tr>\n<tr>\n<td><code>perf top</code></td>\n<td>CPU 가 어느 함수에서 시간을 가장 많이 쓰는지 실시간 프로파일. CPU 스파이크 원인 후보를 좁혀준다.</td>\n</tr>\n<tr>\n<td><code>pidstat -t 1</code></td>\n<td>스레드 단위 CPU/메모리 초당 변화. <code>top -H</code> 보다 스크립트 친화적.</td>\n</tr>\n</tbody>\n</table>", "toc": "<div class=\"toc\">\n<ul>\n<li><a href=\"#1\">1. 컴퓨터 구조 기초</a><ul>\n<li><a href=\"#syscall\">시스템 콜 (System Call)</a></li>\n<li><a href=\"#os-kernel-userspace\">운영체제 · 커널 · 유저 공간</a></li>\n<li><a href=\"#von-neumann\">폰 노이만 구조 (von Neumann architecture)</a></li>\n<li><a href=\"#cpu\">CPU (Central Processing Unit)</a></li>\n<li><a href=\"#throughput-vs-latency\">스루풋 (Throughput) vs 지연시간 (Latency)</a></li>\n<li><a href=\"#time-units\">시간 단위 (ns / µs / ms / s)</a></li>\n<li><a href=\"#concurrency-vs-parallelism\">동시성 (Concurrency) vs 병렬성 (Parallelism)</a></li>\n<li><a href=\"#cpu-vs-io-bound\">CPU-bound vs I/O-bound</a></li>\n<li><a href=\"#bit-byte\">bit · byte · 이진수 (binary)</a></li>\n</ul>\n</li>\n<li><a href=\"#15\">1.5 셸 · 터미널 · 로그 (비전공자 보충)</a><ul>\n<li><a href=\"#shell\">셸 (Shell) · bash · zsh</a></li>\n<li><a href=\"#terminal\">터미널 (Terminal)</a></li>\n<li><a href=\"#cli-gui\">CLI vs GUI</a></li>\n<li><a href=\"#std-streams\">표준 입출력 (stdin · stdout · stderr)</a></li>\n<li><a href=\"#pipe-redirect\">파이프 · 리다이렉트 (|, &gt;, &gt;&gt;, &lt;)</a></li>\n<li><a href=\"#file-descriptor\">파일 디스크립터 (File Descriptor, FD)</a></li>\n<li><a href=\"#exit-code\">exit code (종료 코드) · $?</a></li>\n<li><a href=\"#root-sudo\">root · sudo · 권한 (Permission)</a></li>\n<li><a href=\"#log-level\">로그 · 로그 레벨</a></li>\n</ul>\n</li>\n<li><a href=\"#2-storage-hierarchy\">2. 저장 계층 (Storage Hierarchy)</a><ul>\n<li><a href=\"#register\">레지스터 (Register)</a></li>\n<li><a href=\"#cache\">캐시 · L1 / L2 / L3 (Cache)</a></li>\n<li><a href=\"#dram\">DRAM (= RAM)</a></li>\n<li><a href=\"#disk\">디스크 · SSD · HDD</a></li>\n<li><a href=\"#swap-thrashing\">페이지 교체 · 스왑 · 쓰래싱</a></li>\n</ul>\n</li>\n<li><a href=\"#3\">3. 프로세스와 메모리 구조</a><ul>\n<li><a href=\"#process\">프로세스 (Process)</a></li>\n<li><a href=\"#pid\">PID (Process ID)</a></li>\n<li><a href=\"#parent-child\">PPID · 부모-자식 프로세스</a></li>\n<li><a href=\"#zombie-orphan\">좀비 · 고아 프로세스</a></li>\n<li><a href=\"#daemon\">데몬 (Daemon) · 서비스</a></li>\n<li><a href=\"#virtual-address-space\">가상 주소 공간 (Virtual Address Space)</a></li>\n<li><a href=\"#memory-segments\">Heap · Stack · Data · BSS · Text</a></li>\n<li><a href=\"#malloc-free-gc\">malloc / free / 가비지 컬렉터 (GC)</a></li>\n<li><a href=\"#elf\">ELF (Executable and Linkable Format)</a></li>\n<li><a href=\"#page\">페이지 · 4 KB</a></li>\n<li><a href=\"#mmu\">MMU (Memory Management Unit)</a></li>\n<li><a href=\"#page-table-tlb\">페이지 테이블 · TLB</a></li>\n<li><a href=\"#page-fault\">페이지 폴트 (Page Fault)</a></li>\n<li><a href=\"#lazy-allocation\">lazy allocation (지연 할당)</a></li>\n<li><a href=\"#vsz-vs-rss\">VSZ vs RSS</a></li>\n<li><a href=\"#fork-exec\">fork / exec</a></li>\n<li><a href=\"#cow\">Copy-on-Write (COW)</a></li>\n<li><a href=\"#clone-syscall\">clone() 시스템 콜</a></li>\n</ul>\n</li>\n<li><a href=\"#4\">4. 종료 · 보호 정책 · 환경변수</a><ul>\n<li><a href=\"#oom-killer\">OOM Killer · oom_score</a></li>\n<li><a href=\"#signal\">시그널 · SIGKILL · SIGTERM</a></li>\n<li><a href=\"#env-var\">환경변수 (Environment Variable)</a></li>\n<li><a href=\"#watchdog\">Watchdog (감시견)</a></li>\n</ul>\n</li>\n<li><a href=\"#5\">5. 스레드 · 스케줄링</a><ul>\n<li><a href=\"#thread\">스레드 (Thread)</a></li>\n<li><a href=\"#pcb\">PCB · task_struct</a></li>\n<li><a href=\"#context-switch\">컨텍스트 스위치 (Context Switch)</a></li>\n<li><a href=\"#ipc\">IPC (Inter-Process Communication)</a></li>\n<li><a href=\"#core-smt\">CPU 코어 · 하이퍼스레딩</a></li>\n<li><a href=\"#idle\">idle (유휴 시간)</a></li>\n<li><a href=\"#scheduler\">스케줄러 (Scheduler)</a></li>\n<li><a href=\"#time-slice\">타임 슬라이스 (Time Slice / Quantum)</a></li>\n<li><a href=\"#cfs\">CFS · vruntime</a></li>\n<li><a href=\"#nice\">nice 값 · 우선순위</a></li>\n<li><a href=\"#rb-tree\">빨간-검정 트리 (Red-Black Tree)</a></li>\n<li><a href=\"#pthread\">POSIX Threads (pthread)</a></li>\n<li><a href=\"#tls\">TLS (Thread-Local Storage)</a></li>\n</ul>\n</li>\n<li><a href=\"#6\">6. 병렬 실행 모델</a></li>\n<li><a href=\"#6_1\">6. 병렬 실행 모델</a><ul>\n<li><a href=\"#gil\">GIL (Global Interpreter Lock)</a></li>\n<li><a href=\"#py-multiprocessing\">multiprocessing (Python)</a></li>\n<li><a href=\"#asyncio\">asyncio · 이벤트 루프</a></li>\n<li><a href=\"#amdahl\">암달의 법칙 (Amdahl's Law)</a></li>\n<li><a href=\"#thread-pool\">스레드 풀 (Thread Pool)</a></li>\n<li><a href=\"#producer-consumer\">Producer-Consumer (생산자-소비자)</a></li>\n<li><a href=\"#fork-join\">Fork-Join (분할-합치기)</a></li>\n</ul>\n</li>\n<li><a href=\"#7\">7. 동시성 · 데드락</a><ul>\n<li><a href=\"#race-condition\">Race Condition (경쟁 조건)</a></li>\n<li><a href=\"#critical-section\">임계구역 (Critical Section)</a></li>\n<li><a href=\"#lock-mutex\">락 · 뮤텍스 (Lock · Mutex)</a></li>\n<li><a href=\"#semaphore\">세마포어 (Semaphore)</a></li>\n<li><a href=\"#condition-variable\">컨디션 변수 (Condition Variable)</a></li>\n<li><a href=\"#coffman\">데드락 · Coffman 조건</a></li>\n<li><a href=\"#lock-free\">lock-free 자료구조</a></li>\n<li><a href=\"#try-lock\">try_lock · 타임아웃</a></li>\n<li><a href=\"#dining-philosophers\">식사하는 철학자 문제 (Dining Philosophers)</a></li>\n<li><a href=\"#starvation\">기아 (Starvation)</a></li>\n<li><a href=\"#stat-codes\">프로세스 상태 코드 (STAT)</a></li>\n<li><a href=\"#futex\">futex (Fast Userspace muTEX)</a></li>\n<li><a href=\"#wchan\">wchan (Wait Channel)</a></li>\n<li><a href=\"#busy-wait\">busy-wait (바쁜 대기)</a></li>\n<li><a href=\"#infinite-loop\">무한 루프 (Infinite Loop)</a></li>\n<li><a href=\"#refcount\">참조 카운팅 (Reference Counting)</a></li>\n</ul>\n</li>\n<li><a href=\"#8\">8. 운영 도구</a><ul>\n<li><a href=\"#proc\">/proc 가상 파일시스템</a></li>\n<li><a href=\"#top-ps\">top · htop · ps</a></li>\n<li><a href=\"#dmesg\">dmesg</a></li>\n<li><a href=\"#vmstat\">vmstat</a></li>\n<li><a href=\"#port-localhost\">포트 · localhost · 0.0.0.0</a></li>\n<li><a href=\"#http-curl\">HTTP · curl · wget</a></li>\n<li><a href=\"#text-tools\">grep · awk · sed</a></li>\n<li><a href=\"#systemd-tools\">systemctl · journalctl</a></li>\n</ul>\n</li>\n<li><a href=\"#_1\">부록 — 자주 헷갈리는 개념 비교표</a><ul>\n<li><a href=\"#_2\">메모리 단위</a></li>\n<li><a href=\"#_3\">시그널 자주 쓰는 것</a></li>\n<li><a href=\"#vs\">멀티프로세싱 vs 멀티스레딩 한 줄 요약</a></li>\n<li><a href=\"#_4\">메모리 관련 측정 도구 한 줄 요약</a></li>\n<li><a href=\"#vs-vs\">데드락 vs 라이브락 vs 기아</a></li>\n</ul>\n</li>\n<li><a href=\"#_5\">참고 — 더 깊이 가고 싶을 때</a><ul>\n<li><a href=\"#man\">man 페이지 통독 권장 목록</a></li>\n<li><a href=\"#_6\">시스템 호출 추적 도구</a></li>\n</ul>\n</li>\n</ul>\n</div>\n"}, {"title": "실험 절차서", "file": "실험_절차서.md", "html": "<h1 id=\"3\">실험 절차서 — 3대 장애 재현 &amp; 검증<a class=\"headerlink\" href=\"#3\" title=\"Permanent link\">#</a></h1>\n<blockquote>\n<p>본 문서는 <a href=\"reports/\">reports/</a> 의 3개 리포트가 어떤 순서와 환경변수 조합으로 수집된 증거인지를 추적할 수 있도록 정리한 절차서다.</p>\n<p>🤖 <strong>자동 수행:</strong> 아래 절차(§1~§4)는 <a href=\"src/experiments/\">src/experiments/</a> 의 스크립트로 사람 손 없이 그대로 돌릴 수 있다.\n<code>bash src/experiments/00_run_experiments.sh all</code> (개별: <code>01_oom.sh</code> … <code>04_scheduling.sh</code>). 각 파일이 절차서의 한 실험에 1:1 대응한다.</p>\n</blockquote>\n<hr />\n<h2 id=\"0\">0. 공통 사전 조건<a class=\"headerlink\" href=\"#0\" title=\"Permanent link\">#</a></h2>\n<ul>\n<li>B1-1 환경 구축 완료 (<code>agent-admin</code> 계정, <code>$AGENT_HOME</code> 셋업, monitor.sh + crontab 매분 등록)</li>\n<li><code>agent-leak-app</code> 바이너리가 <code>$AGENT_HOME/bin/agent-leak-app</code> 에 배치됨</li>\n<li><code>secret.key</code> 내용 = <code>agent_api_key_test</code></li>\n<li>매 실험 사이에 이전 PID 잔존 여부 점검 — 잔존 시 <code>kill &lt;pid&gt;</code> (SIGKILL 은 마지막 수단)</li>\n</ul>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"c1\"># 베이스라인 환경변수 (정상 가동용)</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">512</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">95</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">false</span>\n</code></pre></div>\n\n<hr />\n<h2 id=\"1-oom\">1. OOM 실험<a class=\"headerlink\" href=\"#1-oom\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"1-1-before\">1-1. Before 조건 (장애 재현)<a class=\"headerlink\" href=\"#1-1-before\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">256</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">95</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">false</span>\nnohup<span class=\"w\"> </span>./agent-leak-app<span class=\"w\"> </span>&gt;<span class=\"w\"> </span><span class=\"nv\">$AGENT_LOG_DIR</span>/agent-leak-app.log<span class=\"w\"> </span><span class=\"m\">2</span>&gt;<span class=\"p\">&amp;</span><span class=\"m\">1</span><span class=\"w\"> </span><span class=\"p\">&amp;</span>\n<span class=\"nb\">echo</span><span class=\"w\"> </span><span class=\"nv\">$!</span><span class=\"w\"> </span>&gt;<span class=\"w\"> </span>/tmp/agent.pid\n</code></pre></div>\n\n<h3 id=\"1-2-10\">1-2. 관측 (10분 이상)<a class=\"headerlink\" href=\"#1-2-10\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><code>tail -f /var/log/agent-app/monitor.log</code> — MEM% 선형 증가 확인</li>\n<li><code>tail -f $AGENT_LOG_DIR/agent-leak-app.log</code> — <code>MemoryGuard</code> / <code>SELF-TERMINATED</code> 라인 출현</li>\n<li>종료 후 <code>ps -p $(cat /tmp/agent.pid)</code> → 사라짐 확인</li>\n</ul>\n<h3 id=\"1-3-after\">1-3. After 조건 (조치 검증)<a class=\"headerlink\" href=\"#1-3-after\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">512</span><span class=\"w\">   </span><span class=\"c1\"># 256 → 512</span>\n<span class=\"c1\"># 재실행 후 동일 절차로 관측 → 생존시간 약 2배 증가 (10분 → 20분+)</span>\n</code></pre></div>\n\n<h3 id=\"1-4\">1-4. 산출물<a class=\"headerlink\" href=\"#1-4\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><a href=\"evidence/oom_monitor.log\">evidence/oom_monitor.log</a></li>\n<li><a href=\"evidence/oom_app.log\">evidence/oom_app.log</a></li>\n<li><a href=\"evidence/oom_ps_top.txt\">evidence/oom_ps_top.txt</a></li>\n<li>분석: <a href=\"reports/01_oom_report.md\">reports/01_oom_report.md</a></li>\n</ul>\n<hr />\n<h2 id=\"2-cpu\">2. CPU 과점유 실험<a class=\"headerlink\" href=\"#2-cpu\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"2-1-before\">2-1. Before<a class=\"headerlink\" href=\"#2-1-before\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">512</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">80</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">false</span>\nnohup<span class=\"w\"> </span>./agent-leak-app<span class=\"w\"> </span>&gt;<span class=\"w\"> </span><span class=\"nv\">$AGENT_LOG_DIR</span>/agent-leak-app.log<span class=\"w\"> </span><span class=\"m\">2</span>&gt;<span class=\"p\">&amp;</span><span class=\"m\">1</span><span class=\"w\"> </span><span class=\"p\">&amp;</span>\n</code></pre></div>\n\n<h3 id=\"2-2\">2-2. 관측<a class=\"headerlink\" href=\"#2-2\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><code>top -bn1 -p &lt;PID&gt;</code> 5회 (30초 간격) → CPU% 비선형 상승 캡처</li>\n<li><code>WATCHDOG ... SIGTERM</code> 라인 출현 후 자동 종료</li>\n</ul>\n<h3 id=\"2-3-after\">2-3. After<a class=\"headerlink\" href=\"#2-3-after\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">95</span><span class=\"w\">   </span><span class=\"c1\"># 80 → 95</span>\n<span class=\"c1\"># 재실행 → 종료까지 약 4분 → 약 12분으로 연장 (여전히 종료됨)</span>\n</code></pre></div>\n\n<h3 id=\"2-4\">2-4. 산출물<a class=\"headerlink\" href=\"#2-4\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><a href=\"evidence/cpu_monitor.log\">evidence/cpu_monitor.log</a></li>\n<li><a href=\"evidence/cpu_app.log\">evidence/cpu_app.log</a></li>\n<li><a href=\"evidence/cpu_top_ps.txt\">evidence/cpu_top_ps.txt</a></li>\n<li>분석: <a href=\"reports/02_cpu_report.md\">reports/02_cpu_report.md</a></li>\n</ul>\n<hr />\n<h2 id=\"3-deadlock\">3. Deadlock 실험<a class=\"headerlink\" href=\"#3-deadlock\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"3-1-before\">3-1. Before<a class=\"headerlink\" href=\"#3-1-before\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">512</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">95</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">true</span><span class=\"w\">     </span><span class=\"c1\"># ★ 핵심</span>\nnohup<span class=\"w\"> </span>./agent-leak-app<span class=\"w\"> </span>&gt;<span class=\"w\"> </span><span class=\"nv\">$AGENT_LOG_DIR</span>/agent-leak-app.log<span class=\"w\"> </span><span class=\"m\">2</span>&gt;<span class=\"p\">&amp;</span><span class=\"m\">1</span><span class=\"w\"> </span><span class=\"p\">&amp;</span>\n<span class=\"nv\">PID</span><span class=\"o\">=</span><span class=\"nv\">$!</span>\n</code></pre></div>\n\n<h3 id=\"3-2-25\">3-2. 관측 (2~5분 후 무응답 진입)<a class=\"headerlink\" href=\"#3-2-25\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>ps<span class=\"w\"> </span>-ef<span class=\"w\"> </span><span class=\"p\">|</span><span class=\"w\"> </span>grep<span class=\"w\"> </span><span class=\"nv\">$PID</span><span class=\"w\">                 </span><span class=\"c1\"># PID 존재 확인</span>\nps<span class=\"w\"> </span>-p<span class=\"w\"> </span><span class=\"nv\">$PID</span><span class=\"w\"> </span>-o<span class=\"w\"> </span>stat,etime,cmd<span class=\"w\">       </span><span class=\"c1\"># Sl (sleeping + multi-thread)</span>\ntop<span class=\"w\"> </span>-H<span class=\"w\"> </span>-bn1<span class=\"w\"> </span>-p<span class=\"w\"> </span><span class=\"nv\">$PID</span><span class=\"w\">                </span><span class=\"c1\"># 스레드별 %CPU = 0.0</span>\nps<span class=\"w\"> </span>-L<span class=\"w\"> </span>-p<span class=\"w\"> </span><span class=\"nv\">$PID</span><span class=\"w\"> </span>-o<span class=\"w\"> </span>lwp,pcpu,stat,wchan:25,cmd<span class=\"w\">   </span><span class=\"c1\"># wchan=futex_wait_queue_me</span>\ntail<span class=\"w\"> </span>-n<span class=\"w\"> </span><span class=\"m\">20</span><span class=\"w\"> </span><span class=\"nv\">$AGENT_LOG_DIR</span>/agent-leak-app.log<span class=\"w\">  </span><span class=\"c1\"># WAITING/BLOCKED 라인에서 정지</span>\ncurl<span class=\"w\"> </span>--max-time<span class=\"w\"> </span><span class=\"m\">3</span><span class=\"w\"> </span>http://0.0.0.0:15034<span class=\"w\">        </span><span class=\"c1\"># 타임아웃 — 외부 무응답 입증</span>\n</code></pre></div>\n\n<h3 id=\"3-3-after\">3-3. After<a class=\"headerlink\" href=\"#3-3-after\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">false</span>\n<span class=\"c1\"># 재실행 → 30분 이상 정상 가동, curl 응답 정상</span>\n</code></pre></div>\n\n<h3 id=\"3-4\">3-4. 산출물<a class=\"headerlink\" href=\"#3-4\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><a href=\"evidence/deadlock_app.log\">evidence/deadlock_app.log</a></li>\n<li><a href=\"evidence/deadlock_ps_top.txt\">evidence/deadlock_ps_top.txt</a></li>\n<li><a href=\"evidence/deadlock_monitor.log\">evidence/deadlock_monitor.log</a></li>\n<li>분석: <a href=\"reports/03_deadlock_report.md\">reports/03_deadlock_report.md</a></li>\n</ul>\n<hr />\n<h2 id=\"4\">4. 보너스 — 스케줄링 추론용 데이터 수집<a class=\"headerlink\" href=\"#4\" title=\"Permanent link\">#</a></h2>\n<p>위 실험 사이사이 <strong>정상 가동 구간</strong>(데드락 미발생, OOM 직전 충분히 떨어진 구간)에서:</p>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">true</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">512</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">95</span>\n./agent-leak-app<span class=\"w\"> </span><span class=\"p\">&amp;</span>\n<span class=\"c1\"># 60초간 워커 로그 누적</span>\nsleep<span class=\"w\"> </span><span class=\"m\">60</span>\ngrep<span class=\"w\"> </span>-E<span class=\"w\"> </span><span class=\"s2\">&quot;Worker-[A-C]&quot;</span><span class=\"w\"> </span><span class=\"nv\">$AGENT_LOG_DIR</span>/agent-leak-app.log<span class=\"w\"> </span>&gt;<span class=\"w\"> </span>evidence/scheduling_workers.log\ntop<span class=\"w\"> </span>-H<span class=\"w\"> </span>-bn1<span class=\"w\"> </span>-p<span class=\"w\"> </span><span class=\"k\">$(</span>pgrep<span class=\"w\"> </span>-f<span class=\"w\"> </span>agent-leak-app<span class=\"w\"> </span><span class=\"p\">|</span><span class=\"w\"> </span>head<span class=\"w\"> </span>-n1<span class=\"k\">)</sp
