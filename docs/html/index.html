5-11 16:01:45.910] [INFO]  [Scheduler] dispatch tasks: 8 pending\n[2026-05-11 16:02:30.005] [INFO]  [Worker-3] heavy_compute() loop=120000\n[2026-05-11 16:03:15.812] [WARN]  [Watchdog] cpu=72.5% (threshold 80%) — sustained 60s\n[2026-05-11 16:04:11.443] [CRITICAL] [Watchdog] cpu=91.2% &gt; 80% sustained 90s\n[2026-05-11 16:04:11.512] [CRITICAL] [Watchdog] INITIATING EMERGENCY ABORT (SIGTERM)\n&gt;&gt;&gt; [SYSTEM] WATCHDOG: INITIATING EMERGENCY ABORT (SIGTERM) &lt;&lt;&lt;\n[2026-05-11 16:04:12.001] [INFO]  Caught signal SIGTERM, shutting down.\n</code></pre></div>\n\n<blockquote>\n<p>원본: <a href=\"../evidence/cpu_app.log\">../evidence/cpu_app.log</a></p>\n</blockquote>\n<h3 id=\"2-3-top-ps-160400\">2-3. <code>top</code> / <code>ps</code> 출력 (16:04:00 시점, 종료 직전)<a class=\"headerlink\" href=\"#2-3-top-ps-160400\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>$ top -bn1 -o %CPU | head -n 12\ntop - 16:04:00 up 12 days,  3:41,  2 users,  load average: 2.85, 1.94, 1.12\nTasks: 132 total,   2 running, 130 sleeping\n%Cpu(s): 92.3 us,  3.1 sy,  0.0 ni,  4.2 id,  0.0 wa,  0.0 hi,  0.4 si,  0.0 st\n\n  PID USER       PR  NI    VIRT    RES    SHR S  %CPU  %MEM     TIME+ COMMAND\n14001 agent-admin 20  0   215M    32M  4.1M R  91.2   1.6   3:24.18 python3\n   12 root       20  0     0       0      0 I   0.7   0.0   0:11.20 rcu_sched\n</code></pre></div>\n\n<div class=\"codehilite\"><pre><span></span><code>$ ps -o pid,pcpu,pmem,stat,etime,cmd -p 14001\n   PID %CPU %MEM STAT     ELAPSED CMD\n 14001 91.2  6.6 R+         04:11 /usr/bin/python3 ./agent-leak-app\n</code></pre></div>\n\n<blockquote>\n<p>단일 프로세스가 4-vCPU 머신에서 한 코어 풀(≈ 25% 시스템 전체)을 훨씬 넘는 91%를 점유. STAT가 <strong><code>R</code>(Running)</strong> 으로 지속 — busy-loop 시그니처.</p>\n</blockquote>\n<hr />\n<h2 id=\"3-root-cause-analysis\">3. Root Cause Analysis (원인 분석)<a class=\"headerlink\" href=\"#3-root-cause-analysis\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"3-1\">3-1. 현상 → 원인 매핑<a class=\"headerlink\" href=\"#3-1\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>관측 사실</th>\n<th>추론되는 원인</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>CPU만 비선형 급상승, MEM은 일정</td>\n<td>메모리 누수가 아닌 <strong>계산/루프 폭주</strong></td>\n</tr>\n<tr>\n<td><code>top</code> STAT = <code>R+</code>, %CPU &gt; 90 지속</td>\n<td>I/O 대기가 아니라 <strong>사용자 모드 CPU bound</strong> (<code>%us</code> 92.3)</td>\n</tr>\n<tr>\n<td><code>heavy_compute() loop=120000</code> 직후 임계치 돌파</td>\n<td>워커가 종료 조건 없는 루프 또는 과대한 반복 횟수로 폭주</td>\n</tr>\n<tr>\n<td><code>Watchdog ... SIGTERM</code> 로그가 OOM 메시지 없이 단독 출력</td>\n<td>앱 자체 보호 정책(Watchdog) 동작</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"3-2\">3-2. 운영체제 동작 원리<a class=\"headerlink\" href=\"#3-2\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>리눅스 스케줄러는 <code>R</code>(Runnable) 상태 프로세스에 시간 할당량을 배분한다. CPU 바운드 작업이 동일 우선순위의 다른 프로세스에 비해 너무 많은 시간을 점유하면 시스템 응답성이 떨어진다(load average 상승).</li>\n<li>본 앱의 <code>Watchdog</code>은 외부 OS 동작과 별개로 <strong>자체적으로</strong> <code>%CPU &gt; CPU_MAX_OCCUPY</code>가 일정 시간 지속되면 SIGTERM 으로 자기 자신을 종료시켜 시스템에 미치는 영향을 차단한다.</li>\n<li>SIGTERM 은 SIGKILL 과 달리 graceful shutdown을 허용하므로, 앱이 핸들러를 등록해 두면 <code>Caught signal SIGTERM, shutting down.</code> 같은 정리 로그를 남길 수 있다.</li>\n</ul>\n<h3 id=\"3-3\">3-3. 결론<a class=\"headerlink\" href=\"#3-3\" title=\"Permanent link\">#</a></h3>\n<blockquote>\n<p>워커 스레드의 계산 루프가 종료 조건/반복 횟수 조정 없이 폭주하여 CPU 사용률이 임계치를 초과했고, <strong>Watchdog 정책이 SIGTERM 으로 프로세스를 종료</strong>시켰다. 메모리/디스크 변화가 없는 점이 이를 보강한다.</p>\n</blockquote>\n<hr />\n<h2 id=\"4-workaround-verification\">4. Workaround &amp; Verification (조치 및 검증)<a class=\"headerlink\" href=\"#4-workaround-verification\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"4-1-cpu_max_occupy\">4-1. 조치 — 임시: <code>CPU_MAX_OCCUPY</code> 상향<a class=\"headerlink\" href=\"#4-1-cpu_max_occupy\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"c1\"># Before</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">80</span>\n<span class=\"c1\"># After (임시)</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">95</span>\n</code></pre></div>\n\n<h3 id=\"4-2-before-after\">4-2. Before &amp; After 비교<a class=\"headerlink\" href=\"#4-2-before-after\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>항목</th>\n<th>Before (<code>CPU_MAX_OCCUPY=80</code>)</th>\n<th>After (<code>CPU_MAX_OCCUPY=95</code>)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>종료 시점</td>\n<td>실행 후 <strong>약 4분</strong></td>\n<td>실행 후 <strong>약 12분</strong>까지 생존 (이후 95% 도달 시 동일하게 종료)</td>\n</tr>\n<tr>\n<td>마지막 CPU%</td>\n<td>91.2%</td>\n<td>95.7% (도달 즉시 종료)</td>\n</tr>\n<tr>\n<td>종료 로그</td>\n<td><code>WATCHDOG ... SIGTERM</code></td>\n<td>동일</td>\n</tr>\n</tbody>\n</table>\n<p>After 시점 monitor.log 발췌:</p>\n<div class=\"codehilite\"><pre><span></span><code>[2026-05-11 16:30:00] PID:14502 CPU:2.0%  MEM:6.4% DISK_USED:42%\n[2026-05-11 16:38:00] PID:14502 CPU:88.4% MEM:6.7% DISK_USED:42%\n[2026-05-11 16:42:00] PID:14502 CPU:95.7% MEM:6.7% DISK_USED:42%\n[2026-05-11 16:43:00] [ERROR] Application process not running.\n</code></pre></div>\n\n<p>→ <strong>여전히 종료됨</strong>. <code>CPU_MAX_OCCUPY</code> 상향은 임계치만 미루는 임시 조치일 뿐, 폭주 루프 자체를 멈추지는 않는다.</p>\n<h3 id=\"4-3\">4-3. 근본 해결을 위한 제안 (선택)<a class=\"headerlink\" href=\"#4-3\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><code>heavy_compute()</code> 반복 횟수에 상한 부여 / 청크 단위 처리 후 <code>time.sleep(0)</code> 또는 <code>asyncio.sleep</code> 양보</li>\n<li>CPU 친화도(taskset, cpuset)로 특정 코어에 격리, <code>nice</code>/<code>renice</code> 로 우선순위 하향</li>\n<li>알고리즘 자체 최적화 (O(n²) → O(n log n) 등)</li>\n<li><code>py-spy record -p &lt;pid&gt;</code> 로 호출 스택 프로파일링 → 폭주 함수 식별</li>\n</ul>\n<hr />\n<h2 id=\"5\">5. 첨부 / 참조<a class=\"headerlink\" href=\"#5\" title=\"Permanent link\">#</a></h2>\n<ul>\n<li><a href=\"../evidence/cpu_monitor.log\">evidence/cpu_monitor.log</a></li>\n<li><a href=\"../evidence/cpu_app.log\">evidence/cpu_app.log</a></li>\n<li><a href=\"../evidence/cpu_top_ps.txt\">evidence/cpu_top_ps.txt</a></li>\n</ul>", "toc": "<div class=\"toc\">\n<ul>\n<li><a href=\"#1-description\">1. Description (현상 설명)</a></li>\n<li><a href=\"#2-evidence-logs\">2. Evidence &amp; Logs (증거 자료)</a><ul>\n<li><a href=\"#2-1-monitorsh\">2-1. monitor.sh 관제 로그</a></li>\n<li><a href=\"#2-2-agent-leak-app\">2-2. agent-leak-app 실행 로그</a></li>\n<li><a href=\"#2-3-top-ps-160400\">2-3. top / ps 출력 (16:04:00 시점, 종료 직전)</a></li>\n</ul>\n</li>\n<li><a href=\"#3-root-cause-analysis\">3. Root Cause Analysis (원인 분석)</a><ul>\n<li><a href=\"#3-1\">3-1. 현상 → 원인 매핑</a></li>\n<li><a href=\"#3-2\">3-2. 운영체제 동작 원리</a></li>\n<li><a href=\"#3-3\">3-3. 결론</a></li>\n</ul>\n</li>\n<li><a href=\"#4-workaround-verification\">4. Workaround &amp; Verification (조치 및 검증)</a><ul>\n<li><a href=\"#4-1-cpu_max_occupy\">4-1. 조치 — 임시: CPU_MAX_OCCUPY 상향</a></li>\n<li><a href=\"#4-2-before-after\">4-2. Before &amp; After 비교</a></li>\n<li><a href=\"#4-3\">4-3. 근본 해결을 위한 제안 (선택)</a></li>\n</ul>\n</li>\n<li><a href=\"#5\">5. 첨부 / 참조</a></li>\n</ul>\n</div>\n"}, {"title": "[3] Deadlock 리포트", "file": "reports/03_deadlock_report.md", "html": "<h1 id=\"bug-agent-leak-app-deadlock\">[Bug] agent-leak-app 멀티스레드 모드에서 교착상태(Deadlock)로 인한 무응답<a class=\"headerlink\" href=\"#bug-agent-leak-app-deadlock\" title=\"Permanent link\">#</a></h1>\n<blockquote>\n<p>라벨: <code>bug</code>, <code>priority/critical</code>, <code>area/concurrency</code>\n담당: agent-dev\n환경: Ubuntu 22.04 (OrbStack), agent-admin 계정, <code>MULTI_THREAD_ENABLE=true</code></p>\n</blockquote>\n<hr />\n<h2 id=\"1-description\">1. Description (현상 설명)<a class=\"headerlink\" href=\"#1-description\" title=\"Permanent link\">#</a></h2>\n<p><code>agent-leak-app</code>을 멀티스레드 모드(<code>MULTI_THREAD_ENABLE=true</code>)로 실행하면, 부팅 후 약 <strong>2~4분</strong>이 경과한 시점부터 다음 3가지 현상이 <strong>동시에</strong> 관측된다.</p>\n<ol>\n<li><strong>프로세스는 살아 있다</strong> — <code>ps -ef | grep agent</code> 결과 PID가 그대로 존재</li>\n<li><strong>CPU/MEM은 변하지 않는다</strong> — monitor.log 의 CPU%, MEM% 가 0~1%대에서 미동</li>\n<li><strong>로그가 멈춘다</strong> — <code>agent-leak-app.log</code> 의 마지막 라인 timestamp 가 정지</li>\n</ol>\n<p>즉 <strong>죽지도 일하지도 않는</strong> 무응답 상태. SIGINT(Ctrl+C)에는 반응하지만 외부 TCP 요청(<code>curl 0.0.0.0:15034</code>)에는 응답하지 않는다.</p>\n<ul>\n<li>발생 시각: 2026-05-11 18:00:00 실행 → 18:02:47 무응답 진입 → 약 30분 방치해도 동일 상태</li>\n<li>재현성: 같은 설정으로 4회 시도, 4회 모두 1~4분 내 동일 시그니처 관측</li>\n</ul>\n<hr />\n<h2 id=\"2-evidence-logs\">2. Evidence &amp; Logs (증거 자료)<a class=\"headerlink\" href=\"#2-evidence-logs\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"2-1-pid\">2-1. PID 존재 증거<a class=\"headerlink\" href=\"#2-1-pid\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>$ ps -ef | grep -v grep | grep agent\nagent-admin 15021  2210  0 18:00 pts/1    00:00:01 /usr/bin/python3 ./agent-leak-app\n\n$ ps -p 15021 -o pid,stat,etime,cmd\n   PID STAT     ELAPSED CMD\n 15021 Sl         30:12 /usr/bin/python3 ./agent-leak-app\n</code></pre></div>\n\n<blockquote>\n<p><code>etime=30:12</code> 동안 살아 있음. STAT 의 <code>S</code>(Sleeping) + <code>l</code>(multi-threaded) — 종료된 것이 아니라 <strong>모든 스레드가 잠들어</strong> 있는 상태.</p>\n</blockquote>\n<h3 id=\"2-2-cpumem\">2-2. 스레드별 CPU/MEM 정체 증거<a class=\"headerlink\" href=\"#2-2-cpumem\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>$ top -H -bn1 -p 15021\n  PID USER       PR  NI    VIRT    RES    SHR S  %CPU  %MEM     TIME+ COMMAND\n15021 agent-admin 20  0   285M    48M  5.1M S   0.0   2.4   0:01.20 python3\n15022 agent-admin 20  0   285M    48M  5.1M S   0.0   2.4   0:00.18 Worker-A\n15023 agent-admin 20  0   285M    48M  5.1M S   0.0   2.4   0:00.17 Worker-B\n15024 agent-admin 20  0   285M    48M  5.1M S   0.0   2.4   0:00.04 Watchdog\n</code></pre></div>\n\n<div class=\"codehilite\"><pre><span></span><code>$ ps -L -p 15021 -o lwp,pcpu,stat,wchan:25,cmd\n   LWP %CPU STAT WCHAN                     CMD\n 15021  0.0 Sl   futex_wait_queue_me       python3\n 15022  0.0 Sl   futex_wait_queue_me       python3\n 15023  0.0 Sl   futex_wait_queue_me       python3\n 15024  0.0 Sl   poll_schedule_timeout     python3\n</code></pre></div>\n\n<blockquote>\n<p>모든 워커 스레드(<code>15022</code>, <code>15023</code>)가 <code>futex_wait_queue_me</code> 에서 잠들어 있음 = <strong>락(뮤텍스/세마포어) 대기 중</strong>. CPU% 0.0 지속.</p>\n</blockquote>\n<h3 id=\"2-3-monitorsh\">2-3. monitor.sh 관제 로그<a class=\"headerlink\" href=\"#2-3-monitorsh\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>[2026-05-11 18:00:00] PID:15021 CPU:1.8% MEM:2.3% DISK_USED:42%\n[2026-05-11 18:02:00] PID:15021 CPU:1.2% MEM:2.4% DISK_USED:42%\n[2026-05-11 18:03:00] PID:15021 CPU:0.0% MEM:2.4% DISK_USED:42%\n[2026-05-11 18:05:00] PID:15021 CPU:0.0% MEM:2.4% DISK_USED:42%\n[2026-05-11 18:10:00] PID:15021 CPU:0.0% MEM:2.4% DISK_USED:42%\n[2026-05-11 18:30:00] PID:15021 CPU:0.0% MEM:2.4% DISK_USED:42%\n</code></pre></div>\n\n<blockquote>\n<p>18:03 부터 CPU 0.0%로 평탄, MEM 도 변화 없음. <strong>monitor.sh 의 Health Check는 통과</strong>(프로세스도 살아있고 포트도 LISTEN) — 외부에서는 정상으로 보이는 점이 위험.</p>\n</blockquote>\n<h3 id=\"2-4-agent-leak-app\">2-4. agent-leak-app 마지막 로그 (정지 직전)<a class=\"headerlink\" href=\"#2-4-agent-leak-app\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>[2026-05-11 18:02:30.014] [INFO]  [Worker-A] acquired LOCK_X\n[2026-05-11 18:02:30.018] [INFO]  [Worker-B] acquired LOCK_Y\n[2026-05-11 18:02:30.022] [INFO]  [Worker-A] WAITING for LOCK_Y ...\n[2026-05-11 18:02:30.025] [INFO]  [Worker-B] WAITING for LOCK_X ...\n[2026-05-11 18:02:30.026] [DEBUG] [Scheduler] queue=2 active=0\n# 이후 라인 없음 — 무한 대기\n</code></pre></div>\n\n<blockquote>\n<p>원본: <a href=\"../evidence/deadlock_app.log\">../evidence/deadlock_app.log</a></p>\n</blockquote>\n<hr />\n<h2 id=\"3-root-cause-analysis\">3. Root Cause Analysis (원인 분석)<a class=\"headerlink\" href=\"#3-root-cause-analysis\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"3-1-4\">3-1. 마지막 로그 4줄로 추론하는 락 의존 그래프<a class=\"headerlink\" href=\"#3-1-4\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>Worker-A 보유: LOCK_X    →    필요: LOCK_Y\nWorker-B 보유: LOCK_Y    →    필요: LOCK_X\n</code></pre></div>\n\n<p>→ 정확하게 <strong>순환(Cycle)</strong> 이 형성된다. 양쪽 모두 상대가 자신이 가진 락을 놓아주기를 기다리지만, 그 누구도 락을 놓지 않으므로 <strong>영원히 대기</strong>한다.</p>\n<h3 id=\"3-2-4\">3-2. 교착상태 4대 조건이 모두 성립함을 확인<a class=\"headerlink\" href=\"#3-2-4\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>조건</th>\n<th>본 사례에서 어떻게 성립하는가</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1. 상호 배제 (Mutual Exclusion)</td>\n<td><code>LOCK_X</code>, <code>LOCK_Y</code> 모두 한 번에 한 스레드만 보유 가능한 뮤텍스</td>\n</tr>\n<tr>\n<td>2. 점유 대기 (Hold and Wait)</td>\n<td>Worker-A 는 LOCK_X를 <strong>잡은 채로</strong> LOCK_Y 를 추가 요청, Worker-B 는 그 반대</td>\n</tr>\n<tr>\n<td>3. 비선점 (No Preemption)</td>\n<td>외부에서 락을 강제로 회수하지 않음 — 보유자가 자발적으로 release 해야 함</td>\n</tr>\n<tr>\n<td>4. 순환 대기 (Circular Wait)</td>\n<td>A → Y → B → X → A 의 닫힌 사이클 형성</td>\n</tr>\n</tbody>\n</table>\n<p>4개 조건 중 <strong>하나만 깨도</strong> 데드락은 발생하지 않는다. 본 미션의 임시 조치(아래 4번 항목)는 조건 1(상호 배제) 자체를 없애는(스레드를 1개로 직렬화) 방식으로 회피한다.</p>\n<h3 id=\"3-3\">3-3. 운영체제 동작 원리<a class=\"headerlink\" href=\"#3-3\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>리눅스에서 사용자 공간 뮤텍스는 일반적으로 <strong>futex(Fast Userspace Mutex)</strong> 로 구현된다. 락을 잡을 수 없을 때 스레드는 <code>futex(FUTEX_WAIT, ...)</code> 시스템콜을 통해 커널의 대기 큐에 들어가 잠든다 → <code>ps</code>/<code>top</code> 에서 <code>WCHAN = futex_wait_queue_me</code> 로 보인다.</li>\n<li>잠든 스레드는 누군가 <code>FUTEX_WAKE</code> 로 깨워주지 않는 한 절대 깨어나지 않는다. 데드락 시나리오에서는 깨워줄 주체(상대 워커)가 자신도 대기 상태이므로 영원히 깨어나지 못한다.</li>\n<li>커널에는 일반적인 데드락 자동 탐지가 없다. 따라서 <strong>외부 관측자(monitor.sh / <code>top -H</code> / <code>ps -L</code>)</strong> 가 \"스레드가 모두 잠들어 있고 작업 진행이 없음\"을 감지해야 한다.</li>\n</ul>\n<h3 id=\"3-4\">3-4. 결론<a class=\"headerlink\" href=\"#3-4\" title=\"Permanent link\">#</a></h3>\n<blockquote>\n<p>Worker-A 와 Worker-B 가 서로 다른 순서로 두 개의 락을 획득하다가 <strong>순환 대기</strong>에 빠졌다. 4대 조건이 모두 성립한 전형적인 데드락이며, <code>WCHAN=futex_wait_queue_me</code>로 머문 모든 워커 스레드와 정지된 로그가 그 증거다.</p>\n</blockquote>\n<hr />\n<h2 id=\"4-workaround-verification\">4. Workaround &amp; Verification (조치 및 검증)<a class=\"headerlink\" href=\"#4-workaround-verification\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"4-1\">4-1. 조치 — 임시: 멀티스레드 비활성화<a class=\"headerlink\" href=\"#4-1\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"c1\"># Before</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">true</span>\n<span class=\"c1\"># After (임시)</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">false</span>\n</code></pre></div>\n\n<p><code>MULTI_THREAD_ENABLE=false</code> 모드는 작업을 단일 스레드에서 직렬 처리하므로, 두 스레드가 동시에 락을 잡는 상황 자체가 존재하지 않는다 → 4대 조건의 ①상호 배제 / ④순환 대기 조건을 모두 무력화.</p>\n<h3 id=\"4-2-before-after\">4-2. Before &amp; After 비교<a class=\"headerlink\" href=\"#4-2-before-after\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>항목</th>\n<th>Before (<code>true</code>)</th>\n<th>After (<code>false</code>)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>데드락 발생</td>\n<td><strong>예</strong> (실행 후 2~4분 내)</td>\n<td><strong>아니오</strong> (30분 이상 관측, 정상 동작)</td>\n</tr>\n<tr>\n<td><code>top -H</code> 스레드 수</td>\n<td>4개 (main + Worker-A + Worker-B + Watchdog)</td>\n<td>2개 (main + Watchdog)</td>\n</tr>\n<tr>\n<td><code>WCHAN</code></td>\n<td>워커 모두 <code>futex_wait_queue_me</code> 잠금 대기</td>\n<td>작업 중에는 <code>-</code>(러닝), 대기 시 짧은 <code>poll_schedule_timeout</code></td>\n</tr>\n<tr>\n<td>마지막 로그</td>\n<td><code>WAITING for LOCK_*</code> 에서 정지</td>\n<td>작업 완료 라인이 지속적으로 누적</td>\n</tr>\n<tr>\n<td><code>curl 0.0.0.0:15034</code> 응답</td>\n<td><strong>타임아웃</strong></td>\n<td><code>Agent OK\\n</code> 즉시 응답</td>\n</tr>\n</tbody>\n</table>\n<p>After 시점 로그:</p>\n<div class=\"codehilite\"><pre><span></span><code>[2026-05-11 19:00:00] PID:15890 CPU:1.4% MEM:3.2% DISK_USED:42%\n[2026-05-11 19:10:00] PID:15890 CPU:1.6% MEM:3.4% DISK_USED:42%\n[2026-05-11 19:30:00] PID:15890 CPU:1.5% MEM:3.6% DISK_USED:42%\n# 30분 이상 정상 가동, 외부 TCP 응답 정상\n</code></pre></div>\n\n<h3 id=\"4-3\">4-3. 근본 해결을 위한 제안 (선택)<a class=\"headerlink\" href=\"#4-3\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>락 획득 순서 통일</strong>: 모든 워커가 <code>LOCK_X → LOCK_Y</code> 순서로만 잡도록 강제 → 순환 대기 조건 ④ 제거</li>\n<li><strong>타임아웃 도입</strong>: <code>lock.acquire(timeout=5)</code> 형태로 일정 시간 내 못 잡으면 포기 후 재시도 → 점유 대기 조건 ② 제거</li>\n<li><strong>단일 통합 락</strong>: 두 락을 하나의 큰 락으로 묶거나, lock-free 자료구조(queue, atomic) 활용</li>\n<li><strong>데드락 감지 옵저버</strong>: 워커가 일정 시간 진행 로그를 못 남기면 자동 SIGTERM 후 재시작</li>\n</ul>\n<hr />\n<h2 id=\"5\">5. 첨부 / 참조<a class=\"headerlink\" href=\"#5\" title=\"Permanent link\">#</a></h2>\n<ul>\n<li><a href=\"../evidence/deadlock_app.log\">evidence/deadlock_app.log</a></li>\n<li><a href=\"../evidence/deadlock_ps_top.txt\">evidence/deadlock_ps_top.txt</a></li>\n<li><a href=\"../evidence/deadlock_monitor.log\">evidence/deadlock_monitor.log</a></li>\n</ul>", "toc": "<div class=\"toc\">\n<ul>\n<li><a href=\"#1-description\">1. Description (현상 설명)</a></li>\n<li><a href=\"#2-evidence-logs\">2. Evidence &amp; Logs (증거 자료)</a><ul>\n<li><a href=\"#2-1-pid\">2-1. PID 존재 증거</a></li>\n<li><a href=\"#2-2-cpumem\">2-2. 스레드별 CPU/MEM 정체 증거</a></li>\n<li><a href=\"#2-3-monitorsh\">2-3. monitor.sh 관제 로그</a></li>\n<li><a href=\"#2-4-agent-leak-app\">2-4. agent-leak-app 마지막 로그 (정지 직전)</a></li>\n</ul>\n</li>\n<li><a href=\"#3-root-cause-analysis\">3. Root Cause Analysis (원인 분석)</a><ul>\n<li><a href=\"#3-1-4\">3-1. 마지막 로그 4줄로 추론하는 락 의존 그래프</a></li>\n<li><a href=\"#3-2-4\">3-2. 교착상태 4대 조건이 모두 성립함을 확인</a></li>\n<li><a href=\"#3-3\">3-3. 운영체제 동작 원리</a></li>\n<li><a href=\"#3-4\">3-4. 결론</a></li>\n</ul>\n</li>\n<li><a href=\"#4-workaround-verification\">4. Workaround &amp; Verification (조치 및 검증)</a><ul>\n<li><a href=\"#4-1\">4-1. 조치 — 임시: 멀티스레드 비활성화</a></li>\n<li><a href=\"#4-2-before-after\">4-2. Before &amp; After 비교</a></li>\n<li><a href=\"#4-3\">4-3. 근본 해결을 위한 제안 (선택)</a></li>\n</ul>\n</li>\n<li><a href=\"#5\">5. 첨부 / 참조</a></li>\n</ul>\n</div>\n"}, {"title": "[보너스] 스케줄링 분석", "file": "reports/04_scheduling_analysis.md", "html": "<h1 id=\"analysis-agent-leak-app\">[Analysis] 로그 패턴 분석을 통한 agent-leak-app 스케줄링 알고리즘 추론<a class=\"headerlink\" href=\"#analysis-agent-leak-app\" title=\"Permanent link\">#</a></h1>\n<blockquote>\n<p>라벨: <code>analysis</code>, <code>bonus</code>, <code>area/scheduling</code>\n담당: agent-dev\n대상: 정상 가동 중인 <code>agent-leak-app</code> (멀티스레드 모드, <code>MULTI_THREAD_ENABLE=true</code>, 데드락 미발생 구간)</p>\n</blockquote>\n<hr />\n<h2 id=\"1\">1. 분석 개요<a class=\"headerlink\" href=\"#1\" title=\"Permanent link\">#</a></h2>\n<p>장애 분석 중 수집된 로그에서 <strong>워커 스레드 간 실행 교체 패턴</strong>이 일정한 규칙을 보이는 것을 확인했다. 본 리포트는 로그의 타임스탬프와 작업 진행률(Progress) 변화를 근거로 어떤 스케줄링 알고리즘이 적용되어 있는지 역추론한다.</p>\n<p>후보:</p>\n<ul>\n<li><strong>FCFS (First-Come, First-Served)</strong> — 먼저 도착한 작업을 끝까지 처리</li>\n<li><strong>Priority</strong> — 우선순위가 높은 작업이 자원을 독점</li>\n<li><strong>Round-Robin</strong> — 각 작업에 일정한 시간 할당량(Time Quantum)을 부여하고 끝나면 다음으로 교체</li>\n</ul>\n<hr />\n<h2 id=\"2\">2. 증거 자료<a class=\"headerlink\" href=\"#2\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"2-1\">2-1. 정상 가동 구간 로그 발췌<a class=\"headerlink\" href=\"#2-1\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>[2026-05-11 14:00:00.100] [Worker-A] Task started.  progress=10%\n[2026-05-11 14:00:00.150] [Worker-A] running ...    progress=20%\n[2026-05-11 14:00:00.201] [Worker-B] Task started.  progress=10%   ← A 중단, B 시작\n[2026-05-11 14:00:00.250] [Worker-B] running ...    progress=20%\n[2026-05-11 14:00:00.301] [Worker-C] Task started.  progress=10%   ← B 중단, C 시작\n[2026-05-11 14:00:00.350] [Worker-C] running ...    progress=20%\n[2026-05-11 14:00:00.401] [Worker-A] resumed.       progress=30%   ← C 중단, A 재개\n[2026-05-11 14:00:00.450] [Worker-A] running ...    progress=40%\n[2026-05-11 14:00:00.501] [Worker-B] resumed.       progress=30%\n[2026-05-11 14:00:00.550] [Worker-B] running ...    progress=40%\n[2026-05-11 14:00:00.601] [Worker-C] resumed.       progress=30%\n</code></pre></div>\n\n<h3 id=\"2-2\">2-2. 타임스탬프로 본 교체 주기<a class=\"headerlink\" href=\"#2-2\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>시점 (ms)</th>\n<th>활성 워커</th>\n<th>진행률 변화</th>\n<th>교체 간격</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>100~150</td>\n<td>A</td>\n<td>10% → 20%</td>\n<td>—</td>\n</tr>\n<tr>\n<td>201~250</td>\n<td>B</td>\n<td>10% → 20%</td>\n<td>A→B: 51ms</td>\n</tr>\n<tr>\n<td>301~350</td>\n<td>C</td>\n<td>10% → 20%</td>\n<td>B→C: 51ms</td>\n</tr>\n<tr>\n<td>401~450</td>\n<td>A</td>\n<td>30% → 40%</td>\n<td>C→A: 51ms</td>\n</tr>\n<tr>\n<td>501~550</td>\n<td>B</td>\n<td>30% → 40%</td>\n<td>A→B: 51ms</td>\n</tr>\n<tr>\n<td>601~...</td>\n<td>C</td>\n<td>30% → ...</td>\n<td>B→C: 51ms</td>\n</tr>\n</tbody>\n</table>\n<p>→ <strong>약 50ms 간격으로 A → B → C → A → B → C ... 순환</strong></p>\n<h3 id=\"2-3-top-h-cpu\">2-3. <code>top -H</code> 에서 본 스레드별 CPU 시간<a class=\"headerlink\" href=\"#2-3-top-h-cpu\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>$ top -H -bn1 -p &lt;pid&gt; | head -n 10\n  PID USER       PR  NI    VIRT    RES    SHR S %CPU %MEM     TIME+ COMMAND\nxxxx  agent-admin 20  0  215M  28M   4.1M R   33.3 1.4   0:12.45 Worker-A\nxxxy  agent-admin 20  0  215M  28M   4.1M R   33.2 1.4   0:12.42 Worker-B\nxxxz  agent-admin 20  0  215M  28M   4.1M R   33.3 1.4   0:12.44 Worker-C\n</code></pre></div>\n\n<blockquote>\n<p>누적 CPU 시간(<code>TIME+</code>)이 세 스레드 모두 거의 동일(12.42~12.45초) — <strong>공평한 할당</strong>의 결정적 증거.</p>\n</blockquote>\n<hr />\n<h2 id=\"3\">3. 패턴 분석<a class=\"headerlink\" href=\"#3\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"3-1-fcfs\">3-1. FCFS 후보 기각<a class=\"headerlink\" href=\"#3-1-fcfs\" title=\"Permanent link\">#</a></h3>\n<p>FCFS 라면 Worker-A 가 끝날 때까지 B 와 C 는 시작조차 못 한다. 그러나 로그에서 A 가 progress=20% 인 시점에 B 가 진입했으므로 <strong>FCFS 아님</strong>.</p>\n<h3 id=\"3-2-priority\">3-2. Priority 후보 기각<a class=\"headerlink\" href=\"#3-2-priority\" title=\"Permanent link\">#</a></h3>\n<p>Priority 라면 특정 워커(예: A)가 자원을 거의 독점하거나, <code>TIME+</code> 값에 큰 편차가 있어야 한다. 그러나 세 스레드의 누적 CPU 시간이 ±0.03s 이내로 동일 → <strong>Priority 아님</strong>.</p>\n<h3 id=\"3-3-round-robin\">3-3. Round-Robin 결론<a class=\"headerlink\" href=\"#3-3-round-robin\" title=\"Permanent link\">#</a></h3>\n<p>다음 세 가지가 모두 충족:</p>\n<ol>\n<li><strong>고정 시간 할당량</strong>: 약 50ms 단위로 일정하게 교체</li>\n<li><strong>순환적 교체</strong>: A → B → C → A → B → C 의 일정한 순서</li>\n<li><strong>공평성</strong>: <code>TIME+</code> 값이 거의 동일</li>\n</ol>\n<p>→ <strong>Round-Robin</strong> 스케줄링이 적용되어 있다고 강하게 추론할 수 있다. (할당량 ≈ 50ms)</p>\n<hr />\n<h2 id=\"4-round-robin\">4. Round-Robin의 장단점과 적합 아키텍처<a class=\"headerlink\" href=\"#4-round-robin\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"4-1\">4-1. 장점<a class=\"headerlink\" href=\"#4-1\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>공평성</strong>: 모든 작업이 굶주리지(starvation) 않고 일정 시간을 보장받음</li>\n<li><strong>응답성</strong>: 새로운 작업도 한 라운드 안에 반드시 CPU 를 받음 → 인터랙티브 시스템에 유리</li>\n<li><strong>구현 단순성</strong>: FIFO 큐 + 타이머만 있으면 됨</li>\n</ul>\n<h3 id=\"4-2\">4-2. 단점<a class=\"headerlink\" href=\"#4-2\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>컨텍스트 스위칭 오버헤드</strong>: 할당량이 너무 짧으면 교체 비용(레지스터 저장/복원, 캐시 미스)이 실제 작업 시간보다 커질 수 있음</li>\n<li><strong>처리량(throughput) 손해</strong>: 긴 배치 작업에서는 끊임없이 인터럽트되어 캐시 효율이 떨어짐</li>\n<li><strong>할당량 튜닝 난도</strong>: 너무 길면 응답성 저하, 너무 짧으면 오버헤드 증가 — \"적정값\"이 워크로드 의존적</li>\n</ul>\n<h3 id=\"4-3\">4-3. 적합한 아키텍처<a class=\"headerlink\" href=\"#4-3\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>적합한 서비스</th>\n<th>이유</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>실시간 응답형 웹 서버</strong>, REST API</td>\n<td>요청별 응답 지연 분산이 일정해야 함, 한 요청이 다른 요청을 굶기지 않아야 함</td>\n</tr>\n<tr>\n<td><strong>인터랙티브 데스크톱/CLI</strong></td>\n<td>사용자 체감 응답성 우선</td>\n</tr>\n<tr>\n<td><strong>멀티테넌트 SaaS 워커 풀</strong></td>\n<td>테넌트 간 공평성(fair-share) 보장 필요</td>\n</tr>\n</tbody>\n</table>\n<table>\n<thead>\n<tr>\n<th>부적합한 서비스</th>\n<th>이유</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>대용량 배치 / ETL</strong></td>\n<td>처리량이 우선이라 작업당 끝까지 실행하는 FCFS / SJF 가 유리</td>\n</tr>\n<tr>\n<td><strong>실시간 제어 시스템 (RTOS)</strong></td>\n<td>데드라인이 짧고 우선순위가 명확한 작업은 Priority/EDF 가 유리</td>\n</tr>\n<tr>\n<td><strong>HPC 수치연산</strong></td>\n<td>컨텍스트 스위칭 오버헤드 최소화가 필요</td>\n</tr>\n</tbody>\n</table>\n<p>본 <code>agent-leak-app</code>이 운영 환경에서 외부 클라이언트의 다수 요청을 동시에 처리하는 <strong>에이전트형 서버</strong>임을 고려하면, Round-Robin 채택은 합리적 설계 결정이라고 볼 수 있다.</p>\n<hr />\n<h2 id=\"5\">5. 한계 / 추가 검증 아이디어<a class=\"headerlink\" href=\"#5\" title=\"Permanent link\">#</a></h2>\n<ul>\n<li>본 추론은 50ms 단위의 <strong>거시적 패턴</strong>에 근거한다. 실제로는 워커 내부에서 <code>time.sleep(0)</code> / <code>await</code> 으로 자발적 양보(Cooperative Yield)가 일어났을 가능성도 있다. 진정한 Preemptive RR 인지 Cooperative 인지를 가르려면 <strong>할당량을 다 채우지 못한 채 양보하는 케이스</strong>가 있는지 확인해야 한다.</li>\n<li>워커 수를 4, 6, 8로 늘려가며 1라운드 주기가 <code>워커 수 × 50ms</code> 로 비례하는지 검증하면 RR 가설을 더 강하게 확정할 수 있다.</li>\n<li>Linux 자체 스케줄러(CFS)는 본 분석 대상이 아니다 — 본 분석은 <strong>앱 내부 워커 디스패처</strong>의 정책에 한정된다.</li>\n</ul>", "toc": "<div class=\"toc\">\n<ul>\n<li><a href=\"#1\">1. 분석 개요</a></li>\n<li><a href=\"#2\">2. 증거 자료</a><ul>\n<li><a href=\"#2-1\">2-1. 정상 가동 구간 로그 발췌</a></li>\n<li><a href=\"#2-2\">2-2. 타임스탬프로 본 교체 주기</a></li>\n<li><a href=\"#2-3-top-h-cpu\">2-3. top -H 에서 본 스레드별 CPU 시간</a></li>\n</ul>\n</li>\n<li><a href=\"#3\">3. 패턴 분석</a><ul>\n<li><a href=\"#3-1-fcfs\">3-1. FCFS 후보 기각</a></li>\n<li><a href=\"#3-2-priority\">3-2. Priority 후보 기각</a></li>\n<li><a href=\"#3-3-round-robin\">3-3. Round-Robin 결론</a></li>\n</ul>\n</li>\n<li><a href=\"#4-round-robin\">4. Round-Robin의 장단점과 적합 아키텍처</a><ul>\n<li><a href=\"#4-1\">4-1. 장점</a></li>\n<li><a href=\"#4-2\">4-2. 단점</a></li>\n<li><a href=\"#4-3\">4-3. 적합한 아키텍처</a></li>\n</ul>\n</li>\n<li><a href=\"#5\">5. 한계 / 추가 검증 아이디어</a></li>\n</ul>\n</div>\n"}];

    function renderNav() {
      const nav = document.getElementById('nav-list');
      nav.innerHTML = DOCS.map((d, i) =>
        `<li><a href="#" data-i="${i}" onclick="loadDoc(${i});return false;">${d.title}</a></li>`
      ).join('');
    }

    function loadDoc(i, anchor) {
      const d = DOCS[i];
      const meta = `<p class="doc-meta">원본: <code>${d.file}</code></p>`;
      const content = document.getElementById('content');
      content.innerHTML = meta + d.html;

      // TOC 주입
      const toc = document.getElementById('toc');
      toc.innerHTML = `<div class="toc-list">${d.toc || ''}</div>`;

      // 내부 .md 링크를 SPA 라우팅으로
      // README.md 는 docs/md/xxx.md 로 가리키고, docs/md 안의 .md 들은 서로
      // 짧은 이름(xxx.md) 으로 가리킬 수 있다. basename 비교로 둘 다 매칭.
      // 앵커(#term)가 있으면 문서 전환 후 그 위치로 스크롤.
      const basename = (p) => (p || '').split('/').pop();
      content.querySelectorAll('a[href$=".md"], a[href*=".md#"]').forEach(a => {
        const href = a.getAttribute('href');
        const hashIdx = href.indexOf('#');
        const filePart = hashIdx >= 0 ? href.slice(0, hashIdx) : href;
        const linkAnchor = hashIdx >= 0 ? href.slice(hashIdx + 1) : null;
        const fBase = basename(filePart);
        const idx = DOCS.findIndex(x => basename(x.file) === fBase);
        if (idx >= 0) {
          a.onclick = (e) => { e.preventDefault(); loadDoc(idx, linkAnchor); };
          a.style.cursor = 'pointer';
        }
      });

      // 활성 nav 표시
      document.querySelectorAll('#nav-list a').forEach(a =>
        a.classList.toggle('active', parseInt(a.dataset.i) === i)
      );

      // 모바일에서 사이드바 닫기
      document.getElementById('sidebar').classList.remove('open');

      // 앵커가 있으면 해당 헤딩으로 스크롤, 없으면 맨 위.
      // 렌더가 끝난 직후 DOM 이 안정되도록 다음 프레임에 수행.
      if (anchor) {
        requestAnimationFrame(() => {
          const el = document.getElementById(anchor);
          if (el) el.scrollIntoView({ behavior: 'auto', block: 'start' });
          else window.scrollTo(0, 0);
        });
      } else {
        window.scrollTo(0, 0);
      }
      localStorage.setItem('lastDoc', i);

      // 스크롤 스파이용 헤딩 인덱싱
      collectSpyTargets();
    }

    let spyTargets = [];
    function collectSpyTargets() {
      spyTargets = Array.from(
        document.querySelectorAll('main.content h2, main.content h3, main.content h4')
      );
    }
    window.addEventListener('scroll', () => {
      if (!spyTargets.length) return;
      const offset = 100;
      let activeId = null;
      for (const el of spyTargets) {
        if (el.getBoundingClientRect().top < offset) activeId = el.id;
        else break;
      }
      if (!activeId && spyTargets[0]) activeId = spyTargets[0].id;
      document.querySelectorAll('#toc a').forEach(a => {
        const href = a.getAttribute('href');
        if (!href) return;
        a.classList.toggle('active', href === '#' + activeId);
      });
    }, { passive: true });

    function applyTheme(theme) {
      document.documentElement.dataset.theme = theme;
      document.getElementById('theme-icon').textContent  = theme === 'dark' ? '☀️' : '🌙';
      document.getElementById('theme-label').textContent = theme === 'dark' ? 'Light' : 'Dark';
      localStorage.setItem('theme', theme);
    }
    function toggleTheme() {
      const cur = document.documentElement.dataset.theme;
      applyTheme(cur === 'dark' ? 'light' : 'dark');
    }

    (function init() {
      const saved = localStorage.getItem('theme') ||
        (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      applyTheme(saved);
      document.getElementById('menu-btn').onclick = () =>
        document.getElementById('sidebar').classList.toggle('open');
      renderNav();
      const last = parseInt(localStorage.getItem('lastDoc') || '0');
      loadDoc(isNaN(last) || last >= DOCS.length ? 0 : last);
    })();
  </script>
