-conditions\" title=\"Permanent link\">#</a></h3>\n<p><a href=\"용어집.md#coffman\">데드락</a>은 <strong>네 조건이 동시에 모두 성립할 때만</strong> 일어난다<sup id=\"fnref:37\"><a class=\"footnote-ref\" href=\"#fn:37\">37</a></sup>. 하나라도 깨면 데드락은 발생 불가능.</p>\n<table>\n<thead>\n<tr>\n<th>조건</th>\n<th>의미</th>\n<th>깨는 방법(예)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>상호 배제</strong> (Mutual Exclusion)</td>\n<td>자원을 한 번에 한 스레드만 쓸 수 있음<sup id=\"fnref:38\"><a class=\"footnote-ref\" href=\"#fn:38\">38</a></sup></td>\n<td>락 없이 동시 접근 가능한 자료구조 사용 (<a href=\"용어집.md#lock-free\">lock-free</a>)</td>\n</tr>\n<tr>\n<td><strong>점유 대기</strong> (Hold and Wait)</td>\n<td>락을 잡은 채 다른 락을 또 기다림</td>\n<td>필요한 락을 한꺼번에 잡거나 하나도 안 잡고 시작</td>\n</tr>\n<tr>\n<td><strong>비선점</strong> (No Preemption)</td>\n<td>잡힌 락은 강제로 뺏을 수 없음</td>\n<td>타임아웃 적용 (<a href=\"용어집.md#try-lock\"><code>try_lock</code></a>) — 일정 시간 후 포기</td>\n</tr>\n<tr>\n<td><strong>순환 대기</strong> (Circular Wait)</td>\n<td>A→B→A 같은 사이클이 생김</td>\n<td><strong>락에 전역 순서를 매기고 항상 작은 번호부터 잡기</strong></td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p>🔑 <strong>이번 미션의 데드락</strong>: <code>MULTI_THREAD_ENABLE=true</code> 일 때 두 워커 스레드가 락 A 와 B 를 서로 다른 순서로 잡으려 해서 순환 대기가 형성된다. <code>false</code> 로 끄면 멀티스레드 자체가 없으므로 4대 조건 중 '순환 대기'·'점유 대기'가 성립할 수 없어<sup id=\"fnref:39\"><a class=\"footnote-ref\" href=\"#fn:39\">39</a></sup> 자동으로 회피된다.</p>\n</blockquote>\n<div class=\"codehilite\"><pre><span></span><code>   ┌─────────────────┐                   ┌─────────────────┐\n   │   Thread A      │                   │   Thread B      │\n   │                 │                   │                 │\n   │  holds  Lock1   │                   │  holds  Lock2   │\n   │  wants  Lock2 ──┼──────┐     ┌──────┼── wants Lock1   │\n   └─────────────────┘      │     │      └─────────────────┘\n                            ▼     ▼\n                       ┌────────────────┐\n                       │  순환 대기      │\n                       │  (Circular     │\n                       │   Wait)        │\n                       └────────────────┘\n                            │\n                            ▼\n                   둘 다 영원히 futex_wait\n                   CPU% = 0 · RSS 그대로\n                   PID 살아 있는 좀비 상태\n\n  깨는 방법: 락에 전역 번호 부여 → &quot;항상 작은 번호 먼저&quot; 규칙\n            (A·B 모두 Lock1 → Lock2 순서로만 잡게 만들면 끝)\n</code></pre></div>\n\n<h3 id=\"53\">5.3 식사하는 철학자 문제 — 데드락의 표준 비유<a class=\"headerlink\" href=\"#53\" title=\"Permanent link\">#</a></h3>\n<p>5명이 원탁에 앉아 있고 사이사이에 포크 5개가 놓여 있다. 식사는 양손에 포크를 들어야 가능. 모두가 동시에 \"왼쪽 포크를 먼저 든다\" 라고 하면 모두가 왼쪽을 든 채 오른쪽을 무한히 기다린다 → 데드락.</p>\n<div class=\"codehilite\"><pre><span></span><code>                      P1\n                   🍴  ⟲  🍴\n                  F5         F1\n                 ╱             ╲\n              P5                 P2\n              🍴  ⟲           ⟲  🍴\n              F4                 F2\n                ╲              ╱\n                 P4 🍴 ⟲ 🍴  P3\n                       F3\n\n   모두 &quot;왼쪽 포크 먼저&quot; 규칙으로 동시에 손을 뻗으면:\n     P1 → F5 잡음, F1 대기\n     P2 → F1 잡음, F2 대기\n     P3 → F2 잡음, F3 대기\n     P4 → F3 잡음, F4 대기\n     P5 → F4 잡음, F5 대기  ← P1 이 들고 있음!\n\n   결과: P1 → P2 → P3 → P4 → P5 → P1 사이클 = 데드락\n\n   ✅ 해결: 포크에 번호(F1~F5)를 매기고\n           모두 &quot;작은 번호 포크부터 잡기&quot;\n           → P5 만 F4 보다 F5 를 먼저 잡으려 시도\n             (역방향이 되어 사이클이 깨짐) → 데드락 불가능\n</code></pre></div>\n\n<p>이 비유는 다익스트라(1965)가 만든<sup id=\"fnref:40\"><a class=\"footnote-ref\" href=\"#fn:40\">40</a></sup> <a href=\"용어집.md#dining-philosophers\"><strong>식사하는 철학자 문제</strong></a>이고, 위의 4대 조건이 모두 등장한다:</p>\n<ul>\n<li>포크는 1명만 쓸 수 있다 → 상호 배제</li>\n<li>왼쪽을 든 채 오른쪽을 기다린다 → 점유 대기</li>\n<li>들고 있는 포크를 강제로 뺏지 않는다 → 비선점</li>\n<li>1→2→3→4→5→1 의 사이클 → 순환 대기</li>\n</ul>\n<p>해결책: <strong>포크에 번호를 매기고 모두 작은 번호부터 잡게 한다<sup id=\"fnref:41\"><a class=\"footnote-ref\" href=\"#fn:41\">41</a></sup></strong> (순환 대기 차단). 참고로 데드락과 헷갈리기 쉬운 개념으로 <a href=\"용어집.md#starvation\">기아(Starvation)</a>가 있는데, 이는 <em>전체</em> 가 멈추는 게 아니라 <em>특정 스레드만</em> 영영 자원을 못 받는 상태로 구분된다.</p>\n<h3 id=\"54\">5.4 어떻게 외부에서 데드락을 진단하는가<a class=\"headerlink\" href=\"#54\" title=\"Permanent link\">#</a></h3>\n<p>학습자의 핵심 도전 — 소스 코드 디컴파일이 금지된 상황에서 <strong>외부 관측만으로</strong> 데드락을 증명해야 한다.</p>\n<table>\n<thead>\n<tr>\n<th>증거</th>\n<th>어떻게 수집</th>\n<th>무엇을 의미하는가</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>PID 존재</td>\n<td><code>ps -ef \\| grep agent-leak</code></td>\n<td>프로세스는 죽지 않았다 (단순 크래시가 아님)</td>\n</tr>\n<tr>\n<td>스레드 CPU 0%</td>\n<td><code>top -H -p $PID</code> 또는 <code>ps -L -p $PID -o lwp,pcpu</code></td>\n<td>스레드들이 CPU 를 쓰지 않고 자고 있다</td>\n</tr>\n<tr>\n<td><a href=\"용어집.md#wchan\"><code>wchan</code></a> = <code>futex_wait_queue_me</code></td>\n<td><code>ps -L -p $PID -o lwp,wchan:30</code></td>\n<td>커널 안에서 <a href=\"용어집.md#futex\">futex</a> 대기 중 (= 락 대기)<sup id=\"fnref:42\"><a class=\"footnote-ref\" href=\"#fn:42\">42</a></sup></td>\n</tr>\n<tr>\n<td><a href=\"용어집.md#stat-codes\"><code>stat</code></a> = <code>Sl</code></td>\n<td><code>ps -p $PID -o stat</code></td>\n<td>Sleeping + multi-thread<sup id=\"fnref:43\"><a class=\"footnote-ref\" href=\"#fn:43\">43</a></sup></td>\n</tr>\n<tr>\n<td>마지막 로그 = <code>WAITING/BLOCKED</code></td>\n<td><code>tail -n 30 $AGENT_LOG_DIR/*.log</code></td>\n<td>락 획득 시도에서 멈췄다</td>\n</tr>\n<tr>\n<td>외부 요청 무응답</td>\n<td><a href=\"용어집.md#http-curl\"><code>curl</code></a> <code>--max-time 3 http://</code><a href=\"용어집.md#port-localhost\"><code>0.0.0.0:15034</code></a></td>\n<td>이벤트 루프도 멈춰 응답조차 못 한다</td>\n</tr>\n</tbody>\n</table>\n<p>위 6 가지가 동시에 성립할 때 비로소 <strong>\"교착 상태\"</strong> 라는 결론이 정당화된다. 단순히 \"응답이 없다\" 만으로는 부족하다 — 살아있는 <a href=\"용어집.md#zombie-orphan\">좀비</a>, <a href=\"용어집.md#infinite-loop\">무한 루프</a>, 외부 I/O 대기 등 다른 원인일 수 있다.</p>\n<h3 id=\"55-wchan\">5.5 <code>wchan</code> 이 결정적인 이유<a class=\"headerlink\" href=\"#55-wchan\" title=\"Permanent link\">#</a></h3>\n<p><a href=\"용어집.md#wchan\"><code>wchan</code> 컬럼</a>은 그 스레드가 <strong>커널의 어느 함수에서 잠들었는가</strong> 를 보여준다.</p>\n<table>\n<thead>\n<tr>\n<th><code>wchan</code> 값</th>\n<th>의미</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>futex_wait_queue_me</code>, <code>do_futex</code></td>\n<td><strong>유저 공간 락(mutex) 대기</strong> ← 데드락 후보</td>\n</tr>\n<tr>\n<td><code>pipe_wait</code>, <code>sock_recvmsg</code></td>\n<td>I/O 대기 (정상)</td>\n</tr>\n<tr>\n<td><code>do_nanosleep</code>, <code>hrtimer_nanosleep</code></td>\n<td>sleep() 호출 중 (정상)</td>\n</tr>\n<tr>\n<td><code>-</code></td>\n<td>실행 중이거나 종료</td>\n</tr>\n</tbody>\n</table>\n<p>여러 스레드가 동시에 <code>futex_*</code> 에 머물러 있다 = \"<strong>서로 다른 락을 기다리며 영원히 멈춤</strong>\" 의 강력한 증거가 된다. 이는 Python <code>threading.Lock</code>, C++ <code>std::mutex</code> 등 거의 모든 유저 공간 락이 내부적으로 <a href=\"용어집.md#futex\">futex</a>를 쓰기 때문<sup id=\"fnref:44\"><a class=\"footnote-ref\" href=\"#fn:44\">44</a></sup>에 가능한 분석이다.</p>\n<hr />\n<h2 id=\"6\">6. 시스템 관제 도구 정리 (이번 미션에서 자주 쓰는 것 위주)<a class=\"headerlink\" href=\"#6\" title=\"Permanent link\">#</a></h2>\n<table>\n<thead>\n<tr>\n<th>도구</th>\n<th>무엇을 본다</th>\n<th>미션에서 활용</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><a href=\"용어집.md#top-ps\"><code>top</code> / <code>top -H</code></a></td>\n<td>CPU·메모리 실시간, <code>-H</code> 는 스레드 단위</td>\n<td>OOM/CPU/Deadlock 모두 — 특히 데드락은 <code>-H</code> 필수</td>\n</tr>\n<tr>\n<td><code>ps -ef \\| grep</code></td>\n<td>프로세스 존재 / cmdline</td>\n<td>PID 살아 있는지 확인 (데드락 1차 증거)</td>\n</tr>\n<tr>\n<td><code>ps -L -p $PID -o lwp,pcpu,stat,wchan:30</code></td>\n<td>스레드 별 wchan<sup id=\"fnref:45\"><a class=\"footnote-ref\" href=\"#fn:45\">45</a></sup></td>\n<td><strong>데드락 증명의 결정적 증거</strong></td>\n</tr>\n<tr>\n<td><code>ps -o pid,vsz,rss,pcpu,pmem -p $PID</code></td>\n<td>프로세스 메모리/CPU 정밀</td>\n<td>OOM 시 RSS 우상향 패턴</td>\n</tr>\n<tr>\n<td><code>free -m</code></td>\n<td>시스템 전체 메모리</td>\n<td>OOM 시 swap 사용 여부</td>\n</tr>\n<tr>\n<td><a href=\"용어집.md#vmstat\"><code>vmstat 1</code></a></td>\n<td>CPU/MEM/Swap/IO 초당 변화</td>\n<td>OOM 직전 swap 폭증, <a href=\"용어집.md#swap-thrashing\">쓰래싱</a> 확인</td>\n</tr>\n<tr>\n<td><a href=\"용어집.md#dmesg\"><code>dmesg \\| grep -i kill</code></a></td>\n<td>커널 메시지</td>\n<td>커널 OOM Killer 발동 여부 (이번엔 MemoryGuard 이므로 안 보일 가능성 큼)</td>\n</tr>\n<tr>\n<td><code>/proc/$PID/status</code></td>\n<td>프로세스 모든 상태(Vm*, Threads, State)</td>\n<td>RSS, 스레드 수, 상태를 한 화면에서</td>\n</tr>\n<tr>\n<td><code>/proc/$PID/stack</code></td>\n<td>현재 커널 콜 스택</td>\n<td>데드락 시 락 함수 호출 흔적</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p>🔑 <strong>모든 도구의 베이스는 <a href=\"용어집.md#proc\"><code>/proc</code></a></strong>. <code>top</code>, <code>ps</code>, <code>free</code> 는 결국 <code>/proc/&lt;pid&gt;/...</code> 와 <code>/proc/meminfo</code>, <code>/proc/stat</code> 의 텍스트를 파싱해 보여주는 래퍼다<sup id=\"fnref:46\"><a class=\"footnote-ref\" href=\"#fn:46\">46</a></sup>. 한 번씩 <code>cat /proc/$PID/status</code> 로 원본을 봐 보면 도구가 어디서 숫자를 가져오는지가 손에 잡힌다.</p>\n</blockquote>\n<hr />\n<h2 id=\"7-3\">7. 미션 3대 장애 — 이론과 관제 데이터의 매핑<a class=\"headerlink\" href=\"#7-3\" title=\"Permanent link\">#</a></h2>\n<p>학습자가 머릿속에서 다음 표를 그대로 떠올릴 수 있어야 한다.</p>\n<h3 id=\"71-oom-memory-leak\">7.1 OOM (Memory Leak)<a class=\"headerlink\" href=\"#71-oom-memory-leak\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>레이어</th>\n<th>무엇이 일어나는가</th>\n<th>관제 시그니처</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>앱</td>\n<td>전역 컨테이너에 객체가 계속 append, 참조 해제 없음</td>\n<td>로그에 일반 메시지 (눈에 안 띔)</td>\n</tr>\n<tr>\n<td>OS</td>\n<td>RSS 가 우상향 → DRAM 한계 근접 → swap-out 시작 → 쓰래싱</td>\n<td><code>vmstat</code> 의 <code>si/so</code> 가 0 이상으로 튀어 오름<sup id=\"fnref:47\"><a class=\"footnote-ref\" href=\"#fn:47\">47</a></sup></td>\n</tr>\n<tr>\n<td>앱 정책</td>\n<td>RSS &gt; <code>MEMORY_LIMIT</code> 감지 → <code>SELF-TERMINATED</code> 로그 후 자체 SIGKILL</td>\n<td><code>[MemoryGuard] Memory limit exceeded …</code></td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"72-cpu-spike\">7.2 CPU Spike<a class=\"headerlink\" href=\"#72-cpu-spike\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>레이어</th>\n<th>무엇이 일어나는가</th>\n<th>관제 시그니처</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>앱</td>\n<td><a href=\"용어집.md#infinite-loop\">무한 루프</a> 또는 <a href=\"용어집.md#busy-wait\">busy-wait</a> 발생, sleep/yield 없음</td>\n<td>로그 정상 진행 후 갑자기 침묵 직전</td>\n</tr>\n<tr>\n<td>OS</td>\n<td>해당 스레드가 자기 타임 슬라이스를 끝까지 사용, 다른 작업 대기 → CFS 가 균형 잡으려 하지만 한 코어는 사실상 점유<sup id=\"fnref:48\"><a class=\"footnote-ref\" href=\"#fn:48\">48</a></sup></td>\n<td><code>top</code> 의 그 프로세스 <code>%CPU</code> 가 ~100% 근처 (단일 코어)<sup id=\"fnref:49\"><a class=\"footnote-ref\" href=\"#fn:49\">49</a></sup></td>\n</tr>\n<tr>\n<td>앱 정책</td>\n<td><code>%CPU</code> &gt; <code>CPU_MAX_OCCUPY</code> 감지 → SIGTERM 자기 종료</td>\n<td><code>[Watchdog] CPU threshold exceeded … SIGTERM</code></td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"73-deadlock\">7.3 Deadlock<a class=\"headerlink\" href=\"#73-deadlock\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>레이어</th>\n<th>무엇이 일어나는가</th>\n<th>관제 시그니처</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>앱</td>\n<td>스레드 A 가 lock1 잡고 lock2 기다림, 스레드 B 가 lock2 잡고 lock1 기다림</td>\n<td>로그가 <code>WAITING/BLOCKED</code> 에서 정지</td>\n</tr>\n<tr>\n<td>OS</td>\n<td>두 스레드 모두 futex 시스템콜 안에서 무한 슬립 — CPU 도 안 쓰고 메모리도 안 변함<sup id=\"fnref:50\"><a class=\"footnote-ref\" href=\"#fn:50\">50</a></sup></td>\n<td><code>top -H</code> 의 스레드 <code>%CPU = 0</code>, <code>wchan = futex_wait_queue_me</code><sup id=\"fnref:51\"><a class=\"footnote-ref\" href=\"#fn:51\">51</a></sup></td>\n</tr>\n<tr>\n<td>앱 정책</td>\n<td>데드락 감지기 없음 → 영원히 살아있는 <a href=\"용어집.md#zombie-orphan\">좀비</a></td>\n<td>외부 <a href=\"용어집.md#http-curl\"><code>curl</code></a> 타임아웃, 마지막 로그 갱신 정지</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h2 id=\"8\">8. 학습 체크리스트 — 미션 끝난 뒤 스스로 확인<a class=\"headerlink\" href=\"#8\" title=\"Permanent link\">#</a></h2>\n<p>리포트를 다 쓰고 나서, 아래 질문에 <strong>자기 말로</strong> 답할 수 있어야 한다. 답이 막히면 그 부분을 다시 읽고 코드/로그를 재확인하거나, 해당 <a href=\"용어집.md\">용어집</a> 항목을 다시 읽을 것.</p>\n<h3 id=\"81\">8.1 메모리<a class=\"headerlink\" href=\"#81\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>[ ] Heap, Stack, Data 영역의 차이를 한 줄씩 설명할 수 있다.</li>\n<li>[ ] RSS 와 VSZ 의 차이를 사례로 설명할 수 있다.</li>\n<li>[ ] 가상 메모리가 왜 \"환상\" 인지, 페이지 폴트가 무엇인지 설명할 수 있다.</li>\n<li>[ ] 커널 OOM Killer 와 이번 미션의 MemoryGuard 가 다른 메커니즘임을 구분할 수 있다.</li>\n<li>[ ] <code>MEMORY_LIMIT</code> 상향이 왜 임시 조치이지 근본 해결이 아닌지 설명할 수 있다.</li>\n<li>[ ] 쓰래싱이 무엇이고 왜 시스템 마비로 이어지는지 설명할 수 있다.</li>\n<li>[ ] lazy allocation 때문에 VSZ 와 RSS 가 다르다는 사실을 사례로 설명할 수 있다.</li>\n</ul>\n<h3 id=\"82-cpu\">8.2 CPU / 스케줄링<a class=\"headerlink\" href=\"#82-cpu\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>[ ] 프로세스와 스레드의 차이를 5가지 항목으로 비교할 수 있다.</li>\n<li>[ ] <code>top</code> 의 <code>%CPU</code> 가 왜 100% 를 넘을 수 있는지 설명할 수 있다.</li>\n<li>[ ] CFS 의 핵심 직관(\"vruntime 가장 작은 놈\") 을 한 줄로 말할 수 있다.</li>\n<li>[ ] FCFS / RR / Priority 의 외부 관측 시그니처를 구분할 수 있다.</li>\n<li>[ ] SIGTERM 과 SIGKILL 의 차이, Watchdog 이 왜 SIGTERM 인지 설명할 수 있다.</li>\n<li>[ ] 컨텍스트 스위치가 무엇이고 왜 비용이 드는지 설명할 수 있다.</li>\n<li>[ ] 타임 슬라이스의 길이가 응답성과 처리량에 어떤 트레이드오프를 만드는지 설명할 수 있다.</li>\n</ul>\n<h3 id=\"83\">8.3 멀티프로세싱 / 멀티스레딩<a class=\"headerlink\" href=\"#83\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>[ ] 동시성과 병렬성의 차이를 비유로 설명할 수 있다.</li>\n<li>[ ] fork 와 exec 가 각각 무엇을 하는지, <a href=\"용어집.md#shell\">셸</a>이 명령어를 실행할 때 어떻게 쓰이는지 설명할 수 있다.</li>\n<li>[ ] Copy-on-Write 가 fork 비용을 어떻게 줄이는지 설명할 수 있다.</li>\n<li>[ ] 멀티프로세싱 vs 멀티스레딩의 5가지 트레이드오프를 말할 수 있다.</li>\n<li>[ ] Python GIL 이 무엇이고, 왜 CPU-bound 작업에서 멀티스레드가 효과 없는지 설명할 수 있다.</li>\n<li>[ ] CPU-bound 와 I/O-bound 작업의 정의와 적합한 동시성 모델을 매핑할 수 있다.</li>\n<li>[ ] 암달의 법칙 공식을 외우고, 직렬 5% 일 때 천장이 20배인 이유를 설명할 수 있다.</li>\n<li>[ ] Producer-Consumer / Thread Pool / Fork-Join 패턴의 차이를 비유로 설명할 수 있다.</li>\n</ul>\n<h3 id=\"84\">8.4 동시성 / 데드락<a class=\"headerlink\" href=\"#84\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>[ ] Race condition 의 예시를 코드로 그려 보일 수 있다.</li>\n<li>[ ] 데드락 4대 조건을 외울 수 있고, 각각을 깨는 전략을 하나씩 말할 수 있다.</li>\n<li>[ ] 식사하는 철학자 문제로 데드락을 설명할 수 있다.</li>\n<li>[ ] 외부에서 데드락을 증명하기 위해 어떤 6 가지 증거를 모아야 하는지 말할 수 있다.</li>\n<li>[ ] <code>wchan = futex_wait_queue_me</code> 가 왜 결정적 단서인지 설명할 수 있다.</li>\n<li>[ ] 뮤텍스·세마포어·컨디션 변수의 차이를 사례로 설명할 수 있다.</li>\n<li>[ ] 데드락과 기아(starvation)가 다른 개념임을 설명할 수 있다.</li>\n</ul>\n<h3 id=\"85\">8.5 운영 도구<a class=\"headerlink\" href=\"#85\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>[ ] <code>ps</code>, <code>top</code>, <code>/proc</code> 이 어떤 관계인지 (<code>/proc</code> 이 원본) 설명할 수 있다.</li>\n<li>[ ] 데드락 진단에 <code>top -H</code> 와 <code>ps -L</code> 이 필수인 이유를 말할 수 있다.</li>\n<li>[ ] <code>monitor.sh</code> 가 모은 데이터가 왜 장애 분석의 \"최초 단서\" 가 되는지 설명할 수 있다.</li>\n<li>[ ] <code>vmstat</code> 의 <code>si/so</code> 가 무엇이고 쓰래싱 감지에 어떻게 쓰는지 설명할 수 있다.</li>\n<li>[ ] <code>dmesg</code> 에서 무엇을 찾아야 하는지 (특히 OOM Killer) 설명할 수 있다.</li>\n</ul>\n<hr />\n<p>학습자가 이 문서의 모든 표·흐름·용어를 머릿속에서 그릴 수 있다면, \"로그가 이렇게 찍혔다 → 그래서 원인은 X 다\" 라는 추론을 자신감 있게 리포트에 쓸 수 있다. 그게 이번 미션의 진짜 목표다.</p>\n<p>각 용어의 자세한 정의·비유·중요성은 <a href=\"용어집.md\">용어집</a>을, 학습 자료·<code>man</code> 페이지 통독 목록·시스템 호출 추적 도구는 <a href=\"용어집.md#참고--더-깊이-가고-싶을-때\">용어집의 부록</a>을 참고하라.</p>\n<hr />\n<h2 id=\"sources-references\">출처 &amp; 참고 문헌 (Sources &amp; References)<a class=\"headerlink\" href=\"#sources-references\" title=\"Permanent link\">#</a></h2>\n<blockquote>\n<p>본문 위첨자 각주 번호를 누르면 아래 출처로, 출처 끝의 ↩ 로 본문 위치로 돌아온다. <code>⚠</code> 는 검증 중 바로잡은 부정확/오류 정정 항목이다. 출처는 1차/표준 자료(man7.org · kernel.org · docs.python.org · OSTEP · Wikipedia) 우선으로 골랐다.</p>\n</blockquote>\n<div class=\"footnote\">\n<hr />\n<ol>\n<li id=\"fn:1\">\n<p>폰 노이만 구조(stored-program): 코드·데이터를 같은 메모리에 두고 CPU 가 순차 인출. — <a href=\"https://en.wikipedia.org/wiki/Von_Neumann_architecture\">Von Neumann architecture (Wikipedia)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:1\" title=\"Jump back to footnote 1 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:2\">\n<p><a href=\"https://gist.github.com/jboner/2841832\">Latency Numbers Every Programmer Should Know — jboner gist</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:2\" title=\"Jump back to footnote 2 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:3\">\n<p>L1 0.5ns / L2 ~7ns / main memory ~100ns. — <a href=\"https://gist.github.com/jboner/2841832\">Latency Numbers (jboner gist)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:3\" title=\"Jump back to footnote 3 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:4\">\n<p>SSD random read ~150µs, disk seek ~10ms. — <a href=\"https://gist.github.com/jboner/2841832\">Latency Numbers (jboner gist)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:4\" title=\"Jump back to footnote 4 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:5\">\n<p>저장 계층은 한 단 내려갈 때 대략 100~1000배 느려진다. — <a href=\"https://gist.github.com/jboner/2841832\">Latency Numbers (jboner gist)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:5\" title=\"Jump back to footnote 5 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:6\">\n<p>⚠ 용어 보충: 이 절이 실제로 다루는 건 '메모리 벽(memory wall)'이고, 엄밀한 '폰 노이만 병목'은 코드·데이터가 단일 버스를 공유해 생기는 CPU–메모리 전송 처리율 한계를 가리킨다. — <a href=\"https://en.wikipedia.org/wiki/Von_Neumann_architecture\">Von Neumann architecture §Von Neumann bottleneck (Wikipedia)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:6\" title=\"Jump back to footnote 6 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:7\">\n<p>RAM 이 차면 OS 가 페이지를 디스크로 swap-out 하고, 디스크는 DRAM 보다 수천~수십만 배 느려 쓰래싱이 된다. — <a href=\"https://en.wikipedia.org/wiki/Thrashing_%28computer_science%29\">Thrashing (Wikipedia)</a> · <a href=\"https://pages.cs.wisc.edu/~remzi/OSTEP/vm-beyondphys-policy.pdf\">OSTEP: Beyond Physical Memory — Policies</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:7\" title=\"Jump back to footnote 7 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:8\">\n<p>⚠ 보충: x86-64 는 정규형(canonical) 48비트만 사용해 사용자 공간이 약 128 TiB(5-레벨 페이징 시 57비트). '무한'은 비유. — <a href=\"https://en.wikipedia.org/wiki/X86-64\">x86-64 (Wikipedia)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:8\" title=\"Jump back to footnote 8 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:9\">\n<p>가상↔물리 매핑 단위(페이지)는 보통 4 KB. — <a href=\"https://docs.kernel.org/mm/page_tables.html\">Page Tables — Linux Kernel docs</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:9\" title=\"Jump back to footnote 9 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:10\">\n<p>malloc 은 가상 주소만 예약하고 물리 RAM 은 페이지를 처음 건드릴 때 할당(demand paging). — <a href=\"https://man7.org/linux/man-pages/man3/malloc.3.html\">malloc(3)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:10\" title=\"Jump back to footnote 10 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:11\">\n<p>RSS=물리 상주, VSZ=예약 포함 가상 총량. — <a href=\"https://man7.org/linux/man-pages/man1/ps.1.html\">ps(1)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:11\" title=\"Jump back to footnote 11 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:12\">\n<p>메모리 고갈 시 커널이 oom_score(badness)가 가장 높은 프로세스를 SIGKILL. — <a href=\"https://man7.org/linux/man-pages/man5/proc.5.html\">proc(5) — oom_score</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:12\" title=\"Jump back to footnote 12 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:13\">\n<p>리눅스는 프로세스·스레드를 같은 task(task_struct)로 다뤄 ps -L / top -H 로 스레드 관찰이 가능. — <a href=\"https://man7.org/linux/man-pages/man2/clone.2.html\">clone(2)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:13\" title=\"Jump back to footnote 13 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:14\">\n<p>top %CPU 는 코어당 100% 합산(Irix 모드 기본) — 멀티스레드면 400%+ 가능. — <a href=\"https://man7.org/linux/man-pages/man1/top.1.html\">top(1)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:14\" title=\"Jump back to footnote 14 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:15\">\n<p>CFS 는 vruntime 이 가장 작은(leftmost) 태스크를 고른다. — <a href=\"https://docs.kernel.org/scheduler/sched-design-CFS.html\">CFS Scheduler — Linux Kernel docs</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:15\" title=\"Jump back to footnote 15 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:16\">\n<p>CFS 는 공정성 기반 가중치 스케줄링이며 가중치는 nice 값으로 조정. — <a href=\"https://docs.kernel.org/scheduler/sched-design-CFS.html\">CFS Scheduler — Linux Kernel docs</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:16\" title=\"Jump back to footnote 16 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:17\">\n<p>⚠ 정정: softlockup 은 단순 'idle 0%'가 아니라 한 태스크가 커널 모드에서 일정 시간(기본 ~20초) 빠져나오지 못해 재스케줄되지 못할 때 감지(유저 모드 바쁜 루프는 해당 없음). — <a href=\"https://docs.kernel.org/admin-guide/lockup-watchdogs.html\">Softlockup/Hardlockup detector — Linux Kernel docs</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:17\" title=\"Jump back to footnote 17 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:18\">\n<p>시그널 번호/기본 동작·catchable 여부. — <a href=\"https://man7.org/linux/man-pages/man7/signal.7.html\">signal(7)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:18\" title=\"Jump back to footnote 18 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:19\">\n<p>SIGKILL(9)·SIGSTOP 은 잡기·차단·무시 불가. — <a href=\"https://man7.org/linux/man-pages/man7/signal.7.html\">signal(7)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:19\" title=\"Jump back to footnote 19 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:20\">\n<p>병렬성=같은 시각 실제 동시 실행(멀티코어), 동시성=시분할 인터리빙. — <a href=\"https://en.wikipedia.org/wiki/Concurrent_computing\">Concurrent computing (Wikipedia)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:20\" title=\"Jump back to footnote 20 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:21\">\n<p>⚠ 보충: '동시성 ⊃ 병렬성'은 OS 스케줄링 관점의 한 모델일 뿐. 동시성(프로그램 구조)과 병렬성(실행)을 직교 개념으로 보는 정의도 표준적이다. — <a href=\"https://go.dev/blog/waza-talk\">Rob Pike, \"Concurrency is not Parallelism\"</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:21\" title=\"Jump back to footnote 21 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:22\">\n<p>데드락은 병렬성이 아닌 동시성 문제 — 단일 코어 시분할에서도 발생. — <a href=\"https://en.wikipedia.org/wiki/Deadlock_%28computer_science%29\">Deadlock (Wikipedia)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:22\" title=\"Jump back to footnote 22 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:23\">\n<p>fork 후 페이지는 RO 공유; 쓰기 시 page fault 로 그때 복사(Copy-on-Write). — <a href=\"https://man7.org/linux/man-pages/man2/fork.2.html\">fork(2)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:23\" title=\"Jump back to footnote 23 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:24\">\n<p>fork()·pthread_create() 모두 clone() 위에 구현(CLONE_VM/FS/FILES/SIGHAND). — <a href=\"https://man7.org/linux/man-pages/man2/clone.2.html\">clone(2)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:24\" title=\"Jump back to footnote 24 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:25\">\n<p>프로세스·스레드는 자원 공유 설정만 다른 같은 커널 task. — <a href=\"https://man7.org/linux/man-pages/man2/clone.2.html\">clone(2)</a> · <a href=\"https://man7.org/linux/man-pages/man1/ps.1.html\">ps(1) -L</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:25\" title=\"Jump back to footnote 25 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:26\">\n<p>errno 는 스레드별(Thread-Local Storage). — <a href=\"https://man7.org/linux/man-pages/man3/errno.3.html\">errno(3)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:26\" title=\"Jump back to footnote 26 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:27\">\n<p>⚠ 정정: COW fork 라 프로세스 생성도 작을 땐 수십 µs(예: 2MB 힙 ≈ 35µs); 주소공간이 커질수록 페이지테이블 복제로 ms 까지 증가. 'ms 고정'은 과장. — <a href=\"https://eli.thegreenplace.net/2018/launching-linux-threads-and-processes-with-clone/\">Launching Linux threads and processes with clone (Eli Bendersky)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:27\" title=\"Jump back to footnote 27 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:28\">\n<p>프로세스 전환은 주소공간이 바뀌어 비싸다(TLB 무효화). 단 현대 CPU 의 PCID/ASID 는 전체 플러시를 회피. — <a href=\"https://en.wikipedia.org/wiki/Translation_lookaside_buffer\">TLB (Wikipedia)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:28\" title=\"Jump back to footnote 28 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:29\">\n<p>CPython GIL: 한 번에 한 스레드만 바이트코드 실행. — <a href=\"https://wiki.python.org/moin/GlobalInterpreterLock\">Python Wiki: GlobalInterpreterLock</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:29\" title=\"Jump back to footnote 29 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:30\">\n<p>I/O·일부 C 확장(NumPy 등) 내부에서는 GIL 이 풀린다. — <a href=\"https://wiki.python.org/moin/GlobalInterpreterLock\">Python Wiki: GlobalInterpreterLock</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:30\" title=\"Jump back to footnote 30 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:31\">\n<p>GIL 의 근본 이유 = thread-unsafe 한 참조 카운팅 보호. — <a href=\"https://wiki.python.org/moin/GlobalInterpreterLock\">Python Wiki: GlobalInterpreterLock</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:31\" title=\"Jump back to footnote 31 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:32\">\n<p>⚠ 정정: free-threaded 빌드 플래그는 <code>--disable-gil</code>(산출물 python3.13t)이며 <code>--without-gil</code> 아님. — <a href=\"https://peps.python.org/pep-0703/\">PEP 703</a> · <a href=\"https://docs.python.org/3/howto/free-threading-python.html\">Free-threading HOWTO</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:32\" title=\"Jump back to footnote 32 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:33\">\n<p>GIL 은 바이트코드만 직렬화하고 사용자 락 순서는 통제 안 함 → 데드락은 GIL 과 무관. — <a href=\"https://docs.python.org/3/library/threading.html#lock-objects\">threading.Lock</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:33\" title=\"Jump back to footnote 33 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:34\">\n<p>생산자-소비자 대기/깨움은 컨디션 변수+뮤텍스로 구현(busy-wait 아님). — <a href=\"https://pages.cs.wisc.edu/~remzi/OSTEP/threads-cv.pdf\">OSTEP: Condition Variables</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:34\" title=\"Jump back to footnote 34 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:35\">\n<p>Speedup ≤ 1/((1-p)+p/N); 본문 표 수치 계산 검증됨. — <a href=\"https://en.wikipedia.org/wiki/Amdahl%27s_law\">Amdahl's law (Wikipedia)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:35\" title=\"Jump back to footnote 35 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:36\">\n<p>락 순서 통일 = Coffman '순환 대기' 차단. — <a href=\"https://en.wikipedia.org/wiki/Deadlock_%28computer_science%29\">Deadlock (Wikipedia)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:36\" title=\"Jump back to footnote 36 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:37\">\n<p>데드락은 Coffman 4조건 동시 성립 시에만 발생, 하나만 깨도 불가능. — <a href=\"https://en.wikipedia.org/wiki/Deadlock_%28computer_science%29#Necessary_conditions\">Deadlock — Necessary conditions (Wikipedia)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:37\" title=\"Jump back to footnote 37 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:38\">\n<p>4조건 명칭: 상호배제·점유대기·비선점·순환대기. — <a href=\"https://en.wikipedia.org/wiki/Deadlock_%28computer_science%29#Necessary_conditions\">Deadlock — Necessary conditions (Wikipedia)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:38\" title=\"Jump back to footnote 38 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:39\">\n<p>⚠ 정정: 단일 스레드여도 락의 '상호 배제' 속성 자체는 남는다. 멀티스레드를 끄면 사라지는 건 동시 경쟁이고, 그 결과 '점유 대기/순환 대기'가 성립 못 해 데드락이 회피된다. — <a href=\"https://en.wikipedia.org/wiki/Deadlock_%28computer_science%29#Necessary_conditions\">Deadlock — Necessary conditions (Wikipedia)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:39\" title=\"Jump back to footnote 39 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:40\">\n<p>식사하는 철학자 문제 — Dijkstra(1965). — <a href=\"https://en.wikipedia.org/wiki/Dining_philosophers_problem\">Dining philosophers problem (Wikipedia)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:40\" title=\"Jump back to footnote 40 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:41\">\n<p>자원 계층(번호 순) 해법이 순환 대기를 깬다. — <a href=\"https://en.wikipedia.org/wiki/Dining_philosophers_problem#Resource_hierarchy_solution\">Dining philosophers §Resource hierarchy (Wikipedia)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:41\" title=\"Jump back to footnote 41 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:42\">\n<p>wchan 이 futex_* 면 유저공간 락 대기. — <a href=\"https://man7.org/linux/man-pages/man2/futex.2.html\">futex(2)</a> · <a href=\"https://man7.org/linux/man-pages/man1/ps.1.html\">ps(1) — wchan</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:42\" title=\"Jump back to footnote 42 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:43\">\n<p>stat 'Sl' = S(interruptible sleep)+l(multi-threaded). — <a href=\"https://man7.org/linux/man-pages/man1/ps.1.html\">ps(1) — PROCESS STATE CODES</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:43\" title=\"Jump back to footnote 43 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:44\">\n<p>Python Lock·C++ std::mutex 등 대부분 유저 락이 내부적으로 futex 사용. — <a href=\"https://man7.org/linux/man-pages/man2/futex.2.html\">futex(2)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:44\" title=\"Jump back to footnote 44 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:45\">\n<p>스레드별 wchan(커널 대기 함수)이 데드락 증명의 핵심 증거. — <a href=\"https://man7.org/linux/man-pages/man1/ps.1.html\">ps(1) — wchan</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:45\" title=\"Jump back to footnote 45 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:46\">\n<p>top·ps·free 는 /proc 텍스트를 파싱하는 래퍼. — <a href=\"https://man7.org/linux/man-pages/man5/proc.5.html\">proc(5)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:46\" title=\"Jump back to footnote 46 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:47\">\n<p>si/so = 초당 swap-in/out; 0 이상이면 스왑 활동. — <a href=\"https://man7.org/linux/man-pages/man8/vmstat.8.html\">vmstat(8)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:47\" title=\"Jump back to footnote 47 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:48\">\n<p>CFS 가 균형을 맞추려 해도 무한 루프 스레드가 한 코어를 점유. — <a href=\"https://docs.kernel.org/scheduler/sched-design-CFS.html\">CFS Scheduler — Linux Kernel docs</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:48\" title=\"Jump back to footnote 48 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:49\">\n<p>단일 스레드 무한 루프 → 해당 프로세스 %CPU 약 100%(단일 코어). — <a href=\"https://man7.org/linux/man-pages/man1/top.1.html\">top(1)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:49\" title=\"Jump back to footnote 49 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:50\">\n<p>데드락 스레드는 FUTEX_WAIT 에서 블록 — CPU 0·메모리 불변. — <a href=\"https://man7.org/linux/man-pages/man2/futex.2.html\">futex(2)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:50\" title=\"Jump back to footnote 50 in the text\">&#8617;</a></p>\n</li>\n<li id=\"fn:51\">\n<p>⚠ 보충: wchan 심볼명은 커널 버전 의존 — futex_wait_queue_me(≤5.15)·futex_wait_queue(≥5.16)·futex_wait 등. — <a href=\"https://man7.org/linux/man-pages/man2/futex.2.html\">futex(2)</a>&#160;<a class=\"footnote-backref\" href=\"#fnref:51\" title=\"Jump back to footnote 51 in the text\">&#8617;</a></p>\n</li>\n</ol>\n</div>", "toc": "<div class=\"toc\">\n<ul>\n<li><a href=\"#0\">0. 왜 이론을 알아야 하는가</a></li>\n<li><a href=\"#1\">1. 컴퓨터 구조 기초 — 폰 노이만 모델</a><ul>\n<li><a href=\"#11\">1.1 모든 것이 메모리에 있다</a></li>\n<li><a href=\"#12\">1.2 폰 노이만 병목 — \"메모리는 항상 느리다\"</a></li>\n</ul>\n</li>\n<li><a href=\"#2-oom\">2. 메모리 구조 — 가상 메모리부터 OOM 까지</a><ul>\n<li><a href=\"#21\">2.1 프로세스의 가상 메모리 레이아웃</a></li>\n<li><a href=\"#22-virtual-memory-os\">2.2 가상 메모리(Virtual Memory) — OS 가 보여주는 환상</a></li>\n<li><a href=\"#23-rss-vs-vsz-ps-top\">2.3 RSS vs VSZ — ps, top 의 메모리 컬럼</a></li>\n<li><a href=\"#24-oom-out-of-memory\">2.4 OOM (Out-Of-Memory) — 두 가지 트리거</a><ul>\n<li><a href=\"#1-oom-killer\">1) 커널의 OOM Killer</a></li>\n<li><a href=\"#2-memoryguard\">2) 앱 내부의 메모리 보호 정책 (이번 미션 — MemoryGuard)</a></li>\n</ul>\n</li>\n<li><a href=\"#25-memory_limit\">2.5 환경변수 MEMORY_LIMIT 의 의미</a></li>\n</ul>\n</li>\n<li><a href=\"#3-cpu\">3. CPU — 프로세스 · 스레드 · 스케줄링</a><ul>\n<li><a href=\"#31-vs\">3.1 프로세스 vs 스레드 (개요)</a></li>\n<li><a href=\"#32-cpu-cpu-100\">3.2 CPU 사용률(%CPU)이 100% 가 넘는 이유</a></li>\n<li><a href=\"#33-linux-cfs\">3.3 스케줄러 — Linux CFS 의 핵심 직관</a><ul>\n<li><a href=\"#_1\">보너스 과제와의 연결</a></li>\n</ul>\n</li>\n<li><a href=\"#34-watchdog-cpu\">3.4 Watchdog — CPU 과점유 보호 정책</a></li>\n</ul>\n</li>\n<li><a href=\"#4\">4. 멀티프로세싱 · 멀티스레딩 — 병렬 실행의 이론과 실제</a><ul>\n<li><a href=\"#41-concurrency-vs-parallelism\">4.1 동시성(Concurrency) vs 병렬성(Parallelism) — 두 개념의 분리</a></li>\n<li><a href=\"#42\">4.2 멀티프로세싱 — 격리된 주소공간의 협업</a><ul>\n<li><a href=\"#fork\">fork() — 자기 복제</a></li>\n<li><a href=\"#copy-on-write-fork\">Copy-on-Write — fork 가 가난해지지 않는 이유</a></li>\n<li><a href=\"#exec\">exec() — 자기를 다른 프로그램으로 교체</a></li>\n<li><a href=\"#clone\">clone() — 리눅스의 통합 인터페이스</a></li>\n</ul>\n</li>\n<li><a href=\"#43\">4.3 멀티스레딩 — 공유 주소공간의 협업</a></li>\n<li><a href=\"#44-vs\">4.4 멀티프로세싱 vs 멀티스레딩 — 비용·이점 비교표</a></li>\n<li><a href=\"#45-python-gil\">4.5 Python 의 GIL — 왜 멀티스레딩이 마법 같지 않은가</a><ul>\n<li><a href=\"#gil\">왜 GIL 이 존재하는가</a></li>\n<li><a href=\"#cpu-bound-io-bound\">CPU-bound 와 I/O-bound 의 갈림길</a></li>\n<li><a href=\"#gil_1\">GIL 우회 전략</a></li>\n</ul>\n</li>\n<li><a href=\"#46\">4.6 자주 쓰는 동시 실행 패턴</a><ul>\n<li><a href=\"#producer-consumer-\">Producer-Consumer (생산자-소비자)</a></li>\n<li><a href=\"#thread-pool\">Thread Pool (스레드 풀)</a></li>\n<li><a href=\"#fork-join-\">Fork-Join (분할-합치기)</a></li>\n</ul>\n</li>\n<li><a href=\"#47\">4.7 암달의 법칙 — 병렬화의 수학적 한계</a></li>\n<li><a href=\"#48\">4.8 어떤 모델을 언제 쓰는가 — 결정 가이드</a></li>\n<li><a href=\"#49-multi_thread_enable\">4.9 미션 연결 — MULTI_THREAD_ENABLE 의 정체</a></li>\n</ul>\n</li>\n<li><a href=\"#5\">5. 동시성 · 락 · 데드락</a><ul>\n<li><a href=\"#51\">5.1 왜 락이 필요한가 — 공유 자원 문제</a></li>\n<li><a href=\"#52-4-coffman-conditions\">5.2 데드락의 4대 필요조건 (Coffman conditions)</a></li>\n<li><a href=\"#53\">5.3 식사하는 철학자 문제 — 데드락의 표준 비유</a></li>\n<li><a href=\"#54\">5.4 어떻게 외부에서 데드락을 진단하는가</a></li>\n<li><a href=\"#55-wchan\">5.5 wchan 이 결정적인 이유</a></li>\n</ul>\n</li>\n<li><a href=\"#6\">6. 시스템 관제 도구 정리 (이번 미션에서 자주 쓰는 것 위주)</a></li>\n<li><a href=\"#7-3\">7. 미션 3대 장애 — 이론과 관제 데이터의 매핑</a><ul>\n<li><a href=\"#71-oom-memory-leak\">7.1 OOM (Memory Leak)</a></li>\n<li><a href=\"#72-cpu-spike\">7.2 CPU Spike</a></li>\n<li><a href=\"#73-deadlock\">7.3 Deadlock</a></li>\n</ul>\n</li>\n<li><a href=\"#8\">8. 학습 체크리스트 — 미션 끝난 뒤 스스로 확인</a><ul>\n<li><a href=\"#81\">8.1 메모리</a></li>\n<li><a href=\"#82-cpu\">8.2 CPU / 스케줄링</a></li>\n<li><a href=\"#83\">8.3 멀티프로세싱 / 멀티스레딩</a></li>\n<li><a href=\"#84\">8.4 동시성 / 데드락</a></li>\n<li><a href=\"#85\">8.5 운영 도구</a></li>\n</ul>\n</li>\n<li><a href=\"#sources-references\">출처 &amp; 참고 문헌 (Sources &amp; References)</a></li>\n</ul>\n</div>\n"}, {"title": "용어집", "file": "docs/md/용어집.md", "html": "<h1 id=\"b1-2\">용어집 — B1-2 미션에서 쓰이는 개념·도구·약어 사전<a class=\"headerlink\" href=\"#b1-2\" title=\"Permanent link\">#</a></h1>\n<blockquote>\n<p>이 문서는 <a href=\"이론_지식.md\">이론 지식</a> 본문에 등장하는 모든 전문 용어를 한 줄 정의 + 비유 + 왜 중요한가 의 3단 구조로 정리한다.\n본문에서 용어 위의 하이퍼링크를 클릭하면 이 문서의 해당 항목으로 바로 이동하고, 좌측 사이드바의 \"이론 지식\" 을 다시 클릭하면 본문으로 돌아온다.</p>\n<p><strong>읽는 순서 추천</strong>: 처음부터 통독할 필요는 없다. 본문 읽다가 모르는 용어가 나오면 클릭해서 정의만 보고 돌아가면 된다.</p>\n</blockquote>\n<hr />\n<h2 id=\"1\">1. 컴퓨터 구조 기초<a class=\"headerlink\" href=\"#1\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"syscall\">시스템 콜 (System Call)<a class=\"headerlink\" href=\"#syscall\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 일반 프로그램(앱)이 운영체제(OS) 커널에게 \"이 일 좀 대신 해 줘\" 라고 부탁하는 공식 통로 — <em>앱과 커널 사이의 근본 인터페이스</em>다. <code>open</code> 으로 파일 열기, <code>read</code>/<code>write</code> 로 디스크 읽기/쓰기, <code>mmap</code>/<code>brk</code> 로 메모리 영역 늘리기, <code>clone</code> 으로 스레드 만들기 등이 모두 시스템 콜이다. 동작 방식은 CPU 를 특별한 명령(x86-64 의 <code>syscall</code>, ARM 의 <code>svc</code>)으로 <em>트랩(trap)</em> 시켜 유저 모드에서 커널 모드로 권한을 올리는 것이다. 이 모드 전환에는 비용이 들어 — 보통 수백 ns ~ 수 µs — 같은 일을 잘게 쪼개 시스템 콜을 남발하면 느려진다. <strong>흔한 오해</strong>: <code>malloc()</code> 은 시스템 콜이 아니라 C 라이브러리 함수다. 메모리가 부족할 때만 내부적으로 <code>brk</code>/<code>mmap</code> 시스템 콜을 호출한다.</li>\n<li><strong>비유</strong>: 식당에서 손님(앱)이 주방(OS)에 \"물 좀 더 주세요\" 라고 말하는 행위. 손님이 주방에 직접 들어가지는 않고, 정해진 호출 창구로만 요청한다.</li>\n<li><strong>왜 중요한가</strong>: 모든 자원(메모리·CPU 시간·디스크·네트워크)은 OS 가 관리하므로, 앱이 무슨 사고를 치든 그 흔적은 결국 시스템 콜 어딘가에 남는다. <code>strace</code> 로 어떤 시스템 콜에서 멈췄는지(예: OOM 직전 <code>mmap</code> 실패, 데드락 시 <code>futex</code> 대기) 보는 것이 장애 분석의 출발점이 된다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man2/syscalls.2.html\">syscalls(2) — Linux manual page</a> · <a href=\"https://en.wikipedia.org/wiki/System_call\">System call — Wikipedia</a></li>\n</ul>\n<h3 id=\"os-kernel-userspace\">운영체제 · 커널 · 유저 공간<a class=\"headerlink\" href=\"#os-kernel-userspace\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>OS (운영체제)</strong>: 컴퓨터의 모든 자원(CPU·메모리·디스크·네트워크)을 관리하고, 앱들이 안전하게 공유하도록 중재하는 거대한 프로그램. 리눅스·윈도우·macOS 가 OS 다.</li>\n<li><strong>커널 (Kernel)</strong>: OS 의 핵심 부분으로, 가장 강한 권한(CPU 의 \"특권 모드\", x86 에서는 Ring 0)을 가지고 하드웨어를 직접 다루는 코드. \"리눅스 커널\" 이라고 부르는 그것. 부팅 시 메모리에 올라와 종료까지 상주한다.</li>\n<li><strong>유저 공간 (User Space)</strong>: 일반 앱이 실행되는 영역(x86 에서는 Ring 3). 권한이 약해서 하드웨어를 직접 못 만지고, <a href=\"#syscall\">시스템 콜</a>로 커널에 부탁해야 한다. 두 공간은 <em>별도의 메모리 영역</em>으로 분리되어, 유저 앱의 버그가 커널을 직접 깨뜨리지 못하게 막는다(보호, protection).</li>\n<li><strong>비유</strong>: 운영체제 = 빌딩 전체 시스템. 커널 = 시설관리실(전기·수도·엘리베이터 직접 통제). 유저 공간 = 사무실(직원이 일하지만 시설은 못 만짐).</li>\n<li><strong>왜 중요한가</strong>: \"내가 짠 앱\" 은 유저 공간에서 돈다. 메모리 할당·스레드 생성·파일 쓰기 등은 다 커널에 시스템 콜로 부탁하는 거다. 그래서 <em>앱 로그</em> 와 <em>커널 로그(<code>dmesg</code>)</em> 두 군데를 다 봐야 장애 전모를 본다 — 예컨대 OOM Killer 가 프로세스를 죽인 기록은 커널 로그에만 남는다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §1 컴퓨터 구조 기초</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/User_space_and_kernel_space\">User space and kernel space — Wikipedia</a></li>\n</ul>\n<h3 id=\"von-neumann\">폰 노이만 구조 (von Neumann architecture)<a class=\"headerlink\" href=\"#von-neumann\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 1945년 수학자 John von Neumann 이 「First Draft of a Report on the EDVAC」에서 정리·회람한 컴퓨터 모델로, \"코드(명령어)와 데이터를 같은 메모리에 두고, CPU 가 그 메모리에서 한 단어씩 가져와 실행한다\" 는 <em>저장 프로그램(stored-program)</em> 설계다. 핵심 구성요소는 CPU(연산장치 + 제어장치)·메모리·입출력(I/O)이며, 이들을 <em>버스(bus)</em> 가 잇는다. 코드와 데이터가 같은 버스를 공유하기 때문에 CPU 가 명령어를 읽는 동안 데이터를 동시에 못 옮기는 <em>폰 노이만 병목(von Neumann bottleneck)</em> 이 생긴다. <strong>참고</strong>: 이 구조의 착상에는 EDVAC 팀의 Eckert·Mauchly 기여도 컸으나, 회람된 보고서에 von Neumann 의 이름만 실려 그의 이름이 붙었다.</li>\n<li><strong>비유</strong>: 요리사(CPU)와 레시피 + 재료를 같은 책상(메모리) 위에 올려놓고, 요리사가 책상에서 한 줄씩 레시피를 읽으며 재료를 가져다 쓰는 모습.</li>\n<li><strong>왜 중요한가</strong>: 우리가 지금 쓰는 거의 모든 컴퓨터(노트북·서버·스마트폰)가 이 모델을 따르므로, \"코드가 곧 메모리이고, 메모리가 모자라면 코드 실행도 멈춘다\" 는 사실이 자연스러워진다. OOM 이 왜 시스템 마비로 이어지는지의 근본 원인.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §1.2 폰 노이만 병목</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/First_Draft_of_a_Report_on_the_EDVAC\">First Draft of a Report on the EDVAC — Wikipedia</a> · <a href=\"https://en.wikipedia.org/wiki/Von_Neumann_architecture\">Von Neumann architecture — Wikipedia</a></li>\n</ul>\n<h3 id=\"cpu\">CPU (Central Processing Unit)<a class=\"headerlink\" href=\"#cpu\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 컴퓨터의 \"두뇌\". 메모리에 적힌 명령어를 <em>가져오기(fetch) → 해석(decode) → 실행(execute)</em> 의 명령어 사이클로 하나씩 처리하는 하드웨어 칩. 클록(clock)에 맞춰 동작하며 클록 속도(예: 3 GHz = 초당 30억 사이클)가 한 코어의 기본 처리 속도를 정한다. 오늘날 CPU 는 보통 여러 개의 <em>코어(core)</em> 를 담고, 각 코어는 하이퍼스레딩(SMT)으로 2개의 <em>논리 CPU</em> 로 보일 수 있다. <strong>흔한 오해</strong>: 클록만 높다고 빠른 게 아니다 — 캐시·분기예측·코어 수가 실제 성능을 좌우한다.</li>\n<li><strong>비유</strong>: 식당의 요리사. 주문(명령어)을 받아 정해진 동작(더하기·곱하기·메모리 읽기 등)을 수행한다.</li>\n<li><strong>왜 중요한가</strong>: CPU 가 100% 점유되면 다른 작업이 못 들어간다. 이번 미션의 CPU Spike 가 그 결과다. <code>top</code> 의 <code>%CPU</code> 가 코어 수 × 100% 까지 올라갈 수 있다는 점(<a href=\"#cpu-vs-io-bound\">CPU-bound</a> 참고)도 코어 개념에서 나온다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §3 CPU</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Central_processing_unit\">Central processing unit — Wikipedia</a></li>\n</ul>\n<h3 id=\"throughput-vs-latency\">스루풋 (Throughput) vs 지연시간 (Latency)<a class=\"headerlink\" href=\"#throughput-vs-latency\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>스루풋(throughput)</strong>: 단위 시간당 처리 가능한 작업량 (예: 초당 요청 1만 건, RPS).</li>\n<li><strong>지연시간(latency)</strong>: 작업 하나가 시작해서 끝나는 데 걸리는 시간 (예: 요청 한 건당 5ms).</li>\n<li>둘은 단순 역수가 아니다. 파이프라인·병렬 처리가 있으면 <em>지연시간이 길어도 스루풋은 높을 수</em> 있다(공장 컨베이어처럼). 부하가 높아져 큐가 쌓이면 스루풋은 한계에 머물고 지연시간만 폭증한다(Little's Law: 평균 대기 건수 = 스루풋 × 지연시간).</li>\n<li><strong>비유</strong>: 식당에서 스루풋 = \"1시간에 손님 몇 명 받나\", 지연시간 = \"손님 한 명이 음식 받기까지 얼마나 걸리나\".</li>\n<li><strong>왜 중요한가</strong>: 둘이 다른 개념인데 흔히 헷갈린다. CPU 코어가 많아지면 스루풋이 늘지만 한 작업의 지연시간은 그대로일 수 있다. 관제 지표에서 \"처리량은 멀쩡한데 p99 지연만 튄다\" 같은 패턴을 읽으려면 이 구분이 필수다.</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Latency_%28engineering%29\">Latency (engineering) — Wikipedia</a></li>\n</ul>\n<h3 id=\"time-units\">시간 단위 (ns / µs / ms / s)<a class=\"headerlink\" href=\"#time-units\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li>1 초 (s) = 1,000 밀리초 (ms)</li>\n<li>1 밀리초 (ms) = 1,000 마이크로초 (µs)</li>\n<li>1 마이크로초 (µs) = 1,000 나노초 (ns)</li>\n<li>즉 1 초 = 1,000,000,000 나노초. 각 접두어는 SI 표준 10진 접두어(milli=10⁻³, micro=10⁻⁶, nano=10⁻⁹)다.</li>\n<li><strong>비유</strong>: 1초가 1년이라면, 1ms = 약 8시간 46분, 1µs = 약 30초, 1ns = 약 0.03초.</li>\n<li><strong>왜 중요한가</strong>: CPU 한 클록 사이클(약 0.3 ns)과 HDD 탐색(약 10 ms)의 차이는 <strong>약 3,300만 배</strong>다. 메모리·캐시·디스크·네트워크의 지연시간 격차가 이 척도 위에서 벌어지므로, \"작은 단위라고 무시하면 안 된다\" — 어디서 시간을 잡아먹는지 직관을 잡는 기준자다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §1.2 폰 노이만 병목</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://www.bipm.org/en/measurement-units/si-prefixes\">SI prefixes — BIPM</a> · <a href=\"https://gist.github.com/jboner/2841832\">Latency Numbers Every Programmer Should Know — GitHub gist (jboner)</a></li>\n</ul>\n<h3 id=\"concurrency-vs-parallelism\">동시성 (Concurrency) vs 병렬성 (Parallelism)<a class=\"headerlink\" href=\"#concurrency-vs-parallelism\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>동시성(concurrency)</strong>: 여러 일을 <em>논리적으로 겹쳐</em> 다루는 구조. 코어가 1개여도 <a href=\"#scheduler\">스케줄러</a>가 짧은 시간 단위로 <a href=\"#thread\">스레드</a>들을 번갈아 돌리면(시분할, time-slicing) <em>겉으로는</em> 동시 같다. \"동시에 진행 중인 일을 <em>다루는</em> 능력\"이지 반드시 같은 순간 실행을 뜻하진 않는다.</li>\n<li><strong>병렬성(parallelism)</strong>: <em>진짜로</em> 같은 시각에 여러 일이 실행되는 상태. 물리적으로 멀티코어(또는 멀티 CPU)에서만 가능하다.</li>\n<li><strong>비유</strong>: 동시성 = 1명의 요리사가 라면·김밥·떡볶이를 30초마다 번갈아 만들기. 병렬성 = 요리사 3명이 진짜 동시에 만들기.</li>\n<li><strong>왜 중요한가</strong>: 데드락은 <em>동시성</em> 이 만드는 문제이지 <em>병렬성</em> 이 만드는 게 아니다. 1 코어 머신에서도 멀티스레드면 데드락 가능. 집합 관계는 동시성 ⊃ 병렬성(병렬성은 동시성의 한 실현 방식).<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §4.1 동시성 vs 병렬성</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Concurrency_%28computer_science%29\">Concurrency (computer science) — Wikipedia</a></li>\n</ul>\n<h3 id=\"cpu-vs-io-bound\">CPU-bound vs I/O-bound<a class=\"headerlink\" href=\"#cpu-vs-io-bound\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>CPU-bound 작업</strong>: 대부분의 시간을 <em>계산</em> 에 쓰는 작업. 이미지 처리, 압축, 암호화, 수치 시뮬레이션. 더 빠른/더 많은 CPU 코어를 주면 빨라진다.</li>\n<li><strong>I/O-bound 작업</strong>: 대부분의 시간을 <em>기다림</em> 에 쓰는 작업. HTTP 요청, DB 쿼리, 파일 읽기/쓰기, 네트워크 송수신. CPU 를 늘려도 별 소용없고, 대기를 겹치게(오버랩) 만들어야 빨라진다.</li>\n<li>구분법: 작업 중 <code>%CPU</code> 가 거의 100% 면 CPU-bound, CPU 는 한가한데 응답만 느리면 I/O-bound 쪽이다.</li>\n<li><strong>비유</strong>: CPU-bound = 시험 문제를 계속 푸는 학생. I/O-bound = 식당에서 주문하고 음식 나오기를 기다리는 손님.</li>\n<li><strong>왜 중요한가</strong>: 어느 쪽인지에 따라 최적의 병렬화 전략이 다르다. CPU-bound 는 <a href=\"#py-multiprocessing\">멀티프로세싱</a> 이 답이고, I/O-bound 는 <a href=\"#asyncio\">asyncio</a> 나 멀티스레드가 답. Python 의 <a href=\"#gil\">GIL</a> 은 한 번에 한 스레드만 바이트코드를 실행시켜 CPU-bound 멀티스레드의 병렬 가속을 막지만, 스레드가 I/O 대기 중에는 GIL 을 풀어주므로 I/O-bound 는 멀티스레드로도 잘 겹쳐진다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §4.8 어떤 모델을 언제 쓰는가</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/CPU-bound\">CPU-bound — Wikipedia</a> · <a href=\"https://docs.python.org/3/glossary.html#term-global-interpreter-lock\">Global interpreter lock (GIL) — Python Glossary</a></li>\n</ul>\n<h3 id=\"bit-byte\">bit · byte · 이진수 (binary)<a class=\"headerlink\" href=\"#bit-byte\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>bit (비트)</strong>: 0 또는 1 — 컴퓨터의 가장 작은 정보 단위. binary digit 의 줄임말.</li>\n<li><strong>byte (바이트)</strong>: 거의 모든 현대 시스템에서 8 bit 묶음(8비트 묶음을 명확히 가리킬 땐 <em>옥텟, octet</em>). 영어 한 글자(ASCII)가 1 byte 이며, 대부분 아키텍처에서 <em>메모리 주소를 매기는 최소 단위</em>다.</li>\n<li><strong>이진수 (binary)</strong>: 0/1 만으로 모든 숫자·문자·이미지·동영상을 표현하는 방식. 8 bit 한 바이트는 0~255 (= 2⁸ = 256가지)를 나타낸다.</li>\n<li><strong>비유</strong>: bit = 전기 스위치 1개(on/off). byte = 스위치 8개 묶음. 컴퓨터는 결국 스위치 수십억 개로 모든 일을 한다.</li>\n<li><strong>왜 중요한가</strong>: KB·MB·GB 모두 byte 의 배수. <code>top</code>, <code>ps</code>, <code>free</code> 가 보여주는 모든 메모리 수치는 결국 byte 단위다. 4 KB = 4096 byte 라는 사실이 <a href=\"#page\">페이지</a> 크기와도 연결된다.<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §2.1 프로세스의 가상 메모리 레이아웃</a></p>\n</blockquote>\n</li>\n</ul>\n<hr />\n<ul>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Byte\">Byte — Wikipedia</a></li>\n</ul>\n<h2 id=\"15\">1.5 셸 · 터미널 · 로그 (비전공자 보충)<a class=\"headerlink\" href=\"#15\" title=\"Permanent link\">#</a></h2>\n<p>이 섹션은 미션 도중 마주치는 <em>명령행 환경</em> 의 기본기를 비전공자 관점에서 한 번 정리한다.</p>\n<h3 id=\"shell\">셸 (Shell) · bash · zsh<a class=\"headerlink\" href=\"#shell\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 사용자가 키보드로 친 명령어를 받아 OS 에 전달·실행하는 <em>프로그램</em>. 명령행을 토큰으로 쪼개고(파싱), <a href=\"#env-var\">환경변수</a>·와일드카드(<code>*</code>, <code>?</code>)·따옴표를 <em>치환·확장</em> 한 뒤, 내장 명령(<code>cd</code>, <code>export</code> 등)은 직접 처리하고 외부 명령은 <a href=\"#fork-exec\">fork+exec</a> 로 새 프로세스를 띄워 돌린다. 리눅스 기본은 <code>bash</code>, macOS 는 2019년 Catalina 부터 기본 셸을 <code>zsh</code> 로 바꿨다. 흔한 오해: \"셸 = 터미널\" 이 아니다. 셸은 명령 해석기 <em>프로그램</em> 이고, 터미널은 그걸 보여주는 <em>창</em> 이다(<a href=\"#terminal\">터미널</a> 참고). 또 다른 오해: 셸은 단순 입력 전달기가 아니라 <a href=\"#pipe-redirect\">파이프</a>·조건 분기·반복문을 갖춘 <em>프로그래밍 언어</em> 다.</li>\n<li><strong>비유</strong>: 호텔 컨시어지. \"5층 가게 해 주세요\" 같은 사람의 요청을 받아 엘리베이터·청소·룸서비스 같은 실제 시스템에 전달.</li>\n<li><strong>왜 중요한가</strong>: 우리가 치는 <code>ps</code>, <code>top</code>, <code>curl</code>, <code>kill</code> 모두 셸이 받아서 <a href=\"#fork-exec\">fork+exec</a> 로 새 <a href=\"#process\">프로세스</a>를 만들어 돌린다. 셸 자체도 하나의 프로세스(<a href=\"#pid\">PID</a> 있음)라서, 셸이 죽으면 그 아래 자식 프로세스들도 영향을 받는다(이게 <a href=\"#daemon\">데몬</a> <code>nohup</code> 이 필요한 이유와 직결).</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a>\n- <strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Unix_shell\">Shell — Wikipedia (Unix shell)</a> · <a href=\"https://support.apple.com/en-us/102360\">Use zsh as the default shell on your Mac — Apple Support</a></p>\n</blockquote>\n<h3 id=\"terminal\">터미널 (Terminal)<a class=\"headerlink\" href=\"#terminal\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 셸을 띄우고 그 입출력을 화면에 그려 주는 <em>창</em> 프로그램. macOS Terminal, Windows Terminal, GNOME Terminal 등이 모두 터미널 <em>에뮬레이터</em> — 옛날의 물리 단말기를 소프트웨어로 흉내 낸 것이다. 그 원형이 1978년 DEC 가 내놓은 VT100 으로, ANSI 이스케이프 시퀀스(커서 이동·색상 제어용 제어문자열)를 사실상 표준화시켰고 오늘날 거의 모든 에뮬레이터가 \"VT100 호환\" 을 표방한다. 내부적으로 터미널 에뮬레이터는 셸과 <em>의사 터미널(pseudo-terminal, pty)</em> 이라는 커널 장치 쌍으로 연결되어, 사람이 친 키 입력을 셸의 <a href=\"#std-streams\">stdin</a> 으로, 셸의 <a href=\"#std-streams\">stdout/stderr</a> 를 화면으로 중계한다.</li>\n<li><strong>비유</strong>: 셸이 컨시어지라면 터미널은 그 컨시어지가 앉아있는 <em>데스크</em>. SSH 로 원격 서버에 접속하는 것은 \"다른 데스크에서 같은 컨시어지(셸)와 대화\" 하는 것.</li>\n<li><strong>왜 중요한가</strong>: 터미널은 셸을 <em>보여주는 도구</em> 일 뿐 셸 자체는 아니다. 둘을 구분해야 \"터미널을 닫으면 왜 <a href=\"#daemon\"><code>nohup</code></a> 없이는 프로세스도 죽나\" 같은 질문에 답할 수 있다 — 터미널이 닫히면 그 pty 가 사라지며 셸과 자식들에게 <code>SIGHUP</code>(<a href=\"#signal\">시그널</a>)이 전달되기 때문이다.</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a>\n- <strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/VT100\">VT100 — Wikipedia</a> · <a href=\"https://man7.org/linux/man-pages/man7/pty.7.html\">pty(7) — Linux manual page</a></p>\n</blockquote>\n<h3 id=\"cli-gui\">CLI vs GUI<a class=\"headerlink\" href=\"#cli-gui\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>CLI (Command Line Interface)</strong>: 텍스트 명령어를 한 줄씩 입력해 컴퓨터를 다루는 방식. <a href=\"#shell\">셸</a>이 대표. 명령이 텍스트라서 그대로 스크립트 파일에 적어 <em>재현·자동화</em> 할 수 있는 게 핵심 강점이다.</li>\n<li><strong>GUI (Graphical User Interface)</strong>: 아이콘·창·마우스 같은 그래픽 요소로 다루는 방식. 윈도우 탐색기, macOS Finder. 직관적이지만 동작을 그대로 기록·반복하기는 어렵다.</li>\n<li><strong>비유</strong>: CLI = 점원에게 말로 주문. GUI = 메뉴판 사진 보고 손가락으로 가리키기.</li>\n<li><strong>왜 중요한가</strong>: 서버 운영·자동화·스크립트는 거의 CLI. 이번 미션의 모든 도구(<code>ps</code>, <code>top</code>, <code>vmstat</code>, <code>dmesg</code>, <code>curl</code>) 가 CLI 이며, OOM/CPU 장애 분석은 결국 CLI 출력을 <a href=\"#pipe-redirect\">파이프</a>·<code>grep</code> 으로 가공하는 작업이다.</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a>\n- <strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Command-line_interface\">Command-line interface — Wikipedia</a> · <a href=\"https://en.wikipedia.org/wiki/Graphical_user_interface\">Graphical user interface — Wikipedia</a></p>\n</blockquote>\n<h3 id=\"std-streams\">표준 입출력 (stdin · stdout · stderr)<a class=\"headerlink\" href=\"#std-streams\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 모든 <a href=\"#process\">프로세스</a>가 시작할 때 자동으로 열려 있는 3개의 데이터 통로. POSIX 가 각각 <a href=\"#file-descriptor\">파일 디스크립터</a> 0/1/2 번을 차지하도록 규정한다(<code>&lt;unistd.h&gt;</code> 의 <code>STDIN_FILENO</code>/<code>STDOUT_FILENO</code>/<code>STDERR_FILENO</code>).</li>\n<li><strong>stdin (표준 입력, FD 0)</strong>: 키보드 또는 다른 명령의 출력에서 <em>들어오는</em> 데이터.</li>\n<li><strong>stdout (표준 출력, FD 1)</strong>: 화면으로 보내는 일반 출력. 터미널을 향할 때는 <em>줄 단위 버퍼링(line-buffered)</em>.</li>\n<li><strong>stderr (표준 에러, FD 2)</strong>: 화면으로 보내는 에러·경고. <em>버퍼링하지 않아(unbuffered)</em> 즉시 출력되며, stdout 과 분리되어 있어 따로 잡을 수 있다.</li>\n<li><strong>비유</strong>: 식당 카운터에 창구가 3개 — 주문(stdin), 음식(stdout), 컴플레인(stderr).</li>\n<li><strong>왜 중요한가</strong>: <code>command &gt; out.log 2&gt; err.log</code> 처럼 정상 출력과 에러를 분리할 수 있는 건 둘이 다른 FD 라서 가능. monitor.sh 같은 로깅 스크립트가 자주 쓰며, 장애 로그에서 정상 흐름과 에러를 갈라 보는 첫걸음이다. 흔한 함정: 프로그램이 죽기 직전 stdout 버퍼는 비우지 못해도 stderr 의 에러 메시지는 거의 항상 남는다 — 그래서 사후 분석은 stderr 를 먼저 본다.</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a>\n- <strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man3/stdin.3.html\">stdin(3) — Linux manual page</a> · <a href=\"https://pubs.opengroup.org/onlinepubs/9699919799/functions/stdin.html\">stdin — The Open Group Base Specifications</a></p>\n</blockquote>\n<h3 id=\"pipe-redirect\">파이프 · 리다이렉트 (<code>|</code>, <code>&gt;</code>, <code>&gt;&gt;</code>, <code>&lt;</code>)<a class=\"headerlink\" href=\"#pipe-redirect\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>파이프 (<code>|</code>)</strong>: 왼쪽 명령의 <a href=\"#std-streams\">stdout</a> 을 오른쪽 명령의 <a href=\"#std-streams\">stdin</a> 으로 <em>흘려보낸다</em>. <code>ps -ef | grep python</code> 처럼. 두 명령은 <em>동시에</em> 실행되며, 커널의 파이프 버퍼(리눅스 기본 64KiB)가 차면 쓰는 쪽이 잠깐 멈춘다 — 즉 파이프는 <a href=\"#ipc\">IPC</a> 의 한 형태다.</li>\n<li><strong>리다이렉트</strong>: <code>&gt;</code> 는 stdout 을 <em>파일로 덮어쓰기</em>(파일을 비우고 새로 씀), <code>&gt;&gt;</code> 는 <em>이어쓰기</em>, <code>&lt;</code> 는 파일을 stdin 으로 <em>읽기</em>, <code>2&gt;</code> 는 stderr 만 따로 보낸다. 흔한 실수: <code>2&gt;&amp;1</code> 의 위치 — <code>cmd &gt; f 2&gt;&amp;1</code> 은 둘 다 <code>f</code> 로 가지만 <code>cmd 2&gt;&amp;1 &gt; f</code> 는 stderr 가 <em>원래 화면</em> 으로 새어 나간다(평가가 왼쪽→오른쪽 순서라서).</li>\n<li><strong>비유</strong>: 파이프 = 한 요리사가 만든 반찬을 옆 요리사 도마로 바로 올리는 컨베이어 벨트. 리다이렉트 = 다 만든 음식을 그릇(파일)에 담아 보관.</li>\n<li><strong>왜 중요한가</strong>: 셸 스크립트의 거의 모든 표현력이 이 두 가지에서 나온다. monitor.log 같은 결과 파일도 결국 리다이렉트의 산물이며, <code>dmesg | grep -i oom</code> 같은 한 줄로 장애 단서를 추려내는 게 분석의 일상이다.</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a>\n- <strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man7/pipe.7.html\">pipe(7) — Linux manual page</a> · <a href=\"https://www.gnu.org/software/bash/manual/html_node/Redirections.html\">Bash Reference Manual — Redirections (GNU)</a></p>\n</blockquote>\n<h3 id=\"file-descriptor\">파일 디스크립터 (File Descriptor, FD)<a class=\"headerlink\" href=\"#file-descriptor\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#process\">프로세스</a>가 열어 둔 파일·소켓·파이프를 가리키는, OS 가 붙이는 작은 음이 아닌 정수. 0/1/2 는 <a href=\"#std-streams\">stdin/stdout/stderr</a> 가 차지하고, 새로 연 것은 <em>현재 사용 가능한 가장 낮은 번호</em>(보통 3, 4, 5…)를 받는다. 정확히는 FD 는 커널의 <em>열린 파일 테이블</em> 항목을 가리키는 프로세스별 인덱스라서, 같은 파일을 두 번 열면 FD 번호가 둘로 다르다. <code>ls -l /proc/&lt;PID&gt;/fd/</code> 로 그 프로세스가 지금 무엇을 열고 있는지 다 볼 수 있다.</li>\n<li><strong>비유</strong>: 도서관에서 빌린 책마다 받는 번호표. 책 자체가 아니라 번호표만 들고 다닌다.</li>\n<li><strong>왜 중요한가</strong>: 멀티스레드에서 FD 테이블은 프로세스 단위로 <em>공유</em> 자원이라 한 <a href=\"#thread\">스레드</a>가 닫으면 모두에게 영향. \"Too many open files\"(<code>EMFILE</code>) 에러는 한 프로세스가 가질 수 있는 FD 수가 한계(<code>ulimit -n</code>, 리눅스 기본 흔히 1024)에 닿았다는 뜻 — FD 누수는 OOM 못지않은 흔한 장애 원인이다.</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a>\n- <strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man2/open.2.html\">open(2) — Linux manual page</a> · <a href=\"https://man7.org/linux/man-pages/man2/getrlimit.2.html\">getrlimit(2) — Linux manual page</a></p>\n</blockquote>\n<h3 id=\"exit-code\">exit code (종료 코드) · <code>$?</code><a class=\"headerlink\" href=\"#exit-code\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 명령어가 끝날 때 OS 에 반환하는 0~255 정수. 관례: <strong>0 = 성공, 그 외(1~255) = 실패</strong>. 직전 명령의 종료 코드는 셸 변수 <code>$?</code> 에 담긴다. <code>wait()</code> 류 호출이 받는 원래 상태값은 더 넓지만, 셸은 하위 8비트만 노출하므로 256 이상은 256 으로 나눈 나머지로 wrap 된다(예: <code>exit 256</code> → <code>$?</code> 는 0).</li>\n<li><strong>비유</strong>: 시험지를 내고 받는 점수. 0 점이 <em>만점</em>(다 풀었다 = 성공), 다른 숫자는 어디서 막혔는지 코드.</li>\n<li><strong>왜 중요한가</strong>: 셸의 <code>if</code>, <code>&amp;&amp;</code>, <code>||</code> 가 모두 exit code 로 판단. 프로세스가 <a href=\"#signal\">시그널</a>로 죽으면 셸은 <code>128 + 시그널번호</code> 로 보고한다 — SIGKILL(9) → 137, SIGTERM(15) → 143. 로그에 <code>Exited with 137</code> 이 보이면 <em>누군가(흔히 OOM Killer) SIGKILL 을 보냈다</em> 의 강력한 단서.</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a>\n- <strong>출처</strong>: <a href=\"https://www.gnu.org/software/bash/manual/html_node/Exit-Status.html\">Bash Reference Manual — Exit Status (GNU)</a></p>\n</blockquote>\n<h3 id=\"root-sudo\">root · sudo · 권한 (Permission)<a class=\"headerlink\" href=\"#root-sudo\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>root (= superuser, uid 0)</strong>: 시스템 <em>대부분의 권한</em> 을 가진 특수 계정. 통상적인 파일 권한 검사를 우회하며, 어떤 프로세스든 <a href=\"#signal\">SIGKILL</a> 할 수 있다. (엄밀히는 SELinux·capabilities·seccomp 등으로 root 도 제약될 수 있다.)</li>\n<li><strong>sudo</strong>: 일반 사용자가 정책 파일(<code>/etc/sudoers</code>)이 허용하는 범위에서 <em>명령을 다른 사용자(기본 root) 권한으로</em> 실행하는 도구. <code>sudo apt install ...</code> 같은 식.</li>\n<li><strong>권한</strong>: 파일·디렉토리에 붙은 <em>r(읽기) · w(쓰기) · x(실행)</em> 표시. <code>ls -l</code> 의 <code>rwxr-xr-x</code> 9 칸이 (소유자·그룹·기타) × (r/w/x).</li>\n<li><strong>비유</strong>: 빌딩 마스터키(root) vs 직원 카드(일반 사용자). 마스터키는 모든 문을 열지만, 직원 카드는 자기 사무실만. 청소부가 잠깐 마스터키를 빌리는 것 = sudo.</li>\n<li><strong>왜 중요한가</strong>: <code>dmesg</code>, 남의 프로세스 <a href=\"#signal\"><code>kill</code></a>, <code>/proc/&lt;남의 pid&gt;/...</code> 등 시스템 깊은 곳에 닿으려면 root 가 필요할 때가 많다. 보안 원칙: <em>기본은 일반 사용자, 필요할 때만 sudo</em> — 그래야 실수나 침해의 폭발 반경을 줄인다.</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a>\n- <strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man7/credentials.7.html\">credentials(7) — Linux manual page</a> · <a href=\"https://www.sudo.ws/docs/man/sudo.man/\">sudo(8) — sudo.ws manual</a></p>\n</blockquote>\n<h3 id=\"log-level\">로그 · 로그 레벨<a class=\"headerlink\" href=\"#log-level\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 프로그램이 동작 중 남기는 텍스트 기록. 파이썬 <code>logging</code> 모듈은 5단계 레벨을 숫자값과 함께 정의한다 — 숫자가 클수록 심각하고, 설정한 레벨 <em>이상</em> 만 출력된다:</li>\n<li><strong>DEBUG (10)</strong>: 개발 중 추적용 (운영에선 보통 꺼둠)</li>\n<li><strong>INFO (20)</strong>: 정상 진행 상황 알림</li>\n<li><strong>WARNING (30)</strong>: 잘못될 수 있는 상황</li>\n<li><strong>ERROR (40)</strong>: 일부 기능 실패</li>\n<li><strong>CRITICAL (50)</strong> (= FATAL): 시스템 자체가 위험 — 곧 종료/장애</li>\n<li><strong>비유</strong>: 일기. 평범한 날(INFO), 좀 이상한 날(WARNING), 사고 난 날(ERROR), 큰 사건(CRITICAL).</li>\n<li><strong>왜 중요한가</strong>: <code>MemoryGuard</code> 가 띄우는 <code>[CRITICAL]</code> 은 <em>가장 높은 위험 레벨(50)</em> 이므로 장애 1차 단서가 된다. <code>grep CRITICAL</code> 만 해도 평소 안 보이던 사건만 솎아낼 수 있다. 반대로 운영에서 레벨을 WARNING 으로 올려두면 DEBUG/INFO 가 묻혀 정작 중요한 로그를 놓치기도 한다.</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식</a></p>\n</blockquote>\n<hr />\n<ul>\n<li><strong>출처</strong>: <a href=\"https://docs.python.org/3/library/logging.html#logging-levels\">logging — Logging facility for Python (Logging Levels)</a> · <a href=\"https://docs.python.org/3/howto/logging.html#logging-levels\">Logging HOWTO — Python documentation</a></li>\n</ul>\n<h2 id=\"2-storage-hierarchy\">2. 저장 계층 (Storage Hierarchy)<a class=\"headerlink\" href=\"#2-storage-hierarchy\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"register\">레지스터 (Register)<a class=\"headerlink\" href=\"#register\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: CPU 칩 <em>안에</em> 박혀 있는, 컴퓨터에서 가장 빠른(접근 지연 약 0.3 ns) 저장 공간. 산술·논리 연산의 피연산자와 결과는 결국 전부 레지스터를 거친다. 64비트 x86-64 아키텍처 기준 프로그램이 일반적으로 쓰는 <strong>범용 레지스터(GPR)는 16개</strong>(RAX·RBX·...·RSP 등 8개 + R8~R15 8개)이고, 그 외에 부동소수점·벡터(SSE/AVX)·상태 플래그용 레지스터가 따로 있다. 흔한 오해 하나: \"레지스터가 많을수록 무조건 빠르다\" — 실제로는 개수보다 컴파일러가 값을 메모리로 내보내지 않고(=레지스터 스필 회피) 얼마나 레지스터 위에 머물게 하느냐가 성능을 좌우한다.</li>\n<li><strong>비유</strong>: 요리사의 양손. 지금 이 순간 만지고 있는 재료 한두 개만 들 수 있다.</li>\n<li><strong>왜 중요한가</strong>: CPU 가 진짜로 계산하는 건 레지스터 위에서다. 메모리에서 값을 꺼내 레지스터에 올리고, 계산하고, 다시 메모리에 적는 순환을 끝없이 반복한다. CPU 과점유(spike) 장애를 이해할 때, <code>top</code> 의 <code>%CPU</code> 가 100%라는 건 결국 이 \"꺼내고-계산하고-적는\" 사이클이 한 코어를 가득 채우고 있다는 뜻이다.</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §1.2 폰 노이만 병목</a>\n- <strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Processor_register\">Processor register (Wikipedia)</a></p>\n</blockquote>\n<h3 id=\"cache\">캐시 · L1 / L2 / L3 (Cache)<a class=\"headerlink\" href=\"#cache\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#register\">레지스터</a>와 <a href=\"#dram\">DRAM</a> 사이에 끼워 놓은 작은 고속 메모리. CPU 가 방금 쓴(또는 곧 쓸) 데이터를 가까이 붙잡아 두려는 장치다. <strong>L1 이 가장 작고(코어당 수십 KB, 보통 16~64 KB) 가장 빠르며, L3 가 가장 크고(수십 MB) 가장 느리다.</strong> L1·L2 는 보통 코어 전용이고 L3 는 여러 코어가 공유한다. CPU 는 L1→L2→L3→DRAM 순으로 차례로 찾으며, 찾던 데이터가 캐시에 있으면 \"캐시 히트\", 없으면 \"캐시 미스\" 다. 흔한 오해: 캐시는 프로그램이 직접 다루는 게 아니라 하드웨어가 자동으로 채우고 비운다 — 그래서 \"지역성(locality)\"이 좋은 코드가 빨라진다.</li>\n<li><strong>비유</strong>: 책상 서랍 3단. 1단 서랍(L1)은 손 뻗으면 닿지만 작고, 3단(L3)은 약간 멀지만 더 많이 들어간다. 책장(<a href=\"#dram\">DRAM</a>)까지 가는 건 더 멀다.</li>\n<li><strong>왜 중요한가</strong>: 같은 데이터를 반복해 쓰면 캐시 덕분에 무지 빠르다. 반대로 메모리 누수로 작업 집합(working set)이 캐시 용량을 넘어 자주 갈리면(= \"캐시 미스\"가 잦아지면) CPU 가 매번 DRAM 까지 내려가야 하니 같은 일을 해도 수십 배 느려진다.</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §1.2 폰 노이만 병목</a>\n- <strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Cache_hierarchy\">Cache hierarchy (Wikipedia)</a></p>\n</blockquote>\n<h3 id=\"dram\">DRAM (= RAM)<a class=\"headerlink\" href=\"#dram\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 우리가 흔히 \"메모리\" 라 부르는 그것. 전원이 꺼지면 내용이 사라지는 <strong>휘발성</strong> 저장소이며, 한 비트를 트랜지스터 1개 + 콘덴서 1개에 저장한다. 콘덴서의 전하는 시간이 지나면 새어 나가기 때문에, DRAM 은 켜져 있는 동안에도 주기적으로 내용을 다시 써 넣는 <strong>리프레시(refresh)</strong> 를 끊임없이 해야 한다. 이름의 \"D(Dynamic)\" 가 바로 이 동적 리프레시를 가리킨다. 접근 지연은 약 100 ns 로, 캐시보다 한 단계 느린 계층이다.</li>\n<li><strong>비유</strong>: 책장. 책상보다는 크지만 멀고, 정전되면 책이 다 사라지는 마법의 책장.</li>\n<li><strong>왜 중요한가</strong>: 모든 실행 중인 프로그램과 데이터가 여기에 있다. <code>free</code>, <code>%MEM</code> 이 가리키는 게 바로 DRAM 사용량. 가득 차면 OS 가 디스크로 내쫓기 시작한다(= <a href=\"#swap-thrashing\">스왑</a>). 미션의 OOM(메모리 누수) 장애는 본질적으로 이 DRAM 이 한계에 다다르는 과정이다.</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §1.1 모든 것이 메모리에 있다</a>\n- <strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Dynamic_random-access_memory\">Dynamic random-access memory (Wikipedia)</a></p>\n</blockquote>\n<h3 id=\"disk\">디스크 · SSD · HDD<a class=\"headerlink\" href=\"#disk\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>HDD (Hard Disk Drive)</strong>: 회전하는 자기 원판(platter)에 데이터를 자기로 적는 전통적 디스크. 헤드가 물리적으로 이동·탐색하므로 느리다(접근 지연 약 10 ms 수준).</li>\n<li><strong>SSD (Solid State Drive)</strong>: NAND 플래시 메모리 기반. <strong>움직이는 부품이 없어</strong> HDD 보다 약 100배 빠르다(랜덤 접근 지연 약 100 µs 수준).</li>\n<li>둘 다 전원이 꺼져도 내용이 남는 <strong>비휘발성</strong> 저장소다. 단, SSD 의 NAND 셀은 쓰기 횟수에 수명 한계가 있어 무한히 덮어쓸 수 없다는 점이 DRAM 과 다르다.</li>\n<li><strong>비유</strong>: 도서관. 책장에 없는 책을 찾으러 가는 곳. SSD 는 가까운 도서관, HDD 는 다른 도시 도서관.</li>\n<li><strong>왜 중요한가</strong>: <a href=\"#dram\">DRAM</a> 이 다 차면 OS 가 페이지를 SSD/HDD 의 스왑 영역으로 옮긴다. 옮긴 페이지가 다시 필요하면 SSD/HDD 에서 읽어와야 하니 갑자기 100~10000배 느려진다 (= <a href=\"#swap-thrashing\">쓰래싱</a>).</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §1.2 폰 노이만 병목</a>\n- <strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Solid-state_drive\">Solid-state drive (Wikipedia)</a></p>\n</blockquote>\n<h3 id=\"swap-thrashing\">페이지 교체 · 스왑 · 쓰래싱<a class=\"headerlink\" href=\"#swap-thrashing\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>페이지 교체</strong>: <a href=\"#dram\">DRAM</a> 이 모자라면 OS 가 자주 안 쓰는 <a href=\"#page\">페이지</a>(보통 4KB 덩어리)를 골라 디스크로 옮기는(swap-out) 행위. 옮긴 페이지가 다시 필요하면 디스크에서 도로 읽어 온다(swap-in) — 이때 <a href=\"#page-fault\">페이지 폴트</a>가 발생한다.</li>\n<li><strong>스왑 (Swap)</strong>: 그렇게 디스크로 옮겨두는 전용 영역. 리눅스에서는 swap 파일/파티션으로 만든다.</li>\n<li><strong>쓰래싱 (Thrashing)</strong>: 실제 메모리(RAM)가 과도하게 초과 사용(over-commit)되어, 프로그램의 작업 집합이 물리 메모리에 다 들어가지 못하는 상태. 페이지를 디스크로 옮기자마자 다시 필요해져서 \"DRAM ↔ 디스크\" 왕복(page fault)만 끝없이 반복하고, CPU 시간 대부분이 진짜 일이 아니라 페이지 폴트 처리에 소모돼 시스템 처리량이 붕괴한다. 임계점을 넘는 순간 페이지 폴트가 급격히 폭증한다는 점이 특징이다.</li>\n<li><strong>비유</strong>: 책상이 좁아서 안 쓰는 책을 도서관에 반납했는데, 반납하자마자 그 책이 또 필요해져서 다시 빌리러 가는 사람. 결국 책상에서 공부는 못 하고 도서관만 왔다갔다 한다.</li>\n<li><strong>왜 중요한가</strong>: 쓰래싱이 시작되면 <em>겉으로는</em> \"메모리는 아직 100%는 아닌데 CPU 도 멀쩡한데 시스템이 멈췄다\" 처럼 보인다. monitor.log 의 MEM 이 95% 근처에서 CPU 도 같이 치솟는다면 쓰래싱 의심. 즉 OOM 분석과 CPU 분석이 한 화면에서 겹쳐 보이는 대표적 함정이다.</li>\n</ul>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §2.2 가상 메모리</a></p>\n</blockquote>\n<hr />\n<ul>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Thrashing_%28computer_science%29\">Thrashing (computer science) (Wikipedia)</a></li>\n</ul>\n<h2 id=\"3\">3. 프로세스와 메모리 구조<a class=\"headerlink\" href=\"#3\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"process\">프로세스 (Process)<a class=\"headerlink\" href=\"#process\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 실행 중인 프로그램 한 인스턴스. 디스크에 있는 실행 파일을 OS 가 메모리에 올려서 돌리면, 그 살아 있는 단위 하나가 프로세스. 정확히는 <em>코드(텍스트) + 데이터 + <a href=\"#virtual-address-space\">가상 주소 공간</a> + 커널이 관리하는 상태(<a href=\"#pcb\">PCB</a>: 레지스터·열린 파일·스케줄링 우선순위 등)</em> 를 합친 실행 단위다. 흔한 오해 하나: \"프로세스 = 프로그램\" 이 아니다. 프로그램은 디스크 위의 <em>수동적인</em> 파일(데이터)이고, 프로세스는 그것이 메모리에서 <em>능동적으로 실행되는</em> 인스턴스다 — 같은 프로그램을 두 번 실행하면 PID 가 다른 프로세스 2개가 된다.</li>\n<li><strong>비유</strong>: 책장에 꽂힌 요리책(실행 파일) vs 그 레시피로 지금 요리하고 있는 요리사 한 명(프로세스). 같은 책으로 두 요리사가 동시에 요리하면 프로세스 2개.</li>\n<li><strong>왜 중요한가</strong>: <code>ps</code>, <code>top</code>, <code>kill &lt;PID&gt;</code> 등 우리가 다루는 모든 단위가 프로세스다. 각 프로세스는 자기만의 <a href=\"#virtual-address-space\">가상 주소 공간</a>을 가지며, OOM/CPU/데드락 미션의 모든 진단이 결국 \"어느 프로세스인가\"를 특정하는 데서 시작한다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §3.1 프로세스 vs 스레드</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Process_%28computing%29\">Process (computing) — Wikipedia</a></li>\n</ul>\n<h3 id=\"pid\">PID (Process ID)<a class=\"headerlink\" href=\"#pid\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 실행 중인 모든 <a href=\"#process\">프로세스</a>에 OS 가 붙이는 고유 번호. 1 부터 시작하며(부팅 직후 init/systemd 가 PID 1), 종료된 프로세스가 회수되면 그 번호는 재사용될 수 있다. 동시에 살아있는 PID 의 최댓값은 <code>/proc/sys/kernel/pid_max</code> 로 정해지며, 기본값은 보통 32768(2^15) 이고 64비트 리눅스에서는 최대 4194304(2^22) 까지 상향할 수 있다 — 이 한도가 차면 새 프로세스를 만들지 못한다.</li>\n<li><strong>비유</strong>: 식당 손님의 대기번호. 같은 번호는 같은 시각에 두 명 못 받는다.</li>\n<li><strong>왜 중요한가</strong>: 데드락 미션에서 \"PID 가 살아있다(<code>ps -ef | grep</code>)\" 가 1차 증거다. 프로세스가 죽었으면 PID 도 사라진다.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man5/proc.5.html\">proc(5) — Linux manual page</a></li>\n</ul>\n<h3 id=\"parent-child\">PPID · 부모-자식 프로세스<a class=\"headerlink\" href=\"#parent-child\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>PPID (Parent PID)</strong>: 어떤 <a href=\"#process\">프로세스</a>를 <em>만든</em> 부모 프로세스의 <a href=\"#pid\">PID</a>. <code>ps -o pid,ppid,comm</code> 으로 확인.</li>\n<li>모든 프로세스는 <a href=\"#fork-exec\">fork</a> 로 만들어지므로 <em>반드시</em> 부모가 있다. 시스템 부팅 직후 만들어지는 <code>init</code> 또는 <code>systemd</code>(PID 1) 가 모든 프로세스의 시조이며, PID 1 만은 부모가 없다(PPID 0).</li>\n<li>자식이 끝나면 부모가 <code>wait()</code> (또는 <code>waitpid()</code>) 시스템 콜로 회수해야 자식의 <a href=\"#pcb\">PCB</a> 가 깨끗이 정리된다. 부모가 회수하지 않으면 자식은 <a href=\"#zombie-orphan\">좀비</a>로 남는다.</li>\n<li><strong>비유</strong>: 가족 관계도 — 모든 사람에게 부모가 있고, 거슬러 올라가면 한 시조에 닿는다.</li>\n<li><strong>왜 중요한가</strong>: 부모-자식 관계는 <a href=\"#zombie-orphan\">좀비/고아</a> 를 이해하는 토대이며, 셸이 <code>nohup</code> 으로 자식을 <em>부모와 분리</em> 해 살려두는 것도 이 관계를 끊는 행위다.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man2/wait.2.html\">wait(2) — Linux manual page</a></li>\n</ul>\n<h3 id=\"zombie-orphan\">좀비 · 고아 프로세스<a class=\"headerlink\" href=\"#zombie-orphan\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>좀비 (Zombie)</strong>: 자식이 종료됐는데 <a href=\"#parent-child\">부모</a>가 <code>wait()</code> 으로 회수하지 않아 <a href=\"#pcb\">PCB</a> 만 남은 프로세스. <a href=\"#stat-codes\"><code>STAT=Z</code></a>(<code>defunct</code> 로도 표시). CPU·메모리는 거의 0 이지만 종료 코드를 부모가 읽을 때까지 <a href=\"#pid\">PID</a> 슬롯과 프로세스 테이블 항목을 차지한다. 좀비는 <em>이미 죽은</em> 상태라 <code>kill -9</code> 로도 못 죽인다 — 부모가 회수하거나, 부모가 죽어 PID 1 이 회수해야 사라진다.</li>\n<li><strong>고아 (Orphan)</strong>: 부모가 <em>먼저</em> 죽어서 <a href=\"#parent-child\">PPID</a>가 1번(init/systemd)으로 재지정(reparenting)된 자식. 사고는 아니며 정상 동작. PID 1 이 주기적으로 <code>wait()</code> 을 호출해 이들을 회수하므로 고아는 좀비로 남지 않는다.</li>\n<li><strong>비유</strong>: 좀비 = 출석부에는 있는데 졸업 처리가 안 된 학생(자리 차지). 고아 = 담임이 바뀐 학생(여전히 학생).</li>\n<li><strong>왜 중요한가</strong>: 좀비가 쌓이면 시스템 PID 가 고갈된다. ⚠ 단, 이번 데드락 미션의 <em>\"살아있는 좀비\"</em> 표현은 진짜 좀비(STAT=Z)가 아니라 <em>비유적</em> 표현 — 정상 작동이 멈춘 채 PID 만 유지되는 데드락 프로세스를 말한다.</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Zombie_process\">Zombie process — Wikipedia</a> · <a href=\"https://en.wikipedia.org/wiki/Init\">init — Wikipedia</a></li>\n</ul>\n<h3 id=\"daemon\">데몬 (Daemon) · 서비스<a class=\"headerlink\" href=\"#daemon\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 부팅 시 자동으로 떠서 <em>백그라운드로 계속 돌면서</em> 어떤 서비스를 제공하는 <a href=\"#process\">프로세스</a>. 이름 끝에 <code>d</code> 가 붙는 관례(<code>sshd</code>, <code>httpd</code>, <code>crond</code>, <code>systemd</code>). 전통적으로 제어 터미널과 분리(setsid 로 새 세션 리더가 됨)되어 부모가 init 인 <a href=\"#zombie-orphan\">고아</a> 가 되도록 만들어진다. 현대 시스템에서는 systemd 같은 서비스 매니저가 직접 데몬을 자식으로 띄워 관리하는 방식이 일반적이다.</li>\n<li><strong>비유</strong>: 24시간 편의점 점원. 손님이 오든 안 오든 자리를 지키고 있다가 누가 들어오면 응대.</li>\n<li><strong>왜 중요한가</strong>: 리눅스의 거의 모든 시스템 서비스(웹서버·DB·SSH·시간동기화)가 데몬으로 실행된다. <code>agent-leak-app</code> 도 일종의 데몬처럼 종일 동작하다 정책 위반 시 자체 종료. <code>nohup ... &amp;</code> 로 일반 명령을 데몬화할 수 있다.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man7/daemon.7.html\">daemon(7) — Linux manual page</a></li>\n</ul>\n<h3 id=\"virtual-address-space\">가상 주소 공간 (Virtual Address Space)<a class=\"headerlink\" href=\"#virtual-address-space\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#process\">프로세스</a>마다 OS 가 만들어주는 \"자기 전용 메모리 환상\". 실제 <a href=\"#dram\">DRAM</a> 의 어디에 있든, 프로세스는 0번지부터 거대한 연속 공간을 자기가 다 쓰는 것처럼 느낀다. 64비트 x86-64 리눅스에서 사용자 공간 가상 주소는 보통 하위 47비트(128 TB)까지 쓰며, <a href=\"#mmu\">MMU</a>와 <a href=\"#page-table-tlb\">페이지 테이블</a>이 이 가상 주소를 물리 주소로 변환한다. 주의: VSZ 가 크다고 그만큼 실제 메모리를 쓰는 게 아니다 — <a href=\"#lazy-allocation\">lazy allocation</a> 때문에 대부분은 아직 물리 페이지가 배정되지 않은 \"약속\"일 뿐이다.</li>\n<li><strong>비유</strong>: 호텔 객실. 모든 객실은 \"방번호 1번\" 부터 시작하는 듯한 도면을 갖지만, 실제로는 빌딩의 다른 층, 다른 위치에 있다. 옆방의 도면을 봐도 자기 방 안은 못 본다(메모리 격리).</li>\n<li><strong>왜 중요한가</strong>: 가상 주소 공간 덕분에 (1) 프로세스 간 격리 (한 앱 버그가 다른 앱 메모리를 못 망침), (2) DRAM 보다 큰 메모리도 마치 있는 것처럼 쓸 수 있음(스왑 활용) 이 가능하다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §2.2 가상 메모리</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Virtual_memory\">Virtual memory — Wikipedia</a></li>\n</ul>\n<h3 id=\"memory-segments\">Heap · Stack · Data · BSS · Text<a class=\"headerlink\" href=\"#memory-segments\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의 (한 줄씩)</strong>:</li>\n<li><strong>Text (Code)</strong>: 프로그램의 기계어 명령. 읽기 전용이며 여러 프로세스가 같은 실행 파일을 돌릴 때 공유될 수 있다.</li>\n<li><strong>Data</strong>: <code>int x = 5;</code> 처럼 초기값 있는 전역/정적 변수. 실행 파일에 그 값이 그대로 저장된다.</li>\n<li><strong>BSS</strong>: <code>int y;</code> 처럼 초기값 없는(또는 0 인) 전역/정적 변수. 실행 파일엔 <em>크기만</em> 기록되고 로드 시 0 으로 자동 초기화 — 그래서 BSS 는 디스크 용량을 거의 안 먹는다.</li>\n<li><strong>Heap (힙)</strong>: 프로그램이 실행 중에 동적으로 할당받는 영역. <code>malloc()</code>, <code>new</code>, Python 객체 생성 등. 낮은 주소에서 높은 주소 방향으로 자란다(<code>brk</code>/<code>mmap</code>).</li>\n<li><strong>Stack (스택)</strong>: 함수가 호출될 때마다 새 칸(스택 프레임)이 쌓이는 영역. 지역 변수·매개변수·반환 주소가 들어감. 보통 높은 주소에서 낮은 주소 방향으로 자라며, 무한 재귀 등으로 한계를 넘으면 스택 오버플로(SIGSEGV)가 난다.</li>\n<li><strong>비유</strong>: 식당 주방의 구역들. Text = 메뉴판(못 바꿈), Data/BSS = 주방장이 미리 만들어둔 소스 통, Heap = 손님 주문대로 그때그때 만드는 음식 보관함(계속 변함), Stack = 지금 만드는 한 요리에 쓰는 임시 도마(만들고 치움).</li>\n<li><strong>왜 중요한가</strong>: 메모리 누수는 <em>거의 항상</em> Heap 에서 일어난다. Stack 은 함수 끝나면 자동 정리되니까. 그래서 누수 분석은 Heap 사용량(= <a href=\"#vsz-vs-rss\">RSS</a>)추이만 봐도 충분.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §2.1 프로세스의 가상 메모리 레이아웃</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Data_segment\">Data segment — Wikipedia</a></li>\n</ul>\n<h3 id=\"malloc-free-gc\">malloc / free / 가비지 컬렉터 (GC)<a class=\"headerlink\" href=\"#malloc-free-gc\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><code>malloc()</code>: C 언어에서 <a href=\"#memory-segments\">Heap</a>에 메모리 달라는 함수. (\"malloc\" = memory allocate) 작은 요청은 <code>brk</code> 로 힙을 늘려 처리하고, 큰 요청(보통 128 KB 이상)은 <code>mmap</code> 으로 별도 영역을 받아온다.</li>\n<li><code>free()</code>: 다 쓴 메모리를 반납하는 함수. C 에서는 <em>손으로</em> 호출해야 함. free 를 안 하면 누수, 두 번 하면 double-free 버그.</li>\n<li><strong>GC (Garbage Collector)</strong>: Python/Java 등 일부 언어가 자동으로 \"이 객체 더 이상 쓸 사람 없네\" 라고 판단해 메모리를 회수해주는 시스템. CPython 은 <em>참조 카운팅</em> 을 기본으로 쓰고, 서로를 참조하는 순환 참조를 따로 처리하는 보조 순환 수집기를 둔다.</li>\n<li><strong>비유</strong>: 도서관에서 책을 빌리는 것(malloc) ↔ 반납하는 것(free). GC 는 \"한 달 동안 안 본 책은 자동 반납됨\" 같은 자동화 시스템.</li>\n<li><strong>왜 중요한가</strong>: GC 가 있어도 <em>어딘가에서 그 객체를 참조하고 있으면</em> GC 는 못 치운다. 전역 리스트에 자꾸 append 하면서 안 비우면 GC 도 \"이거 누가 쓰고 있는 거 같은데?\" 하고 그냥 둔다 → 메모리 누수.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man3/malloc.3.html\">malloc(3) — Linux manual page</a> · <a href=\"https://docs.python.org/3/library/gc.html\">gc — Garbage Collector interface — Python docs</a></li>\n</ul>\n<h3 id=\"elf\">ELF (Executable and Linkable Format)<a class=\"headerlink\" href=\"#elf\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 리눅스를 비롯한 대부분의 유닉스 계열 OS 가 쓰는 표준 실행 파일·공유 라이브러리·오브젝트 파일 형식. 윈도우의 <code>.exe</code>(PE 형식) 에 해당. 파일 맨 앞 4바이트가 매직 넘버 <code>0x7F 'E' 'L' 'F'</code> 라 <code>file</code> 명령이 이걸 보고 ELF 임을 판별한다.</li>\n<li><strong>비유</strong>: 실행 파일이 담긴 도시락 박스. 표지에 \"이 도시락 안에 코드는 여기, 데이터는 여기\" 식의 색인이 있어 OS 가 그걸 보고 메모리에 펼친다.</li>\n<li><strong>왜 중요한가</strong>: <code>agent-leak-app</code> 도 ELF 다 (<code>file agent-leak-app</code> 으로 확인 가능). 부팅 시 로더가 ELF 의 <a href=\"#memory-segments\">Text/Data 영역</a>을 <a href=\"#virtual-address-space\">가상 메모리</a>에 펼친다.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man5/elf.5.html\">elf(5) — Linux manual page</a></li>\n</ul>\n<h3 id=\"page\">페이지 · 4 KB<a class=\"headerlink\" href=\"#page\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 가상 메모리 ↔ 물리 메모리 매핑을 관리하는 최소 단위. 거의 모든 현대 OS·x86-64 에서 4096 바이트(4 KB). 실행 중인 시스템의 실제 값은 <code>getconf PAGE_SIZE</code> 또는 <code>sysconf(_SC_PAGESIZE)</code> 로 확인한다. 단, 큰 메모리를 효율적으로 쓰려고 2 MB·1 GB 짜리 <em>huge page</em> 를 쓸 수도 있다(기본은 4 KB).</li>\n<li><strong>비유</strong>: 책의 한 페이지. 책을 한 글자 단위로 도서관에서 빌리고 반납하면 비효율적이니, \"페이지 단위로 빌린다\" 고 정한 셈.</li>\n<li><strong>왜 중요한가</strong>: OS 는 메모리를 페이지 단위로 할당·회수·스왑한다. 1 바이트만 써도 4 KB 가 할당된다(= 내부 단편화). 메모리 누수도 결국 페이지 단위 누적.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man2/getpagesize.2.html\">getpagesize(2) — Linux manual page</a></li>\n</ul>\n<h3 id=\"mmu\">MMU (Memory Management Unit)<a class=\"headerlink\" href=\"#mmu\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: CPU 칩 안에 있는 하드웨어로, <a href=\"#process\">프로세스</a>가 보는 가상 주소를 실제 <a href=\"#dram\">DRAM</a> 의 물리 주소로 <em>매번</em> 자동 변환해주는 장치. 변환 과정에서 <a href=\"#page-table-tlb\">페이지 테이블</a>을 참조하고, 접근 권한(읽기/쓰기/실행) 위반이나 매핑 부재를 발견하면 <a href=\"#page-fault\">페이지 폴트</a>를 일으켜 커널에 제어를 넘긴다.</li>\n<li><strong>비유</strong>: 호텔 객실 번호(가상) → 실제 빌딩 층/방 번호(물리) 를 즉시 알려주는 안내원.</li>\n<li><strong>왜 중요한가</strong>: 이게 없다면 <a href=\"#virtual-address-space\">가상 메모리</a>도 없고, 프로세스 격리도 없고, 스왑도 없다. 모든 메모리 시스템의 토대.</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Memory_management_unit\">Memory management unit — Wikipedia</a></li>\n</ul>\n<h3 id=\"page-table-tlb\">페이지 테이블 · TLB<a class=\"headerlink\" href=\"#page-table-tlb\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>페이지 테이블</strong>: \"가상 페이지 N 번은 물리 페이지 M 번에 있다\" 같은 매핑 정보가 적힌 표. 메모리에 있으며, 64비트 주소 공간이 워낙 커서 보통 4단계(또는 5단계) 계층 구조로 구성된다.</li>\n<li><strong>TLB (Translation Lookaside Buffer)</strong>: 페이지 테이블 검색(여러 단계 메모리 접근)이 너무 자주 일어나니, <a href=\"#mmu\">MMU</a> 가 최근 매핑 결과를 작은 캐시에 저장. 캐시 히트면 한 번에 변환, 미스면 페이지 테이블을 다시 걷는다(page table walk).</li>\n<li><strong>비유</strong>: 페이지 테이블 = 호텔 객실 도면(분량이 크다). TLB = 안내원이 머리에 외워둔 최근 객실 위치 메모.</li>\n<li><strong>왜 중요한가</strong>: 메모리를 새로 많이 할당하면 TLB 가 자주 갈리고(= miss), 변환만으로도 느려진다. 메모리 누수가 성능 저하를 가속하는 또 하나의 이유. <a href=\"#context-switch\">컨텍스트 스위치</a> 시 TLB 가 통째로 비워지므로 <a href=\"#py-multiprocessing\">멀티프로세싱</a> 이 <a href=\"#pthread\">멀티스레딩</a> 보다 비싼 이유이기도 하다.</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Page_table\">Page table — Wikipedia</a> · <a href=\"https://en.wikipedia.org/wiki/Translation_lookaside_buffer\">Translation lookaside buffer — Wikipedia</a></li>\n</ul>\n<h3 id=\"page-fault\">페이지 폴트 (Page Fault)<a class=\"headerlink\" href=\"#page-fault\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#process\">프로세스</a>가 어떤 가상 주소를 건드렸는데, 해당 <a href=\"#page\">페이지</a>가 아직 <a href=\"#dram\">DRAM</a> 에 없거나 매핑이 안 돼 있을 때 발생하는 이벤트. CPU 가 커널에게 \"이 페이지 좀 채워줘\" 라고 호출. 디스크 I/O 가 필요 없으면 <strong>마이너 폴트</strong>(수 마이크로초), 스왑·디스크에서 읽어와야 하면 <strong>메이저 폴트</strong>(수 밀리초 — 약 1000배 느림)로 나뉜다. <code>ps -o min_flt,maj_flt</code> 로 카운트를 볼 수 있다.</li>\n<li><strong>비유</strong>: 호텔 객실 도면에 있는 방인데 실제로는 아직 가구가 없는 상태로 가니, 안내원이 즉시 가구를 옮겨와 채워주는 행위.</li>\n<li><strong>왜 중요한가</strong>: 페이지 폴트는 <em>정상</em> 동작이다. 처음 할당받은 페이지에 처음 쓰는 순간 항상 발생. 하지만 메이저 폴트가 너무 자주 발생하면(예: 스왑된 페이지를 다시 가져오는 <a href=\"#swap-thrashing\">스래싱</a>) 시스템이 급격히 느려진다. <a href=\"#cow\">Copy-on-Write</a> 도 페이지 폴트 메커니즘 위에 얹혀 있다.</li>\n<li><strong>출처</strong>: <a href=\"https://en.wikipedia.org/wiki/Page_fault\">Page fault — Wikipedia</a></li>\n</ul>\n<h3 id=\"lazy-allocation\">lazy allocation (지연 할당)<a class=\"headerlink\" href=\"#lazy-allocation\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#process\">프로세스</a>가 <code>malloc(1GB)</code> 라고 해도 OS 는 진짜 1GB 물리 메모리를 안 준다. <em>프로세스가 그 페이지를 실제로 읽거나 쓰는 순간</em>(<a href=\"#page-fault\">페이지 폴트</a>) 에만 물리 페이지를 배정한다(demand paging). 그래서 할당 자체는 거의 즉시 성공하지만 실제 물리 메모리는 천천히 채워진다 — 이 때문에 리눅스는 실제 RAM 보다 더 많은 메모리를 약속하는 <em>오버커밋(overcommit)</em> 이 기본이다.</li>\n<li><strong>비유</strong>: 식당에서 \"10인분 예약\" 했다고 음식을 미리 다 만들어두지 않는다. 손님이 와서 \"이제 주세요\" 할 때마다 한 사람분씩 만든다.</li>\n<li><strong>왜 중요한가</strong>: <a href=\"#vsz-vs-rss\">VSZ vs RSS</a> 의 차이를 만드는 핵심 메커니즘. 누수 추적 시 <em>RSS</em> 만 봐야 하는 이유. 오버커밋이 한계를 넘으면 <a href=\"#oom-killer\">OOM Killer</a> 가 발동한다.</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man5/proc.5.html\">proc(5) overcommit_memory — Linux manual page</a></li>\n</ul>\n<h3 id=\"vsz-vs-rss\">VSZ vs RSS<a class=\"headerlink\" href=\"#vsz-vs-rss\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>VSZ (Virtual Size)</strong>: <a href=\"#process\">프로세스</a>가 OS 에 \"이만큼 줘\" 라고 <em>요청한</em> 가상 메모리 총량 (KB 단위). <a href=\"#lazy-allocation\">lazy allocation</a> 때문에 실제 사용량은 더 작을 수 있다. 매핑된 공유 라이브러리·예약 영역까지 다 포함하므로 보통 RSS 보다 훨씬 크다.</li>\n<li><strong>RSS (Resident Set Size)</strong>: 그 중에서 <em>지금 <a href=\"#dram\">DRAM</a> 에 진짜 올라와 있는</em> 양. <a href=\"#swap-thrashing\">스왑</a>으로 나간 페이지는 빠진다. 단, 여러 프로세스가 공유하는 페이지(공유 라이브러리 등)도 각 프로세스의 RSS 에 중복 계산되므로, RSS 들을 단순 합산하면 실제 물리 메모리 사용량보다 커진다는 함정이 있다.</li>\n<li><strong>비유</strong>: 호텔 예약(VSZ) vs 지금 실제 묵고 있는 손님 수(RSS). 1000명 예약해도 80명만 와 있으면 RSS 는 80명분.</li>\n<li><strong>왜 중요한가</strong>: 메모리 누수의 가장 직접적 지표는 RSS 다. VSZ 는 늘었다 줄었다 안 하므로 누수 감지에 둔감하다.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §2.3 RSS vs VSZ</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man1/ps.1.html\">ps(1) — Linux manual page</a> · <a href=\"https://en.wikipedia.org/wiki/Resident_set_size\">Resident set size — Wikipedia</a></li>\n</ul>\n<h3 id=\"fork-exec\">fork / exec<a class=\"headerlink\" href=\"#fork-exec\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong><code>fork()</code></strong>: 현재 <a href=\"#process\">프로세스</a> 를 <em>자기 복제</em> 하는 시스템 콜. 호출 한 번에 거의 똑같은 프로세스 두 개(부모·자식)가 생긴다. 메모리 상태·열린 파일·환경변수 모두 같지만 <a href=\"#pid\">PID</a> 만 다르다. fork 는 한 번 호출되어 부모에게는 자식의 PID 를, 자식에게는 0 을 반환한다(\"한 번 호출, 두 번 반환\"). 메모리 복제는 <a href=\"#cow\">Copy-on-Write</a> 로 지연된다.</li>\n<li><strong><code>exec()</code></strong>: 현재 프로세스의 메모리 이미지를 <em>다른 프로그램으로 교체</em> 하는 시스템 콜(<code>execve</code> 계열). PID 는 유지되지만 코드·데이터·힙·스택이 완전히 새 프로그램으로 바뀐다. 성공하면 원래 코드로 돌아오지 않는다.</li>\n<li><strong>비유</strong>: fork = 나 자신을 복사해서 쌍둥이를 만든다. exec = 그 쌍둥이가 옷·기억·이름표를 한꺼번에 새것으로 바꾼다(PID 라는 사번만 유지).</li>\n<li><strong>왜 중요한가</strong>: 셸이 명령어를 실행할 때마다 <code>fork → exec</code> 패턴을 쓴다. <code>bash</code> 가 <code>ls</code> 를 돌리려면 fork 로 자식을 만들고, 자식이 exec 로 ls 가 된다. 멀티프로세싱 구현의 가장 밑바닥.</li>\n<li>\n<blockquote>\n<p>더 깊이: <a href=\"이론_지식.md\">이론 지식 §4.2 멀티프로세싱</a></p>\n</blockquote>\n</li>\n<li><strong>출처</strong>: <a href=\"https://man7.org/linux/man-pages/man2/fork.2.html\">fork(2) — Linux manual page</a> · <a href=\"https://man7.org/linux/man-pages/man2/execve.2.html\">execve(2) — Linux manual page</a></li>\n</ul>\n<h3 id=\"cow\">Copy-on-Write (COW)<a class=\"headerlink\" href=\"#cow\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#fork-exec\">fork</a> 후에 부모와 자식이 같은 물리 페이지를 <em>공유</em> 하다가, 어느 한쪽이 페이지에 <em>쓰려는 순간</em> 비로소 페이지를 복사해 둘로
