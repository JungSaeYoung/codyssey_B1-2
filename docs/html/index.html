<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codyssey B1-2 — 시스템 장애 분석 Documentation</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap">

  <style>
    :root {
      --bg:#ffffff; --bg-alt:#f6f8fa; --bg-soft:#eef2f5;
      --fg:#1f2328; --fg-muted:#656d76;
      --border:#d0d7de; --accent:#0969da; --accent-soft:#ddf4ff;
      --code-bg:#f6f8fa;
      --side-w:300px;
    }
    [data-theme="dark"] {
      --bg:#0d1117; --bg-alt:#161b22; --bg-soft:#1c2330;
      --fg:#e6edf3; --fg-muted:#8b949e;
      --border:#30363d; --accent:#58a6ff; --accent-soft:#1f2d3d;
      --code-bg:#161b22;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,
                   'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
      background: var(--bg); color: var(--fg);
      line-height: 1.75; font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ─────────────────────────────────────────────────────── */
    aside.sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: var(--side-w);
      background: var(--bg-alt); border-right: 1px solid var(--border);
      padding: 24px 20px; overflow-y: auto;
    }
    main.content {
      margin-left: var(--side-w); max-width: 920px;
      padding: 56px 64px 120px;
    }
    @media (max-width: 900px) {
      aside.sidebar {
        transform: translateX(-100%); transition: transform .2s; z-index: 50;
        box-shadow: 0 0 24px rgba(0,0,0,.2);
      }
      aside.sidebar.open { transform: translateX(0); }
      main.content { margin-left: 0; padding: 24px; }
      #menu-btn { display: flex !important; }
    }

    /* ── Sidebar ────────────────────────────────────────────────────── */
    .brand {
      display: flex; align-items: center; gap: 8px;
      font-size: 17px; font-weight: 700;
      padding: 4px 8px 0; margin-bottom: 8px;
    }
    .brand small { font-weight: 500; color: var(--fg-muted); font-size: 12px; }
    .sec-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
      color: var(--fg-muted); padding: 14px 8px 6px; font-weight: 600;
    }
    .nav-list, .toc-list, .toc-list ul { list-style: none; padding: 0; margin: 0; }
    .nav-list a {
      display: block; padding: 8px 12px; color: var(--fg);
      border-radius: 6px; font-size: 14px; margin-bottom: 1px;
    }
    .nav-list a:hover { background: var(--bg-soft); text-decoration: none; }
    .nav-list a.active { background: var(--accent); color: #fff; }
    .nav-list a.active:hover { text-decoration: none; }

    /* TOC (Python markdown extension 이 만든 nested ul 형태) */
    .toc-list a {
      display: block; padding: 3px 10px;
      color: var(--fg-muted); font-size: 13px;
      border-left: 2px solid transparent;
      line-height: 1.45;
    }
    .toc-list a:hover { color: var(--fg); text-decoration: none; }
    .toc-list a.active {
      color: var(--accent); border-left-color: var(--accent);
      background: var(--accent-soft);
    }
    .toc-list ul ul a { padding-left: 24px; font-size: 12.5px; }
    .toc-list ul ul ul a { padding-left: 38px; font-size: 12px; opacity: .85; }

    /* ── Controls ───────────────────────────────────────────────────── */
    .controls {
      position: fixed; top: 16px; right: 24px; display: flex; gap: 8px; z-index: 20;
    }
    .ctl-btn {
      background: var(--bg-alt); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; cursor: pointer;
      color: var(--fg); font-size: 13px; font-family: inherit;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .ctl-btn:hover { background: var(--bg-soft); }

    #menu-btn {
      display: none; position: fixed; top: 16px; left: 16px; z-index: 60;
      background: var(--bg-alt); border: 1px solid var(--border);
      border-radius: 8px; width: 38px; height: 38px;
      align-items: center; justify-content: center; cursor: pointer;
      color: var(--fg); font-size: 18px;
    }

    /* ── Content typography ─────────────────────────────────────────── */
    main.content h1, main.content h2, main.content h3,
    main.content h4, main.content h5 {
      color: var(--fg); font-weight: 700; line-height: 1.35;
      scroll-margin-top: 24px;
    }
    main.content h1 {
      font-size: 2.1em; margin: 0 0 .6em;
      border-bottom: 1px solid var(--border); padding-bottom: 14px;
    }
    main.content h2 {
      font-size: 1.55em; margin: 2.2em 0 .6em;
      border-bottom: 1px solid var(--border); padding-bottom: 8px;
    }
    main.content h3 { font-size: 1.25em; margin: 1.8em 0 .5em; }
    main.content h4 { font-size: 1.08em; margin: 1.4em 0 .4em; color: var(--fg-muted); }
    main.content p { margin: 0.9em 0; }
    main.content ul, main.content ol { padding-left: 1.5em; }
    main.content li { margin: .25em 0; }
    main.content hr { border: 0; border-top: 1px solid var(--border); margin: 2em 0; }

    /* Inline code & code blocks */
    main.content :not(pre) > code {
      background: var(--code-bg);
      padding: 0.18em 0.42em; border-radius: 5px;
      font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace;
      font-size: 0.875em; word-break: break-word;
    }
    main.content pre, main.content .codehilite pre {
      background: var(--code-bg); padding: 16px 18px;
      border-radius: 8px; overflow-x: auto;
      border: 1px solid var(--border);
      font-family: 'JetBrains Mono','SF Mono',Menlo,Consolas,monospace;
      font-size: 13px; line-height: 1.55;
    }
    main.content pre code {
      background: none; padding: 0; font-size: inherit; border-radius: 0;
    }
    .codehilite { margin: 1em 0; }

    /* Blockquote */
    main.content blockquote {
      margin: 1em 0; padding: 10px 18px;
      background: var(--bg-soft); border-left: 4px solid var(--accent);
      border-radius: 0 6px 6px 0; color: var(--fg);
    }
    main.content blockquote > :first-child { margin-top: 0; }
    main.content blockquote > :last-child { margin-bottom: 0; }

    /* Table */
    main.content table {
      border-collapse: collapse; margin: 1.2em 0;
      font-size: 0.92em; max-width: 100%;
    }
    main.content th, main.content td {
      border: 1px solid var(--border); padding: 8px 14px; text-align: left;
      vertical-align: top;
    }
    main.content th { background: var(--bg-soft); font-weight: 600; }
    main.content tr:nth-child(2n) td { background: var(--bg-alt); }

    /* TOC permalink (#) */
    main.content .headerlink {
      opacity: 0; margin-left: 8px; font-size: .85em; color: var(--fg-muted);
      text-decoration: none;
    }
    main.content h1:hover .headerlink,
    main.content h2:hover .headerlink,
    main.content h3:hover .headerlink,
    main.content h4:hover .headerlink { opacity: 1; }

    /* Doc meta */
    .doc-meta {
      color: var(--fg-muted); font-size: 13px;
      margin: -8px 0 28px;
    }
    .doc-meta code { font-size: .95em; background: var(--bg-soft);
                      padding: 2px 6px; border-radius: 4px; }

    /* Print */
    @media print {
      aside.sidebar, .controls, #menu-btn { display: none !important; }
      main.content { margin-left: 0; max-width: 100%; padding: 0; }
      a { color: var(--fg) !important; text-decoration: underline; }
      pre, .codehilite pre { break-inside: avoid; }
    }

    /* Scrollbar */
    aside.sidebar::-webkit-scrollbar { width: 8px; }
    aside.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  <script>
    const DOCS = [{"title": "README", "file": "README.md", "html": "<h1 id=\"codyssey-b1-2\">Codyssey B1-2 — 시스템 장애 분석 &amp; 기술 리포트 작성<a class=\"headerlink\" href=\"#codyssey-b1-2\" title=\"Permanent link\">#</a></h1>\n<blockquote>\n<p>실서버에서 발생하는 3대 장애(<strong>OOM / CPU Spike / Deadlock</strong>)를 관제 로그·실행 로그·시스템 도구의 객관적 증거를 근거로 추론하고, GitHub Issue 형태의 기술 리포트로 정리한다.</p>\n<p>실행 환경: <strong>macOS + OrbStack Ubuntu 24.04 머신</strong> (B1-1과 동일 인프라 재사용)</p>\n<p>본 저장소는 B1-1 에서 구축한 SSH/방화벽/계정/디렉토리/cron 인프라 위에 <strong>B1-2 전용으로 <code>agent-leak-app</code> 을 얹어</strong> 장애를 재현하는 구조다.</p>\n</blockquote>\n<hr />\n<h2 id=\"0\">0. 미션이 진짜로 묻는 것<a class=\"headerlink\" href=\"#0\" title=\"Permanent link\">#</a></h2>\n<p>쉘 명령어를 외워서 푸는 게 아니라, <strong>외부에서 보이는 데이터(로그·관제·시스템 도구) 만으로 프로세스 안과 OS 안에서 무슨 일이 벌어졌는지 역추론</strong>할 수 있는지를 묻는다.</p>\n<div class=\"codehilite\"><pre><span></span><code>[관측] monitor.log 의 MEM% 가 96% 까지 올라갔고 SELF-TERMINATED 가 찍혔다\n   ↓\n[추론] 어떤 자료구조 위에서, 어떤 정책이, 누구를, 어떤 시그널로 죽였는가?\n   ↓\n[증명] /proc, ps, top 으로 그 추론을 뒷받침할 수 있는가?\n   ↓\n[소통] 위 3단계를 동료 개발자가 30초만에 따라올 수 있는 Issue 로 정리했는가?\n</code></pre></div>\n\n<p>따라서 미션의 산출물은 <strong>리포트(.md)</strong> 다. 하지만 진짜 측정 대상은 학습자가 <strong>운영체제 동작 원리</strong> 를 자기 언어로 설명할 수 있게 됐는가이다. 그래서 본 저장소는 리포트와 함께 <strong>이론 지식 문서</strong>를 핵심 산출물로 포함한다.</p>\n<hr />\n<h2 id=\"1\">1. 학습 목표<a class=\"headerlink\" href=\"#1\" title=\"Permanent link\">#</a></h2>\n<p>수료 후 학습자는 다음을 자기 말로 설명할 수 있어야 한다:</p>\n<ul>\n<li>가상 메모리·Heap·RSS·OOM Killer·앱 자체 MemoryGuard 의 관계</li>\n<li>특정 프로세스의 CPU 과점유가 시스템 지연을 유발하는 원리, CFS 스케줄러의 기본 직관</li>\n<li>데드락 4대 조건(상호배제·점유대기·비선점·순환대기), 외부 도구로 데드락을 증명하는 6가지 증거</li>\n<li>로그·관제 데이터를 근거로 GitHub Issue 형태로 동료와 소통하는 방법</li>\n</ul>\n<p>이론적 배경은 <a href=\"docs/md/이론_지식.md\">docs/md/이론_지식.md</a> 에 깊이 정리돼 있다 — 리포트를 쓰기 전에 한 번 통독할 것.</p>\n<hr />\n<h2 id=\"2\">2. 디렉토리 구조<a class=\"headerlink\" href=\"#2\" title=\"Permanent link\">#</a></h2>\n<div class=\"codehilite\"><pre><span></span><code>codyssey_B1-2/\n├── README.md                       ← 이 파일 (미션 개요 + 수행 방법)\n├── 실험_절차서.md                  ← 3개 장애 재현·검증 절차\n│\n├── docs/\n│   ├── md/\n│   │   └── 이론_지식.md            ← 컴퓨터 구조 · 메모리 · CPU · 동시성 (필독)\n│   └── html/\n│       └── index.html              ← tools/build_docs.py 가 생성하는 정적 사이트\n│\n├── reports/                        ← GitHub Issue 형식 분석 리포트 (제출 산출물)\n│   ├── 01_oom_report.md\n│   ├── 02_cpu_report.md\n│   ├── 03_deadlock_report.md\n│   └── 04_scheduling_analysis.md   ← 보너스 (스케줄링 추론)\n│\n├── evidence/                       ← 리포트가 인용한 로그·명령어 출력 원본\n│   ├── oom_monitor.log / oom_app.log / oom_ps_top.txt\n│   ├── cpu_monitor.log / cpu_app.log / cpu_top_ps.txt\n│   ├── deadlock_monitor.log / deadlock_app.log / deadlock_ps_top.txt\n│   └── scheduling_workers.log / scheduling_top_h.txt\n│\n├── bin/                            ← 운영 측 제공 agent-leak-app 을 두는 자리 (비어 있음)\n│   └── (agent-leak-app)            ← 학습자가 직접 배치 — 이 저장소에는 포함 안 됨\n│\n├── src/                            ← B1-1 에서 가져온 인프라 자동화 스크립트\n│   ├── monitor.sh                  ← 시스템 상태 수집·로깅 (cron 매분)\n│   ├── report.sh                   ← monitor.log 통계 출력\n│   ├── archive_logs.sh             ← 시간 기반 로그 보존 정책\n│   ├── 00_run_all.sh               ← 01~07 setup 단계를 한 번에 실행\n│   ├── 01_ssh_hardening.sh         ← SSH 포트 20022 + Root 차단\n│   ├── 02_firewall_allowlist.sh    ← UFW 화이트리스트 (20022/15034)\n│   ├── 03_users_and_groups.sh      ← 계정 3종 + 그룹 2종\n│   ├── 04_directories_and_acl.sh   ← 디렉토리 + ACL\n│   ├── 05_env_and_keyfile.sh       ← B1-2 사양 env 5종 + 실험용 3종 + secret.key\n│   ├── 06_deploy_app_and_scripts.sh ← agent-leak-app + *.sh 배포 (B1-2 버전)\n│   └── 07_cron_schedule.sh         ← cron 매분/매일 등록\n│\n└── tools/\n    └── build_docs.py               ← .md → docs/html/index.html 빌더\n</code></pre></div>\n\n<blockquote>\n<p>B1-1 과 가장 큰 차이는 두 가지다:\n1. <code>src/05_env_and_keyfile.sh</code> 가 B1-2 사양으로 바뀌었다 (key 파일명, key 경로 의미, 실험용 ENV 3종 추가).\n2. <code>src/06_deploy_app_and_scripts.sh</code> 의 바이너리 이름이 <code>agent-leak-app</code> 으로 바뀌었다. <strong>이 저장소에 바이너리는 포함되어 있지 않으니</strong> 운영 측이 제공한 파일을 <code>bin/agent-leak-app</code> 에 배치해야 한다.</p>\n</blockquote>\n<hr />\n<h2 id=\"3-agent-leak-app\">3. 사전 준비 (agent-leak-app 실행 조건)<a class=\"headerlink\" href=\"#3-agent-leak-app\" title=\"Permanent link\">#</a></h2>\n<p>운영 측에서 제공한 <code>agent-leak-app</code> 은 부트 시퀀스에서 아래 항목을 모두 검사하고, 하나라도 실패하면 자동 부팅 실패 처리된다.</p>\n<table>\n<thead>\n<tr>\n<th>항목</th>\n<th>조건</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>실행 계정</td>\n<td>root <strong>금지</strong>, 일반 사용자 (예: <code>agent-admin</code>)</td>\n</tr>\n<tr>\n<td><code>AGENT_HOME</code></td>\n<td>필수 환경변수</td>\n</tr>\n<tr>\n<td><code>AGENT_PORT</code></td>\n<td><code>15034</code> 고정</td>\n</tr>\n<tr>\n<td><code>AGENT_UPLOAD_DIR</code></td>\n<td><code>$AGENT_HOME/upload_files</code> (디렉토리 존재)</td>\n</tr>\n<tr>\n<td><code>AGENT_KEY_PATH</code></td>\n<td><code>$AGENT_HOME/api_keys</code> (경로 존재) — <strong>B1-1 과 달리 디렉토리</strong></td>\n</tr>\n<tr>\n<td><code>AGENT_LOG_DIR</code></td>\n<td>디렉토리 존재 + 쓰기 권한</td>\n</tr>\n<tr>\n<td><code>MEMORY_LIMIT</code></td>\n<td>정수, <strong>50~512</strong> (MB)</td>\n</tr>\n<tr>\n<td><code>CPU_MAX_OCCUPY</code></td>\n<td>정수, <strong>10~100</strong> (%)</td>\n</tr>\n<tr>\n<td><code>MULTI_THREAD_ENABLE</code></td>\n<td><code>true/false</code>, <code>1/0</code>, <code>yes/no</code> 허용</td>\n</tr>\n<tr>\n<td><code>secret.key</code> 파일</td>\n<td><code>$AGENT_HOME/api_keys/secret.key</code>, 내용 = <code>agent_api_key_test</code></td>\n</tr>\n<tr>\n<td>네트워크</td>\n<td><code>0.0.0.0:15034</code> 바인딩 가능</td>\n</tr>\n</tbody>\n</table>\n<p><code>.bashrc</code> 예시 (<code>src/05_env_and_keyfile.sh</code> 가 자동 등록):</p>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">AGENT_HOME</span><span class=\"o\">=</span><span class=\"s2\">&quot;/home/agent-admin/agent-app&quot;</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">AGENT_PORT</span><span class=\"o\">=</span><span class=\"s2\">&quot;15034&quot;</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">AGENT_UPLOAD_DIR</span><span class=\"o\">=</span><span class=\"s2\">&quot;</span><span class=\"nv\">$AGENT_HOME</span><span class=\"s2\">/upload_files&quot;</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">AGENT_KEY_PATH</span><span class=\"o\">=</span><span class=\"s2\">&quot;</span><span class=\"nv\">$AGENT_HOME</span><span class=\"s2\">/api_keys&quot;</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">AGENT_LOG_DIR</span><span class=\"o\">=</span><span class=\"s2\">&quot;/var/log/agent-app&quot;</span>\n\n<span class=\"c1\"># 베이스라인 (정상 가동) — 실험 시 실험_절차서.md 조합표대로 바꿔서 재실행</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"s2\">&quot;512&quot;</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"s2\">&quot;95&quot;</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"s2\">&quot;false&quot;</span>\n</code></pre></div>\n\n<hr />\n<h2 id=\"4\">4. 분석 흐름 (모든 장애 공통)<a class=\"headerlink\" href=\"#4\" title=\"Permanent link\">#</a></h2>\n<div class=\"codehilite\"><pre><span></span><code>[1] 정상 가동 (Baseline 수집)\n        │  monitor.sh 가 1분 단위로 CPU/MEM/DISK 로그\n        ▼\n[2] 장애 관측 (Symptom)\n        │  - OOM: 메모리 선형 증가 → 종료\n        │  - CPU: CPU% 급상승 → SIGTERM\n        │  - Deadlock: PID 살아있지만 로그/리소스 정지\n        ▼\n[3] 증거 수집 (Evidence)\n        │  monitor.log + agent-leak-app 실행 로그 + ps/top\n        ▼\n[4] 원인 추론 (Root Cause)\n        │  OS 동작 원리 + 앱 정책 매핑\n        │  → 막히면 docs/md/이론_지식.md 재참조\n        ▼\n[5] 임시 조치 &amp; 재검증 (Workaround)\n        │  환경변수 조정 → 재실행 → Before/After 비교\n        ▼\n[6] GitHub Issue 작성 (reports/*.md)\n</code></pre></div>\n\n<hr />\n<h2 id=\"5\">5. 빠른 실행 가이드<a class=\"headerlink\" href=\"#5\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"51-orbstack\">5.1 환경 구축 (OrbStack)<a class=\"headerlink\" href=\"#51-orbstack\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"c1\"># macOS 호스트</span>\nbrew<span class=\"w\"> </span>install<span class=\"w\"> </span>orbstack\norb<span class=\"w\"> </span>create<span class=\"w\"> </span>ubuntu:24.04<span class=\"w\"> </span>codyssey-b1-2\n\n<span class=\"c1\"># 운영 측 제공 agent-leak-app 을 bin/ 에 미리 두고 함께 push</span>\ncp<span class=\"w\"> </span>~/Downloads/agent-leak-app<span class=\"w\"> </span>bin/agent-leak-app\norb<span class=\"w\"> </span>push<span class=\"w\"> </span>-m<span class=\"w\"> </span>codyssey-b1-2<span class=\"w\"> </span>src/*.sh<span class=\"w\"> </span>bin/agent-leak-app<span class=\"w\"> </span>/tmp/\n\norb<span class=\"w\"> </span>shell<span class=\"w\"> </span>-m<span class=\"w\"> </span>codyssey-b1-2\n\n<span class=\"c1\"># 머신 안에서 (CRLF 정리 후 setup)</span>\nsudo<span class=\"w\"> </span>apt-get<span class=\"w\"> </span>install<span class=\"w\"> </span>-y<span class=\"w\"> </span>dos2unix\ndos2unix<span class=\"w\"> </span>/tmp/*.sh<span class=\"w\"> </span><span class=\"o\">&amp;&amp;</span><span class=\"w\"> </span>chmod<span class=\"w\"> </span>+x<span class=\"w\"> </span>/tmp/*.sh\nbash<span class=\"w\"> </span>/tmp/00_run_all.sh<span class=\"w\">           </span><span class=\"c1\"># 7단계 setup 한 번에</span>\n</code></pre></div>\n\n<h3 id=\"52\">5.2 부트 시퀀스 확인<a class=\"headerlink\" href=\"#52\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>sudo<span class=\"w\"> </span>-iu<span class=\"w\"> </span>agent-admin\n<span class=\"nb\">cd</span><span class=\"w\"> </span><span class=\"nv\">$AGENT_HOME</span>\n./agent-leak-app<span class=\"w\">             </span><span class=\"c1\"># 모든 [OK] 가 떠야 정상</span>\n</code></pre></div>\n\n<h3 id=\"53\">5.3 장애 실험<a class=\"headerlink\" href=\"#53\" title=\"Permanent link\">#</a></h3>\n<p>세 가지 장애를 순서대로 재현하는 환경변수 조합과 검증 명령은 <a href=\"실험_절차서.md\">실험_절차서.md</a> 에 정리돼 있다.</p>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"c1\"># 한 줄 요약</span>\n<span class=\"c1\"># OOM     : MEMORY_LIMIT=256        다른 건 정상 → 10분 후 SELF-TERMINATED</span>\n<span class=\"c1\"># CPU     : CPU_MAX_OCCUPY=80       다른 건 정상 → 4분 후 WATCHDOG SIGTERM</span>\n<span class=\"c1\"># Deadlock: MULTI_THREAD_ENABLE=true 다른 건 정상 → 2~4분 후 무응답</span>\n</code></pre></div>\n\n<h3 id=\"54\">5.4 관제 모니터링<a class=\"headerlink\" href=\"#54\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"c1\"># 다른 터미널</span>\ntail<span class=\"w\"> </span>-f<span class=\"w\"> </span>/var/log/agent-app/monitor.log<span class=\"w\">              </span><span class=\"c1\"># cron 매분 누적</span>\ntail<span class=\"w\"> </span>-f<span class=\"w\"> </span><span class=\"nv\">$AGENT_LOG_DIR</span>/agent-leak-app.log<span class=\"w\">           </span><span class=\"c1\"># 앱 자체 로그</span>\n</code></pre></div>\n\n<hr />\n<h2 id=\"6\">6. 리포트 작성 가이드<a class=\"headerlink\" href=\"#6\" title=\"Permanent link\">#</a></h2>\n<p>세 리포트 모두 동일한 4단 구조로 쓴다:</p>\n<div class=\"codehilite\"><pre><span></span><code>[Bug] {장애 유형} - {한 줄 요약}\n\n<span class=\"gu\">## 1. Description (현상 설명)</span>\n<span class=\"k\">-</span><span class=\"w\"> </span>무엇이, 언제, 어떤 조건에서 발생했나\n\n<span class=\"gu\">## 2. Evidence &amp; Logs (증거 자료)</span>\n<span class=\"k\">-</span><span class=\"w\"> </span>monitor.log 발췌 (수치)\n<span class=\"k\">-</span><span class=\"w\"> </span>앱 로그 핵심 라인 발췌\n<span class=\"k\">-</span><span class=\"w\"> </span>ps/top 출력\n\n<span class=\"gu\">## 3. Root Cause Analysis (원인 분석)</span>\n<span class=\"k\">-</span><span class=\"w\"> </span>위 증거가 OS 동작 원리로 어떻게 설명되는가\n<span class=\"k\">-</span><span class=\"w\"> </span>(이론_지식.md 의 어느 부분을 끌어왔는지 자기 언어로 적기)\n\n<span class=\"gu\">## 4. Workaround &amp; Verification (조치 및 검증)</span>\n<span class=\"k\">-</span><span class=\"w\"> </span>어떤 환경변수를 어떻게 바꿨고\n<span class=\"k\">-</span><span class=\"w\"> </span>Before / After 결과가 어떻게 달라졌는가\n<span class=\"k\">-</span><span class=\"w\"> </span>근본 해결은 무엇인가 (선택)\n</code></pre></div>\n\n<blockquote>\n<p>🔑 <strong>리포트의 합격선은 \"동료가 30초 안에 따라올 수 있는가\"</strong> 다. 4단 구조의 각 섹션을 한 번에 한 가지 사실만 적되, 그 사실의 근거를 evidence/ 파일과 1:1 로 연결되게 인용한다.</p>\n</blockquote>\n<hr />\n<h2 id=\"7\">7. 제약 사항<a class=\"headerlink\" href=\"#7\" title=\"Permanent link\">#</a></h2>\n<ul>\n<li>사용 가능 도구: <code>monitor.sh</code>, <code>ps</code>, <code>top</code>, <code>htop</code>, <code>pstree</code>, <code>kill</code>, <code>vmstat</code>, <code>/proc</code> 등 리눅스 표준 도구</li>\n<li><strong>바이너리 디컴파일/리버스 엔지니어링 금지</strong> — 외부 관측 정보(로그/관제)만으로 추론</li>\n<li>일반 계정으로만 실행 (root 금지)</li>\n<li>자동화 스크립트는 <strong>Bash 로만</strong></li>\n</ul>\n<hr />\n<h2 id=\"8\">8. 필수 증거 체크리스트<a class=\"headerlink\" href=\"#8\" title=\"Permanent link\">#</a></h2>\n<table>\n<thead>\n<tr>\n<th>장애</th>\n<th>증거</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>OOM</strong></td>\n<td>monitor.log MEM% 선형 증가 구간 + <code>Memory limit exceeded</code> / <code>SELF-TERMINATED</code> 로그 + <code>MEMORY_LIMIT</code> 변경 전/후 생존시간 비교</td>\n</tr>\n<tr>\n<td><strong>CPU</strong></td>\n<td>monitor.log CPU% 급상승 구간 + <code>WATCHDOG … SIGTERM</code> 로그 + <code>CPU_MAX_OCCUPY</code> 변경 전/후 비교</td>\n</tr>\n<tr>\n<td><strong>Deadlock</strong></td>\n<td><code>ps -ef \\| grep agent</code> PID 존재 + <code>top -H</code> 스레드 CPU 0% + <code>ps -L -o wchan</code> 의 <code>futex_wait_queue_me</code> + 마지막 <code>WAITING/BLOCKED</code> 로그 + <code>MULTI_THREAD_ENABLE=false</code> 회피 확인</td>\n</tr>\n<tr>\n<td><strong>(보너스) 스케줄링</strong></td>\n<td>워커 스레드 로그의 타임스탬프 + 진행률 패턴 → RR / FCFS / Priority / CFS 중 어느 시그니처인지</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h2 id=\"9\">9. 문서 빌드 (선택)<a class=\"headerlink\" href=\"#9\" title=\"Permanent link\">#</a></h2>\n<p>세 개의 .md (이 파일, 실험_절차서, 이론_지식) 와 4개 리포트를 묶어 보기 좋은 정적 HTML 로 빌드:</p>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"c1\"># 의존성 (Python 3 + markdown + pygments)</span>\npip<span class=\"w\"> </span>install<span class=\"w\"> </span>markdown<span class=\"w\"> </span>pygments\n\npython3<span class=\"w\"> </span>tools/build_docs.py<span class=\"w\">            </span><span class=\"c1\"># docs/html/index.html 생성</span>\n<span class=\"c1\"># Windows: 더블클릭으로 열기 / macOS: open docs/html/index.html</span>\n</code></pre></div>\n\n<p>생성된 <code>docs/html/index.html</code> 은 <strong>단일 파일·외부 파일 없음</strong> 으로 만들어져 어디로 옮겨도 그대로 열린다. 좌측 사이드바에서 문서 간 이동 + 우측에 현재 문서 목차가 같이 보인다.</p>\n<hr />\n<h2 id=\"10\">10. 다음 단계 — 학습 체크리스트<a class=\"headerlink\" href=\"#10\" title=\"Permanent link\">#</a></h2>\n<p>리포트를 다 쓴 뒤, <a href=\"docs/md/이론_지식.md\">이론_지식.md 의 §8 학습 체크리스트</a> 의 질문들에 자기 언어로 답할 수 있는지 확인해보자. 답이 막히는 항목이 있다면 그 부분이 이번 미션에서 더 채워야 할 이론의 빈 곳이다.</p>", "toc": "<div class=\"toc\">\n<ul>\n<li><a href=\"#0\">0. 미션이 진짜로 묻는 것</a></li>\n<li><a href=\"#1\">1. 학습 목표</a></li>\n<li><a href=\"#2\">2. 디렉토리 구조</a></li>\n<li><a href=\"#3-agent-leak-app\">3. 사전 준비 (agent-leak-app 실행 조건)</a></li>\n<li><a href=\"#4\">4. 분석 흐름 (모든 장애 공통)</a></li>\n<li><a href=\"#5\">5. 빠른 실행 가이드</a><ul>\n<li><a href=\"#51-orbstack\">5.1 환경 구축 (OrbStack)</a></li>\n<li><a href=\"#52\">5.2 부트 시퀀스 확인</a></li>\n<li><a href=\"#53\">5.3 장애 실험</a></li>\n<li><a href=\"#54\">5.4 관제 모니터링</a></li>\n</ul>\n</li>\n<li><a href=\"#6\">6. 리포트 작성 가이드</a></li>\n<li><a href=\"#7\">7. 제약 사항</a></li>\n<li><a href=\"#8\">8. 필수 증거 체크리스트</a></li>\n<li><a href=\"#9\">9. 문서 빌드 (선택)</a></li>\n<li><a href=\"#10\">10. 다음 단계 — 학습 체크리스트</a></li>\n</ul>\n</div>\n"}, {"title": "이론 지식", "file": "docs/md/이론_지식.md", "html": "<h1 id=\"cpu\">이론 지식 — 컴퓨터 구조 · 메모리 · CPU · 동시성 · 데드락<a class=\"headerlink\" href=\"#cpu\" title=\"Permanent link\">#</a></h1>\n<blockquote>\n<p>이 문서는 B1-2 미션(OOM / CPU Spike / Deadlock 분석)을 수행할 때 <strong>로그·관제 수치 뒤에서 무슨 일이 벌어지고 있는가</strong> 를 학습자가 스스로 추론할 수 있도록, 컴퓨터 구조 → OS 동작 → 앱 정책의 흐름을 한 줄로 잇기 위한 이론 지식을 정리한다.</p>\n<p>\"MEM% 가 96% 까지 올라가서 SELF-TERMINATED 됐다\" 같은 한 줄을 <strong>누가, 어떤 자료구조 위에서, 어떤 정책에 의해 종료시켰는가</strong> 로 풀어 설명할 수 있어야 한다.</p>\n<p><strong>이 문서 읽는 법</strong>: 본문에서 처음 등장하는 모든 전문 용어는 <a href=\"용어집.md\">용어집</a>으로 가는 하이퍼링크로 표시된다. 링크를 클릭하면 용어집의 해당 항목으로 이동해 정의·비유·왜 중요한가 를 확인할 수 있고, 좌측 사이드바의 \"이론 지식\" 을 다시 클릭하면 본문으로 돌아온다.</p>\n</blockquote>\n<hr />\n<h2 id=\"0\">0. 왜 이론을 알아야 하는가<a class=\"headerlink\" href=\"#0\" title=\"Permanent link\">#</a></h2>\n<p>쉘 명령어 한 줄(<code>top</code>, <code>ps</code>, <code>kill</code>)만 외워서 장애를 해결하는 단계와, <strong>장애가 왜 일어났는지 운영체제 동작 원리로 설명할 수 있는 단계</strong>는 분명히 다르다.</p>\n<p>이번 미션의 본질은 다음 한 문장이다:</p>\n<blockquote>\n<p><strong>\"외부에서 관측 가능한 데이터(로그·관제·시스템 도구)만으로, 프로세스 내부와 OS 내부에서 일어난 일을 역추론한다.\"</strong></p>\n</blockquote>\n<p>따라서 학습자는 아래 3개 레이어가 한 줄에 연결되는 멘탈 모델을 가져야 한다.</p>\n<div class=\"codehilite\"><pre><span></span><code>[Application 정책]  MemoryGuard / Watchdog / Lock 획득 순서\n        ↑↓ 시스템 콜 (malloc, mmap, futex, sched_yield…)\n[Operating System]  가상 메모리 / OOM Killer / 스케줄러 / 뮤텍스\n        ↑↓ 명령어 실행\n[Hardware]          CPU 코어 · 캐시 · DRAM · 디스크\n</code></pre></div>\n\n<p>OOM 로그 한 줄을 보면 학습자는 머릿속에서 <strong>하단부터</strong> 거꾸로 올라가며 묻는 습관이 생겨야 한다.</p>\n<ul>\n<li>DRAM 의 어디까지 채워졌나? (Hardware)</li>\n<li>가상 메모리는 어떤 페이지를 디스크로 내쫓고 있었나? (OS)</li>\n<li>그래서 앱 정책이 어느 임계치에서 자신을 죽였나? (Application)</li>\n</ul>\n<p>상위 레이어가 하위 레이어에게 일을 시키는 방법이 <a href=\"용어집.md#syscall\">시스템 콜</a>이고, 우리가 외부에서 관찰하는 모든 수치는 결국 <a href=\"용어집.md#os-kernel-userspace\">운영체제·커널</a>이 자기 내부 상태를 노출해주는 흔적이다.</p>\n<hr />\n<h2 id=\"1\">1. 컴퓨터 구조 기초 — 폰 노이만 모델<a class=\"headerlink\" href=\"#1\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"11\">1.1 모든 것이 메모리에 있다<a class=\"headerlink\" href=\"#11\" title=\"Permanent link\">#</a></h3>\n<p>현대 컴퓨터의 기본 가정은 <strong>명령어(코드)와 데이터가 같은 메모리에 들어 있고, <a href=\"용어집.md#cpu\">CPU</a> 는 그 메모리에서 한 단어씩 꺼내 실행한다</strong> 는 <a href=\"용어집.md#von-neumann\">폰 노이만 구조</a>다. 이 가정에서 두 가지 시스템 자원이 곧바로 도출된다.</p>\n<table>\n<thead>\n<tr>\n<th>자원</th>\n<th>역할</th>\n<th>이번 미션에서 관찰되는 모습</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>CPU</strong></td>\n<td>메모리에서 명령어를 꺼내 실행</td>\n<td><code>top</code> 의 <code>%CPU</code> 컬럼, <code>CPU_MAX_OCCUPY</code></td>\n</tr>\n<tr>\n<td><strong>메모리</strong></td>\n<td>코드/데이터 보관</td>\n<td><code>free</code>, <code>top</code> 의 <code>%MEM</code> 컬럼, <code>MEMORY_LIMIT</code></td>\n</tr>\n</tbody>\n</table>\n<p>CPU 가 빠를수록 단위 시간당 더 많은 명령어를 처리하고(<a href=\"용어집.md#throughput-vs-latency\">스루풋</a> ↑), 메모리가 클수록 동시에 살아 있을 수 있는 객체(데이터)의 수가 늘어난다. <strong>이 두 자원 모두 유한</strong> 하다는 것이 이번 미션 3개 장애의 공통 출발점이다.</p>\n<h3 id=\"12\">1.2 폰 노이만 병목 — \"메모리는 항상 느리다\"<a class=\"headerlink\" href=\"#12\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>저장 계층</th>\n<th>접근 <a href=\"용어집.md#time-units\">지연</a> (rough)</th>\n<th>비유</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><a href=\"용어집.md#register\">레지스터</a></td>\n<td>0.3 ns</td>\n<td>책상 위</td>\n</tr>\n<tr>\n<td><a href=\"용어집.md#cache\">L1 / L2 / L3 캐시</a></td>\n<td>1 ~ 20 ns</td>\n<td>책상 서랍</td>\n</tr>\n<tr>\n<td><a href=\"용어집.md#dram\">DRAM (RAM)</a></td>\n<td>~ 100 ns</td>\n<td>책장</td>\n</tr>\n<tr>\n<td><a href=\"용어집.md#disk\">SSD</a></td>\n<td>~ 100 µs (= 100,000 ns)</td>\n<td>도서관</td>\n</tr>\n<tr>\n<td><a href=\"용어집.md#disk\">HDD</a></td>\n<td>~ 10 ms (= 10,000,000 ns)</td>\n<td>다른 도시 도서관</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li>한 단계 내려갈 때마다 보통 <strong>100배~1000배</strong> 느려진다.</li>\n<li>따라서 OS 는 자주 쓰는 데이터를 위쪽 계층에 두려고 발버둥치고, 그 행위가 곧 캐시, <a href=\"용어집.md#swap-thrashing\">페이지 교체, 스왑</a> 같은 메커니즘이다.</li>\n<li>메모리 누수가 무서운 이유는 단지 \"공간이 모자란다\" 가 아니라, <strong>DRAM 이 가득 차면 OS 가 디스크(스왑)로 페이지를 내쫓기 시작하고</strong>, 디스크는 DRAM 보다 <em>수만 배</em> 느리기 때문에 시스템 전체가 갑자기 멈춰버리는 데 있다. 이 현상을 <a href=\"용어집.md#swap-thrashing\">쓰래싱(thrashing)</a>이라 부른다.</li>\n</ul>\n<blockquote>\n<p>🔑 <strong>미션 연결점</strong>: <code>agent-leak-app</code> 의 메모리 누수가 임계치에 도달하면 OS 가 페이지 교체로 발버둥치다 결국 OOM Killer 가 발동한다. 즉 \"메모리 부족 → CPU 도 같이 느려진다\" 가 결합돼 나타날 수 있다. monitor.log 에서 MEM% 가 90% 를 넘어가는 순간 CPU% 도 같이 튀어 오르는 패턴이 보이는지 살펴보면 쓰래싱의 흔적을 잡을 수 있다.</p>\n</blockquote>\n<hr />\n<h2 id=\"2-oom\">2. 메모리 구조 — 가상 메모리부터 OOM 까지<a class=\"headerlink\" href=\"#2-oom\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"21\">2.1 프로세스의 가상 메모리 레이아웃<a class=\"headerlink\" href=\"#21\" title=\"Permanent link\">#</a></h3>\n<p>리눅스는 모든 <a href=\"용어집.md#process\">프로세스</a>에게 <strong>자기만 쓰는 <a href=\"용어집.md#virtual-address-space\">가상 주소 공간</a></strong> 을 환상으로 제공한다(64bit 에서는 사실상 무한처럼 보임). 이 주소 공간 안에는 정해진 자리에 영역들이 배치된다.</p>\n<div class=\"codehilite\"><pre><span></span><code>높은 주소\n┌─────────────────────────────┐\n│           Stack             │  ← 자동 변수, 함수 호출 프레임 (↓ 자라남)\n│             ↓               │\n│                             │\n│             ↑               │\n│           Heap              │  ← malloc / new / 동적 객체  (↑ 자라남)\n├─────────────────────────────┤\n│           BSS               │  ← 초기화 안된 전역/정적 변수\n│           Data              │  ← 초기화된 전역/정적 변수\n│           Text (Code)       │  ← 기계어 명령\n└─────────────────────────────┘\n낮은 주소\n</code></pre></div>\n\n<p><a href=\"용어집.md#memory-segments\">각 영역의 의미</a>는 다음과 같이 나뉜다.</p>\n<table>\n<thead>\n<tr>\n<th>영역</th>\n<th>누가 채움</th>\n<th>누가 비움</th>\n<th>이번 미션에서</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Text</strong></td>\n<td>로더가 <a href=\"용어집.md#elf\">ELF</a> 에서 로드</td>\n<td>종료 시</td>\n<td>거의 안 변함</td>\n</tr>\n<tr>\n<td><strong>Data / BSS</strong></td>\n<td>로더</td>\n<td>종료 시</td>\n<td>거의 안 변함</td>\n</tr>\n<tr>\n<td><strong>Heap</strong></td>\n<td><a href=\"용어집.md#malloc-free-gc\"><code>malloc</code></a> (Python 객체 등)</td>\n<td><code>free</code> 또는 GC</td>\n<td><strong>여기가 새는 곳</strong></td>\n</tr>\n<tr>\n<td><strong>Stack</strong></td>\n<td>함수 호출 시 push</td>\n<td>함수 반환 시 pop</td>\n<td>보통 일정 — 단 무한 재귀 시 오버플로</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p>🔑 <strong>메모리 누수의 정체</strong>: \"사용 안 하지만 참조가 남아 있어서 GC/<code>free()</code> 가 회수하지 못하는 객체가 Heap 에 계속 누적되는 상태.\" 즉 <strong>누수는 Heap 영역에서만 일어난다</strong>(거의 항상). Python 같은 <a href=\"용어집.md#malloc-free-gc\">GC</a> 언어에서도 전역 리스트에 append 만 하고 pop 안 하면 객체가 계속 살아 있으니 누수가 된다.</p>\n</blockquote>\n<h3 id=\"22-virtual-memory-os\">2.2 가상 메모리(Virtual Memory) — OS 가 보여주는 환상<a class=\"headerlink\" href=\"#22-virtual-memory-os\" title=\"Permanent link\">#</a></h3>\n<p>프로세스가 보는 주소는 <strong>가상 주소</strong> 다. 실제 DRAM 의 물리 주소는 OS 와 <a href=\"용어집.md#mmu\">MMU</a> (CPU 안의 하드웨어)가 둘 사이를 매핑한다.</p>\n<ul>\n<li>매핑 단위는 <a href=\"용어집.md#page\">페이지(Page)</a> — 보통 4 KB.</li>\n<li>매핑 정보는 <a href=\"용어집.md#page-table-tlb\">페이지 테이블</a>에 들어 있고, 자주 쓰는 매핑은 CPU 안 <a href=\"용어집.md#page-table-tlb\">TLB</a>에 캐시된다.</li>\n<li>프로세스가 새 페이지를 처음 건드릴 때 → <a href=\"용어집.md#page-fault\">페이지 폴트</a> → 커널이 물리 페이지를 할당해 매핑.</li>\n</ul>\n<p>이 구조가 가져다 주는 두 가지 사실:</p>\n<ol>\n<li><strong>물리 메모리는 처음부터 할당되지 않는다 (<a href=\"용어집.md#lazy-allocation\">lazy allocation</a>)</strong> — <code>malloc(1GB)</code> 만 해서는 RAM 1GB 가 안 줄어든다. 그 메모리를 <em>건드려야</em> RAM 이 줄어든다.</li>\n<li><strong>RAM 이 모자라면 OS 는 자주 안 쓰는 페이지를 디스크로 내쫓는다 (swap out)</strong> — 이걸 <a href=\"용어집.md#swap-thrashing\">페이지 교체</a>라 한다.</li>\n</ol>\n<h3 id=\"23-rss-vs-vsz-ps-top\">2.3 RSS vs VSZ — <code>ps</code>, <code>top</code> 의 메모리 컬럼<a class=\"headerlink\" href=\"#23-rss-vs-vsz-ps-top\" title=\"Permanent link\">#</a></h3>\n<p><a href=\"용어집.md#vsz-vs-rss\">VSZ 와 RSS</a> 의 차이는 누수 분석에서 가장 중요한 구분이다.</p>\n<table>\n<thead>\n<tr>\n<th>컬럼</th>\n<th>의미</th>\n<th>이번 미션에서 봐야 할 것</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>VSZ</strong></td>\n<td>가상 메모리 총량 (예약 포함)</td>\n<td>거의 안 변하면 정상. 급격히 늘면 mmap 이슈</td>\n</tr>\n<tr>\n<td><strong>RSS</strong></td>\n<td>Resident Set Size — <strong>실제로 DRAM 에 올라가 있는</strong> 양</td>\n<td><strong>이게 누수의 진짜 지표</strong></td>\n</tr>\n<tr>\n<td><strong>%MEM</strong></td>\n<td>RSS / 전체 DRAM 비율</td>\n<td>monitor.log 에 찍히는 값과 동일 의미</td>\n</tr>\n</tbody>\n</table>\n<p><code>ps -o pid,vsz,rss,pcpu,comm -p $PID</code> 로 같이 보면 누수 패턴이 명확해진다 — VSZ 는 일정한데 RSS 만 우상향이면 명백한 누수다.</p>\n<h3 id=\"24-oom-out-of-memory\">2.4 OOM (Out-Of-Memory) — 두 가지 트리거<a class=\"headerlink\" href=\"#24-oom-out-of-memory\" title=\"Permanent link\">#</a></h3>\n<p>리눅스에서 \"메모리 부족으로 종료\" 는 <strong>두 가지 다른 메커니즘</strong> 으로 일어날 수 있다.</p>\n<h4 id=\"1-oom-killer\">1) 커널의 <a href=\"용어집.md#oom-killer\">OOM Killer</a><a class=\"headerlink\" href=\"#1-oom-killer\" title=\"Permanent link\">#</a></h4>\n<ul>\n<li>DRAM + 스왑까지 다 차서 더는 페이지를 못 받을 때, 커널이 <strong>점수(<code>oom_score</code>)가 가장 높은 프로세스를 <a href=\"용어집.md#signal\">SIGKILL</a></strong> 로 강제 종료.</li>\n<li>흔적: <code>dmesg | grep -i oom</code> 또는 <code>journalctl -k | grep -i oom-killer</code> 에서 <code>Killed process … total-vm:… anon-rss:…</code> 라인.</li>\n<li>학습자의 프로세스 <em>바깥</em>(커널) 에서 일어나는 일이라 앱 로그에는 흔적이 안 남는다.</li>\n</ul>\n<h4 id=\"2-memoryguard\">2) 앱 내부의 메모리 보호 정책 (이번 미션 — <code>MemoryGuard</code>)<a class=\"headerlink\" href=\"#2-memoryguard\" title=\"Permanent link\">#</a></h4>\n<ul>\n<li><code>agent-leak-app</code> 은 자신의 RSS 를 주기적으로 체크하고, <a href=\"용어집.md#env-var\"><code>MEMORY_LIMIT</code> 환경변수</a>를 넘으면 <strong>자기 자신을 종료</strong> 한다(<code>SELF-TERMINATED</code>). 즉 <em>self-protection</em> 패턴.</li>\n<li>흔적: 앱 로그에 <code>[CRITICAL] [MemoryGuard] Memory limit exceeded (…MB &gt;= …MB)</code> 처럼 명시적으로 남음. 커널 dmesg 에는 안 남는다.</li>\n</ul>\n<blockquote>\n<p>🔑 <strong>이번 미션은 (2) 다.</strong> OOM Killer 가 발동되기 <em>전에</em> 앱이 스스로 죽는 구조. 학습자가 OOM Killer 와 헷갈리지 않는 게 중요하다 — 같은 \"OOM 으로 죽었다\" 라도 누가 죽였는지를 로그로 구분해야 한다.</p>\n</blockquote>\n<table>\n<thead>\n<tr>\n<th>구분</th>\n<th>트리거</th>\n<th><a href=\"용어집.md#signal\">시그널</a></th>\n<th>로그 위치</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>커널 OOM Killer</td>\n<td>시스템 전체 RAM 부족</td>\n<td>SIGKILL (9)</td>\n<td><code>dmesg</code>, <code>/var/log/syslog</code></td>\n</tr>\n<tr>\n<td>MemoryGuard (앱)</td>\n<td>프로세스 RSS &gt; <code>MEMORY_LIMIT</code></td>\n<td>자체 종료</td>\n<td><code>$AGENT_LOG_DIR/agent-leak-app.log</code></td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"25-memory_limit\">2.5 환경변수 <code>MEMORY_LIMIT</code> 의 의미<a class=\"headerlink\" href=\"#25-memory_limit\" title=\"Permanent link\">#</a></h3>\n<p>이 미션에서 <code>MEMORY_LIMIT=256</code> 의 의미는 \"256 MB 까지는 누수가 쌓여도 봐주겠다\" 이다. 즉 <strong>누수를 막는 게 아니라, 한계까지의 생존 시간을 늘리는 임시 조치</strong> 다.</p>\n<p>리포트의 <em>Workaround</em> 항목에 적어야 할 핵심:\n- <code>MEMORY_LIMIT</code> 상향은 <strong>근본 해결이 아니다.</strong> 새는 속도가 일정하다면 단지 죽기까지의 시간을 산술적으로 늘릴 뿐.\n- 근본 해결은 누수 지점(전역 리스트, 캐시, 참조 사이클 등)을 코드에서 끊는 것.</p>\n<hr />\n<h2 id=\"3-cpu\">3. CPU — 프로세스 · 스레드 · 스케줄링<a class=\"headerlink\" href=\"#3-cpu\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"31-vs\">3.1 프로세스 vs 스레드 (개요)<a class=\"headerlink\" href=\"#31-vs\" title=\"Permanent link\">#</a></h3>\n<p>본격적인 멀티프로세싱·멀티스레딩 심화는 <a href=\"#4-멀티프로세싱--멀티스레딩--병렬-실행의-이론과-실제\">§4</a> 에서 다루지만, 우선 스케줄링 논의에 필요한 최소한의 개념만 짚는다.</p>\n<table>\n<thead>\n<tr>\n<th>구분</th>\n<th><a href=\"용어집.md#process\">프로세스</a></th>\n<th><a href=\"용어집.md#thread\">스레드</a></th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>주소 공간</td>\n<td>자기 것 (격리)</td>\n<td><strong>부모 프로세스와 공유</strong></td>\n</tr>\n<tr>\n<td>생성 비용</td>\n<td>크다 (PCB 통째로)</td>\n<td>작다 (스택만 따로)</td>\n</tr>\n<tr>\n<td>통신</td>\n<td><a href=\"용어집.md#ipc\">IPC</a> (파이프, 소켓, shm)</td>\n<td>같은 메모리 — 변수 직접 공유</td>\n</tr>\n<tr>\n<td>한 명 죽으면?</td>\n<td>다른 프로세스 무사</td>\n<td><strong>같은 프로세스 안 모두 종료</strong></td>\n</tr>\n</tbody>\n</table>\n<p>리눅스 커널은 사실 프로세스/스레드를 거의 같은 자료구조(<a href=\"용어집.md#pcb\"><code>task_struct</code></a>)로 다룬다 — 그래서 <code>ps -L</code> 또는 <code>top -H</code> 로 스레드 단위 관찰이 가능하다. 두 스레드를 번갈아 실행시키는 데 드는 비용이 <a href=\"용어집.md#context-switch\">컨텍스트 스위치</a>이고, 너무 자주 일어나면 그 자체가 성능 저하의 원인이 된다.</p>\n<h3 id=\"32-cpu-cpu-100\">3.2 CPU 사용률(%CPU)이 100% 가 넘는 이유<a class=\"headerlink\" href=\"#32-cpu-cpu-100\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>1 <a href=\"용어집.md#core-smt\">코어</a> 1 시간 = 100% × 1시간</li>\n<li>2 코어 1 시간 = <strong>200%</strong> × 1시간</li>\n</ul>\n<p><code>top</code> 의 <code>%CPU</code> 는 <strong>한 코어를 100% 로 잡아 먹는 비율</strong> 을 합산한 값이다. 4 코어 머신에서 한 프로세스가 멀티스레드로 4개 코어를 다 점유하면 400% 까지 찍힐 수 있다.</p>\n<p><code>agent-leak-app</code> 이 <code>CPU_MAX_OCCUPY=80</code> 이면 보통 \"단일 코어 기준 80% 까지 봐줌\" 으로 해석된다. monitor.sh 의 CPU% 는 <strong>시스템 전체</strong> 의 사용률(<a href=\"용어집.md#idle\">idle</a> 의 반대) 이므로 두 수치를 헷갈리지 말 것.</p>\n<h3 id=\"33-linux-cfs\">3.3 스케줄러 — Linux CFS 의 핵심 직관<a class=\"headerlink\" href=\"#33-linux-cfs\" title=\"Permanent link\">#</a></h3>\n<p>리눅스의 기본 <a href=\"용어집.md#scheduler\">스케줄러</a>는 <a href=\"용어집.md#cfs\"><strong>CFS(Completely Fair Scheduler)</strong></a> 다. 한 줄로 요약하면:</p>\n<blockquote>\n<p>\"모든 실행 가능한(runnable) <a href=\"용어집.md#thread\">스레드</a> 중에서, <strong>지금까지 가장 적게 CPU 를 받은</strong> 놈에게 다음 <a href=\"용어집.md#time-slice\">타임 슬라이스</a>를 준다.\"</p>\n</blockquote>\n<ul>\n<li>각 스레드는 <code>vruntime</code> 이라는 가상 실행 시간을 누적한다.</li>\n<li>스케줄러는 <code>vruntime</code> 이 가장 작은 스레드를 <a href=\"용어집.md#rb-tree\">빨간-검정 트리</a>에서 골라 실행시킨다.</li>\n<li>그 스레드가 자기 몫만큼 돌고 나면 <code>vruntime</code> 이 증가 → 트리 안에서 위치가 뒤로 밀림 → 다른 스레드가 골라짐.</li>\n</ul>\n<p>겉으로 보기엔 <strong>Round-Robin 처럼 보이지만</strong>, 엄밀히는 <em>공정성 기반 가중치 스케줄링</em> 이다. 가중치는 <a href=\"용어집.md#nice\">nice 값</a>으로 조정한다.</p>\n<h4 id=\"_1\">보너스 과제와의 연결<a class=\"headerlink\" href=\"#_1\" title=\"Permanent link\">#</a></h4>\n<p><code>agent-leak-app</code> 의 워커 스레드 로그에서 A → B → C → A → B … 식으로 돌아가며 진행률이 찍힌다면, 학습자가 외부에서 관측한 결과는 <strong>Round-Robin 처럼 보이는 패턴</strong> 이다. 그게 정확히 RR 인지 CFS 의 결과인지, FCFS 가 아니고 Priority 도 아닌 근거가 무엇인지를 로그 타임스탬프와 진행률 변화로 짚어내는 것이 보너스 미션의 핵심이다.</p>\n<table>\n<thead>\n<tr>\n<th>알고리즘</th>\n<th>한 줄 정의</th>\n<th>외부 관측 시그니처</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>FCFS</strong> (First-Come First-Served)</td>\n<td>도착 순서대로 끝까지</td>\n<td>한 스레드가 완료될 때까지 다른 스레드 진행률 0%</td>\n</tr>\n<tr>\n<td><strong>Round-Robin</strong></td>\n<td>각자 정해진 타임퀀텀만큼 → 다음</td>\n<td>A → B → C → A → B → C … 균등 교대</td>\n</tr>\n<tr>\n<td><strong>Priority</strong></td>\n<td>우선순위 높은 놈 먼저</td>\n<td>특정 스레드만 빠르게 진행, 나머지 정체</td>\n</tr>\n<tr>\n<td><strong>CFS</strong></td>\n<td><code>vruntime</code> 가장 작은 놈 우선</td>\n<td>RR 과 비슷하나 nice 값/부하에 따라 비율이 미세 변동</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"34-watchdog-cpu\">3.4 Watchdog — CPU 과점유 보호 정책<a class=\"headerlink\" href=\"#34-watchdog-cpu\" title=\"Permanent link\">#</a></h3>\n<p><code>agent-leak-app</code> 의 <a href=\"용어집.md#watchdog\"><code>Watchdog</code></a> 은 자기 자신의 CPU 사용률을 주기적으로 측정하다가 <code>CPU_MAX_OCCUPY</code> 를 넘기면 <a href=\"용어집.md#signal\"><strong>SIGTERM</strong></a> 으로 자신을 종료시킨다. 이게 OS 의 <code>softlockup detector</code> 가 아니라 <strong>앱 내부 정책</strong> 이라는 점을 분명히 해야 한다.</p>\n<table>\n<thead>\n<tr>\n<th>구분</th>\n<th>트리거</th>\n<th>시그널</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>커널 softlockup</td>\n<td>CPU 코어 하나가 일정 시간 idle 0%</td>\n<td>보통 경고 메시지 (<code>watchdog: BUG: soft lockup</code>)</td>\n</tr>\n<tr>\n<td>Watchdog (앱)</td>\n<td>프로세스 자신의 CPU% &gt; <code>CPU_MAX_OCCUPY</code></td>\n<td>SIGTERM → 자체 종료</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p>🔑 <strong>SIGTERM vs SIGKILL</strong>: SIGTERM(15) 은 \"정상 종료 요청\" — 프로세스가 신호를 받고 cleanup 할 시간이 있음. SIGKILL(9) 은 \"지금 즉시 죽임\" — 무시 불가, cleanup 못 함. <code>MemoryGuard</code> 가 SIGKILL 을 쓰는 이유는 메모리가 이미 한계에 도달해 cleanup 도 추가 메모리를 요구할 수 있어 위험하기 때문. <code>Watchdog</code> 이 SIGTERM 인 이유는 CPU 만 문제이므로 정상 정리 시간을 줘도 안전하기 때문.</p>\n</blockquote>\n<hr />\n<h2 id=\"4\">4. 멀티프로세싱 · 멀티스레딩 — 병렬 실행의 이론과 실제<a class=\"headerlink\" href=\"#4\" title=\"Permanent link\">#</a></h2>\n<blockquote>\n<p>이번 미션의 데드락은 <code>MULTI_THREAD_ENABLE=true</code> 일 때만 발생한다. 그 환경변수가 정확히 무엇을 켜는지, 왜 끄면 모든 종류의 동시성 사고를 회피할 수 있는지를 이해하려면 \"프로세스 N개로 일할 것인가, 스레드 N개로 일할 것인가, 아니면 한 스레드 안에서 비동기로 처리할 것인가\" 라는 <strong>병렬 실행 모델 의 선택지</strong> 를 먼저 손에 잡아야 한다.</p>\n<p>이 챕터는 §3 의 스케줄링 논의를 한 단계 더 끌어올려, <em>어떻게 동시에 일을 시킬지</em> 의 세 가지 모델(멀티프로세싱·멀티스레딩·비동기 단일스레드) 을 비교하고, 각 모델이 만드는 비용·이점·사고 가능성을 다룬다.</p>\n</blockquote>\n<h3 id=\"41-concurrency-vs-parallelism\">4.1 동시성(Concurrency) vs 병렬성(Parallelism) — 두 개념의 분리<a class=\"headerlink\" href=\"#41-concurrency-vs-parallelism\" title=\"Permanent link\">#</a></h3>\n<p>가장 자주 헷갈리는 두 단어부터 정리한다. <a href=\"용어집.md#concurrency-vs-parallelism\">동시성과 병렬성</a>은 서로 다른 개념이다.</p>\n<ul>\n<li><strong>동시성</strong>: 여러 일이 진행 중인 <em>것처럼</em> 보이는 상태. 1 <a href=\"용어집.md#core-smt\">코어</a> 머신에서도 OS <a href=\"용어집.md#scheduler\">스케줄러</a> 가 짧은 시간 단위로 <a href=\"용어집.md#thread\">스레드</a> 들을 번갈아 돌리면 <em>겉으로는</em> 동시 같다.</li>\n<li><strong>병렬성</strong>: <em>진짜로</em> 같은 시각에 여러 일이 실행되는 상태. 멀티코어에서만 가능.</li>\n</ul>\n<p>비유:</p>\n<ul>\n<li><strong>동시성</strong> = 1명의 요리사가 30초마다 라면을 끓이다, 김밥을 자르다, 떡볶이를 젓는다. 외부에서는 셋이 동시에 만들어지는 것처럼 보이지만 사실 한 명이 번갈아 한다.</li>\n<li><strong>병렬성</strong> = 요리사 3명이 진짜로 라면·김밥·떡볶이를 동시에 만든다.</li>\n</ul>\n<p>집합 관계: <strong>동시성 ⊃ 병렬성</strong>. 모든 병렬은 동시지만, 모든 동시가 병렬은 아니다.</p>\n<p>미션 연결점:\n- <code>agent-leak-app</code> 이 <code>MULTI_THREAD_ENABLE=true</code> 면 동시성 모델로 동작.\n- 머신이 멀티코어이면 그 동시성이 실제로 병렬성이 된다.\n- <strong>데드락은 <em>동시성 자체가</em> 만드는 문제이지 병렬성이 만드는 게 아니다</strong> — 1 코어 머신에서도 멀티스레드면 데드락이 가능하다.</p>\n<h3 id=\"42\">4.2 멀티프로세싱 — 격리된 주소공간의 협업<a class=\"headerlink\" href=\"#42\" title=\"Permanent link\">#</a></h3>\n<p>리눅스에서 새 <a href=\"용어집.md#process\">프로세스</a>를 만드는 방법은 거의 항상 <a href=\"용어집.md#fork-exec\"><code>fork()</code></a> 시스템 콜 하나로 귀결된다.</p>\n<h4 id=\"fork\">fork() — 자기 복제<a class=\"headerlink\" href=\"#fork\" title=\"Permanent link\">#</a></h4>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"kt\">pid_t</span><span class=\"w\"> </span><span class=\"n\">pid</span><span class=\"w\"> </span><span class=\"o\">=</span><span class=\"w\"> </span><span class=\"n\">fork</span><span class=\"p\">();</span>\n<span class=\"k\">if</span><span class=\"w\"> </span><span class=\"p\">(</span><span class=\"n\">pid</span><span class=\"w\"> </span><span class=\"o\">==</span><span class=\"w\"> </span><span class=\"mi\">0</span><span class=\"p\">)</span><span class=\"w\"> </span><span class=\"p\">{</span>\n<span class=\"w\">    </span><span class=\"c1\">// 자식 프로세스 코드 — pid 는 0</span>\n<span class=\"p\">}</span><span class=\"w\"> </span><span class=\"k\">else</span><span class=\"w\"> </span><span class=\"k\">if</span><span class=\"w\"> </span><span class=\"p\">(</span><span class=\"n\">pid</span><span class=\"w\"> </span><span class=\"o\">&gt;</span><span class=\"w\"> </span><span class=\"mi\">0</span><span class=\"p\">)</span><span class=\"w\"> </span><span class=\"p\">{</span>\n<span class=\"w\">    </span><span class=\"c1\">// 부모 프로세스 코드 — pid 는 자식의 PID</span>\n<span class=\"p\">}</span><span class=\"w\"> </span><span class=\"k\">else</span><span class=\"w\"> </span><span class=\"p\">{</span>\n<span class=\"w\">    </span><span class=\"c1\">// fork 실패 (메모리/리소스 부족)</span>\n<span class=\"p\">}</span>\n</code></pre></div>\n\n<p><code>fork()</code> 호출이 끝나면 <strong>거의 똑같은 프로세스 두 개</strong> 가 존재한다. 메모리 상태·열린 파일·환경변수 다 같고, <a href=\"용어집.md#pid\">PID</a> 만 다르다. 이후 두 프로세스는 <em>각자의 길</em> 을 간다.</p>\n<h4 id=\"copy-on-write-fork\">Copy-on-Write — fork 가 가난해지지 않는 이유<a class=\"headerlink\" href=\"#copy-on-write-fork\" title=\"Permanent link\">#</a></h4>\n<p>순진하게 생각하면 fork() 는 1 GB 짜리 프로세스의 메모리를 전부 복사해야 하니 무지 비싸 보인다. 하지만 리눅스는 <a href=\"용어집.md#cow\">Copy-on-Write (COW)</a> 기법으로 이걸 거의 공짜로 만든다.</p>\n<ul>\n<li>fork 직후: 두 프로세스가 <em>같은 물리 페이지</em> 를 가리키고, <a href=\"용어집.md#page-table-tlb\">페이지 테이블</a>에는 \"읽기 전용\" 표시.</li>\n<li>어느 한쪽이 페이지를 <em>쓰려고</em> 하는 순간: <a href=\"용어집.md#page-fault\">페이지 폴트</a> 발생 → 커널이 <em>그때서야</em> 페이지를 복사 → 둘이 분리.</li>\n<li>결과: 안 쓰는 페이지는 영영 안 복사된다.</li>\n</ul>\n<p>비유: 책 한 권을 둘이 같이 보다가, 한 명이 한 페이지에 메모를 쓰려는 순간 그 페이지만 복사해서 갖는 방식.</p>\n<h4 id=\"exec\">exec() — 자기를 다른 프로그램으로 교체<a class=\"headerlink\" href=\"#exec\" title=\"Permanent link\">#</a></h4>\n<p>fork 만으로는 새 프로그램을 실행할 수 없다(자기 복제만 함). 자식이 새 프로그램으로 <em>변신</em> 하려면 <a href=\"용어집.md#fork-exec\"><code>exec()</code></a> 계열 시스템 콜을 호출한다.</p>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"kt\">pid_t</span><span class=\"w\"> </span><span class=\"n\">pid</span><span class=\"w\"> </span><span class=\"o\">=</span><span class=\"w\"> </span><span class=\"n\">fork</span><span class=\"p\">();</span>\n<span class=\"k\">if</span><span class=\"w\"> </span><span class=\"p\">(</span><span class=\"n\">pid</span><span class=\"w\"> </span><span class=\"o\">==</span><span class=\"w\"> </span><span class=\"mi\">0</span><span class=\"p\">)</span><span class=\"w\"> </span><span class=\"p\">{</span>\n<span class=\"w\">    </span><span class=\"n\">execl</span><span class=\"p\">(</span><span class=\"s\">&quot;/bin/ls&quot;</span><span class=\"p\">,</span><span class=\"w\"> </span><span class=\"s\">&quot;ls&quot;</span><span class=\"p\">,</span><span class=\"w\"> </span><span class=\"s\">&quot;-la&quot;</span><span class=\"p\">,</span><span class=\"w\"> </span><span class=\"nb\">NULL</span><span class=\"p\">);</span><span class=\"w\">  </span><span class=\"c1\">// ls 프로그램으로 자기 자신을 교체</span>\n<span class=\"w\">    </span><span class=\"c1\">// 여기는 도달 안 됨 (성공 시)</span>\n<span class=\"p\">}</span>\n<span class=\"c1\">// 부모는 자식의 종료를 wait() 으로 기다림</span>\n<span class=\"kt\">int</span><span class=\"w\"> </span><span class=\"n\">status</span><span class=\"p\">;</span><span class=\"w\"> </span><span class=\"n\">waitpid</span><span class=\"p\">(</span><span class=\"n\">pid</span><span class=\"p\">,</span><span class=\"w\"> </span><span class=\"o\">&amp;</span><span class=\"n\">status</span><span class=\"p\">,</span><span class=\"w\"> </span><span class=\"mi\">0</span><span class=\"p\">);</span>\n</code></pre></div>\n\n<p>이게 셸이 명령어를 실행하는 표준 패턴 — <strong>fork-then-exec</strong>. <code>bash</code> 가 <code>ls</code> 를 돌리려면 fork 로 자식을 만들고, 자식이 exec 로 ls 가 된다.</p>\n<h4 id=\"clone\">clone() — 리눅스의 통합 인터페이스<a class=\"headerlink\" href=\"#clone\" title=\"Permanent link\">#</a></h4>\n<p>리눅스 커널 입장에서는 fork() 도 pthread_create() 도 같은 <a href=\"용어집.md#clone-syscall\"><code>clone()</code></a> 시스템 콜의 다른 옵션이다. clone 의 인자(<code>CLONE_VM</code>, <code>CLONE_FS</code>, <code>CLONE_FILES</code>, <code>CLONE_SIGHAND</code> …)로 \"메모리도 공유? 파일도 공유? 시그널 핸들러도 공유?\" 를 결정.</p>\n<ul>\n<li><strong>fork</strong>: 아무것도 공유 안 함 (= 완전 복제)</li>\n<li><strong>pthread_create</strong>: 메모리·파일·시그널 핸들러 다 공유 (= 스레드)</li>\n<li>그 중간 형태도 가능 (예: 메모리만 공유, 나머지는 따로)</li>\n</ul>\n<p>그래서 리눅스에서 \"프로세스\" 와 \"스레드\" 는 사실 같은 커널 객체(<code>task_struct</code>)의 다른 설정일 뿐이다. <code>ps -L</code> 이 스레드 별로 정보를 보여줄 수 있는 이유.</p>\n<h3 id=\"43\">4.3 멀티스레딩 — 공유 주소공간의 협업<a class=\"headerlink\" href=\"#43\" title=\"Permanent link\">#</a></h3>\n<p><a href=\"용어집.md#pthread\">POSIX Threads (pthread)</a> 는 유닉스 계열의 표준 <a href=\"용어집.md#thread\">스레드</a> API.</p>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"cp\">#include</span><span class=\"w\"> </span><span class=\"cpf\">&lt;pthread.h&gt;</span>\n\n<span class=\"kt\">void</span><span class=\"w\"> </span><span class=\"o\">*</span><span class=\"nf\">worker</span><span class=\"p\">(</span><span class=\"kt\">void</span><span class=\"w\"> </span><span class=\"o\">*</span><span class=\"n\">arg</span><span class=\"p\">)</span><span class=\"w\"> </span><span class=\"p\">{</span>\n<span class=\"w\">    </span><span class=\"c1\">// 새 스레드가 실행할 함수</span>\n<span class=\"w\">    </span><span class=\"k\">return</span><span class=\"w\"> </span><span class=\"nb\">NULL</span><span class=\"p\">;</span>\n<span class=\"p\">}</span>\n\n<span class=\"n\">pthread_t</span><span class=\"w\"> </span><span class=\"n\">tid</span><span class=\"p\">;</span>\n<span class=\"n\">pthread_create</span><span class=\"p\">(</span><span class=\"o\">&amp;</span><span class=\"n\">tid</span><span class=\"p\">,</span><span class=\"w\"> </span><span class=\"nb\">NULL</span><span class=\"p\">,</span><span class=\"w\"> </span><span class=\"n\">worker</span><span class=\"p\">,</span><span class=\"w\"> </span><span class=\"nb\">NULL</span><span class=\"p\">);</span><span class=\"w\">  </span><span class=\"c1\">// 스레드 생성</span>\n<span class=\"n\">pthread_join</span><span class=\"p\">(</span><span class=\"n\">tid</span><span class=\"p\">,</span><span class=\"w\"> </span><span class=\"nb\">NULL</span><span class=\"p\">);</span><span class=\"w\">                    </span><span class=\"c1\">// 스레드 종료 대기</span>\n</code></pre></div>\n\n<p>스레드의 메모리 구조 — 무엇이 공유되고 무엇이 따로인지가 핵심이다.</p>\n<table>\n<thead>\n<tr>\n<th>영역</th>\n<th>멀티스레드에서</th>\n<th>의미</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>Text (코드)</strong></td>\n<td>공유</td>\n<td>같은 함수를 여러 스레드가 동시에 실행 가능</td>\n</tr>\n<tr>\n<td><strong>Data / BSS</strong></td>\n<td>공유</td>\n<td>전역 변수는 모든 스레드가 같은 값 봄</td>\n</tr>\n<tr>\n<td><strong>Heap</strong></td>\n<td>공유</td>\n<td><code>malloc</code> 한 객체를 다른 스레드도 접근 가능 — <strong>race condition 의 무대</strong></td>\n</tr>\n<tr>\n<td><strong>Stack</strong></td>\n<td><strong>각자 다름</strong></td>\n<td>지역 변수·매개변수는 스레드별 격리</td>\n</tr>\n<tr>\n<td>레지스터 상태</td>\n<td>각자 다름</td>\n<td><a href=\"용어집.md#context-switch\">컨텍스트 스위치</a>로 저장/복원</td>\n</tr>\n<tr>\n<td>시그널 마스크</td>\n<td>각자 다름</td>\n<td>같은 SIGUSR1 도 스레드마다 다르게 처리 가능</td>\n</tr>\n<tr>\n<td><code>errno</code></td>\n<td>각자 다름</td>\n<td><a href=\"용어집.md#tls\">TLS</a> 로 구현</td>\n</tr>\n<tr>\n<td>열린 파일 디스크립터</td>\n<td>공유</td>\n<td>한 스레드가 닫으면 모두에게 영향</td>\n</tr>\n</tbody>\n</table>\n<p>여기서 <a href=\"용어집.md#tls\">TLS (Thread-Local Storage)</a> 는 \"스레드별 전역변수\" 같은 개념. C 에서 <code>__thread int counter</code>, Python 에서 <code>threading.local()</code> 로 선언. 락 없이도 스레드별로 안전한 상태를 가질 수 있어 멀티스레드 설계의 좋은 도구다.</p>\n<h3 id=\"44-vs\">4.4 멀티프로세싱 vs 멀티스레딩 — 비용·이점 비교표<a class=\"headerlink\" href=\"#44-vs\" title=\"Permanent link\">#</a></h3>\n<p>미션의 핵심 표 중 하나. 외워두면 데드락 리포트의 <em>Root Cause Analysis</em> 와 <em>Workaround</em> 가 훨씬 단단해진다.</p>\n<table>\n<thead>\n<tr>\n<th>비교 항목</th>\n<th>멀티프로세싱</th>\n<th>멀티스레딩</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>생성 비용</strong></td>\n<td>크다 (PCB 통째로) — 약 <strong>1 ms</strong> 단위</td>\n<td>작다 (스택만 따로) — 약 <strong>10 µs</strong> 단위</td>\n</tr>\n<tr>\n<td><strong>메모리 사용</strong></td>\n<td><a href=\"용어집.md#cow\">COW</a> 덕에 첫 fork 는 가볍지만 시간 지나면 페이지가 분리되며 증가</td>\n<td>자기 스택만 추가 (수 MB)</td>\n</tr>\n<tr>\n<td><strong>컨텍스트 스위치 비용</strong></td>\n<td>비싸다 (<a href=\"용어집.md#page-table-tlb\">TLB</a> 비우고 다시 채우기)</td>\n<td>싸다 (TLB 유지 — 같은 주소공간)</td>\n</tr>\n<tr>\n<td><strong>통신 방법</strong></td>\n<td><a href=\"용어집.md#ipc\">IPC</a> (파이프·소켓·공유메모리) — <em>명시적</em></td>\n<td>같은 변수 직접 참조 — <em>암묵적</em></td>\n</tr>\n<tr>\n<td><strong>데이터 공유</strong></td>\n<td>명시적 직렬화 필요 (보내는 데 비용)</td>\n<td>즉시 가능 (보내는 비용 없음)</td>\n</tr>\n<tr>\n<td><strong>격리 수준</strong></td>\n<td><strong>완전</strong> — 한쪽 버그가 다른 쪽 메모리를 못 망침</td>\n<td>없음 — 한 스레드의 메모리 손상이 전체를 망침</td>\n</tr>\n<tr>\n<td><strong>장애 격리</strong></td>\n<td>한 명 죽어도 다른 명 살아 있음</td>\n<td>한 스레드의 SEGV → 프로세스 전체 종료</td>\n</tr>\n<tr>\n<td><strong>데드락 가능성</strong></td>\n<td>거의 없음 (격리 덕분)</td>\n<td>있음 — 락을 공유하므로</td>\n</tr>\n<tr>\n<td><strong>디버깅 난이도</strong></td>\n<td>쉬움 (각자 독립)</td>\n<td>어려움 (재현 불가능한 race 다수)</td>\n</tr>\n<tr>\n<td><strong>확장성</strong></td>\n<td>메모리 비용으로 자연스럽게 제한 (수십~수백)</td>\n<td>수천 개 가능하지만 <a href=\"용어집.md#gil\">GIL</a> 등 별도 제약</td>\n</tr>\n</tbody>\n</table>\n<p>핵심 트레이드오프:\n- <strong>멀티프로세싱</strong>: <em>안전하지만 비싸고 통신이 번거롭다</em>\n- <strong>멀티스레딩</strong>: <em>가볍지만 동시성 사고에 취약하다</em></p>\n<h3 id=\"45-python-gil\">4.5 Python 의 GIL — 왜 멀티스레딩이 마법 같지 않은가<a class=\"headerlink\" href=\"#45-python-gil\" title=\"Permanent link\">#</a></h3>\n<p>CPython(가장 흔한 Python 구현체)에는 <a href=\"용어집.md#gil\">Global Interpreter Lock (GIL)</a> 이라는 거대 락이 있다. 핵심 효과:</p>\n<blockquote>\n<p><strong>\"같은 프로세스 안에서는 한 번에 <em>오직 한 스레드만</em> Python 바이트코드를 실행할 수 있다.\"</strong></p>\n</blockquote>\n<p>따라서:\n- 8 <a href=\"용어집.md#core-smt\">코어</a> 머신에서 Python 스레드를 8 개 만들어도, <em>Python 코드</em> 자체는 1 코어 분량만 돌아간다.\n- C 확장(NumPy, hashlib 등)이나 I/O 시스템 콜 안에서는 GIL 이 풀리므로, 멀티스레드가 의미 있는 영역도 있다.</p>\n<h4 id=\"gil\">왜 GIL 이 존재하는가<a class=\"headerlink\" href=\"#gil\" title=\"Permanent link\">#</a></h4>\n<p>CPython 의 메모리 관리는 <em>참조 카운팅(reference counting)</em> 기반이다. 모든 객체에 \"지금 누가 나를 가리키고 있나\" 카운터가 붙어 있고, 이게 0 이 되면 즉시 해제. 두 스레드가 동시에 카운터를 ++/-- 하면 <a href=\"용어집.md#race-condition\">race condition</a> 으로 카운터가 망가지고 메모리 누수·중복 해제가 발생한다.</p>\n<p>해결책 후보:\n1. <strong>모든 객체에 락을 건다</strong> → 락 오버헤드로 <em>단일 스레드 성능</em> 이 크게 떨어진다.\n2. <strong>인터프리터 전체에 락을 건다</strong> → 단일 스레드는 빠르지만 멀티스레드 병렬화 못 함.</p>\n<p>CPython 은 (2)를 골랐다. 그게 GIL.</p>\n<h4 id=\"cpu-bound-io-bound\">CPU-bound 와 I/O-bound 의 갈림길<a class=\"headerlink\" href=\"#cpu-bound-io-bound\" title=\"Permanent link\">#</a></h4>\n<p>이 구분이 GIL 에 대한 모든 논의의 출발점이다.</p>\n<table>\n<thead>\n<tr>\n<th>작업 유형</th>\n<th>정의</th>\n<th>Python 멀티스레드 효과</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><a href=\"용어집.md#cpu-vs-io-bound\">CPU-bound</a></td>\n<td>계산 중심 — 이미지 처리, 압축, 암호화, 시뮬레이션</td>\n<td><strong>없음</strong> — GIL 에 막혀서 코어 1개분만</td>\n</tr>\n<tr>\n<td><a href=\"용어집.md#cpu-vs-io-bound\">I/O-bound</a></td>\n<td>I/O 대기 중심 — HTTP 요청, DB 쿼리, 파일 읽기</td>\n<td><strong>있음</strong> — I/O 대기 중에 GIL 해제</td>\n</tr>\n</tbody>\n</table>\n<h4 id=\"gil_1\">GIL 우회 전략<a class=\"headerlink\" href=\"#gil_1\" title=\"Permanent link\">#</a></h4>\n<table>\n<thead>\n<tr>\n<th>전략</th>\n<th>도구</th>\n<th>적합한 경우</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>멀티프로세싱</strong></td>\n<td><a href=\"용어집.md#py-multiprocessing\"><code>multiprocessing</code></a> 모듈, <code>concurrent.futures.ProcessPoolExecutor</code></td>\n<td>CPU-bound — 진짜 병렬화 필요</td>\n</tr>\n<tr>\n<td><strong>비동기 I/O</strong></td>\n<td><a href=\"용어집.md#asyncio\"><code>asyncio</code></a>, <code>aiohttp</code>, <code>asyncpg</code></td>\n<td>I/O-bound + 동시 연결 수천 개</td>\n</tr>\n<tr>\n<td><strong>C 확장</strong></td>\n<td>NumPy, PyTorch 등의 내부 연산</td>\n<td>수치 연산 — 내부에서 GIL 해제</td>\n</tr>\n<tr>\n<td><strong>인터프리터 교체</strong></td>\n<td>PyPy, GraalPy</td>\n<td>특정 상황에서만</td>\n</tr>\n<tr>\n<td><strong>GIL-free Python</strong></td>\n<td>Python 3.13 <code>--without-gil</code> (실험적)</td>\n<td>미래 기술 — 아직 대부분의 라이브러리 미지원</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p>🔑 <strong>미션 연결</strong>: <code>agent-leak-app</code> 이 Python 으로 짜였고 <code>MULTI_THREAD_ENABLE=true</code> 가 워커를 멀티스레드로 만든다면, 그 멀티스레드는 <em>I/O 처리에는 도움이 되지만 CPU 작업의 병렬화에는 GIL 때문에 도움이 안 된다</em>. 즉 CPU 과점유 장애가 멀티스레드를 켜도 안 사라지는 이유의 한 후보다. 데드락은 그것과 별개로 <em>락 관리</em> 의 문제이므로 GIL 과 무관하게 발생할 수 있다 — GIL 은 <em>바이트코드 실행</em> 만 직렬화하지 <em>락 획득 순서</em> 까지 통제하지는 않기 때문.</p>\n</blockquote>\n<h3 id=\"46\">4.6 자주 쓰는 동시 실행 패턴<a class=\"headerlink\" href=\"#46\" title=\"Permanent link\">#</a></h3>\n<h4 id=\"producer-consumer-\">Producer-Consumer (생산자-소비자)<a class=\"headerlink\" href=\"#producer-consumer-\" title=\"Permanent link\">#</a></h4>\n<p>한 쪽은 작업을 큐에 <em>생산</em> 하고, 다른 쪽은 큐에서 꺼내 <em>소비</em> 한다. 큐가 비면 소비자가 대기, 가득 차면 생산자가 대기. <a href=\"용어집.md#producer-consumer\">Producer-Consumer 패턴</a> 은 멀티스레드/멀티프로세스 시스템의 가장 흔한 구조다.</p>\n<div class=\"codehilite\"><pre><span></span><code>[Producer]  ──→  [Queue]  ──→  [Consumer]\n   ↑               ↑               ↓\n   │               │           꺼내서 처리\n   └──── 가득 차면 대기 ────┐   └── 비면 대기\n                              │\n              (조건 만족 시 깨움)\n</code></pre></div>\n\n<p>비유: 카페에서 바리스타(생산자)가 음료를 카운터(큐)에 올리면 손님(소비자)이 가져간다. 카운터 자리가 다 차면 바리스타가 멈추고, 비어 있으면 손님이 기다린다.</p>\n<p>대기와 깨움은 보통 <a href=\"용어집.md#condition-variable\">컨디션 변수(Condition Variable)</a> + <a href=\"용어집.md#lock-mutex\">뮤텍스</a> 한 쌍으로 구현된다. <a href=\"용어집.md#busy-wait\">busy-wait</a> 처럼 CPU 를 태우지 않고 <em>진짜로 잠들기</em> 때문에 효율적.</p>\n<h4 id=\"thread-pool\">Thread Pool (스레드 풀)<a class=\"headerlink\" href=\"#thread-pool\" title=\"Permanent link\">#</a></h4>\n<p><a href=\"용어집.md#thread-pool\">스레드 풀</a>은 스레드를 <em>그때그때 만들지 않고</em> 미리 N 개 만들어 두고 작업을 분배하는 패턴.</p>\n<div class=\"codehilite\"><pre><span></span><code>              [Task Queue]\n                  │\n        ┌─────────┼─────────┐\n        ↓         ↓         ↓\n   [Worker 1] [Worker 2] [Worker N]   ← 대기 중인 스레드들\n</code></pre></div>\n\n<p>비유: 콜센터 — 전화 올 때마다 사람을 뽑지 않고, 상담사 50명을 미리 대기시켜 둔다.</p>\n<p>Python: <code>concurrent.futures.ThreadPoolExecutor</code>, <code>multiprocessing.Pool</code>. 만들고 부수는 비용을 절약하기 위함.</p>\n<h4 id=\"fork-join-\">Fork-Join (분할-합치기)<a class=\"headerlink\" href=\"#fork-join-\" title=\"Permanent link\">#</a></h4>\n<p><a href=\"용어집.md#fork-join\">Fork-Join 모델</a>은 큰 작업을 N 개로 쪼개서 병렬 실행 → 다 끝나면 결과를 모음.</p>\n<div class=\"codehilite\"><pre><span></span><code>     [큰 작업]\n         │ fork\n         ├──→ [작업 1] ──┐\n         ├──→ [작업 2] ──┤   join\n         ├──→ [작업 3] ──┤\n         └──→ [작업 N] ──┘\n         ↓\n     [결과 합침]\n</code></pre></div>\n\n<p>비유: 큰 시험지 채점을 5명에게 나눠 주고, 다 끝나면 점수를 합산.</p>\n<p>대용량 데이터 처리(MapReduce), 병렬 정렬, 행렬 곱셈 등이 대표적.</p>\n<h3 id=\"47\">4.7 암달의 법칙 — 병렬화의 수학적 한계<a class=\"headerlink\" href=\"#47\" title=\"Permanent link\">#</a></h3>\n<p>병렬화로 얼마나 빨라질 수 있는가? <a href=\"용어집.md#amdahl\">암달의 법칙(Amdahl's Law)</a> 이 답한다.</p>\n<blockquote>\n<p><strong>Speedup ≤ 1 / ((1 − p) + p / N)</strong></p>\n<p>p = 병렬화 가능한 코드 비율, N = 코어 수</p>\n</blockquote>\n<table>\n<thead>\n<tr>\n<th>p (병렬화 가능 비율)</th>\n<th>N=4 코어</th>\n<th>N=16 코어</th>\n<th>N=∞</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>50%</td>\n<td>1.6×</td>\n<td>1.9×</td>\n<td>2×</td>\n</tr>\n<tr>\n<td>90%</td>\n<td>3.1×</td>\n<td>6.4×</td>\n<td>10×</td>\n</tr>\n<tr>\n<td>95%</td>\n<td>3.5×</td>\n<td>9.1×</td>\n<td>20×</td>\n</tr>\n<tr>\n<td>99%</td>\n<td>3.9×</td>\n<td>13.9×</td>\n<td>100×</td>\n</tr>\n</tbody>\n</table>\n<p>핵심 통찰:\n- <strong>직렬 부분(1-p) 이 작아 보여도 천장이 낮다.</strong> 5% 만 직렬이어도 코어를 무한히 늘려도 20배가 최대.\n- 그래서 진짜 병렬 시스템 설계는 \"직렬 구간을 어떻게 줄일 것인가\" 가 핵심.</p>\n<p>비유: 부엌 일에서 <em>씻기·자르기</em> 는 여러 명이 동시에 가능하지만 <em>국 한 솥을 끓이는 시간</em> 은 사람 수 늘려도 안 줄어든다.</p>\n<p>미션 연결: <code>agent-leak-app</code> 의 워커 스레드를 늘려도 어느 시점부터는 성능이 더 안 오른다면, 코드 안에 직렬 부분(공유 큐 접근, 공유 자원 락, 로그 출력 등)이 존재한다는 증거다.</p>\n<h3 id=\"48\">4.8 어떤 모델을 언제 쓰는가 — 결정 가이드<a class=\"headerlink\" href=\"#48\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>상황</th>\n<th>추천 모델</th>\n<th>이유</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>CPU 집중 계산을 여러 코어로 가속 (Python)</td>\n<td><strong>멀티프로세싱</strong></td>\n<td>GIL 우회 필요</td>\n</tr>\n<tr>\n<td>CPU 집중 계산을 여러 코어로 가속 (C/C++/Go/Rust)</td>\n<td>멀티스레딩</td>\n<td>GIL 없음, 통신 오버헤드 최소화</td>\n</tr>\n<tr>\n<td>수많은 네트워크 요청 처리 (Python)</td>\n<td><strong>asyncio</strong></td>\n<td>I/O 대기가 대부분, 메모리 효율적</td>\n</tr>\n<tr>\n<td>수많은 네트워크 요청 처리 (Java/Go)</td>\n<td>가벼운 스레드/고루틴</td>\n<td>런타임이 효율적 스케줄링</td>\n</tr>\n<tr>\n<td>한 명 실패해도 다른 명은 살아야 함 (예: 워커 풀)</td>\n<td><strong>멀티프로세싱</strong></td>\n<td>격리가 가장 큰 이점</td>\n</tr>\n<tr>\n<td>데이터 공유가 잦고 작업당 비용이 작음</td>\n<td>멀티스레딩</td>\n<td>통신 오버헤드 회피</td>\n</tr>\n<tr>\n<td>동기화가 까다로워 데드락이 우려됨</td>\n<td><strong>단일 스레드 + 이벤트 루프</strong></td>\n<td>동시성 사고 원천 차단</td>\n</tr>\n<tr>\n<td>안정성이 최우선, 성능은 부차적</td>\n<td><strong>단일 프로세스 + 단일 스레드</strong></td>\n<td>가장 단순한 게 가장 안전</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"49-multi_thread_enable\">4.9 미션 연결 — <code>MULTI_THREAD_ENABLE</code> 의 정체<a class=\"headerlink\" href=\"#49-multi_thread_enable\" title=\"Permanent link\">#</a></h3>\n<p><code>agent-leak-app</code> 의 <code>MULTI_THREAD_ENABLE</code> 환경변수는 위 결정 매트릭스의 가장 위험한 선택지(공유 메모리 + 락 → 데드락 가능) 를 켜고 끄는 스위치다.</p>\n<table>\n<thead>\n<tr>\n<th>값</th>\n<th>모델</th>\n<th>동시성 사고 가능성</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>true</code></td>\n<td>멀티스레드 워커</td>\n<td>데드락 / race condition 가능</td>\n</tr>\n<tr>\n<td><code>false</code></td>\n<td>단일 스레드 (혹은 멀티프로세스)</td>\n<td>사실상 없음</td>\n</tr>\n</tbody>\n</table>\n<p>실서버에서 데드락이 났을 때 운영자가 가장 먼저 시도하는 임시 조치 중 하나가 바로 \"멀티스레드 모드 끄기\" 다 — 결정 매트릭스의 마지막 줄(\"안정성이 최우선이면 단순한 게 답\") 로 후퇴하는 것. 이번 미션의 데드락 리포트에서 <em>Workaround</em> 로 <code>MULTI_THREAD_ENABLE=false</code> 를 추천하는 근거가 여기 있다.</p>\n<p>단, 이는 <em>근본 해결</em> 이 아니다. 근본 해결은 다음 셋 중 하나다:\n1. <strong>락 획득 순서를 코드 전역에서 통일</strong> (Coffman 4조건 중 \"순환 대기\" 차단)\n2. <strong>타임아웃을 적용</strong> (<code>try_lock</code>) 해서 비선점 깨기\n3. <strong>락 자체를 제거</strong> (<a href=\"용어집.md#lock-free\">lock-free</a> 자료구조나 <a href=\"용어집.md#asyncio\">이벤트 루프</a> 로 전환)</p>\n<p>리포트의 \"근본적 해결을 위한 추가 제안\" 항목에 위 3가지 중 하나를 인용해 적으면 좋다.</p>\n<hr />\n<h2 id=\"5\">5. 동시성 · 락 · 데드락<a class=\"headerlink\" href=\"#5\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"51\">5.1 왜 락이 필요한가 — 공유 자원 문제<a class=\"headerlink\" href=\"#51\" title=\"Permanent link\">#</a></h3>\n<p><a href=\"용어집.md#thread\">스레드</a>가 같은 메모리를 공유하면 좋은 점(빠른 통신)과 나쁜 점(<a href=\"용어집.md#race-condition\"><strong>Race Condition</strong></a>)이 함께 온다.</p>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"n\">balance</span> <span class=\"o\">=</span> <span class=\"mi\">100</span>      <span class=\"c1\"># 공유 변수</span>\n\n<span class=\"c1\"># 스레드 A          # 스레드 B</span>\n<span class=\"n\">tmp</span> <span class=\"o\">=</span> <span class=\"n\">balance</span>       <span class=\"n\">tmp</span> <span class=\"o\">=</span> <span class=\"n\">balance</span>\n<span class=\"n\">tmp</span> <span class=\"o\">+=</span> <span class=\"mi\">50</span>           <span class=\"n\">tmp</span> <span class=\"o\">+=</span> <span class=\"mi\">50</span>\n<span class=\"n\">balance</span> <span class=\"o\">=</span> <span class=\"n\">tmp</span>       <span class=\"n\">balance</span> <span class=\"o\">=</span> <span class=\"n\">tmp</span>\n</code></pre></div>\n\n<p>둘 다 동시에 실행되면 <code>balance</code> 가 200 이 되어야 할 것 같지만 150 으로 끝날 수 있다 — 두 스레드가 같은 <code>tmp = balance</code> 시점의 값을 읽었기 때문. 이를 막으려고 <a href=\"용어집.md#lock-mutex\"><strong>임계구역(Critical Section)을 락(mutex)으로 보호</strong></a>한다.</p>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"k\">with</span> <span class=\"n\">lock</span><span class=\"p\">:</span>\n    <span class=\"n\">balance</span> <span class=\"o\">+=</span> <span class=\"mi\">50</span>\n</code></pre></div>\n\n<p>동시에 N 명까지 허용해야 한다면 <a href=\"용어집.md#semaphore\">세마포어(Semaphore)</a>를 쓰고, \"조건이 만족될 때까지 잠들었다가 깨우기\" 가 필요하면 <a href=\"용어집.md#condition-variable\">컨디션 변수</a>를 쓴다. 셋 다 <a href=\"#46-자주-쓰는-동시-실행-패턴\">§4.6 Producer-Consumer 패턴</a> 의 기본 도구들.</p>\n<h3 id=\"52-4-coffman-conditions\">5.2 데드락의 4대 필요조건 (Coffman conditions)<a class=\"headerlink\" href=\"#52-4-coffman-conditions\" title=\"Permanent link\">#</a></h3>\n<p><a href=\"용어집.md#coffman\">데드락</a>은 <strong>네 조건이 동시에 모두 성립할 때만</strong> 일어난다. 하나라도 깨면 데드락은 발생 불가능.</p>\n<table>\n<thead>\n<tr>\n<th>조건</th>\n<th>의미</th>\n<th>깨는 방법(예)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>상호 배제</strong> (Mutual Exclusion)</td>\n<td>자원을 한 번에 한 스레드만 쓸 수 있음</td>\n<td>락 없이 동시 접근 가능한 자료구조 사용 (<a href=\"용어집.md#lock-free\">lock-free</a>)</td>\n</tr>\n<tr>\n<td><strong>점유 대기</strong> (Hold and Wait)</td>\n<td>락을 잡은 채 다른 락을 또 기다림</td>\n<td>필요한 락을 한꺼번에 잡거나 하나도 안 잡고 시작</td>\n</tr>\n<tr>\n<td><strong>비선점</strong> (No Preemption)</td>\n<td>잡힌 락은 강제로 뺏을 수 없음</td>\n<td>타임아웃 적용 (<a href=\"용어집.md#try-lock\"><code>try_lock</code></a>) — 일정 시간 후 포기</td>\n</tr>\n<tr>\n<td><strong>순환 대기</strong> (Circular Wait)</td>\n<td>A→B→A 같은 사이클이 생김</td>\n<td><strong>락에 전역 순서를 매기고 항상 작은 번호부터 잡기</strong></td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p>🔑 <strong>이번 미션의 데드락</strong>: <code>MULTI_THREAD_ENABLE=true</code> 일 때 두 워커 스레드가 락 A 와 B 를 서로 다른 순서로 잡으려 해서 순환 대기가 형성된다. <code>false</code> 로 끄면 멀티스레드 자체가 없으므로 4대 조건의 첫 번째인 상호 배제도 일어나지 않아 자동으로 회피된다.</p>\n</blockquote>\n<h3 id=\"53\">5.3 식사하는 철학자 문제 — 데드락의 표준 비유<a class=\"headerlink\" href=\"#53\" title=\"Permanent link\">#</a></h3>\n<p>5명이 원탁에 앉아 있고 사이사이에 포크 5개가 놓여 있다. 식사는 양손에 포크를 들어야 가능. 모두가 동시에 \"왼쪽 포크를 먼저 든다\" 라고 하면 모두가 왼쪽을 든 채 오른쪽을 무한히 기다린다 → 데드락.</p>\n<p>이 비유는 다익스트라(1965)가 만든 <a href=\"용어집.md#dining-philosophers\"><strong>식사하는 철학자 문제</strong></a>이고, 위의 4대 조건이 모두 등장한다:</p>\n<ul>\n<li>포크는 1명만 쓸 수 있다 → 상호 배제</li>\n<li>왼쪽을 든 채 오른쪽을 기다린다 → 점유 대기</li>\n<li>들고 있는 포크를 강제로 뺏지 않는다 → 비선점</li>\n<li>1→2→3→4→5→1 의 사이클 → 순환 대기</li>\n</ul>\n<p>해결책: <strong>포크에 번호를 매기고 모두 작은 번호부터 잡게 한다</strong> (순환 대기 차단). 참고로 데드락과 헷갈리기 쉬운 개념으로 <a href=\"용어집.md#starvation\">기아(Starvation)</a>가 있는데, 이는 <em>전체</em> 가 멈추는 게 아니라 <em>특정 스레드만</em> 영영 자원을 못 받는 상태로 구분된다.</p>\n<h3 id=\"54\">5.4 어떻게 외부에서 데드락을 진단하는가<a class=\"headerlink\" href=\"#54\" title=\"Permanent link\">#</a></h3>\n<p>학습자의 핵심 도전 — 소스 코드 디컴파일이 금지된 상황에서 <strong>외부 관측만으로</strong> 데드락을 증명해야 한다.</p>\n<table>\n<thead>\n<tr>\n<th>증거</th>\n<th>어떻게 수집</th>\n<th>무엇을 의미하는가</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>PID 존재</td>\n<td><code>ps -ef \\| grep agent-leak</code></td>\n<td>프로세스는 죽지 않았다 (단순 크래시가 아님)</td>\n</tr>\n<tr>\n<td>스레드 CPU 0%</td>\n<td><code>top -H -p $PID</code> 또는 <code>ps -L -p $PID -o lwp,pcpu</code></td>\n<td>스레드들이 CPU 를 쓰지 않고 자고 있다</td>\n</tr>\n<tr>\n<td><a href=\"용어집.md#wchan\"><code>wchan</code></a> = <code>futex_wait_queue_me</code></td>\n<td><code>ps -L -p $PID -o lwp,wchan:30</code></td>\n<td>커널 안에서 <a href=\"용어집.md#futex\">futex</a> 대기 중 (= 락 대기)</td>\n</tr>\n<tr>\n<td><a href=\"용어집.md#stat-codes\"><code>stat</code></a> = <code>Sl</code></td>\n<td><code>ps -p $PID -o stat</code></td>\n<td>Sleeping + multi-thread</td>\n</tr>\n<tr>\n<td>마지막 로그 = <code>WAITING/BLOCKED</code></td>\n<td><code>tail -n 30 $AGENT_LOG_DIR/*.log</code></td>\n<td>락 획득 시도에서 멈췄다</td>\n</tr>\n<tr>\n<td>외부 요청 무응답</td>\n<td><code>curl --max-time 3 http://0.0.0.0:15034</code></td>\n<td>이벤트 루프도 멈춰 응답조차 못 한다</td>\n</tr>\n</tbody>\n</table>\n<p>위 6 가지가 동시에 성립할 때 비로소 <strong>\"교착 상태\"</strong> 라는 결론이 정당화된다. 단순히 \"응답이 없다\" 만으로는 부족하다 — 살아있는 좀비, 무한 루프, 외부 I/O 대기 등 다른 원인일 수 있다.</p>\n<h3 id=\"55-wchan\">5.5 <code>wchan</code> 이 결정적인 이유<a class=\"headerlink\" href=\"#55-wchan\" title=\"Permanent link\">#</a></h3>\n<p><a href=\"용어집.md#wchan\"><code>wchan</code> 컬럼</a>은 그 스레드가 <strong>커널의 어느 함수에서 잠들었는가</strong> 를 보여준다.</p>\n<table>\n<thead>\n<tr>\n<th><code>wchan</code> 값</th>\n<th>의미</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>futex_wait_queue_me</code>, <code>do_futex</code></td>\n<td><strong>유저 공간 락(mutex) 대기</strong> ← 데드락 후보</td>\n</tr>\n<tr>\n<td><code>pipe_wait</code>, <code>sock_recvmsg</code></td>\n<td>I/O 대기 (정상)</td>\n</tr>\n<tr>\n<td><code>do_nanosleep</code>, <code>hrtimer_nanosleep</code></td>\n<td>sleep() 호출 중 (정상)</td>\n</tr>\n<tr>\n<td><code>-</code></td>\n<td>실행 중이거나 종료</td>\n</tr>\n</tbody>\n</table>\n<p>여러 스레드가 동시에 <code>futex_*</code> 에 머물러 있다 = \"<strong>서로 다른 락을 기다리며 영원히 멈춤</strong>\" 의 강력한 증거가 된다. 이는 Python <code>threading.Lock</code>, C++ <code>std::mutex</code> 등 거의 모든 유저 공간 락이 내부적으로 <a href=\"용어집.md#futex\">futex</a>를 쓰기 때문에 가능한 분석이다.</p>\n<hr />\n<h2 id=\"6\">6. 시스템 관제 도구 정리 (이번 미션에서 자주 쓰는 것 위주)<a class=\"headerlink\" href=\"#6\" title=\"Permanent link\">#</a></h2>\n<table>\n<thead>\n<tr>\n<th>도구</th>\n<th>무엇을 본다</th>\n<th>미션에서 활용</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><a href=\"용어집.md#top-ps\"><code>top</code> / <code>top -H</code></a></td>\n<td>CPU·메모리 실시간, <code>-H</code> 는 스레드 단위</td>\n<td>OOM/CPU/Deadlock 모두 — 특히 데드락은 <code>-H</code> 필수</td>\n</tr>\n<tr>\n<td><code>ps -ef \\| grep</code></td>\n<td>프로세스 존재 / cmdline</td>\n<td>PID 살아 있는지 확인 (데드락 1차 증거)</td>\n</tr>\n<tr>\n<td><code>ps -L -p $PID -o lwp,pcpu,stat,wchan:30</code></td>\n<td>스레드 별 wchan</td>\n<td><strong>데드락 증명의 결정적 증거</strong></td>\n</tr>\n<tr>\n<td><code>ps -o pid,vsz,rss,pcpu,pmem -p $PID</code></td>\n<td>프로세스 메모리/CPU 정밀</td>\n<td>OOM 시 RSS 우상향 패턴</td>\n</tr>\n<tr>\n<td><code>free -m</code></td>\n<td>시스템 전체 메모리</td>\n<td>OOM 시 swap 사용 여부</td>\n</tr>\n<tr>\n<td><a href=\"용어집.md#vmstat\"><code>vmstat 1</code></a></td>\n<td>CPU/MEM/Swap/IO 초당 변화</td>\n<td>OOM 직전 swap 폭증, <a href=\"용어집.md#swap-thrashing\">쓰래싱</a> 확인</td>\n</tr>\n<tr>\n<td><a href=\"용어집.md#dmesg\"><code>dmesg \\| grep -i kill</code></a></td>\n<td>커널 메시지</td>\n<td>커널 OOM Killer 발동 여부 (이번엔 MemoryGuard 이므로 안 보일 가능성 큼)</td>\n</tr>\n<tr>\n<td><code>/proc/$PID/status</code></td>\n<td>프로세스 모든 상태(Vm*, Threads, State)</td>\n<td>RSS, 스레드 수, 상태를 한 화면에서</td>\n</tr>\n<tr>\n<td><code>/proc/$PID/stack</code></td>\n<td>현재 커널 콜 스택</td>\n<td>데드락 시 락 함수 호출 흔적</td>\n</tr>\n</tbody>\n</table>\n<blockquote>\n<p>🔑 <strong>모든 도구의 베이스는 <a href=\"용어집.md#proc\"><code>/proc</code></a></strong>. <code>top</code>, <code>ps</code>, <code>free</code> 는 결국 <code>/proc/&lt;pid&gt;/...</code> 와 <code>/proc/meminfo</code>, <code>/proc/stat</code> 의 텍스트를 파싱해 보여주는 래퍼다. 한 번씩 <code>cat /proc/$PID/status</code> 로 원본을 봐 보면 도구가 어디서 숫자를 가져오는지가 손에 잡힌다.</p>\n</blockquote>\n<hr />\n<h2 id=\"7-3\">7. 미션 3대 장애 — 이론과 관제 데이터의 매핑<a class=\"headerlink\" href=\"#7-3\" title=\"Permanent link\">#</a></h2>\n<p>학습자가 머릿속에서 다음 표를 그대로 떠올릴 수 있어야 한다.</p>\n<h3 id=\"71-oom-memory-leak\">7.1 OOM (Memory Leak)<a class=\"headerlink\" href=\"#71-oom-memory-leak\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>레이어</th>\n<th>무엇이 일어나는가</th>\n<th>관제 시그니처</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>앱</td>\n<td>전역 컨테이너에 객체가 계속 append, 참조 해제 없음</td>\n<td>로그에 일반 메시지 (눈에 안 띔)</td>\n</tr>\n<tr>\n<td>OS</td>\n<td>RSS 가 우상향 → DRAM 한계 근접 → swap-out 시작 → 쓰래싱</td>\n<td><code>vmstat</code> 의 <code>si/so</code> 가 0 이상으로 튀어 오름</td>\n</tr>\n<tr>\n<td>앱 정책</td>\n<td>RSS &gt; <code>MEMORY_LIMIT</code> 감지 → <code>SELF-TERMINATED</code> 로그 후 자체 SIGKILL</td>\n<td><code>[MemoryGuard] Memory limit exceeded …</code></td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"72-cpu-spike\">7.2 CPU Spike<a class=\"headerlink\" href=\"#72-cpu-spike\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>레이어</th>\n<th>무엇이 일어나는가</th>\n<th>관제 시그니처</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>앱</td>\n<td>무한 루프 또는 <a href=\"용어집.md#busy-wait\">busy-wait</a> 발생, sleep/yield 없음</td>\n<td>로그 정상 진행 후 갑자기 침묵 직전</td>\n</tr>\n<tr>\n<td>OS</td>\n<td>해당 스레드가 자기 타임 슬라이스를 끝까지 사용, 다른 작업 대기 → CFS 가 균형 잡으려 하지만 한 코어는 사실상 점유</td>\n<td><code>top</code> 의 그 프로세스 <code>%CPU</code> 가 ~100% 근처 (단일 코어)</td>\n</tr>\n<tr>\n<td>앱 정책</td>\n<td><code>%CPU</code> &gt; <code>CPU_MAX_OCCUPY</code> 감지 → SIGTERM 자기 종료</td>\n<td><code>[Watchdog] CPU threshold exceeded … SIGTERM</code></td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"73-deadlock\">7.3 Deadlock<a class=\"headerlink\" href=\"#73-deadlock\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>레이어</th>\n<th>무엇이 일어나는가</th>\n<th>관제 시그니처</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>앱</td>\n<td>스레드 A 가 lock1 잡고 lock2 기다림, 스레드 B 가 lock2 잡고 lock1 기다림</td>\n<td>로그가 <code>WAITING/BLOCKED</code> 에서 정지</td>\n</tr>\n<tr>\n<td>OS</td>\n<td>두 스레드 모두 futex 시스템콜 안에서 무한 슬립 — CPU 도 안 쓰고 메모리도 안 변함</td>\n<td><code>top -H</code> 의 스레드 <code>%CPU = 0</code>, <code>wchan = futex_wait_queue_me</code></td>\n</tr>\n<tr>\n<td>앱 정책</td>\n<td>데드락 감지기 없음 → 영원히 살아있는 좀비</td>\n<td>외부 <code>curl</code> 타임아웃, 마지막 로그 갱신 정지</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h2 id=\"8\">8. 학습 체크리스트 — 미션 끝난 뒤 스스로 확인<a class=\"headerlink\" href=\"#8\" title=\"Permanent link\">#</a></h2>\n<p>리포트를 다 쓰고 나서, 아래 질문에 <strong>자기 말로</strong> 답할 수 있어야 한다. 답이 막히면 그 부분을 다시 읽고 코드/로그를 재확인하거나, 해당 <a href=\"용어집.md\">용어집</a> 항목을 다시 읽을 것.</p>\n<h3 id=\"81\">8.1 메모리<a class=\"headerlink\" href=\"#81\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>[ ] Heap, Stack, Data 영역의 차이를 한 줄씩 설명할 수 있다.</li>\n<li>[ ] RSS 와 VSZ 의 차이를 사례로 설명할 수 있다.</li>\n<li>[ ] 가상 메모리가 왜 \"환상\" 인지, 페이지 폴트가 무엇인지 설명할 수 있다.</li>\n<li>[ ] 커널 OOM Killer 와 이번 미션의 MemoryGuard 가 다른 메커니즘임을 구분할 수 있다.</li>\n<li>[ ] <code>MEMORY_LIMIT</code> 상향이 왜 임시 조치이지 근본 해결이 아닌지 설명할 수 있다.</li>\n<li>[ ] 쓰래싱이 무엇이고 왜 시스템 마비로 이어지는지 설명할 수 있다.</li>\n<li>[ ] lazy allocation 때문에 VSZ 와 RSS 가 다르다는 사실을 사례로 설명할 수 있다.</li>\n</ul>\n<h3 id=\"82-cpu\">8.2 CPU / 스케줄링<a class=\"headerlink\" href=\"#82-cpu\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>[ ] 프로세스와 스레드의 차이를 5가지 항목으로 비교할 수 있다.</li>\n<li>[ ] <code>top</code> 의 <code>%CPU</code> 가 왜 100% 를 넘을 수 있는지 설명할 수 있다.</li>\n<li>[ ] CFS 의 핵심 직관(\"vruntime 가장 작은 놈\") 을 한 줄로 말할 수 있다.</li>\n<li>[ ] FCFS / RR / Priority 의 외부 관측 시그니처를 구분할 수 있다.</li>\n<li>[ ] SIGTERM 과 SIGKILL 의 차이, Watchdog 이 왜 SIGTERM 인지 설명할 수 있다.</li>\n<li>[ ] 컨텍스트 스위치가 무엇이고 왜 비용이 드는지 설명할 수 있다.</li>\n<li>[ ] 타임 슬라이스의 길이가 응답성과 처리량에 어떤 트레이드오프를 만드는지 설명할 수 있다.</li>\n</ul>\n<h3 id=\"83\">8.3 멀티프로세싱 / 멀티스레딩<a class=\"headerlink\" href=\"#83\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>[ ] 동시성과 병렬성의 차이를 비유로 설명할 수 있다.</li>\n<li>[ ] fork 와 exec 가 각각 무엇을 하는지, 셸이 명령어를 실행할 때 어떻게 쓰이는지 설명할 수 있다.</li>\n<li>[ ] Copy-on-Write 가 fork 비용을 어떻게 줄이는지 설명할 수 있다.</li>\n<li>[ ] 멀티프로세싱 vs 멀티스레딩의 5가지 트레이드오프를 말할 수 있다.</li>\n<li>[ ] Python GIL 이 무엇이고, 왜 CPU-bound 작업에서 멀티스레드가 효과 없는지 설명할 수 있다.</li>\n<li>[ ] CPU-bound 와 I/O-bound 작업의 정의와 적합한 동시성 모델을 매핑할 수 있다.</li>\n<li>[ ] 암달의 법칙 공식을 외우고, 직렬 5% 일 때 천장이 20배인 이유를 설명할 수 있다.</li>\n<li>[ ] Producer-Consumer / Thread Pool / Fork-Join 패턴의 차이를 비유로 설명할 수 있다.</li>\n</ul>\n<h3 id=\"84\">8.4 동시성 / 데드락<a class=\"headerlink\" href=\"#84\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>[ ] Race condition 의 예시를 코드로 그려 보일 수 있다.</li>\n<li>[ ] 데드락 4대 조건을 외울 수 있고, 각각을 깨는 전략을 하나씩 말할 수 있다.</li>\n<li>[ ] 식사하는 철학자 문제로 데드락을 설명할 수 있다.</li>\n<li>[ ] 외부에서 데드락을 증명하기 위해 어떤 6 가지 증거를 모아야 하는지 말할 수 있다.</li>\n<li>[ ] <code>wchan = futex_wait_queue_me</code> 가 왜 결정적 단서인지 설명할 수 있다.</li>\n<li>[ ] 뮤텍스·세마포어·컨디션 변수의 차이를 사례로 설명할 수 있다.</li>\n<li>[ ] 데드락과 기아(starvation)가 다른 개념임을 설명할 수 있다.</li>\n</ul>\n<h3 id=\"85\">8.5 운영 도구<a class=\"headerlink\" href=\"#85\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>[ ] <code>ps</code>, <code>top</code>, <code>/proc</code> 이 어떤 관계인지 (<code>/proc</code> 이 원본) 설명할 수 있다.</li>\n<li>[ ] 데드락 진단에 <code>top -H</code> 와 <code>ps -L</code> 이 필수인 이유를 말할 수 있다.</li>\n<li>[ ] <code>monitor.sh</code> 가 모은 데이터가 왜 장애 분석의 \"최초 단서\" 가 되는지 설명할 수 있다.</li>\n<li>[ ] <code>vmstat</code> 의 <code>si/so</code> 가 무엇이고 쓰래싱 감지에 어떻게 쓰는지 설명할 수 있다.</li>\n<li>[ ] <code>dmesg</code> 에서 무엇을 찾아야 하는지 (특히 OOM Killer) 설명할 수 있다.</li>\n</ul>\n<hr />\n<p>학습자가 이 문서의 모든 표·흐름·용어를 머릿속에서 그릴 수 있다면, \"로그가 이렇게 찍혔다 → 그래서 원인은 X 다\" 라는 추론을 자신감 있게 리포트에 쓸 수 있다. 그게 이번 미션의 진짜 목표다.</p>\n<p>각 용어의 자세한 정의·비유·중요성은 <a href=\"용어집.md\">용어집</a>을, 학습 자료·<code>man</code> 페이지 통독 목록·시스템 호출 추적 도구는 <a href=\"용어집.md#참고--더-깊이-가고-싶을-때\">용어집의 부록</a>을 참고하라.</p>", "toc": "<div class=\"toc\">\n<ul>\n<li><a href=\"#0\">0. 왜 이론을 알아야 하는가</a></li>\n<li><a href=\"#1\">1. 컴퓨터 구조 기초 — 폰 노이만 모델</a><ul>\n<li><a href=\"#11\">1.1 모든 것이 메모리에 있다</a></li>\n<li><a href=\"#12\">1.2 폰 노이만 병목 — \"메모리는 항상 느리다\"</a></li>\n</ul>\n</li>\n<li><a href=\"#2-oom\">2. 메모리 구조 — 가상 메모리부터 OOM 까지</a><ul>\n<li><a href=\"#21\">2.1 프로세스의 가상 메모리 레이아웃</a></li>\n<li><a href=\"#22-virtual-memory-os\">2.2 가상 메모리(Virtual Memory) — OS 가 보여주는 환상</a></li>\n<li><a href=\"#23-rss-vs-vsz-ps-top\">2.3 RSS vs VSZ — ps, top 의 메모리 컬럼</a></li>\n<li><a href=\"#24-oom-out-of-memory\">2.4 OOM (Out-Of-Memory) — 두 가지 트리거</a><ul>\n<li><a href=\"#1-oom-killer\">1) 커널의 OOM Killer</a></li>\n<li><a href=\"#2-memoryguard\">2) 앱 내부의 메모리 보호 정책 (이번 미션 — MemoryGuard)</a></li>\n</ul>\n</li>\n<li><a href=\"#25-memory_limit\">2.5 환경변수 MEMORY_LIMIT 의 의미</a></li>\n</ul>\n</li>\n<li><a href=\"#3-cpu\">3. CPU — 프로세스 · 스레드 · 스케줄링</a><ul>\n<li><a href=\"#31-vs\">3.1 프로세스 vs 스레드 (개요)</a></li>\n<li><a href=\"#32-cpu-cpu-100\">3.2 CPU 사용률(%CPU)이 100% 가 넘는 이유</a></li>\n<li><a href=\"#33-linux-cfs\">3.3 스케줄러 — Linux CFS 의 핵심 직관</a><ul>\n<li><a href=\"#_1\">보너스 과제와의 연결</a></li>\n</ul>\n</li>\n<li><a href=\"#34-watchdog-cpu\">3.4 Watchdog — CPU 과점유 보호 정책</a></li>\n</ul>\n</li>\n<li><a href=\"#4\">4. 멀티프로세싱 · 멀티스레딩 — 병렬 실행의 이론과 실제</a><ul>\n<li><a href=\"#41-concurrency-vs-parallelism\">4.1 동시성(Concurrency) vs 병렬성(Parallelism) — 두 개념의 분리</a></li>\n<li><a href=\"#42\">4.2 멀티프로세싱 — 격리된 주소공간의 협업</a><ul>\n<li><a href=\"#fork\">fork() — 자기 복제</a></li>\n<li><a href=\"#copy-on-write-fork\">Copy-on-Write — fork 가 가난해지지 않는 이유</a></li>\n<li><a href=\"#exec\">exec() — 자기를 다른 프로그램으로 교체</a></li>\n<li><a href=\"#clone\">clone() — 리눅스의 통합 인터페이스</a></li>\n</ul>\n</li>\n<li><a href=\"#43\">4.3 멀티스레딩 — 공유 주소공간의 협업</a></li>\n<li><a href=\"#44-vs\">4.4 멀티프로세싱 vs 멀티스레딩 — 비용·이점 비교표</a></li>\n<li><a href=\"#45-python-gil\">4.5 Python 의 GIL — 왜 멀티스레딩이 마법 같지 않은가</a><ul>\n<li><a href=\"#gil\">왜 GIL 이 존재하는가</a></li>\n<li><a href=\"#cpu-bound-io-bound\">CPU-bound 와 I/O-bound 의 갈림길</a></li>\n<li><a href=\"#gil_1\">GIL 우회 전략</a></li>\n</ul>\n</li>\n<li><a href=\"#46\">4.6 자주 쓰는 동시 실행 패턴</a><ul>\n<li><a href=\"#producer-consumer-\">Producer-Consumer (생산자-소비자)</a></li>\n<li><a href=\"#thread-pool\">Thread Pool (스레드 풀)</a></li>\n<li><a href=\"#fork-join-\">Fork-Join (분할-합치기)</a></li>\n</ul>\n</li>\n<li><a href=\"#47\">4.7 암달의 법칙 — 병렬화의 수학적 한계</a></li>\n<li><a href=\"#48\">4.8 어떤 모델을 언제 쓰는가 — 결정 가이드</a></li>\n<li><a href=\"#49-multi_thread_enable\">4.9 미션 연결 — MULTI_THREAD_ENABLE 의 정체</a></li>\n</ul>\n</li>\n<li><a href=\"#5\">5. 동시성 · 락 · 데드락</a><ul>\n<li><a href=\"#51\">5.1 왜 락이 필요한가 — 공유 자원 문제</a></li>\n<li><a href=\"#52-4-coffman-conditions\">5.2 데드락의 4대 필요조건 (Coffman conditions)</a></li>\n<li><a href=\"#53\">5.3 식사하는 철학자 문제 — 데드락의 표준 비유</a></li>\n<li><a href=\"#54\">5.4 어떻게 외부에서 데드락을 진단하는가</a></li>\n<li><a href=\"#55-wchan\">5.5 wchan 이 결정적인 이유</a></li>\n</ul>\n</li>\n<li><a href=\"#6\">6. 시스템 관제 도구 정리 (이번 미션에서 자주 쓰는 것 위주)</a></li>\n<li><a href=\"#7-3\">7. 미션 3대 장애 — 이론과 관제 데이터의 매핑</a><ul>\n<li><a href=\"#71-oom-memory-leak\">7.1 OOM (Memory Leak)</a></li>\n<li><a href=\"#72-cpu-spike\">7.2 CPU Spike</a></li>\n<li><a href=\"#73-deadlock\">7.3 Deadlock</a></li>\n</ul>\n</li>\n<li><a href=\"#8\">8. 학습 체크리스트 — 미션 끝난 뒤 스스로 확인</a><ul>\n<li><a href=\"#81\">8.1 메모리</a></li>\n<li><a href=\"#82-cpu\">8.2 CPU / 스케줄링</a></li>\n<li><a href=\"#83\">8.3 멀티프로세싱 / 멀티스레딩</a></li>\n<li><a href=\"#84\">8.4 동시성 / 데드락</a></li>\n<li><a href=\"#85\">8.5 운영 도구</a></li>\n</ul>\n</li>\n</ul>\n</div>\n"}, {"title": "용어집", "file": "docs/md/용어집.md", "html": "<h1 id=\"b1-2\">용어집 — B1-2 미션에서 쓰이는 개념·도구·약어 사전<a class=\"headerlink\" href=\"#b1-2\" title=\"Permanent link\">#</a></h1>\n<blockquote>\n<p>이 문서는 <a href=\"이론_지식.md\">이론 지식</a> 본문에 등장하는 모든 전문 용어를 한 줄 정의 + 비유 + 왜 중요한가 의 3단 구조로 정리한다.\n본문에서 용어 위의 하이퍼링크를 클릭하면 이 문서의 해당 항목으로 바로 이동하고, 좌측 사이드바의 \"이론 지식\" 을 다시 클릭하면 본문으로 돌아온다.</p>\n<p><strong>읽는 순서 추천</strong>: 처음부터 통독할 필요는 없다. 본문 읽다가 모르는 용어가 나오면 클릭해서 정의만 보고 돌아가면 된다.</p>\n</blockquote>\n<hr />\n<h2 id=\"1\">1. 컴퓨터 구조 기초<a class=\"headerlink\" href=\"#1\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"syscall\">시스템 콜 (System Call)<a class=\"headerlink\" href=\"#syscall\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의
