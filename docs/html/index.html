</strong>: 일반 프로그램(앱)이 운영체제(OS)에게 \"이 일 좀 대신 해 줘\" 라고 부탁하는 공식 통로. <code>malloc</code> 으로 메모리 달라고 하기, <code>open</code> 으로 파일 열기, <code>read/write</code> 로 디스크 읽기/쓰기 등 — 결국 다 시스템 콜이다.</li>\n<li><strong>비유</strong>: 식당에서 손님(앱)이 주방(OS)에 \"물 좀 더 주세요\" 라고 말하는 행위. 손님이 주방에 직접 들어가지는 않고, 정해진 호출 창구로만 요청한다.</li>\n<li><strong>왜 중요한가</strong>: 모든 자원(메모리·CPU 시간·디스크·네트워크)은 OS 가 관리하므로, 앱이 무슨 사고를 치든 그 흔적은 결국 시스템 콜 어딘가에 남는다. 장애 분석의 출발점이 된다.</li>\n</ul>\n<h3 id=\"os-kernel-userspace\">운영체제 · 커널 · 유저 공간<a class=\"headerlink\" href=\"#os-kernel-userspace\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>OS (운영체제)</strong>: 컴퓨터의 모든 자원(CPU·메모리·디스크·네트워크)을 관리하고, 앱들이 안전하게 공유하도록 중재하는 거대한 프로그램. 리눅스·윈도우·macOS 가 OS 다.</li>\n<li><strong>커널 (Kernel)</strong>: OS 의 핵심 부분으로, 가장 강한 권한을 가지고 하드웨어를 직접 다루는 코드. \"리눅스 커널\" 이라고 부르는 그것.</li>\n<li><strong>유저 공간 (User Space)</strong>: 일반 앱이 실행되는 영역. 권한이 약해서 하드웨어를 직접 못 만지고, <a href=\"#syscall\">시스템 콜</a>로 커널에 부탁해야 한다.</li>\n<li><strong>비유</strong>: 운영체제 = 빌딩 전체 시스템. 커널 = 시설관리실(전기·수도·엘리베이터 직접 통제). 유저 공간 = 사무실(직원이 일하지만 시설은 못 만짐).</li>\n<li><strong>왜 중요한가</strong>: \"내가 짠 앱\" 은 유저 공간에서 돈다. 메모리 할당·스레드 생성·파일 쓰기 등은 다 커널에 시스템 콜로 부탁하는 거다. 그래서 <em>앱 로그</em> 와 <em>커널 로그(dmesg)</em> 두 군데를 다 봐야 장애 전모를 본다.</li>\n</ul>\n<h3 id=\"von-neumann\">폰 노이만 구조 (von Neumann architecture)<a class=\"headerlink\" href=\"#von-neumann\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 1945년 수학자 John von Neumann 이 정리한 컴퓨터 모델로, \"코드와 데이터를 같은 메모리에 두고, CPU 가 그 메모리에서 한 단어씩 가져와 실행한다\" 는 설계.</li>\n<li><strong>비유</strong>: 요리사(CPU)와 레시피 + 재료를 같은 책상(메모리) 위에 올려놓고, 요리사가 책상에서 한 줄씩 레시피를 읽으며 재료를 가져다 쓰는 모습.</li>\n<li><strong>왜 중요한가</strong>: 우리가 지금 쓰는 거의 모든 컴퓨터(노트북·서버·스마트폰)가 이 모델을 따르므로, \"코드가 곧 메모리이고, 메모리가 모자라면 코드 실행도 멈춘다\" 는 사실이 자연스러워진다. OOM 이 왜 시스템 마비로 이어지는지의 근본 원인.</li>\n</ul>\n<h3 id=\"cpu\">CPU (Central Processing Unit)<a class=\"headerlink\" href=\"#cpu\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 컴퓨터의 \"두뇌\". 메모리에 적힌 명령어를 하나씩 꺼내 실행하는 하드웨어 칩.</li>\n<li><strong>비유</strong>: 식당의 요리사. 주문(명령어)을 받아 정해진 동작(더하기·곱하기·메모리 읽기 등)을 수행한다.</li>\n<li><strong>왜 중요한가</strong>: CPU 가 100% 점유되면 다른 작업이 못 들어간다. 이번 미션의 CPU Spike 가 그 결과다.</li>\n</ul>\n<h3 id=\"throughput-vs-latency\">스루풋 (Throughput) vs 지연시간 (Latency)<a class=\"headerlink\" href=\"#throughput-vs-latency\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>스루풋</strong>: 단위 시간당 처리 가능한 작업량 (예: 초당 요청 1만 건)</li>\n<li><strong>지연시간</strong>: 작업 하나가 끝나는 데 걸리는 시간 (예: 요청 한 건당 5ms)</li>\n<li><strong>비유</strong>: 식당에서 스루풋 = \"1시간에 손님 몇 명 받나\", 지연시간 = \"손님 한 명이 음식 받기까지 얼마나 걸리나\".</li>\n<li><strong>왜 중요한가</strong>: 둘이 다른 개념인데 흔히 헷갈린다. CPU 코어가 많아지면 스루풋이 늘지만 한 작업의 지연시간은 그대로일 수 있다.</li>\n</ul>\n<h3 id=\"time-units\">시간 단위 (ns / µs / ms / s)<a class=\"headerlink\" href=\"#time-units\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li>1 초 (s) = 1,000 밀리초 (ms)</li>\n<li>1 밀리초 (ms) = 1,000 마이크로초 (µs)</li>\n<li>1 마이크로초 (µs) = 1,000 나노초 (ns)</li>\n<li>즉 1 초 = 1,000,000,000 나노초.</li>\n<li><strong>비유</strong>: 1초가 1년이라면, 1ms = 8시간, 1µs = 30초, 1ns = 0.03초.</li>\n<li><strong>왜 중요한가</strong>: 레지스터(0.3ns)와 HDD(10ms)의 차이는 <strong>3300만 배</strong>다. 작은 단위라고 무시하면 안 된다.</li>\n</ul>\n<h3 id=\"concurrency-vs-parallelism\">동시성 (Concurrency) vs 병렬성 (Parallelism)<a class=\"headerlink\" href=\"#concurrency-vs-parallelism\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>동시성</strong>: 여러 일이 진행 중인 <em>것처럼</em> 보이는 상태. 코어가 1개여도 <a href=\"#scheduler\">스케줄러</a>가 짧은 시간 단위로 <a href=\"#thread\">스레드</a>들을 번갈아 돌리면 <em>겉으로는</em> 동시 같다.</li>\n<li><strong>병렬성</strong>: <em>진짜로</em> 같은 시각에 여러 일이 실행되는 상태. 멀티코어에서만 가능.</li>\n<li><strong>비유</strong>: 동시성 = 1명의 요리사가 라면·김밥·떡볶이를 30초마다 번갈아 만들기. 병렬성 = 요리사 3명이 진짜 동시에 만들기.</li>\n<li><strong>왜 중요한가</strong>: 데드락은 <em>동시성</em> 이 만드는 문제이지 <em>병렬성</em> 이 만드는 게 아니다. 1 코어 머신에서도 멀티스레드면 데드락 가능. 집합 관계는 동시성 ⊃ 병렬성.</li>\n</ul>\n<h3 id=\"cpu-vs-io-bound\">CPU-bound vs I/O-bound<a class=\"headerlink\" href=\"#cpu-vs-io-bound\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>CPU-bound 작업</strong>: 대부분의 시간을 <em>계산</em> 에 쓰는 작업. 이미지 처리, 압축, 암호화, 수치 시뮬레이션.</li>\n<li><strong>I/O-bound 작업</strong>: 대부분의 시간을 <em>기다림</em> 에 쓰는 작업. HTTP 요청, DB 쿼리, 파일 읽기/쓰기, 네트워크 송수신.</li>\n<li><strong>비유</strong>: CPU-bound = 시험 문제를 계속 푸는 학생. I/O-bound = 식당에서 주문하고 음식 나오기를 기다리는 손님.</li>\n<li><strong>왜 중요한가</strong>: 어느 쪽인지에 따라 최적의 병렬화 전략이 다르다. CPU-bound 는 <a href=\"#py-multiprocessing\">멀티프로세싱</a> 이 답이고, I/O-bound 는 <a href=\"#asyncio\">asyncio</a> 나 멀티스레드가 답. Python 의 <a href=\"#gil\">GIL</a> 은 CPU-bound 멀티스레드를 막지만 I/O-bound 는 허용한다.</li>\n</ul>\n<hr />\n<h2 id=\"2-storage-hierarchy\">2. 저장 계층 (Storage Hierarchy)<a class=\"headerlink\" href=\"#2-storage-hierarchy\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"register\">레지스터 (Register)<a class=\"headerlink\" href=\"#register\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: CPU 칩 <em>안에</em> 있는 가장 빠른 저장 공간. 보통 64비트짜리가 십수 개 있다.</li>\n<li><strong>비유</strong>: 요리사의 양손. 지금 이 순간 만지고 있는 재료 한두 개만 들 수 있다.</li>\n<li><strong>왜 중요한가</strong>: CPU 가 진짜로 계산하는 건 레지스터 위에서다. 메모리에서 값을 꺼내 레지스터에 올리고, 계산하고, 다시 메모리에 적는 순환을 끝없이 반복한다.</li>\n</ul>\n<h3 id=\"cache\">캐시 · L1 / L2 / L3 (Cache)<a class=\"headerlink\" href=\"#cache\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: CPU 와 DRAM 사이에 끼워 놓은 작은 고속 메모리. L1 이 가장 작고(수십 KB) 빠르고, L3 가 가장 크고(수십 MB) 느리다.</li>\n<li><strong>비유</strong>: 책상 서랍 3단. 1단 서랍(L1)은 손 뻗으면 닿지만 작고, 3단(L3)은 약간 멀지만 더 많이 들어간다. 책장(<a href=\"#dram\">DRAM</a>)까지 가는 건 더 멀다.</li>\n<li><strong>왜 중요한가</strong>: 같은 데이터를 반복해 쓰면 캐시 덕분에 무지 빠르다. 반대로 메모리 누수로 캐시가 자주 갈리면 (= \"캐시 미스\") CPU 가 매번 DRAM 까지 가야 하니 느려진다.</li>\n</ul>\n<h3 id=\"dram\">DRAM (= RAM)<a class=\"headerlink\" href=\"#dram\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 우리가 흔히 \"메모리\" 라 부르는 그것. 전원이 꺼지면 내용이 사라지는 휘발성 저장소.</li>\n<li><strong>비유</strong>: 책장. 책상보다는 크지만 멀고, 정전되면 책이 다 사라지는 마법의 책장.</li>\n<li><strong>왜 중요한가</strong>: 모든 실행 중인 프로그램과 데이터가 여기에 있다. <code>free</code>, <code>%MEM</code> 이 가리키는 게 바로 DRAM 사용량. 가득 차면 OS 가 디스크로 내쫓기 시작한다.</li>\n</ul>\n<h3 id=\"disk\">디스크 · SSD · HDD<a class=\"headerlink\" href=\"#disk\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>HDD (Hard Disk Drive)</strong>: 회전판에 자기로 데이터를 적는 전통적 디스크. 느림.</li>\n<li><strong>SSD (Solid State Drive)</strong>: 플래시 메모리 기반. HDD 보다 약 100배 빠름.</li>\n<li>둘 다 전원이 꺼져도 내용이 남는 비휘발성 저장소.</li>\n<li><strong>비유</strong>: 도서관. 책장에 없는 책을 찾으러 가는 곳. SSD 는 가까운 도서관, HDD 는 다른 도시 도서관.</li>\n<li><strong>왜 중요한가</strong>: <a href=\"#dram\">DRAM</a> 이 다 차면 OS 가 페이지를 SSD/HDD 의 스왑 영역으로 옮긴다. 옮긴 페이지가 다시 필요하면 SSD/HDD 에서 읽어와야 하니 갑자기 100~10000배 느려진다 (= <a href=\"#swap-thrashing\">쓰래싱</a>).</li>\n</ul>\n<h3 id=\"swap-thrashing\">페이지 교체 · 스왑 · 쓰래싱<a class=\"headerlink\" href=\"#swap-thrashing\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>페이지 교체</strong>: <a href=\"#dram\">DRAM</a> 이 모자라면 OS 가 자주 안 쓰는 <a href=\"#page\">페이지</a>(4KB 덩어리)를 골라 디스크로 옮기는 행위.</li>\n<li><strong>스왑 (Swap)</strong>: 그렇게 디스크로 옮겨두는 전용 영역. 리눅스에서는 swap 파일/파티션.</li>\n<li><strong>쓰래싱 (Thrashing)</strong>: 페이지를 디스크로 옮기자마자 다시 필요해져서, \"DRAM ↔ 디스크\" 왕복만 반복하며 진짜 일은 못 하는 상태.</li>\n<li><strong>비유</strong>: 책상이 좁아서 안 쓰는 책을 도서관에 반납했는데, 반납하자마자 그 책이 또 필요해져서 다시 빌리러 가는 사람. 결국 책상에서 공부는 못 하고 도서관만 왔다갔다 한다.</li>\n<li><strong>왜 중요한가</strong>: 쓰래싱이 시작되면 <em>겉으로는</em> \"메모리는 아직 100%는 아닌데 CPU 도 멀쩡한데 시스템이 멈췄다\" 처럼 보인다. monitor.log 의 MEM 이 95% 근처에서 CPU 도 같이 치솟는다면 쓰래싱 의심.</li>\n</ul>\n<hr />\n<h2 id=\"3\">3. 프로세스와 메모리 구조<a class=\"headerlink\" href=\"#3\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"process\">프로세스 (Process)<a class=\"headerlink\" href=\"#process\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 실행 중인 프로그램 한 인스턴스. 디스크에 있는 실행 파일을 OS 가 메모리에 올려서 돌리면, 그 살아 있는 단위 하나가 프로세스.</li>\n<li><strong>비유</strong>: 책장에 꽂힌 요리책(실행 파일) vs 그 레시피로 지금 요리하고 있는 요리사 한 명(프로세스). 같은 책으로 두 요리사가 동시에 요리하면 프로세스 2개.</li>\n<li><strong>왜 중요한가</strong>: <code>ps</code>, <code>top</code>, <code>kill &lt;PID&gt;</code> 등 우리가 다루는 모든 단위가 프로세스다. 각 프로세스는 자기만의 <a href=\"#virtual-address-space\">가상 주소 공간</a>을 가진다.</li>\n</ul>\n<h3 id=\"pid\">PID (Process ID)<a class=\"headerlink\" href=\"#pid\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 실행 중인 모든 <a href=\"#process\">프로세스</a>에 OS 가 붙이는 고유 번호.</li>\n<li><strong>비유</strong>: 식당 손님의 대기번호. 같은 번호는 같은 시각에 두 명 못 받는다.</li>\n<li><strong>왜 중요한가</strong>: 데드락 미션에서 \"PID 가 살아있다(<code>ps -ef | grep</code>)\" 가 1차 증거다. 프로세스가 죽었으면 PID 도 사라진다.</li>\n</ul>\n<h3 id=\"virtual-address-space\">가상 주소 공간 (Virtual Address Space)<a class=\"headerlink\" href=\"#virtual-address-space\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#process\">프로세스</a>마다 OS 가 만들어주는 \"자기 전용 메모리 환상\". 실제 <a href=\"#dram\">DRAM</a> 의 어디에 있든, 프로세스는 0번지부터 거대한 연속 공간을 자기가 다 쓰는 것처럼 느낀다.</li>\n<li><strong>비유</strong>: 호텔 객실. 모든 객실은 \"방번호 1번\" 부터 시작하는 듯한 도면을 갖지만, 실제로는 빌딩의 다른 층, 다른 위치에 있다. 옆방의 도면을 봐도 자기 방 안은 못 본다(메모리 격리).</li>\n<li><strong>왜 중요한가</strong>: 가상 주소 공간 덕분에 (1) 프로세스 간 격리 (한 앱 버그가 다른 앱 메모리를 못 망침), (2) DRAM 보다 큰 메모리도 마치 있는 것처럼 쓸 수 있음(스왑 활용) 이 가능하다.</li>\n</ul>\n<h3 id=\"memory-segments\">Heap · Stack · Data · BSS · Text<a class=\"headerlink\" href=\"#memory-segments\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의 (한 줄씩)</strong>:</li>\n<li><strong>Text (Code)</strong>: 프로그램의 기계어 명령. 읽기 전용.</li>\n<li><strong>Data</strong>: <code>int x = 5;</code> 처럼 초기값 있는 전역/정적 변수.</li>\n<li><strong>BSS</strong>: <code>int y;</code> 처럼 초기값 없는 전역/정적 변수. (0 으로 자동 초기화)</li>\n<li><strong>Heap (힙)</strong>: 프로그램이 실행 중에 동적으로 할당받는 영역. <code>malloc()</code>, <code>new</code>, Python 객체 생성 등.</li>\n<li><strong>Stack (스택)</strong>: 함수가 호출될 때마다 새 칸이 위에 쌓이는 영역. 지역 변수·매개변수·반환 주소가 들어감.</li>\n<li><strong>비유</strong>: 식당 주방의 구역들. Text = 메뉴판(못 바꿈), Data/BSS = 주방장이 미리 만들어둔 소스 통, Heap = 손님 주문대로 그때그때 만드는 음식 보관함(계속 변함), Stack = 지금 만드는 한 요리에 쓰는 임시 도마(만들고 치움).</li>\n<li><strong>왜 중요한가</strong>: 메모리 누수는 <em>거의 항상</em> Heap 에서 일어난다. Stack 은 함수 끝나면 자동 정리되니까. 그래서 누수 분석은 Heap 사용량(= <a href=\"#vsz-vs-rss\">RSS</a>)추이만 봐도 충분.</li>\n</ul>\n<h3 id=\"malloc-free-gc\">malloc / free / 가비지 컬렉터 (GC)<a class=\"headerlink\" href=\"#malloc-free-gc\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><code>malloc()</code>: C 언어에서 <a href=\"#memory-segments\">Heap</a>에 메모리 달라는 함수. (\"malloc\" = memory allocate)</li>\n<li><code>free()</code>: 다 쓴 메모리를 반납하는 함수. C 에서는 <em>손으로</em> 호출해야 함.</li>\n<li><strong>GC (Garbage Collector)</strong>: Python/Java 등 일부 언어가 자동으로 \"이 객체 더 이상 쓸 사람 없네\" 라고 판단해 메모리를 회수해주는 시스템.</li>\n<li><strong>비유</strong>: 도서관에서 책을 빌리는 것(malloc) ↔ 반납하는 것(free). GC 는 \"한 달 동안 안 본 책은 자동 반납됨\" 같은 자동화 시스템.</li>\n<li><strong>왜 중요한가</strong>: GC 가 있어도 <em>어딘가에서 그 객체를 참조하고 있으면</em> GC 는 못 치운다. 전역 리스트에 자꾸 append 하면서 안 비우면 GC 도 \"이거 누가 쓰고 있는 거 같은데?\" 하고 그냥 둔다 → 메모리 누수.</li>\n</ul>\n<h3 id=\"elf\">ELF (Executable and Linkable Format)<a class=\"headerlink\" href=\"#elf\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 리눅스의 표준 실행 파일 형식. 윈도우의 <code>.exe</code> 에 해당.</li>\n<li><strong>비유</strong>: 실행 파일이 담긴 도시락 박스. 표지에 \"이 도시락 안에 코드는 여기, 데이터는 여기\" 식의 색인이 있어 OS 가 그걸 보고 메모리에 펼친다.</li>\n<li><strong>왜 중요한가</strong>: <code>agent-leak-app</code> 도 ELF 다 (<code>file agent-leak-app</code> 으로 확인 가능). 부팅 시 로더가 ELF 의 <a href=\"#memory-segments\">Text/Data 영역</a>을 <a href=\"#virtual-address-space\">가상 메모리</a>에 펼친다.</li>\n</ul>\n<h3 id=\"page\">페이지 · 4 KB<a class=\"headerlink\" href=\"#page\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 가상 메모리 ↔ 물리 메모리 매핑을 관리하는 최소 단위. 거의 모든 현대 OS 에서 4096 바이트(4 KB).</li>\n<li><strong>비유</strong>: 책의 한 페이지. 책을 한 글자 단위로 도서관에서 빌리고 반납하면 비효율적이니, \"페이지 단위로 빌린다\" 고 정한 셈.</li>\n<li><strong>왜 중요한가</strong>: OS 는 메모리를 페이지 단위로 할당·회수·스왑한다. 1 바이트만 써도 4 KB 가 할당된다(= 내부 단편화). 메모리 누수도 결국 페이지 단위 누적.</li>\n</ul>\n<h3 id=\"mmu\">MMU (Memory Management Unit)<a class=\"headerlink\" href=\"#mmu\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: CPU 칩 안에 있는 하드웨어로, <a href=\"#process\">프로세스</a>가 보는 가상 주소를 실제 <a href=\"#dram\">DRAM</a> 의 물리 주소로 <em>매번</em> 자동 변환해주는 장치.</li>\n<li><strong>비유</strong>: 호텔 객실 번호(가상) → 실제 빌딩 층/방 번호(물리) 를 즉시 알려주는 안내원.</li>\n<li><strong>왜 중요한가</strong>: 이게 없다면 <a href=\"#virtual-address-space\">가상 메모리</a>도 없고, 프로세스 격리도 없고, 스왑도 없다. 모든 메모리 시스템의 토대.</li>\n</ul>\n<h3 id=\"page-table-tlb\">페이지 테이블 · TLB<a class=\"headerlink\" href=\"#page-table-tlb\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>페이지 테이블</strong>: \"가상 페이지 N 번은 물리 페이지 M 번에 있다\" 같은 매핑 정보가 적힌 거대한 표. 메모리에 있다.</li>\n<li><strong>TLB (Translation Lookaside Buffer)</strong>: 페이지 테이블 검색이 너무 자주 일어나니, <a href=\"#mmu\">MMU</a> 가 최근 매핑 결과를 작은 캐시에 저장. 캐시 히트면 빠르게 변환.</li>\n<li><strong>비유</strong>: 페이지 테이블 = 호텔 객실 도면(분량이 크다). TLB = 안내원이 머리에 외워둔 최근 객실 위치 메모.</li>\n<li><strong>왜 중요한가</strong>: 메모리를 새로 많이 할당하면 TLB 가 자주 갈리고(= miss), 변환만으로도 느려진다. 메모리 누수가 성능 저하를 가속하는 또 하나의 이유. <a href=\"#context-switch\">컨텍스트 스위치</a> 시 TLB 가 통째로 비워지므로 <a href=\"#py-multiprocessing\">멀티프로세싱</a> 이 <a href=\"#pthread\">멀티스레딩</a> 보다 비싼 이유이기도 하다.</li>\n</ul>\n<h3 id=\"page-fault\">페이지 폴트 (Page Fault)<a class=\"headerlink\" href=\"#page-fault\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#process\">프로세스</a>가 어떤 가상 주소를 건드렸는데, 해당 <a href=\"#page\">페이지</a>가 아직 <a href=\"#dram\">DRAM</a> 에 없거나 매핑이 안 돼 있을 때 발생하는 이벤트. CPU 가 커널에게 \"이 페이지 좀 채워줘\" 라고 호출.</li>\n<li><strong>비유</strong>: 호텔 객실 도면에 있는 방인데 실제로는 아직 가구가 없는 상태로 가니, 안내원이 즉시 가구를 옮겨와 채워주는 행위.</li>\n<li><strong>왜 중요한가</strong>: 페이지 폴트는 <em>정상</em> 동작이다. 처음 할당받은 페이지에 처음 쓰는 순간 항상 발생. 하지만 너무 자주 발생하면(예: 스왑된 페이지를 다시 가져오는 경우) 시스템이 느려진다. <a href=\"#cow\">Copy-on-Write</a> 도 페이지 폴트 메커니즘 위에 얹혀 있다.</li>\n</ul>\n<h3 id=\"lazy-allocation\">lazy allocation (지연 할당)<a class=\"headerlink\" href=\"#lazy-allocation\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#process\">프로세스</a>가 <code>malloc(1GB)</code> 라고 해도 OS 는 진짜 1GB 물리 메모리를 안 준다. <em>프로세스가 그 페이지를 실제로 읽거나 쓰는 순간</em> 에만 물리 페이지를 배정한다.</li>\n<li><strong>비유</strong>: 식당에서 \"10인분 예약\" 했다고 음식을 미리 다 만들어두지 않는다. 손님이 와서 \"이제 주세요\" 할 때마다 한 사람분씩 만든다.</li>\n<li><strong>왜 중요한가</strong>: <a href=\"#vsz-vs-rss\">VSZ vs RSS</a> 의 차이를 만드는 핵심 메커니즘. 누수 추적 시 <em>RSS</em> 만 봐야 하는 이유.</li>\n</ul>\n<h3 id=\"vsz-vs-rss\">VSZ vs RSS<a class=\"headerlink\" href=\"#vsz-vs-rss\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>VSZ (Virtual Size)</strong>: <a href=\"#process\">프로세스</a>가 OS 에 \"이만큼 줘\" 라고 <em>요청한</em> 가상 메모리 총량 (KB 단위). <a href=\"#lazy-allocation\">lazy allocation</a> 때문에 실제 사용량은 더 작을 수 있다.</li>\n<li><strong>RSS (Resident Set Size)</strong>: 그 중에서 <em>지금 <a href=\"#dram\">DRAM</a> 에 진짜 올라와 있는</em> 양. <a href=\"#swap-thrashing\">스왑</a>으로 나간 페이지는 빠진다.</li>\n<li><strong>비유</strong>: 호텔 예약(VSZ) vs 지금 실제 묵고 있는 손님 수(RSS). 1000명 예약해도 80명만 와 있으면 RSS 는 80명분.</li>\n<li><strong>왜 중요한가</strong>: 메모리 누수의 가장 직접적 지표는 RSS 다. VSZ 는 늘었다 줄었다 안 하므로 누수 감지에 둔감하다.</li>\n</ul>\n<h3 id=\"fork-exec\">fork / exec<a class=\"headerlink\" href=\"#fork-exec\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong><code>fork()</code></strong>: 현재 <a href=\"#process\">프로세스</a> 를 <em>자기 복제</em> 하는 시스템 콜. 호출 한 번에 거의 똑같은 프로세스 두 개(부모·자식)가 생긴다. 메모리 상태·열린 파일·환경변수 모두 같지만 <a href=\"#pid\">PID</a> 만 다르다.</li>\n<li><strong><code>exec()</code></strong>: 현재 프로세스의 메모리 이미지를 <em>다른 프로그램으로 교체</em> 하는 시스템 콜. PID 는 유지되지만 코드는 완전히 새것.</li>\n<li><strong>비유</strong>: fork = 나 자신을 복사해서 쌍둥이를 만든다. exec = 그 쌍둥이가 옷·기억·이름표를 한꺼번에 새것으로 바꾼다(PID 라는 사번만 유지).</li>\n<li><strong>왜 중요한가</strong>: 셸이 명령어를 실행할 때마다 <code>fork → exec</code> 패턴을 쓴다. <code>bash</code> 가 <code>ls</code> 를 돌리려면 fork 로 자식을 만들고, 자식이 exec 로 ls 가 된다. 멀티프로세싱 구현의 가장 밑바닥.</li>\n</ul>\n<h3 id=\"cow\">Copy-on-Write (COW)<a class=\"headerlink\" href=\"#cow\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#fork-exec\">fork</a> 후에 부모와 자식이 같은 물리 페이지를 <em>공유</em> 하다가, 어느 한쪽이 페이지에 <em>쓰려는 순간</em> 비로소 페이지를 복사해 둘로 분리하는 최적화. 읽기만 하면 영원히 공유.</li>\n<li><strong>비유</strong>: 같은 책을 둘이 같이 보다가, 한 명이 한 페이지에 메모를 적으려는 순간 그 페이지만 복사해 가져가는 방식.</li>\n<li><strong>왜 중요한가</strong>: 1 GB 짜리 프로세스를 fork 해도 실제 메모리는 거의 안 늘어난다. 그래서 멀티프로세싱이 <em>생각보다</em> 메모리 효율적이다. 단, 시간이 흐르며 페이지가 분리되면 결국 메모리는 늘어난다.</li>\n</ul>\n<h3 id=\"clone-syscall\">clone() 시스템 콜<a class=\"headerlink\" href=\"#clone-syscall\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 리눅스에서 <a href=\"#fork-exec\"><code>fork</code></a> 도 <a href=\"#pthread\"><code>pthread_create</code></a> 도 결국 모두 같은 <code>clone()</code> 시스템 콜의 다른 옵션이다. <code>CLONE_VM</code>·<code>CLONE_FS</code>·<code>CLONE_FILES</code>·<code>CLONE_SIGHAND</code> 등 플래그로 \"메모리도 공유? 파일도 공유? 시그널 핸들러도 공유?\" 를 결정.</li>\n<li><strong>비유</strong>: 한 종류의 \"분신술\" 시스템에서 분신과 본체가 무엇을 공유할지 옵션으로 고를 수 있는 것. fork = 아무것도 공유 안 함. thread = 거의 다 공유.</li>\n<li><strong>왜 중요한가</strong>: 리눅스에서 프로세스와 스레드의 경계가 <em>유연</em> 하다는 의미. 그래서 <code>ps -L</code> 이 스레드 별 정보를 보여줄 수 있다. 커널 입장에서는 같은 <a href=\"#pcb\"><code>task_struct</code></a>.</li>\n</ul>\n<hr />\n<h2 id=\"4\">4. 종료 · 보호 정책 · 환경변수<a class=\"headerlink\" href=\"#4\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"oom-killer\">OOM Killer · <code>oom_score</code><a class=\"headerlink\" href=\"#oom-killer\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>OOM Killer</strong>: 시스템 전체 메모리가 부족해 더는 안 되겠다 싶을 때 리눅스 커널이 발동하는 비상 장치. 누군가 한 명을 죽여서 살아남는다.</li>\n<li><strong><code>oom_score</code></strong>: 커널이 각 프로세스에 매기는 \"이 놈이 죽으면 메모리가 많이 회수될까\" 점수. <a href=\"#vsz-vs-rss\">RSS</a> 가 큰 프로세스일수록 높음. <code>/proc/&lt;pid&gt;/oom_score</code> 에서 확인.</li>\n<li><strong>비유</strong>: 응급 상황에서 함선 무게를 줄여야 할 때, 가장 무거운 짐 한 개를 골라 바다에 던지는 함장.</li>\n<li><strong>왜 중요한가</strong>: OOM Killer 가 발동하면 <em>우리가 죽이고 싶지 않은 중요한 프로세스</em> 가 죽을 수 있다. 그래서 앱 내부에 MemoryGuard 같은 자체 보호 정책을 두는 게 일반적이다.</li>\n</ul>\n<h3 id=\"signal\">시그널 · SIGKILL · SIGTERM<a class=\"headerlink\" href=\"#signal\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#process\">프로세스</a>에게 보내는 짧은 알림. 종류마다 번호와 의미가 다름.</li>\n<li><strong>SIGTERM (15)</strong>: \"끝낼 준비해\" — 프로세스가 받아서 정상 종료 절차(파일 닫기, 락 풀기 등) 수행 가능.</li>\n<li><strong>SIGKILL (9)</strong>: \"지금 즉시 죽여\" — 프로세스가 거부할 수도, 정리할 수도 없다. 무조건 즉사.</li>\n<li><strong>SIGINT (2)</strong>: Ctrl+C 가 보내는 시그널. SIGTERM 비슷한 정상 종료.</li>\n<li><strong>비유</strong>: SIGTERM = \"퇴근 준비하세요\" / SIGKILL = \"당장 나가\" / SIGINT = \"Ctrl+C 누른 사용자의 인내심 끝\".</li>\n<li><strong>왜 중요한가</strong>: MemoryGuard 는 보통 SIGKILL 을 쓰고, <a href=\"#watchdog\">Watchdog</a> 은 SIGTERM 을 쓰는 차이가 있다. 시그널이 뭐였는지를 알면 어떤 정책이 발동했는지 추론 가능.</li>\n</ul>\n<h3 id=\"env-var\">환경변수 (Environment Variable)<a class=\"headerlink\" href=\"#env-var\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 셸/프로세스가 자식 프로세스에게 전달하는 키=값 쌍. <code>export NAME=value</code> 로 설정하고, 프로그램에서 <code>getenv(\"NAME\")</code> 로 읽음.</li>\n<li><strong>비유</strong>: 신입사원이 출근할 때 받는 가이드. \"사무실 전화번호는 X, 이메일은 Y\" 같은 정보를 미리 알려준다.</li>\n<li><strong>왜 중요한가</strong>: <code>agent-leak-app</code> 은 <code>MEMORY_LIMIT</code>, <code>CPU_MAX_OCCUPY</code> 같은 환경변수를 부팅 시 읽고, 이후 행동의 임계치로 쓴다. 환경변수를 바꾸면 코드 재컴파일 없이 정책이 바뀐다.</li>\n</ul>\n<h3 id=\"watchdog\">Watchdog (감시견)<a class=\"headerlink\" href=\"#watchdog\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 어떤 자원의 사용량을 주기적으로 감시하다가, 임계치를 넘으면 미리 정의된 보호 조치(주로 종료)를 발동하는 패턴. 하드웨어 워치독, OS 워치독, 앱 워치독 등 다양한 층위에서 존재.</li>\n<li><strong>비유</strong>: 집의 누전 차단기. 전기를 너무 많이 쓰면 자동으로 차단해서 화재를 막는다.</li>\n<li><strong>왜 중요한가</strong>: \"내가 폭주하면 알아서 자살\" 패턴은 시스템 전체를 지키는 방어선. 이번 미션의 핵심 정책 중 하나.</li>\n</ul>\n<hr />\n<h2 id=\"5\">5. 스레드 · 스케줄링<a class=\"headerlink\" href=\"#5\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"thread\">스레드 (Thread)<a class=\"headerlink\" href=\"#thread\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#process\">프로세스</a> 안에서 따로 실행되는 작업 단위. 같은 프로세스의 메모리·파일·코드를 공유하지만 자기만의 실행 흐름과 <a href=\"#memory-segments\">Stack</a>을 가짐.</li>\n<li><strong>비유</strong>: 한 식당(프로세스) 안의 여러 요리사(스레드). 같은 주방과 재료(메모리)를 공유하면서 각자 다른 요리를 동시에 만든다.</li>\n<li><strong>왜 중요한가</strong>: 멀티스레드는 빠르지만, 같은 자원을 동시에 만지면 충돌(<a href=\"#race-condition\">race condition</a>, <a href=\"#coffman\">데드락</a>)이 생긴다. 이번 미션 3번째 장애의 원인.</li>\n</ul>\n<h3 id=\"pcb\">PCB · <code>task_struct</code><a class=\"headerlink\" href=\"#pcb\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 프로세스/스레드의 상태(레지스터 값, <a href=\"#pid\">PID</a>, 메모리 정보, 열린 파일 목록 등)를 담아두는 OS 내부 자료구조. 리눅스에서는 <code>task_struct</code> 라는 C 구조체.</li>\n<li><strong>비유</strong>: 식당 손님 카드. 손님 번호, 주문 내역, 결제 정보 등을 한 장에 모아둔 것.</li>\n<li><strong>왜 중요한가</strong>: OS 가 <a href=\"#context-switch\">컨텍스트 스위치</a> (다음 스레드로 바꾸기)를 할 때 PCB 의 정보를 저장·복원한다.</li>\n</ul>\n<h3 id=\"context-switch\">컨텍스트 스위치 (Context Switch)<a class=\"headerlink\" href=\"#context-switch\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: CPU 가 지금 돌리던 <a href=\"#thread\">스레드</a>를 멈추고 다른 스레드로 바꾸는 행위. 현재 스레드의 모든 레지스터 값을 <a href=\"#pcb\">PCB</a> 에 저장하고, 새 스레드의 값을 PCB 에서 꺼내 레지스터에 채운다.</li>\n<li><strong>비유</strong>: 요리사가 음식 만들기를 잠시 멈추고, 도마/칼/재료 위치를 메모지에 적어둔 뒤, 다른 요리를 시작. 나중에 돌아오면 그 메모지를 보고 정확히 멈춘 자리부터 재개.</li>\n<li><strong>왜 중요한가</strong>: 컨텍스트 스위치는 공짜가 아니다(수십 µs 비용). 너무 자주 일어나면 정작 일하는 시간보다 바꾸는 시간이 길어진다. 또 <em>프로세스 간</em> 스위치는 <a href=\"#page-table-tlb\">TLB</a> 까지 비워야 해서 <em>스레드 간</em> 스위치보다 훨씬 비싸다.</li>\n</ul>\n<h3 id=\"ipc\">IPC (Inter-Process Communication)<a class=\"headerlink\" href=\"#ipc\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 서로 격리된 <a href=\"#process\">프로세스</a>끼리 데이터를 주고받는 방법들. 파이프·소켓·공유 메모리·시그널 등.</li>\n<li><strong>비유</strong>: 다른 사무실에 있는 동료에게 메모를 보내거나(파이프), 전화하거나(소켓), 공용 게시판에 적거나(공유 메모리), 사내 방송으로 알리는 것(<a href=\"#signal\">시그널</a>).</li>\n<li><strong>왜 중요한가</strong>: 멀티프로세스 설계에서 필수. 메모리가 격리돼 있어 변수 공유가 안 되므로 명시적 통신이 필요. <a href=\"#pthread\">멀티스레딩</a> 에 비해 통신이 <em>명시적이고 비싼</em> 게 멀티프로세싱의 트레이드오프.</li>\n</ul>\n<h3 id=\"core-smt\">CPU 코어 · 하이퍼스레딩<a class=\"headerlink\" href=\"#core-smt\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>코어</strong>: CPU 칩 안에 들어 있는 독립적 처리 유닛. 코어 하나당 동시에 한 <a href=\"#thread\">스레드</a> 실행 가능.</li>\n<li><strong>하이퍼스레딩 (Hyper-Threading, SMT)</strong>: 한 물리 코어가 마치 2개 코어인 것처럼 보이게 하는 인텔/AMD 기술. 4코어 + HT = OS 가 보기엔 8 \"논리 코어\".</li>\n<li><strong>비유</strong>: 코어 = 식당 요리사 인원. HT 는 한 명이 두 일을 번갈아 하는 \"1.5인분\" 효과.</li>\n<li><strong>왜 중요한가</strong>: <code>top</code> 에서 %CPU 가 400% 찍혔다면 \"4코어 다 쓰고 있다\" 라는 뜻. 시스템 전체 사용률은 (총합 / 코어 수) 로 나눠서 봐야 함. <a href=\"#concurrency-vs-parallelism\">병렬성</a> 의 상한은 결국 코어 수.</li>\n</ul>\n<h3 id=\"idle\">idle (유휴 시간)<a class=\"headerlink\" href=\"#idle\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#cpu\">CPU</a> 가 할 일이 없어서 쉬고 있는 시간의 비율. <code>top</code> 의 <code>id</code> 컬럼.</li>\n<li><strong>비유</strong>: 식당 요리사가 주문이 없어 그냥 서 있는 시간의 비율.</li>\n<li><strong>왜 중요한가</strong>: CPU 사용률 = 100% - idle%. <code>monitor.sh</code> 가 사용률을 구하는 공식이 그것.</li>\n</ul>\n<h3 id=\"scheduler\">스케줄러 (Scheduler)<a class=\"headerlink\" href=\"#scheduler\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 여러 <a href=\"#thread\">스레드</a>가 동시에 실행 가능할 때, \"다음으로 어느 스레드에게 CPU 를 줄까\" 를 결정하는 커널의 핵심 모듈.</li>\n<li><strong>비유</strong>: 식당 매니저. 손님이 줄을 서면 누구를 어느 테이블에 보낼지 결정한다.</li>\n<li><strong>왜 중요한가</strong>: 스케줄러 정책이 바뀌면 같은 코드도 다른 속도로 돌 수 있다. \"왜 내 작업이 안 끝나지?\" 의 답이 스케줄러에 있을 때가 많다.</li>\n</ul>\n<h3 id=\"time-slice\">타임 슬라이스 (Time Slice / Quantum)<a class=\"headerlink\" href=\"#time-slice\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 한 <a href=\"#thread\">스레드</a>가 <a href=\"#cpu\">CPU</a> 를 잡고 있을 수 있는 최대 시간. 보통 수 ms 단위. 이 시간이 지나면 <a href=\"#scheduler\">스케줄러</a>가 강제로 다음 스레드로 바꾼다.</li>\n<li><strong>비유</strong>: 회의실 예약 시간. 30분 슬롯이 다 차면 다음 팀에게 양보해야 한다.</li>\n<li><strong>왜 중요한가</strong>: 타임 슬라이스가 짧으면 응답성↑ <a href=\"#context-switch\">컨텍스트 스위치</a>↑(오버헤드↑). 길면 처리량↑ 응답성↓. 트레이드오프의 대표 사례.</li>\n</ul>\n<h3 id=\"cfs\">CFS · <code>vruntime</code><a class=\"headerlink\" href=\"#cfs\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>CFS (Completely Fair Scheduler)</strong>: 리눅스 2.6.23 부터 기본 <a href=\"#scheduler\">스케줄러</a>. \"모든 <a href=\"#thread\">스레드</a>를 가능한 한 <em>공정하게</em> 다루겠다\".</li>\n<li><strong><code>vruntime</code></strong>: 각 스레드가 지금까지 받은 CPU 시간을 가중치로 보정한 \"가상 실행 시간\". 작을수록 우선 실행 대상.</li>\n<li><strong>비유</strong>: CFS = 식당 매니저가 \"오늘 가장 적게 음식 받은 손님에게 다음 음식을 준다\" 정책. vruntime = 손님이 받은 음식 양.</li>\n<li><strong>왜 중요한가</strong>: 공정성을 추구하므로 Round-Robin 과 외형이 비슷하지만, 일부 스레드가 자발적으로 sleep 하거나 <a href=\"#nice\">nice 값</a>이 다르면 비율이 달라진다.</li>\n</ul>\n<h3 id=\"nice\">nice 값 · 우선순위<a class=\"headerlink\" href=\"#nice\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 리눅스에서 <a href=\"#thread\">스레드</a>에 매기는 \"양보 정도\". -20 ~ +19 정수. 음수일수록 더 많은 CPU 시간을 받음, 양수일수록 양보.</li>\n<li><strong>비유</strong>: 회의실 예약 우선권. 임원(낮은 nice)은 먼저 잡고, 일반 직원(높은 nice)은 양보.</li>\n<li><strong>왜 중요한가</strong>: <code>nice</code> / <code>renice</code> 명령으로 조정 가능. 백그라운드 작업은 nice 값을 높여서 시스템 응답성을 지키는 게 정석.</li>\n</ul>\n<h3 id=\"rb-tree\">빨간-검정 트리 (Red-Black Tree)<a class=\"headerlink\" href=\"#rb-tree\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 자가 균형 이진 탐색 트리의 한 종류. 삽입·삭제·탐색이 모두 O(log n) 보장.</li>\n<li><strong>비유</strong>: 자동으로 균형을 유지하는 분류 책장. 어느 책을 찾든 비슷한 시간에 찾을 수 있다.</li>\n<li><strong>왜 중요한가</strong>: <a href=\"#cfs\">CFS</a> 가 \"vruntime 가장 작은 <a href=\"#thread\">스레드</a>\" 를 빨리 찾기 위해 이 자료구조를 쓴다. 스케줄링 결정이 O(log n) 안에 끝나서 스레드 수가 많아도 안정적.</li>\n</ul>\n<h3 id=\"pthread\">POSIX Threads (pthread)<a class=\"headerlink\" href=\"#pthread\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 유닉스 계열의 표준 <a href=\"#thread\">스레드</a> API. <code>pthread_create(&amp;tid, attr, func, arg)</code> 로 생성, <code>pthread_join(tid, &amp;ret)</code> 로 종료 대기, <code>pthread_mutex_*</code> 로 락 관리.</li>\n<li><strong>비유</strong>: 모든 유닉스 식당이 따르는 \"요리사 추가 채용 표준 매뉴얼\". 식당마다 똑같은 양식으로 요리사를 부르고 보낼 수 있다.</li>\n<li><strong>왜 중요한가</strong>: C/C++/Rust 등 시스템 언어의 멀티스레드는 거의 다 pthread 위에 얹혀 있다. Python <code>threading</code> 모듈도 내부적으로 pthread 를 부른다. 리눅스에서는 <a href=\"#clone-syscall\"><code>clone()</code></a> 시스템 콜로 구현.</li>\n</ul>\n<h3 id=\"tls\">TLS (Thread-Local Storage)<a class=\"headerlink\" href=\"#tls\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 같은 <a href=\"#process\">프로세스</a> 안의 <a href=\"#thread\">스레드</a>들이 메모리를 공유하지만, <em>스레드별로 따로 존재하는</em> 변수를 두는 메커니즘. C 에서는 <code>__thread int x</code>, Python 에서는 <code>threading.local()</code>.</li>\n<li><strong>비유</strong>: 식당의 공용 주방에서 각 요리사가 자기만의 도마와 칼을 따로 갖는 것. 재료는 공유하지만 작업 도구는 개인용.</li>\n<li><strong>왜 중요한가</strong>: 멀티스레드에서 \"스레드마다 다른 컨텍스트(예: DB 커넥션, 로깅 prefix)\" 가 필요할 때 <a href=\"#lock-mutex\">락</a> 없이도 안전하게 가질 수 있다. <code>errno</code> 도 TLS 로 구현돼 있어 멀티스레드에서 충돌 안 남.</li>\n</ul>\n<hr />\n<h2 id=\"6\">6. 병렬 실행 모델<a class=\"headerlink\" href=\"#6\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"gil\">GIL (Global Interpreter Lock)<a class=\"headerlink\" href=\"#gil\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: CPython(가장 흔한 Python 구현체) 인터프리터 전체를 하나의 거대한 <a href=\"#lock-mutex\">락</a>으로 묶는 메커니즘. 결과: <strong>같은 프로세스 안에서는 한 번에 <em>오직 한 <a href=\"#thread\">스레드</a>만</em> Python 바이트코드를 실행할 수 있다</strong>.</li>\n<li><strong>비유</strong>: 5인용 회의실에 마이크가 하나뿐인 회의. 5명이 들어와 있어도 마이크 가진 한 명만 발언 가능.</li>\n<li><strong>왜 중요한가</strong>: GIL 때문에 Python 멀티스레드는 <strong><a href=\"#cpu-vs-io-bound\">CPU-bound</a> 작업에는 효과가 없다</strong> (코어가 8개여도 1개만 쓰는 셈). <a href=\"#cpu-vs-io-bound\">I/O-bound</a> 작업은 I/O 대기 중 GIL 이 풀려서 의미가 있음. CPU 병렬화가 필요하면 <a href=\"#py-multiprocessing\">멀티프로세싱</a> 으로 가야 한다. CPython 의 메모리 관리(참조 카운팅)가 스레드-안전하지 않아서 도입된 역사적 결정.</li>\n</ul>\n<h3 id=\"py-multiprocessing\">multiprocessing (Python)<a class=\"headerlink\" href=\"#py-multiprocessing\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: Python 의 표준 멀티프로세스 라이브러리. <code>multiprocessing.Process</code>, <code>Pool</code>, <code>Queue</code> 등을 제공해 <a href=\"#gil\">GIL</a> 을 우회하는 진짜 병렬 실행을 가능하게 한다. 내부적으로 <a href=\"#fork-exec\"><code>fork</code></a> 시스템 콜을 호출.</li>\n<li><strong>비유</strong>: 마이크 하나로 회의가 안 굴러가니, 회의실을 5개로 쪼개서 5개 회의를 동시에 열기.</li>\n<li><strong>왜 중요한가</strong>: CPU-bound Python 작업을 멀티코어로 가속하는 <em>표준</em> 방법. 단점은 <a href=\"#ipc\">IPC</a> 가 명시적이고 비싸다는 것 — 객체를 <a href=\"https://docs.python.org/3/library/pickle.html\">pickle</a> 로 직렬화해서 보내야 함.</li>\n</ul>\n<h3 id=\"asyncio\">asyncio · 이벤트 루프<a class=\"headerlink\" href=\"#asyncio\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 단일 <a href=\"#thread\">스레드</a> 안에서 <em>수많은 동시 작업</em> 을 효율적으로 굴리기 위한 비동기 프로그래밍 모델. Python <code>asyncio</code>, JavaScript Node.js, C 의 libuv 등이 같은 원리.</li>\n<li><strong>이벤트 루프</strong>: \"지금 깨어 있어야 할 작업\" 들의 큐를 돌며 하나씩 실행하다가, I/O 대기에 들어가면 다음 작업으로 넘어가는 단일 스레드 스케줄러.</li>\n<li><strong>비유</strong>: 1명의 손님 응대 직원이 손님 A 에게 \"메뉴 보고 계세요\" 하고 손님 B 응대를 시작, 그 사이 손님 A 가 결정하면 다시 가는 식. 한 명이 100명을 효율적으로 응대.</li>\n<li><strong>왜 중요한가</strong>: I/O-bound 작업에 <a href=\"#thread\">스레드</a> 100개를 만드는 대신 <em>하나의 이벤트 루프</em> 로 처리하면 메모리·컨텍스트 스위치 비용이 훨씬 적다. 단, CPU-bound 작업이 끼면 <em>모든 다른 작업이 같이 멈춘다</em> (이벤트 루프 블로킹).</li>\n</ul>\n<h3 id=\"amdahl\">암달의 법칙 (Amdahl's Law)<a class=\"headerlink\" href=\"#amdahl\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 1967년 Gene Amdahl 이 정리한 병렬화의 수학적 한계.</li>\n<li><strong>Speedup ≤ 1 / ((1 − p) + p / N)</strong> &nbsp;&nbsp; (p = 병렬화 가능한 코드 비율, N = 코어 수)</li>\n<li><strong>비유</strong>: 부엌 일에서 <em>씻기·자르기</em> 는 사람을 늘려 빨라지지만 <em>국 한 솥을 끓이는 시간</em> 은 사람 수 늘려도 안 줄어든다. 끓이는 시간이 직렬 부분.</li>\n<li><strong>왜 중요한가</strong>: 직렬 부분 5% 만 있어도 코어를 <em>무한</em> 으로 늘려도 최대 20배. 50% 직렬이면 최대 2배. 그래서 병렬 시스템 설계의 핵심은 \"직렬 구간을 어떻게 줄이느냐\" 다.</li>\n</ul>\n<h3 id=\"thread-pool\">스레드 풀 (Thread Pool)<a class=\"headerlink\" href=\"#thread-pool\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#thread\">스레드</a>를 그때그때 만들지 않고, <em>미리 N개</em> 를 만들어 두고 작업을 분배하는 패턴. 작업이 끝난 스레드는 다음 작업을 받아 재사용.</li>\n<li><strong>비유</strong>: 콜센터 — 전화 올 때마다 사람 뽑지 않고, 상담사 50명을 미리 대기시켜 두고 들어오는 전화를 분배.</li>\n<li><strong>왜 중요한가</strong>: 스레드 생성·종료 비용이 작업당 비용보다 클 때 큰 차이가 난다. Python <code>concurrent.futures.ThreadPoolExecutor</code>, Java <code>ExecutorService</code> 등이 표준 구현. <a href=\"#py-multiprocessing\">멀티프로세싱</a> 에서도 <code>ProcessPoolExecutor</code>, <code>multiprocessing.Pool</code> 로 같은 패턴.</li>\n</ul>\n<h3 id=\"producer-consumer\">Producer-Consumer (생산자-소비자)<a class=\"headerlink\" href=\"#producer-consumer\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 한 쪽은 작업을 <a href=\"#critical-section\">큐</a>에 <em>생산</em> 하고, 다른 쪽은 큐에서 꺼내 <em>소비</em> 한다. 큐가 비면 소비자가 대기, 가득 차면 생산자가 대기.</li>\n<li><strong>비유</strong>: 카페에서 바리스타(생산자)가 음료를 카운터(큐)에 올리면 손님(소비자)이 가져간다. 카운터 자리가 다 차면 바리스타가 멈추고, 비어 있으면 손님이 기다린다.</li>\n<li><strong>왜 중요한가</strong>: 멀티스레드·멀티프로세스 동시 실행의 가장 흔한 패턴. 큐 자체는 <a href=\"#lock-mutex\">락</a> + <a href=\"#condition-variable\">컨디션 변수</a> 로 구현된다. 데이터 파이프라인의 기본 형태.</li>\n</ul>\n<h3 id=\"fork-join\">Fork-Join (분할-합치기)<a class=\"headerlink\" href=\"#fork-join\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 큰 작업을 N 개로 쪼개서 병렬 실행 → 모두 끝나면 결과를 모으는 패턴.</li>\n<li><strong>비유</strong>: 큰 시험지 채점을 5명에게 나눠 주고, 다 끝나면 점수를 합산.</li>\n<li><strong>왜 중요한가</strong>: MapReduce, 병렬 정렬, 행렬 곱셈 등 대량 데이터 처리의 기본 구조. Java <code>ForkJoinPool</code>, Go 의 <code>sync.WaitGroup</code> 등이 표준 구현 제공.</li>\n</ul>\n<hr />\n<h2 id=\"7\">7. 동시성 · 데드락<a class=\"headerlink\" href=\"#7\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"race-condition\">Race Condition (경쟁 조건)<a class=\"headerlink\" href=\"#race-condition\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 두 개 이상의 <a href=\"#thread\">스레드</a>가 같은 자원을 동시에 만질 때, 누가 먼저 도달하느냐에 따라 결과가 달라지는 상태. \"버그가 가끔만 나타난다\" 는 가장 무서운 종류의 버그.</li>\n<li><strong>비유</strong>: 식당에서 두 종업원이 동시에 같은 주문서를 읽어 같은 음식을 두 번 만드는 사고.</li>\n<li><strong>왜 중요한가</strong>: 한 번 만들고 끝나는 게 아니라, <em>발생 가능 조건</em> 만 잠재돼 있다. 테스트에서 99 번 통과해도 100 번째에 사고가 난다. <a href=\"#lock-mutex\">락</a>으로 예방하는 게 정석.</li>\n</ul>\n<h3 id=\"critical-section\">임계구역 (Critical Section)<a class=\"headerlink\" href=\"#critical-section\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 한 번에 <em>한 <a href=\"#thread\">스레드</a>만</em> 들어가야 하는 코드 구간. 공유 자원을 만지는 부분 전체.</li>\n<li><strong>비유</strong>: 일인용 탈의실. 한 명이 들어가면 다른 사람은 밖에서 기다려야 한다.</li>\n<li><strong>왜 중요한가</strong>: 임계구역을 정확히 식별해서 <a href=\"#lock-mutex\">락</a>으로 둘러싸야 <a href=\"#race-condition\">race condition</a> 을 막을 수 있다.</li>\n</ul>\n<h3 id=\"lock-mutex\">락 · 뮤텍스 (Lock · Mutex)<a class=\"headerlink\" href=\"#lock-mutex\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><strong>락</strong>: 자원을 보호하는 잠금 장치. 잡으면(acquire) 다른 <a href=\"#thread\">스레드</a>는 못 잡고 대기.</li>\n<li><strong>뮤텍스 (Mutex = Mutual Exclusion)</strong>: 락의 가장 흔한 구현. 한 번에 한 명만 잡을 수 있는 가장 단순한 락.</li>\n<li><strong>비유</strong>: 탈의실 문 잠금. 한 명만 잠그면 다른 사람은 밖에서 기다린다. 안에 있는 사람이 풀어야 다음 사람 입장.</li>\n<li><strong>왜 중요한가</strong>: 락을 잘못 쓰면 <a href=\"#coffman\">데드락</a>이 난다. 모든 동시성 버그의 90% 가 락 관리 실수.</li>\n</ul>\n<h3 id=\"semaphore\">세마포어 (Semaphore)<a class=\"headerlink\" href=\"#semaphore\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#lock-mutex\">뮤텍스</a>의 확장판. 동시에 N 명까지 잡을 수 있는 락. N=1 이면 뮤텍스와 동일.</li>\n<li><strong>비유</strong>: 좌석 5개짜리 회의실. 5명까지는 들어가고, 6번째는 한 명 나갈 때까지 대기.</li>\n<li><strong>왜 중요한가</strong>: \"동시 접속자 수 제한\" 같은 시나리오에 적합. 데드락 가능성은 뮤텍스와 동일하게 존재.</li>\n</ul>\n<h3 id=\"condition-variable\">컨디션 변수 (Condition Variable)<a class=\"headerlink\" href=\"#condition-variable\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: \"특정 조건이 만족될 때까지 잠들었다가, 다른 <a href=\"#thread\">스레드</a>가 깨워줄 때 일어나는\" 동기화 메커니즘. 보통 <a href=\"#lock-mutex\">뮤텍스</a>와 한 쌍으로 쓴다. C 에서 <code>pthread_cond_wait</code> / <code>pthread_cond_signal</code>, Python 에서 <code>threading.Condition</code>.</li>\n<li><strong>비유</strong>: 손님이 \"음식 나오면 깨워 주세요\" 하고 자리에서 잠든 뒤, 종업원이 와서 어깨를 두드려 깨우는 방식. <a href=\"#busy-wait\">busy-wait</a> 처럼 계속 확인하지 않아도 됨.</li>\n<li><strong>왜 중요한가</strong>: <a href=\"#producer-consumer\">Producer-Consumer 패턴</a> 의 핵심 도구. 큐가 비었을 때 소비자가 <em>효율적으로 잠들었다가</em> 생산자가 깨우는 식. 락만으로는 못 만든다.</li>\n</ul>\n<h3 id=\"coffman\">데드락 · Coffman 조건<a class=\"headerlink\" href=\"#coffman\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 데드락 = 서로의 자원을 무한히 기다려 멈춤. E.G. Coffman 이 1971년 논문에서 정리한 4가지 필요조건(상호 배제·점유 대기·비선점·순환 대기)이 동시에 성립할 때만 일어난다.</li>\n<li><strong>비유</strong>: 좁은 골목에서 두 차가 마주쳐 서로 양보하지 않고 영원히 멈춰 있는 상황.</li>\n<li><strong>왜 중요한가</strong>: \"데드락 막으려면 어떤 조건을 깨야 하나\" 의 체크리스트. 4개 다 외워야 데드락 분석을 자기 말로 할 수 있다.</li>\n</ul>\n<h3 id=\"lock-free\">lock-free 자료구조<a class=\"headerlink\" href=\"#lock-free\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#lock-mutex\">락</a> 없이도 멀티스레드가 안전하게 쓸 수 있도록 설계한 자료구조. CPU 의 원자적 명령(<code>compare-and-swap</code>) 으로 동기화.</li>\n<li><strong>비유</strong>: 일인용 탈의실 대신, 누가 들어가도 충돌 안 나는 자동 회전문.</li>\n<li><strong>왜 중요한가</strong>: <a href=\"#coffman\">데드락</a> 자체가 없어진다. 단, 설계가 매우 어렵고 모든 자료구조에 만들 수 있는 건 아니다.</li>\n</ul>\n<h3 id=\"try-lock\">try_lock · 타임아웃<a class=\"headerlink\" href=\"#try-lock\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: \"<a href=\"#lock-mutex\">락</a>을 잡으려고 시도하되, X 초 안에 못 잡으면 포기\" 패턴.</li>\n<li><strong>비유</strong>: 회의실 문이 잠겨 있으면 5분만 기다리고 다른 회의실 찾아가는 행동.</li>\n<li><strong>왜 중요한가</strong>: <a href=\"#coffman\">Coffman 조건</a>의 \"비선점\" 을 깬다. 데드락 회피의 실용적 방법 중 하나.</li>\n</ul>\n<h3 id=\"dining-philosophers\">식사하는 철학자 문제 (Dining Philosophers)<a class=\"headerlink\" href=\"#dining-philosophers\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 1965년 다익스트라(Edsger Dijkstra)가 만든 동시성 학습용 가상 시나리오. 5명의 철학자가 원탁에 앉아 양옆 포크를 동시에 들어야 식사 가능 — 모두 왼쪽 포크부터 들면 데드락.</li>\n<li><strong>비유</strong>: 5명이 원탁에 앉아 포크 5개를 사이에 두고 식사. 모두가 동시에 왼쪽 포크를 들고 오른쪽을 기다리면 영원히 멈춤.</li>\n<li><strong>왜 중요한가</strong>: 운영체제 교과서마다 등장. 면접 단골 질문. 이번 미션 리포트의 <em>Root Cause Analysis</em> 에 인용하면 설득력이 확 올라간다.</li>\n</ul>\n<h3 id=\"starvation\">기아 (Starvation)<a class=\"headerlink\" href=\"#starvation\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#coffman\">데드락</a>은 아니지만 <em>특정 <a href=\"#thread\">스레드</a>만</em> 영영 자원을 못 받는 상태. 다른 스레드들이 계속 우선 처리돼서.</li>\n<li><strong>비유</strong>: 식당에서 한 손님이 매번 우선순위 낮아서 새치기 당하다가 영원히 음식 못 받는 상황.</li>\n<li><strong>왜 중요한가</strong>: Priority 스케줄링에서 자주 발생. 데드락과 다른 개념이라 구분해서 진단.</li>\n</ul>\n<h3 id=\"stat-codes\">프로세스 상태 코드 (STAT)<a class=\"headerlink\" href=\"#stat-codes\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <code>ps</code> 의 <code>STAT</code> 컬럼에 한 글자씩 찍히는 상태 코드.</li>\n<li><code>R</code>: Running (실행 중 또는 실행 가능)</li>\n<li><code>S</code>: Sleeping (이벤트 대기 중, 인터럽트 가능)</li>\n<li><code>D</code>: Uninterruptible sleep (디스크 I/O 대기 등, 강제 깨우기 불가)</li>\n<li><code>Z</code>: Zombie (종료됐는데 부모가 회수 안 함)</li>\n<li><code>T</code>: Stopped (Ctrl+Z 등으로 정지)</li>\n<li>뒤에 <code>l</code>: 멀티스레드, <code>+</code>: 포그라운드 등</li>\n<li><strong>비유</strong>: 손님 상태 — 식사 중(R), 음식 기다림(S), 화장실(D), 가버림(Z).</li>\n<li><strong>왜 중요한가</strong>: 데드락 의심 시 <code>Sl</code> 이 뜨면 멀티스레드가 잠들어 있다는 강한 단서.</li>\n</ul>\n<h3 id=\"futex\">futex (Fast Userspace muTEX)<a class=\"headerlink\" href=\"#futex\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 리눅스에서 유저 공간 <a href=\"#lock-mutex\">락</a>을 효율적으로 구현하기 위한 <a href=\"#syscall\">시스템 콜</a>. 락이 경합 없으면 시스템 콜 없이 빠르게, 경합 있으면 커널에 잠들기.</li>\n<li><strong>비유</strong>: 회의실 문이 안 잠겨 있으면 그냥 들어가고(빠름), 잠겨 있을 때만 \"노크하고 기다리는\" 시스템.</li>\n<li><strong>왜 중요한가</strong>: Python <code>threading.Lock</code>, C++ <code>std::mutex</code> 등이 내부적으로 futex 를 쓴다. 그래서 데드락이 나면 <a href=\"#wchan\"><code>wchan=futex_*</code></a> 가 결정적 단서.</li>\n</ul>\n<h3 id=\"wchan\"><code>wchan</code> (Wait Channel)<a class=\"headerlink\" href=\"#wchan\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: <a href=\"#thread\">스레드</a>가 잠들었을 때 그 호출이 일어난 커널 함수의 이름. <code>/proc/&lt;pid&gt;/wchan</code> 또는 <code>ps -L -o wchan</code>.</li>\n<li><strong>비유</strong>: 잠든 사람이 \"어떤 일 때문에 잠들었는지\" 라벨을 붙여둔 것.</li>\n<li><strong>왜 중요한가</strong>: <code>wchan</code> 만 보면 \"이 스레드가 락 대기인가, I/O 대기인가, 단순 sleep 인가\" 가 한눈에 구분된다. 데드락 분석의 핵심 컬럼.</li>\n</ul>\n<h3 id=\"busy-wait\">busy-wait (바쁜 대기)<a class=\"headerlink\" href=\"#busy-wait\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 조건이 만족될 때까지 <code>while (!condition) {}</code> 식으로 <em><a href=\"#cpu\">CPU</a> 를 계속 돌리면서</em> 기다리는 패턴. CPU 100% 점유의 가장 흔한 원인.</li>\n<li><strong>비유</strong>: 친구가 올 때까지 문 앞에서 계속 깡총깡총 뛰는 행동. 가만히 의자에 앉아 기다리면 될 일을.</li>\n<li><strong>왜 중요한가</strong>: 올바른 동시성 코드는 <a href=\"#condition-variable\">컨디션 변수</a> 같은 메커니즘으로 잠들었다가 <em>깨어나는</em> 방식을 쓴다. busy-wait 는 거의 항상 버그 또는 미숙한 설계.</li>\n</ul>\n<hr />\n<h2 id=\"8\">8. 운영 도구<a class=\"headerlink\" href=\"#8\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"proc\"><code>/proc</code> 가상 파일시스템<a class=\"headerlink\" href=\"#proc\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 실제 디스크에 없는 가짜 파일시스템. 커널이 현재 시스템·프로세스 상태를 텍스트 파일처럼 보여주는 인터페이스. <code>cat /proc/cpuinfo</code>, <code>cat /proc/&lt;pid&gt;/status</code> 등.</li>\n<li><strong>비유</strong>: 빌딩 1층에 걸린 실시간 전광판. 지금 누가 어디 있는지 텍스트로 보여준다.</li>\n<li><strong>왜 중요한가</strong>: <code>top</code>, <code>ps</code>, <code>free</code> 모두 결국 <code>/proc</code> 을 읽는다. 명령어가 막힐 때 직접 <code>/proc</code> 을 보면 원본 진실에 닿을 수 있다.</li>\n</ul>\n<h3 id=\"top-ps\"><code>top</code> · <code>htop</code> · <code>ps</code><a class=\"headerlink\" href=\"#top-ps\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>:</li>\n<li><code>top</code>: <a href=\"#process\">프로세스</a> 사용량을 <em>실시간</em> 으로 갱신해 보여주는 도구. <code>q</code> 로 종료.</li>\n<li><code>htop</code>: top 의 향상 버전. 색깔·트리뷰·마우스 지원. (별도 설치 필요)</li>\n<li><code>ps</code>: 그 순간의 <em>스냅샷</em> 만 한 번 찍어 표시. 스크립트에서 파싱하기 좋음.</li>\n<li><strong>비유</strong>: top = CCTV 라이브 화면, ps = 폴라로이드 사진 한 장.</li>\n<li><strong>왜 중요한가</strong>: 데드락은 시간이 흐르지 않으므로 ps 한 장으로 충분. CPU 폭주는 실시간 변화를 봐야 하니 top 필요.</li>\n</ul>\n<h3 id=\"dmesg\"><code>dmesg</code><a class=\"headerlink\" href=\"#dmesg\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 커널이 부팅 이후 출력한 메시지를 모아 보여주는 명령어. 하드웨어 변화·드라이버·<a href=\"#oom-killer\">OOM Killer</a> 발동 등이 다 여기에 있다.</li>\n<li><strong>비유</strong>: 빌딩 관리실의 로그북. 정전·화재경보·승강기 고장 같은 큰 사건이 다 기록됨.</li>\n<li><strong>왜 중요한가</strong>: 앱 로그에 안 나오는 시스템 레벨 사건(특히 OOM Killer)이 dmesg 에만 있을 수 있다.</li>\n</ul>\n<h3 id=\"vmstat\"><code>vmstat</code><a class=\"headerlink\" href=\"#vmstat\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><strong>정의</strong>: 가상 메모리·CPU·디스크 I/O 의 초당 변화를 한 줄씩 보여주는 도구. <code>vmstat 1</code> 로 매초 갱신.</li>\n<li><strong>비유</strong>: 자동차 계기판. 속도·연료·rpm 을 동시에 한 화면에서 모니터링.</li>\n<li><strong>왜 중요한가</strong>: OOM 직전에 <code>si</code>(swap in) / <code>so</code>(swap out) 가 폭증하면 <a href=\"#swap-thrashing\">쓰래싱</a>의 결정적 증거.</li>\n</ul>\n<hr />\n<h2 id=\"_1\">부록 — 자주 헷갈리는 개념 비교표<a class=\"headerlink\" href=\"#_1\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"_2\">메모리 단위<a class=\"headerlink\" href=\"#_2\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>단위</th>\n<th>크기</th>\n<th>비고</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1 Byte (B)</td>\n<td>8 bit</td>\n<td>영어 한 글자(아스키)</td>\n</tr>\n<tr>\n<td>1 KB</td>\n<td>1,024 B</td>\n<td>보통 1,000 B 로 어림(SI 와 IEC 의 차이)</td>\n</tr>\n<tr>\n<td>1 MB</td>\n<td>1,024 KB ≈ 100만 B</td>\n<td>작은 이미지</td>\n</tr>\n<tr>\n<td>1 GB</td>\n<td>1,024 MB ≈ 10억 B</td>\n<td>영화 한 편(저화질)</td>\n</tr>\n<tr>\n<td>4 KB</td>\n<td>—</td>\n<td>리눅스 페이지 기본 크기</td>\n</tr>\n<tr>\n<td>1 MiB</td>\n<td>1,024 KiB (정확히 2^20 B)</td>\n<td>IEC 표준, 1 MB 와 미세하게 다름</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"_3\">시그널 자주 쓰는 것<a class=\"headerlink\" href=\"#_3\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>번호</th>\n<th>이름</th>\n<th>의미</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1</td>\n<td>SIGHUP</td>\n<td>터미널 끊김 — 데몬 재로드 신호로 자주 재활용</td>\n</tr>\n<tr>\n<td>2</td>\n<td>SIGINT</td>\n<td>Ctrl+C</td>\n</tr>\n<tr>\n<td>9</td>\n<td>SIGKILL</td>\n<td>즉시 죽임 (catch/ignore 불가)</td>\n</tr>\n<tr>\n<td>11</td>\n<td>SIGSEGV</td>\n<td>메모리 위반 (NULL 포인터 등)</td>\n</tr>\n<tr>\n<td>15</td>\n<td>SIGTERM</td>\n<td>정상 종료 요청</td>\n</tr>\n<tr>\n<td>17</td>\n<td>SIGCHLD</td>\n<td>자식 프로세스 종료 알림</td>\n</tr>\n<tr>\n<td>19</td>\n<td>SIGSTOP</td>\n<td>정지 (Ctrl+Z 와 비슷, 무시 불가)</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"vs\">멀티프로세싱 vs 멀티스레딩 한 줄 요약<a class=\"headerlink\" href=\"#vs\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>항목</th>\n<th>멀티프로세싱</th>\n<th>멀티스레딩</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>생성 비용</td>\n<td>크다 (~1ms)</td>\n<td>작다 (~10µs)</td>\n</tr>\n<tr>\n<td>메모리 격리</td>\n<td>완전</td>\n<td>없음</td>\n</tr>\n<tr>\n<td>통신</td>\n<td><a href=\"#ipc\">IPC</a> 필요</td>\n<td>변수 직접 공유</td>\n</tr>\n<tr>\n<td>데드락 가능성</td>\n<td>거의 없음</td>\n<td>있음</td>\n</tr>\n<tr>\n<td>한 명 죽으면</td>\n<td>다른 명 무사</td>\n<td>전체 종료</td>\n</tr>\n<tr>\n<td>Python GIL 우회</td>\n<td>가능</td>\n<td>불가</td>\n</tr>\n<tr>\n<td>적합한 작업</td>\n<td><a href=\"#cpu-vs-io-bound\">CPU-bound</a> (Python), 격리 필요</td>\n<td><a href=\"#cpu-vs-io-bound\">I/O-bound</a>, 데이터 공유 잦음</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"_4\">메모리 관련 측정 도구 한 줄 요약<a class=\"headerlink\" href=\"#_4\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>도구</th>\n<th>무엇을 본다</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>free -h</code></td>\n<td>시스템 전체 RAM/Swap 합계</td>\n</tr>\n<tr>\n<td><code>top</code> (<code>Shift+M</code>)</td>\n<td>프로세스를 MEM 순으로 정렬</td>\n</tr>\n<tr>\n<td><code>ps -o pid,vsz,rss,comm</code></td>\n<td>프로세스 별 <a href=\"#vsz-vs-rss\">VSZ/RSS</a></td>\n</tr>\n<tr>\n<td><code>cat /proc/meminfo</code></td>\n<td>시스템 메모리의 원본 데이터</td>\n</tr>\n<tr>\n<td><code>cat /proc/$PID/status</code></td>\n<td>프로세스 별 메모리·스레드 원본</td>\n</tr>\n<tr>\n<td><code>pmap -x $PID</code></td>\n<td>프로세스의 메모리 영역별 분포</td>\n</tr>\n<tr>\n<td><code>smem</code></td>\n<td>RSS·PSS·USS 를 한눈에 (별도 설치)</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"vs-vs\">데드락 vs 라이브락 vs 기아<a class=\"headerlink\" href=\"#vs-vs\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>현상</th>\n<th>정의</th>\n<th>진단</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><a href=\"#coffman\">데드락</a></td>\n<td>서로의 자원을 기다리며 영원히 정지</td>\n<td>CPU 0%, <a href=\"#wchan\">wchan</a> = futex_*, 로그 멈춤</td>\n</tr>\n<tr>\n<td>라이브락</td>\n<td>서로 양보만 하느라 진척이 없음 (실제로는 CPU 를 쓰며 도는데 결과 없음)</td>\n<td>CPU 높음, 로그는 계속 찍히는데 같은 패턴 반복</td>\n</tr>\n<tr>\n<td><a href=\"#starvation\">기아 (Starvation)</a></td>\n<td>특정 스레드만 영영 자원을 못 받음</td>\n<td>한 스레드의 진행률만 멈춰 있음, 다른 건 정상</td>\n</tr>\n</tbody>\n</table>\n<hr />\n<h2 id=\"_5\">참고 — 더 깊이 가고 싶을 때<a class=\"headerlink\" href=\"#_5\" title=\"Permanent link\">#</a></h2>\n<table>\n<thead>\n<tr>\n<th>자료</th>\n<th>한 줄 평</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><strong>OSTEP</strong> (<em>Operating Systems: Three Easy Pieces</em>)</td>\n<td>무료 PDF, 가상 메모리·스케줄링·동시성의 정석. <strong>무료 + 통독 강추</strong>.</td>\n</tr>\n<tr>\n<td><strong>CSAPP</strong> (Computer Systems: A Programmer's Perspective)</td>\n<td>메모리 계층·시스템 콜·동시성을 C 코드로 따라가며 배운다.</td>\n</tr>\n<tr>\n<td><strong>Modern Operating Systems</strong> (Tanenbaum)</td>\n<td>OS 의 전통적 교과서. 친절한 비유 多. 스케줄링·데드락 챕터 추천.</td>\n</tr>\n<tr>\n<td><strong>Linux Kernel Development</strong> (Robert Love)</td>\n<td>리눅스 커널 내부를 깔끔하게 정리. 스케줄러·메모리 관리 챕터 추천.</td>\n</tr>\n<tr>\n<td><strong>The Linux Programming Interface</strong> (Michael Kerrisk)</td>\n<td>1500쪽짜리 시스템 콜 백과사전. <code>man</code> 페이지의 큰형. fork/exec/pthread 챕터가 특히 좋음.</td>\n</tr>\n<tr>\n<td><strong>Systems Performance</strong> (Brendan Gregg)</td>\n<td>시스템 성능 분석의 바이블. <code>top</code>/<code>vmstat</code>/<code>perf</code> 사용법과 함정.</td>\n</tr>\n<tr>\n<td><strong>The Art of Multiprocessor Programming</strong> (Herlihy &amp; Shavit)</td>\n<td>락·세마포어·lock-free 자료구조의 정석.</td>\n</tr>\n<tr>\n<td><strong>Dijkstra 의 1965 논문</strong> <em>Cooperating sequential processes</em></td>\n<td>세마포어와 <a href=\"#dining-philosophers\">식사하는 철학자 문제</a>의 원전. 짧고 읽기 쉽다.</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"man\"><code>man</code> 페이지 통독 권장 목록<a class=\"headerlink\" href=\"#man\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>man<span class=\"w\"> </span><span class=\"m\">7</span><span class=\"w\"> </span>signal<span class=\"w\">       </span><span class=\"c1\"># 시그널 개요 — SIGTERM/SIGKILL/SIGSEGV 다 여기</span>\nman<span class=\"w\"> </span><span class=\"m\">7</span><span class=\"w\"> </span>pthreads<span class=\"w\">     </span><span class=\"c1\"># POSIX 스레드 개요</span>\nman<span class=\"w\"> </span><span class=\"m\">5</span><span class=\"w\"> </span>proc<span class=\"w\">         </span><span class=\"c1\"># /proc 안의 모든 파일 의미</span>\nman<span class=\"w\"> </span><span class=\"m\">2</span><span class=\"w\"> </span>fork<span class=\"w\">         </span><span class=\"c1\"># fork — 멀티프로세싱의 출발점</span>\nman<span class=\"w\"> </span><span class=\"m\">2</span><span class=\"w\"> </span>clone<span class=\"w\">        </span><span class=\"c1\"># clone — 리눅스의 통합 프로세스/스레드 생성</span>\nman<span class=\"w\"> </span><span class=\"m\">2</span><span class=\"w\"> </span>mmap<span class=\"w\">         </span><span class=\"c1\"># mmap — 가상 메모리 매핑의 진실</span>\nman<span class=\"w\"> </span><span class=\"m\">2</span><span class=\"w\"> </span>futex<span class=\"w\">        </span><span class=\"c1\"># futex — 락의 진짜 구현</span>\nman<span class=\"w\"> </span><span class=\"m\">1</span><span class=\"w\"> </span>top<span class=\"w\">          </span><span class=\"c1\"># top 의 모든 컬럼 의미</span>\nman<span class=\"w\"> </span><span class=\"m\">1</span><span class=\"w\"> </span>ps<span class=\"w\">           </span><span class=\"c1\"># ps 의 모든 옵션</span>\n</code></pre></div>\n\n<h3 id=\"_6\">시스템 호출 추적 도구<a class=\"headerlink\" href=\"#_6\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>도구</th>\n<th>무엇을 보여주나</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td><code>strace -f -p $PID</code></td>\n<td>그 프로세스(+자식들)가 <em>지금</em> 호출하는 <a href=\"#syscall\">시스템 콜</a>을 실시간으로 출력. 데드락 시 모든 스레드가 <code>futex(...)</code> 에서 멈춰 있는 모습이 직접 보인다.</td>\n</tr>\n<tr>\n<td><code>ltrace -p $PID</code></td>\n<td>라이브러리 함수 호출을 추적. <code>pthread_mutex_lock</code> 같은 함수가 어디서 멈췄는지 보임.</td>\n</tr>\n<tr>\n<td><code>perf top</code></td>\n<td>CPU 가 어느 함수에서 시간을 가장 많이 쓰는지 실시간 프로파일. CPU 스파이크 원인 후보를 좁혀준다.</td>\n</tr>\n<tr>\n<td><code>pidstat -t 1</code></td>\n<td>스레드 단위 CPU/메모리 초당 변화. <code>top -H</code> 보다 스크립트 친화적.</td>\n</tr>\n</tbody>\n</table>", "toc": "<div class=\"toc\">\n<ul>\n<li><a href=\"#1\">1. 컴퓨터 구조 기초</a><ul>\n<li><a href=\"#syscall\">시스템 콜 (System Call)</a></li>\n<li><a href=\"#os-kernel-userspace\">운영체제 · 커널 · 유저 공간</a></li>\n<li><a href=\"#von-neumann\">폰 노이만 구조 (von Neumann architecture)</a></li>\n<li><a href=\"#cpu\">CPU (Central Processing Unit)</a></li>\n<li><a href=\"#throughput-vs-latency\">스루풋 (Throughput) vs 지연시간 (Latency)</a></li>\n<li><a href=\"#time-units\">시간 단위 (ns / µs / ms / s)</a></li>\n<li><a href=\"#concurrency-vs-parallelism\">동시성 (Concurrency) vs 병렬성 (Parallelism)</a></li>\n<li><a href=\"#cpu-vs-io-bound\">CPU-bound vs I/O-bound</a></li>\n</ul>\n</li>\n<li><a href=\"#2-storage-hierarchy\">2. 저장 계층 (Storage Hierarchy)</a><ul>\n<li><a href=\"#register\">레지스터 (Register)</a></li>\n<li><a href=\"#cache\">캐시 · L1 / L2 / L3 (Cache)</a></li>\n<li><a href=\"#dram\">DRAM (= RAM)</a></li>\n<li><a href=\"#disk\">디스크 · SSD · HDD</a></li>\n<li><a href=\"#swap-thrashing\">페이지 교체 · 스왑 · 쓰래싱</a></li>\n</ul>\n</li>\n<li><a href=\"#3\">3. 프로세스와 메모리 구조</a><ul>\n<li><a href=\"#process\">프로세스 (Process)</a></li>\n<li><a href=\"#pid\">PID (Process ID)</a></li>\n<li><a href=\"#virtual-address-space\">가상 주소 공간 (Virtual Address Space)</a></li>\n<li><a href=\"#memory-segments\">Heap · Stack · Data · BSS · Text</a></li>\n<li><a href=\"#malloc-free-gc\">malloc / free / 가비지 컬렉터 (GC)</a></li>\n<li><a href=\"#elf\">ELF (Executable and Linkable Format)</a></li>\n<li><a href=\"#page\">페이지 · 4 KB</a></li>\n<li><a href=\"#mmu\">MMU (Memory Management Unit)</a></li>\n<li><a href=\"#page-table-tlb\">페이지 테이블 · TLB</a></li>\n<li><a href=\"#page-fault\">페이지 폴트 (Page Fault)</a></li>\n<li><a href=\"#lazy-allocation\">lazy allocation (지연 할당)</a></li>\n<li><a href=\"#vsz-vs-rss\">VSZ vs RSS</a></li>\n<li><a href=\"#fork-exec\">fork / exec</a></li>\n<li><a href=\"#cow\">Copy-on-Write (COW)</a></li>\n<li><a href=\"#clone-syscall\">clone() 시스템 콜</a></li>\n</ul>\n</li>\n<li><a href=\"#4\">4. 종료 · 보호 정책 · 환경변수</a><ul>\n<li><a href=\"#oom-killer\">OOM Killer · oom_score</a></li>\n<li><a href=\"#signal\">시그널 · SIGKILL · SIGTERM</a></li>\n<li><a href=\"#env-var\">환경변수 (Environment Variable)</a></li>\n<li><a href=\"#watchdog\">Watchdog (감시견)</a></li>\n</ul>\n</li>\n<li><a href=\"#5\">5. 스레드 · 스케줄링</a><ul>\n<li><a href=\"#thread\">스레드 (Thread)</a></li>\n<li><a href=\"#pcb\">PCB · task_struct</a></li>\n<li><a href=\"#context-switch\">컨텍스트 스위치 (Context Switch)</a></li>\n<li><a href=\"#ipc\">IPC (Inter-Process Communication)</a></li>\n<li><a href=\"#core-smt\">CPU 코어 · 하이퍼스레딩</a></li>\n<li><a href=\"#idle\">idle (유휴 시간)</a></li>\n<li><a href=\"#scheduler\">스케줄러 (Scheduler)</a></li>\n<li><a href=\"#time-slice\">타임 슬라이스 (Time Slice / Quantum)</a></li>\n<li><a href=\"#cfs\">CFS · vruntime</a></li>\n<li><a href=\"#nice\">nice 값 · 우선순위</a></li>\n<li><a href=\"#rb-tree\">빨간-검정 트리 (Red-Black Tree)</a></li>\n<li><a href=\"#pthread\">POSIX Threads (pthread)</a></li>\n<li><a href=\"#tls\">TLS (Thread-Local Storage)</a></li>\n</ul>\n</li>\n<li><a href=\"#6\">6. 병렬 실행 모델</a><ul>\n<li><a href=\"#gil\">GIL (Global Interpreter Lock)</a></li>\n<li><a href=\"#py-multiprocessing\">multiprocessing (Python)</a></li>\n<li><a href=\"#asyncio\">asyncio · 이벤트 루프</a></li>\n<li><a href=\"#amdahl\">암달의 법칙 (Amdahl's Law)</a></li>\n<li><a href=\"#thread-pool\">스레드 풀 (Thread Pool)</a></li>\n<li><a href=\"#producer-consumer\">Producer-Consumer (생산자-소비자)</a></li>\n<li><a href=\"#fork-join\">Fork-Join (분할-합치기)</a></li>\n</ul>\n</li>\n<li><a href=\"#7\">7. 동시성 · 데드락</a><ul>\n<li><a href=\"#race-condition\">Race Condition (경쟁 조건)</a></li>\n<li><a href=\"#critical-section\">임계구역 (Critical Section)</a></li>\n<li><a href=\"#lock-mutex\">락 · 뮤텍스 (Lock · Mutex)</a></li>\n<li><a href=\"#semaphore\">세마포어 (Semaphore)</a></li>\n<li><a href=\"#condition-variable\">컨디션 변수 (Condition Variable)</a></li>\n<li><a href=\"#coffman\">데드락 · Coffman 조건</a></li>\n<li><a href=\"#lock-free\">lock-free 자료구조</a></li>\n<li><a href=\"#try-lock\">try_lock · 타임아웃</a></li>\n<li><a href=\"#dining-philosophers\">식사하는 철학자 문제 (Dining Philosophers)</a></li>\n<li><a href=\"#starvation\">기아 (Starvation)</a></li>\n<li><a href=\"#stat-codes\">프로세스 상태 코드 (STAT)</a></li>\n<li><a href=\"#futex\">futex (Fast Userspace muTEX)</a></li>\n<li><a href=\"#wchan\">wchan (Wait Channel)</a></li>\n<li><a href=\"#busy-wait\">busy-wait (바쁜 대기)</a></li>\n</ul>\n</li>\n<li><a href=\"#8\">8. 운영 도구</a><ul>\n<li><a href=\"#proc\">/proc 가상 파일시스템</a></li>\n<li><a href=\"#top-ps\">top · htop · ps</a></li>\n<li><a href=\"#dmesg\">dmesg</a></li>\n<li><a href=\"#vmstat\">vmstat</a></li>\n</ul>\n</li>\n<li><a href=\"#_1\">부록 — 자주 헷갈리는 개념 비교표</a><ul>\n<li><a href=\"#_2\">메모리 단위</a></li>\n<li><a href=\"#_3\">시그널 자주 쓰는 것</a></li>\n<li><a href=\"#vs\">멀티프로세싱 vs 멀티스레딩 한 줄 요약</a></li>\n<li><a href=\"#_4\">메모리 관련 측정 도구 한 줄 요약</a></li>\n<li><a href=\"#vs-vs\">데드락 vs 라이브락 vs 기아</a></li>\n</ul>\n</li>\n<li><a href=\"#_5\">참고 — 더 깊이 가고 싶을 때</a><ul>\n<li><a href=\"#man\">man 페이지 통독 권장 목록</a></li>\n<li><a href=\"#_6\">시스템 호출 추적 도구</a></li>\n</ul>\n</li>\n</ul>\n</div>\n"}, {"title": "실험 절차서", "file": "실험_절차서.md", "html": "<h1 id=\"3\">실험 절차서 — 3대 장애 재현 &amp; 검증<a class=\"headerlink\" href=\"#3\" title=\"Permanent link\">#</a></h1>\n<blockquote>\n<p>본 문서는 <a href=\"reports/\">reports/</a> 의 3개 리포트가 어떤 순서와 환경변수 조합으로 수집된 증거인지를 추적할 수 있도록 정리한 절차서다.</p>\n</blockquote>\n<hr />\n<h2 id=\"0\">0. 공통 사전 조건<a class=\"headerlink\" href=\"#0\" title=\"Permanent link\">#</a></h2>\n<ul>\n<li>B1-1 환경 구축 완료 (<code>agent-admin</code> 계정, <code>$AGENT_HOME</code> 셋업, monitor.sh + crontab 매분 등록)</li>\n<li><code>agent-leak-app</code> 바이너리가 <code>$AGENT_HOME/bin/agent-leak-app</code> 에 배치됨</li>\n<li><code>secret.key</code> 내용 = <code>agent_api_key_test</code></li>\n<li>매 실험 사이에 이전 PID 잔존 여부 점검 — 잔존 시 <code>kill &lt;pid&gt;</code> (SIGKILL 은 마지막 수단)</li>\n</ul>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"c1\"># 베이스라인 환경변수 (정상 가동용)</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">512</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">95</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">false</span>\n</code></pre></div>\n\n<hr />\n<h2 id=\"1-oom\">1. OOM 실험<a class=\"headerlink\" href=\"#1-oom\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"1-1-before\">1-1. Before 조건 (장애 재현)<a class=\"headerlink\" href=\"#1-1-before\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">256</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">95</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">false</span>\nnohup<span class=\"w\"> </span>./agent-leak-app<span class=\"w\"> </span>&gt;<span class=\"w\"> </span><span class=\"nv\">$AGENT_LOG_DIR</span>/agent-leak-app.log<span class=\"w\"> </span><span class=\"m\">2</span>&gt;<span class=\"p\">&amp;</span><span class=\"m\">1</span><span class=\"w\"> </span><span class=\"p\">&amp;</span>\n<span class=\"nb\">echo</span><span class=\"w\"> </span><span class=\"nv\">$!</span><span class=\"w\"> </span>&gt;<span class=\"w\"> </span>/tmp/agent.pid\n</code></pre></div>\n\n<h3 id=\"1-2-10\">1-2. 관측 (10분 이상)<a class=\"headerlink\" href=\"#1-2-10\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><code>tail -f /var/log/agent-app/monitor.log</code> — MEM% 선형 증가 확인</li>\n<li><code>tail -f $AGENT_LOG_DIR/agent-leak-app.log</code> — <code>MemoryGuard</code> / <code>SELF-TERMINATED</code> 라인 출현</li>\n<li>종료 후 <code>ps -p $(cat /tmp/agent.pid)</code> → 사라짐 확인</li>\n</ul>\n<h3 id=\"1-3-after\">1-3. After 조건 (조치 검증)<a class=\"headerlink\" href=\"#1-3-after\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">512</span><span class=\"w\">   </span><span class=\"c1\"># 256 → 512</span>\n<span class=\"c1\"># 재실행 후 동일 절차로 관측 → 생존시간 약 2배 증가 (10분 → 20분+)</span>\n</code></pre></div>\n\n<h3 id=\"1-4\">1-4. 산출물<a class=\"headerlink\" href=\"#1-4\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><a href=\"evidence/oom_monitor.log\">evidence/oom_monitor.log</a></li>\n<li><a href=\"evidence/oom_app.log\">evidence/oom_app.log</a></li>\n<li><a href=\"evidence/oom_ps_top.txt\">evidence/oom_ps_top.txt</a></li>\n<li>분석: <a href=\"reports/01_oom_report.md\">reports/01_oom_report.md</a></li>\n</ul>\n<hr />\n<h2 id=\"2-cpu\">2. CPU 과점유 실험<a class=\"headerlink\" href=\"#2-cpu\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"2-1-before\">2-1. Before<a class=\"headerlink\" href=\"#2-1-before\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">512</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">80</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">false</span>\nnohup<span class=\"w\"> </span>./agent-leak-app<span class=\"w\"> </span>&gt;<span class=\"w\"> </span><span class=\"nv\">$AGENT_LOG_DIR</span>/agent-leak-app.log<span class=\"w\"> </span><span class=\"m\">2</span>&gt;<span class=\"p\">&amp;</span><span class=\"m\">1</span><span class=\"w\"> </span><span class=\"p\">&amp;</span>\n</code></pre></div>\n\n<h3 id=\"2-2\">2-2. 관측<a class=\"headerlink\" href=\"#2-2\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><code>top -bn1 -p &lt;PID&gt;</code> 5회 (30초 간격) → CPU% 비선형 상승 캡처</li>\n<li><code>WATCHDOG ... SIGTERM</code> 라인 출현 후 자동 종료</li>\n</ul>\n<h3 id=\"2-3-after\">2-3. After<a class=\"headerlink\" href=\"#2-3-after\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">95</span><span class=\"w\">   </span><span class=\"c1\"># 80 → 95</span>\n<span class=\"c1\"># 재실행 → 종료까지 약 4분 → 약 12분으로 연장 (여전히 종료됨)</span>\n</code></pre></div>\n\n<h3 id=\"2-4\">2-4. 산출물<a class=\"headerlink\" href=\"#2-4\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><a href=\"evidence/cpu_monitor.log\">evidence/cpu_monitor.log</a></li>\n<li><a href=\"evidence/cpu_app.log\">evidence/cpu_app.log</a></li>\n<li><a href=\"evidence/cpu_top_ps.txt\">evidence/cpu_top_ps.txt</a></li>\n<li>분석: <a href=\"reports/02_cpu_report.md\">reports/02_cpu_report.md</a></li>\n</ul>\n<hr />\n<h2 id=\"3-deadlock\">3. Deadlock 실험<a class=\"headerlink\" href=\"#3-deadlock\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"3-1-before\">3-1. Before<a class=\"headerlink\" href=\"#3-1-before\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">512</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">95</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">true</span><span class=\"w\">     </span><span class=\"c1\"># ★ 핵심</span>\nnohup<span class=\"w\"> </span>./agent-leak-app<span class=\"w\"> </span>&gt;<span class=\"w\"> </span><span class=\"nv\">$AGENT_LOG_DIR</span>/agent-leak-app.log<span class=\"w\"> </span><span class=\"m\">2</span>&gt;<span class=\"p\">&amp;</span><span class=\"m\">1</span><span class=\"w\"> </span><span class=\"p\">&amp;</span>\n<span class=\"nv\">PID</span><span class=\"o\">=</span><span class=\"nv\">$!</span>\n</code></pre></div>\n\n<h3 id=\"3-2-25\">3-2. 관측 (2~5분 후 무응답 진입)<a class=\"headerlink\" href=\"#3-2-25\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>ps<span class=\"w\"> </span>-ef<span class=\"w\"> </span><span class=\"p\">|</span><span class=\"w\"> </span>grep<span class=\"w\"> </span><span class=\"nv\">$PID</span><span class=\"w\">                 </span><span class=\"c1\"># PID 존재 확인</span>\nps<span class=\"w\"> </span>-p<span class=\"w\"> </span><span class=\"nv\">$PID</span><span class=\"w\"> </span>-o<span class=\"w\"> </span>stat,etime,cmd<span class=\"w\">       </span><span class=\"c1\"># Sl (sleeping + multi-thread)</span>\ntop<span class=\"w\"> </span>-H<span class=\"w\"> </span>-bn1<span class=\"w\"> </span>-p<span class=\"w\"> </span><span class=\"nv\">$PID</span><span class=\"w\">                </span><span class=\"c1\"># 스레드별 %CPU = 0.0</span>\nps<span class=\"w\"> </span>-L<span class=\"w\"> </span>-p<span class=\"w\"> </span><span class=\"nv\">$PID</span><span class=\"w\"> </span>-o<span class=\"w\"> </span>lwp,pcpu,stat,wchan:25,cmd<span class=\"w\">   </span><span class=\"c1\"># wchan=futex_wait_queue_me</span>\ntail<span class=\"w\"> </span>-n<span class=\"w\"> </span><span class=\"m\">20</span><span class=\"w\"> </span><span class=\"nv\">$AGENT_LOG_DIR</span>/agent-leak-app.log<span class=\"w\">  </span><span class=\"c1\"># WAITING/BLOCKED 라인에서 정지</span>\ncurl<span class=\"w\"> </span>--max-time<span class=\"w\"> </span><span class=\"m\">3</span><span class=\"w\"> </span>http://0.0.0.0:15034<span class=\"w\">        </span><span class=\"c1\"># 타임아웃 — 외부 무응답 입증</span>\n</code></pre></div>\n\n<h3 id=\"3-3-after\">3-3. After<a class=\"headerlink\" href=\"#3-3-after\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">false</span>\n<span class=\"c1\"># 재실행 → 30분 이상 정상 가동, curl 응답 정상</span>\n</code></pre></div>\n\n<h3 id=\"3-4\">3-4. 산출물<a class=\"headerlink\" href=\"#3-4\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li><a href=\"evidence/deadlock_app.log\">evidence/deadlock_app.log</a></li>\n<li><a href=\"evidence/deadlock_ps_top.txt\">evidence/deadlock_ps_top.txt</a></li>\n<li><a href=\"evidence/deadlock_monitor.log\">evidence/deadlock_monitor.log</a></li>\n<li>분석: <a href=\"reports/03_deadlock_report.md\">reports/03_deadlock_report.md</a></li>\n</ul>\n<hr />\n<h2 id=\"4\">4. 보너스 — 스케줄링 추론용 데이터 수집<a class=\"headerlink\" href=\"#4\" title=\"Permanent link\">#</a></h2>\n<p>위 실험 사이사이 <strong>정상 가동 구간</strong>(데드락 미발생, OOM 직전 충분히 떨어진 구간)에서:</p>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MULTI_THREAD_ENABLE</span><span class=\"o\">=</span><span class=\"nb\">true</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">512</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">CPU_MAX_OCCUPY</span><span class=\"o\">=</span><span class=\"m\">95</span>\n./agent-leak-app<span class=\"w\"> </span><span class=\"p\">&amp;</span>\n<span class=\"c1\"># 60초간 워커 로그 누적</span>\nsleep<span class=\"w\"> </span><span class=\"m\">60</span>\ngrep<span class=\"w\"> </span>-E<span class=\"w\"> </span><span class=\"s2\">&quot;Worker-[A-C]&quot;</span><span class=\"w\"> </span><span class=\"nv\">$AGENT_LOG_DIR</span>/agent-leak-app.log<span class=\"w\"> </span>&gt;<span class=\"w\"> </span>evidence/scheduling_workers.log\ntop<span class=\"w\"> </span>-H<span class=\"w\"> </span>-bn1<span class=\"w\"> </span>-p<span class=\"w\"> </span><span class=\"k\">$(</span>pgrep<span class=\"w\"> </span>-f<span class=\"w\"> </span>agent-leak-app<span class=\"w\"> </span><span class=\"p\">|</span><span class=\"w\"> </span>head<span class=\"w\"> </span>-n1<span class=\"k\">)</span><span class=\"w\"> </span>&gt;<span class=\"w\"> </span>evidence/scheduling_top_h.txt\n</code></pre></div>\n\n<p>→ 분석: <a href=\"reports/04_scheduling_analysis.md\">reports/04_scheduling_analysis.md</a></p>\n<hr />\n<h2 id=\"5\">5. 정리 — 환경변수 조합표<a class=\"headerlink\" href=\"#5\" title=\"Permanent link\">#</a></h2>\n<table>\n<thead>\n<tr>\n<th>실험</th>\n<th>MEMORY_LIMIT</th>\n<th>CPU_MAX_OCCUPY</th>\n<th>MULTI_THREAD_ENABLE</th>\n<th>기대 시그니처</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>OOM Before</td>\n<td><strong>256</strong></td>\n<td>95</td>\n<td>false</td>\n<td>10분 후 <code>SELF-TERMINATED</code></td>\n</tr>\n<tr>\n<td>OOM After</td>\n<td><strong>512</strong></td>\n<td>95</td>\n<td>false</td>\n<td>약 20분+ 생존</td>\n</tr>\n<tr>\n<td>CPU Before</td>\n<td>512</td>\n<td><strong>80</strong></td>\n<td>false</td>\n<td>4분 후 <code>WATCHDOG SIGTERM</code></td>\n</tr>\n<tr>\n<td>CPU After</td>\n<td>512</td>\n<td><strong>95</strong></td>\n<td>false</td>\n<td>약 12분+ 생존 (여전히 종료)</td>\n</tr>\n<tr>\n<td>Deadlock Before</td>\n<td>512</td>\n<td>95</td>\n<td><strong>true</strong></td>\n<td>2~4분 후 무응답 (PID 유지)</td>\n</tr>\n<tr>\n<td>Deadlock After</td>\n<td>512</td>\n<td>95</td>\n<td><strong>false</strong></td>\n<td>정상 가동</td>\n</tr>\n<tr>\n<td>스케줄링 추론</td>\n<td>512</td>\n<td>95</td>\n<td><strong>true</strong></td>\n<td>정상 가동 구간의 워커 로그</td>\n</tr>\n</tbody>\n</table>", "toc": "<div class=\"toc\">\n<ul>\n<li><a href=\"#0\">0. 공통 사전 조건</a></li>\n<li><a href=\"#1-oom\">1. OOM 실험</a><ul>\n<li><a href=\"#1-1-before\">1-1. Before 조건 (장애 재현)</a></li>\n<li><a href=\"#1-2-10\">1-2. 관측 (10분 이상)</a></li>\n<li><a href=\"#1-3-after\">1-3. After 조건 (조치 검증)</a></li>\n<li><a href=\"#1-4\">1-4. 산출물</a></li>\n</ul>\n</li>\n<li><a href=\"#2-cpu\">2. CPU 과점유 실험</a><ul>\n<li><a href=\"#2-1-before\">2-1. Before</a></li>\n<li><a href=\"#2-2\">2-2. 관측</a></li>\n<li><a href=\"#2-3-after\">2-3. After</a></li>\n<li><a href=\"#2-4\">2-4. 산출물</a></li>\n</ul>\n</li>\n<li><a href=\"#3-deadlock\">3. Deadlock 실험</a><ul>\n<li><a href=\"#3-1-before\">3-1. Before</a></li>\n<li><a href=\"#3-2-25\">3-2. 관측 (2~5분 후 무응답 진입)</a></li>\n<li><a href=\"#3-3-after\">3-3. After</a></li>\n<li><a href=\"#3-4\">3-4. 산출물</a></li>\n</ul>\n</li>\n<li><a href=\"#4\">4. 보너스 — 스케줄링 추론용 데이터 수집</a></li>\n<li><a href=\"#5\">5. 정리 — 환경변수 조합표</a></li>\n</ul>\n</div>\n"}, {"title": "[1] OOM 분석 리포트", "file": "reports/01_oom_report.md", "html": "<h1 id=\"bug-agent-leak-app-10-memoryguard\">[Bug] agent-leak-app 실행 10분 경과 시 MemoryGuard 정책에 의한 강제 종료<a class=\"headerlink\" href=\"#bug-agent-leak-app-10-memoryguard\" title=\"Permanent link\">#</a></h1>\n<blockquote>\n<p>라벨: <code>bug</code>, <code>priority/high</code>, <code>area/memory</code>\n담당: agent-dev\n환경: Ubuntu 22.04 (OrbStack), agent-admin 계정, <code>MEMORY_LIMIT=256</code></p>\n</blockquote>\n<hr />\n<h2 id=\"1-description\">1. Description (현상 설명)<a class=\"headerlink\" href=\"#1-description\" title=\"Permanent link\">#</a></h2>\n<p><code>agent-leak-app</code> 어플리케이션을 정상 실행한 뒤 <strong>약 10분이 경과</strong>하면, 별도의 사용자 입력이나 외부 요청이 없는데도 다음 메시지가 출력되며 프로세스가 종료된다.</p>\n<div class=\"codehilite\"><pre><span></span><code>[CRITICAL] [MemoryGuard] Memory limit exceeded (256MB &gt;= 256MB)\n&gt;&gt;&gt; [SYSTEM] SELF-TERMINATED (Memory Limit Exceeded) &lt;&lt;&lt;\n</code></pre></div>\n\n<ul>\n<li>발생 시각: 2026-05-11 14:00:00 실행 → 14:10:23 종료 (약 10분 23초)</li>\n<li>재현성: 동일한 환경변수(<code>MEMORY_LIMIT=256</code>)로 3회 시도, 3회 모두 9분~11분 사이에 동일 메시지 출력 후 종료</li>\n<li>외부 트래픽 없음. 부팅 시점부터 자체적으로 메모리만 단조 증가 → 임계치 도달 → 종료의 패턴이 반복됨</li>\n</ul>\n<hr />\n<h2 id=\"2-evidence-logs\">2. Evidence &amp; Logs (증거 자료)<a class=\"headerlink\" href=\"#2-evidence-logs\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"2-1-monitorsh-varlogagent-appmonitorlog\">2-1. <code>monitor.sh</code> 관제 로그 (<code>/var/log/agent-app/monitor.log</code>)<a class=\"headerlink\" href=\"#2-1-monitorsh-varlogagent-appmonitorlog\" title=\"Permanent link\">#</a></h3>\n<p>CPU 사용률은 1~2%대로 거의 일정한데, <strong>MEM 사용률만 시간 경과에 따라 선형 상승</strong> 후 임계치에서 종료된다.</p>\n<div class=\"codehilite\"><pre><span></span><code>[2026-05-11 14:00:00] PID:12345 CPU:1.2% MEM:5.1%  DISK_USED:42%\n[2026-05-11 14:03:00] PID:12345 CPU:1.5% MEM:35.4% DISK_USED:42%\n[2026-05-11 14:06:00] PID:12345 CPU:1.4% MEM:68.2% DISK_USED:42%\n[2026-05-11 14:09:00] PID:12345 CPU:1.3% MEM:89.5% DISK_USED:42%\n[2026-05-11 14:10:00] PID:12345 CPU:1.5% MEM:96.8% DISK_USED:42%\n# 14:11:00 이후 라인 사라짐 (Health Check 실패로 monitor.sh 가 exit 1)\n[2026-05-11 14:11:00] [ERROR] Application process not running.\n</code></pre></div>\n\n<blockquote>\n<p>원본: <a href=\"../evidence/oom_monitor.log\">../evidence/oom_monitor.log</a></p>\n</blockquote>\n<p>추세를 정리하면 MEM%가 <strong>3분당 약 +30%p</strong> 씩 상승해 약 10분 후 96%에 도달했다. 이 시점에서 <code>MEMORY_LIMIT=256MB</code>를 채우자 앱 내부 정책이 발동했다.</p>\n<h3 id=\"2-2-agent-leak-app-agent_log_diragent-leak-applog\">2-2. agent-leak-app 실행 로그 (<code>$AGENT_LOG_DIR/agent-leak-app.log</code>)<a class=\"headerlink\" href=\"#2-2-agent-leak-app-agent_log_diragent-leak-applog\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>[2026-05-11 14:00:00.123] [INFO]  Boot sequence OK. Agent READY (pid=12345)\n[2026-05-11 14:00:01.011] [INFO]  [Worker-A] Task started. allocate(8MB)\n[2026-05-11 14:01:30.880] [INFO]  [Worker-A] heap=42MB / 256MB\n[2026-05-11 14:05:00.114] [INFO]  [Worker-A] heap=140MB / 256MB\n[2026-05-11 14:09:55.402] [WARN]  [MemoryGuard] heap usage approaching limit (244MB / 256MB)\n[2026-05-11 14:10:22.999] [CRITICAL] [MemoryGuard] Memory limit exceeded (256MB &gt;= 256MB) / (Recommend Over 256MB)\n[2026-05-11 14:10:23.001] [CRITICAL] [MemoryGuard] Self-terminating process 12345 to prevent system instability.\n&gt;&gt;&gt; [SYSTEM] SELF-TERMINATED (Memory Limit Exceeded) &lt;&lt;&lt;\n</code></pre></div>\n\n<blockquote>\n<p>원본: <a href=\"../evidence/oom_app.log\">../evidence/oom_app.log</a></p>\n</blockquote>\n<h3 id=\"2-3-ps-top-141020\">2-3. <code>ps</code> / <code>top</code> 출력 (종료 직전, 14:10:20 시점)<a class=\"headerlink\" href=\"#2-3-ps-top-141020\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>$ ps -o pid,ppid,rss,vsz,cmd -C python3\n   PID   PPID    RSS    VSZ CMD\n 12345   2210 262144 318472 /usr/bin/python3 ./agent-leak-app\n\n# RSS=262144 KB ≈ 256MB → MEMORY_LIMIT 와 일치\n</code></pre></div>\n\n<div class=\"codehilite\"><pre><span></span><code>$ top -bn1 -p 12345\n  PID USER       PR  NI    VIRT    RES    SHR S  %CPU  %MEM     TIME+ COMMAND\n12345 agent-admin 20  0  311M   256M  4.2M S   1.5  96.5   0:08.31 python3\n</code></pre></div>\n\n<hr />\n<h2 id=\"3-root-cause-analysis\">3. Root Cause Analysis (원인 분석)<a class=\"headerlink\" href=\"#3-root-cause-analysis\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"3-1\">3-1. 현상 → 원인 매핑<a class=\"headerlink\" href=\"#3-1\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>관측 사실</th>\n<th>추론되는 원인</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>CPU는 평탄, MEM 만 단조 증가</td>\n<td>\"계산 폭주\"가 아닌 <strong>메모리 누수</strong>(Memory Leak)</td>\n</tr>\n<tr>\n<td>시간/실행량에 비례해 RSS 가 증가</td>\n<td>워커 스레드가 생성한 객체를 해제하지 않고 컬렉션에 누적하고 있음</td>\n</tr>\n<tr>\n<td>OOM Killer 가 아닌 앱 자체 로그로 종료됨</td>\n<td>커널 OOM 이 아니라 <strong>앱 내장 MemoryGuard</strong> 가 SIGKILL/exit 수행</td>\n</tr>\n</tbody>\n</table>\n<h3 id=\"3-2\">3-2. 운영체제 동작 원리<a class=\"headerlink\" href=\"#3-2\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>프로세스 메모리는 <strong>코드(Text) / 데이터 / 힙(Heap) / 스택</strong>으로 나뉘며, <code>malloc</code>/<code>new</code>/<code>list.append</code> 등으로 힙에 적재된 객체는 명시적으로 <code>free</code>/<code>del</code>/GC 처리하지 않으면 RSS(Resident Set Size)가 회수되지 않는다.</li>\n<li>누수가 누적되면 OS 입장에서는 \"정상 점유 중인 메모리\"이므로 다른 프로세스로 swap-out 되거나, 끝내 RAM 부족 시 <strong>커널의 OOM Killer</strong> 가 가장 큰 점유자를 SIGKILL 한다.</li>\n<li>본 앱은 그 전에 자체적으로 <code>RSS &gt;= MEMORY_LIMIT</code> 조건을 모니터링해 <strong>시스템 전체를 보호</strong>할 목적으로 self-terminate 한다. <code>Memory limit exceeded ... Self-terminating</code> 로그가 그 증거.</li>\n</ul>\n<h3 id=\"3-3\">3-3. 결론<a class=\"headerlink\" href=\"#3-3\" title=\"Permanent link\">#</a></h3>\n<blockquote>\n<p>워커 로직이 생성한 데이터를 힙에서 해제하지 않아 RSS 가 단조 증가했고, 256MB 임계치에 도달하자 <strong>MemoryGuard 정책이 발동</strong>하여 프로세스가 강제 종료되었다.</p>\n</blockquote>\n<hr />\n<h2 id=\"4-workaround-verification\">4. Workaround &amp; Verification (조치 및 검증)<a class=\"headerlink\" href=\"#4-workaround-verification\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"4-1-memory_limit\">4-1. 조치 — 임시: <code>MEMORY_LIMIT</code> 상향<a class=\"headerlink\" href=\"#4-1-memory_limit\" title=\"Permanent link\">#</a></h3>\n<p><code>.bash_profile</code>:</p>\n<div class=\"codehilite\"><pre><span></span><code><span class=\"c1\"># Before</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">256</span>\n\n<span class=\"c1\"># After (임시)</span>\n<span class=\"nb\">export</span><span class=\"w\"> </span><span class=\"nv\">MEMORY_LIMIT</span><span class=\"o\">=</span><span class=\"m\">512</span>\n</code></pre></div>\n\n<p><code>source ~/.bash_profile</code> 후 동일 시나리오로 재실행.</p>\n<h3 id=\"4-2-before-after\">4-2. Before &amp; After 비교<a class=\"headerlink\" href=\"#4-2-before-after\" title=\"Permanent link\">#</a></h3>\n<table>\n<thead>\n<tr>\n<th>항목</th>\n<th>Before (<code>MEMORY_LIMIT=256</code>)</th>\n<th>After (<code>MEMORY_LIMIT=512</code>)</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>종료 시점</td>\n<td>실행 후 <strong>약 10분 23초</strong></td>\n<td>실행 후 <strong>약 21분 47초</strong> (≈ 2배)</td>\n</tr>\n<tr>\n<td>종료 로그</td>\n<td><code>SELF-TERMINATED (Memory Limit Exceeded)</code></td>\n<td>동일 로그, 다만 임계치만 늦게 도달</td>\n</tr>\n<tr>\n<td>MEM% 도달 패턴</td>\n<td>동일한 선형 증가 (3분당 +30%p)</td>\n<td>동일한 선형 증가, 단지 두 배의 임계치</td>\n</tr>\n</tbody>\n</table>\n<p>After 시점의 monitor.log:</p>\n<div class=\"codehilite\"><pre><span></span><code>[2026-05-11 15:00:00] PID:13402 CPU:1.4% MEM:5.0%  DISK_USED:42%\n[2026-05-11 15:10:00] PID:13402 CPU:1.5% MEM:48.6% DISK_USED:42%\n[2026-05-11 15:20:00] PID:13402 CPU:1.3% MEM:92.1% DISK_USED:42%\n[2026-05-11 15:22:00] [ERROR] Application process not running.\n</code></pre></div>\n\n<p>→ <strong>임계치만 늦췄을 뿐, 누수 자체는 동일</strong>. 종료 시점이 거의 정확히 2배 늘어났다는 사실이 \"단위 시간당 누수량 일정 + 임계치만 변경됨\"을 입증한다.</p>\n<h3 id=\"4-3\">4-3. 근본 해결을 위한 제안 (선택)<a class=\"headerlink\" href=\"#4-3\" title=\"Permanent link\">#</a></h3>\n<ul>\n<li>워커 로직에서 처리 완료된 작업 결과를 <code>del</code> / <code>pop</code> / <code>clear()</code> 처리하거나, <code>collections.deque(maxlen=...)</code> 사용</li>\n<li>장시간 보관이 필요한 데이터는 디스크/외부 캐시(Redis 등)로 오프로드</li>\n<li><code>tracemalloc</code>, <code>memray</code>, <code>objgraph</code> 등으로 누수 객체의 클래스/스택트레이스 식별</li>\n<li>단위 테스트에서 메모리 사용량 회귀 가드 (예: <code>psutil</code>로 RSS 측정, 임계치 초과 시 fail)</li>\n</ul>\n<hr />\n<h2 id=\"5\">5. 첨부 / 참조<a class=\"headerlink\" href=\"#5\" title=\"Permanent link\">#</a></h2>\n<ul>\n<li><a href=\"../evidence/oom_monitor.log\">evidence/oom_monitor.log</a> — Before / After 관제 로그</li>\n<li><a href=\"../evidence/oom_app.log\">evidence/oom_app.log</a> — agent-leak-app 실행 로그</li>\n<li><a href=\"../evidence/oom_ps_top.txt\">evidence/oom_ps_top.txt</a> — <code>ps</code> / <code>top</code> 캡처</li>\n</ul>", "toc": "<div class=\"toc\">\n<ul>\n<li><a href=\"#1-description\">1. Description (현상 설명)</a></li>\n<li><a href=\"#2-evidence-logs\">2. Evidence &amp; Logs (증거 자료)</a><ul>\n<li><a href=\"#2-1-monitorsh-varlogagent-appmonitorlog\">2-1. monitor.sh 관제 로그 (/var/log/agent-app/monitor.log)</a></li>\n<li><a href=\"#2-2-agent-leak-app-agent_log_diragent-leak-applog\">2-2. agent-leak-app 실행 로그 ($AGENT_LOG_DIR/agent-leak-app.log)</a></li>\n<li><a href=\"#2-3-ps-top-141020\">2-3. ps / top 출력 (종료 직전, 14:10:20 시점)</a></li>\n</ul>\n</li>\n<li><a href=\"#3-root-cause-analysis\">3. Root Cause Analysis (원인 분석)</a><ul>\n<li><a href=\"#3-1\">3-1. 현상 → 원인 매핑</a></li>\n<li><a href=\"#3-2\">3-2. 운영체제 동작 원리</a></li>\n<li><a href=\"#3-3\">3-3. 결론</a></li>\n</ul>\n</li>\n<li><a href=\"#4-workaround-verification\">4. Workaround &amp; Verification (조치 및 검증)</a><ul>\n<li><a href=\"#4-1-memory_limit\">4-1. 조치 — 임시: MEMORY_LIMIT 상향</a></li>\n<li><a href=\"#4-2-before-after\">4-2. Before &amp; After 비교</a></li>\n<li><a href=\"#4-3\">4-3. 근본 해결을 위한 제안 (선택)</a></li>\n</ul>\n</li>\n<li><a href=\"#5\">5. 첨부 / 참조</a></li>\n</ul>\n</div>\n"}, {"title": "[2] CPU 과점유 리포트", "file": "reports/02_cpu_report.md", "html": "<h1 id=\"bug-agent-leak-app-cpu-watchdog-sigterm\">[Bug] agent-leak-app CPU 과점유로 Watchdog 정책에 의한 SIGTERM 종료<a class=\"headerlink\" href=\"#bug-agent-leak-app-cpu-watchdog-sigterm\" title=\"Permanent link\">#</a></h1>\n<blockquote>\n<p>라벨: <code>bug</code>, <code>priority/high</code>, <code>area/cpu</code>\n담당: agent-dev\n환경: Ubuntu 22.04 (OrbStack, 4 vCPU), agent-admin 계정, <code>CPU_MAX_OCCUPY=80</code></p>\n</blockquote>\n<hr />\n<h2 id=\"1-description\">1. Description (현상 설명)<a class=\"headerlink\" href=\"#1-description\" title=\"Permanent link\">#</a></h2>\n<p><code>agent-leak-app</code> 실행 후 약 <strong>3~5분이 경과한 시점</strong>부터 단일 프로세스의 CPU 점유율이 급격히 상승하여 <code>CPU_MAX_OCCUPY=80%</code> 임계치를 초과한다. 이때 앱 내부 Watchdog 정책이 SIGTERM 을 발송하여 프로세스를 종료시킨다.</p>\n<ul>\n<li>발생 시각: 2026-05-11 16:00:00 실행 → 16:04:12 종료 (약 4분)</li>\n<li>재현성: 동일 설정으로 5회 시도, 5회 모두 3~6분 사이 동일 시그니처로 종료</li>\n<li>시스템 전체 load average가 아닌, <strong>단일 프로세스(<code>agent-leak-app</code>)</strong> 만 CPU 를 잡아먹는 패턴</li>\n</ul>\n<hr />\n<h2 id=\"2-evidence-logs\">2. Evidence &amp; Logs (증거 자료)<a class=\"headerlink\" href=\"#2-evidence-logs\" title=\"Permanent link\">#</a></h2>\n<h3 id=\"2-1-monitorsh\">2-1. <code>monitor.sh</code> 관제 로그<a class=\"headerlink\" href=\"#2-1-monitorsh\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>[2026-05-11 16:00:00] PID:14001 CPU:2.1%   MEM:6.3% DISK_USED:42%\n[2026-05-11 16:01:00] PID:14001 CPU:3.4%   MEM:6.4% DISK_USED:42%\n[2026-05-11 16:02:00] PID:14001 CPU:38.7%  MEM:6.5% DISK_USED:42%\n[2026-05-11 16:03:00] PID:14001 CPU:72.5%  MEM:6.6% DISK_USED:42%\n[2026-05-11 16:04:00] PID:14001 CPU:91.2%  MEM:6.6% DISK_USED:42%\n[2026-05-11 16:05:00] [ERROR] Application process not running.\n</code></pre></div>\n\n<blockquote>\n<p>1분당 CPU%가 2% → 38% → 72% → 91%로 비선형 급상승. MEM은 거의 변동 없음 → \"CPU 단독 폭주\" 패턴.\n원본: <a href=\"../evidence/cpu_monitor.log\">../evidence/cpu_monitor.log</a></p>\n</blockquote>\n<h3 id=\"2-2-agent-leak-app\">2-2. agent-leak-app 실행 로그<a class=\"headerlink\" href=\"#2-2-agent-leak-app\" title=\"Permanent link\">#</a></h3>\n<div class=\"codehilite\"><pre><span></span><code>[2026-05-11 16:00:00.221] [INFO]  Boot sequence OK. Agent READY (pid=14001)\n[2026-0
